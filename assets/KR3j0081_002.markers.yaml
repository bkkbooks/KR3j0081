  - {type: variant, offset: 610, length: 0, content: '', krp: 通覽古今間習朝廷儀體尤善漢家法度故事常見中壘校尉劉向以世俗多傳道孝文皇帝小生於軍及長}
  - {type: variant, offset: 611, length: 0, content: '', SBCK: 有識不知父所在日􅀕於代東門外髙帝數夢見一兒祭己使使至代求之果得文帝立爲代王及後徴到後期不得立日爲􅄪中及即位爲天子躬自節儉集上書囊以爲前殿惟常居明光宮聼政爲皇太薄后持三年服廬居枕塊如禮至以發大病知後子不能行三年之喪更制三十六日服治天下致升平㫁獄三百人粟升一錢有此事不同對曰皆不然謹按漢髙三年魏王豹叛漢附楚漢使大將韓信擊虜豹􅁎薄夫人}
