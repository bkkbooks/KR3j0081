  - {type: 'tls:seg', offset: 623, content: '', id: KR3j0081_CHANT_002-6a.8}
  - {type: variant, offset: 623, length: 12, content: 法度明察春夏慶賞秋冬刑罰, SBCK: 向對曰生於言事文帝禮言事者不傷其意群臣無小大至即便從容言上止輦聽之其言可者稱善不可者喜笑而已言事多褒之後人見遺文則以爲然世之毁譽莫能得實審形者少隨聲者多或至以無爲有故曰堯舜不勝其善桀紂不勝其惡桀紂非殺父與君也而世有殺君父者人皆無道如桀紂此不勝其惡故若文帝之仁賢不勝其善世俗褒揚言其德比成王治㡬太平也然文帝之節儉約身以率先天下忍容言者含咽臣子之短此亦通人難及似出於孝宣皇}
  - {type: page-break, offset: 623, content: '', id: KR3j0081_SBCK_002-13b}
  - {type: variant, offset: 623, length: 12, content: 法度明察春夏慶賞秋冬刑罰, WYG: 向對曰生於言事文帝禮言事者不傷其意羣臣無小大至即便從容言上止輦聽之其言可者稱善不可者喜笑而已言事多褒之後人見遺文則以為然世之毁譽莫能得實審形者少隨聲者多或至以無為有故曰堯舜不勝其善桀紂不勝其惡桀紂非殺父與君也而世有殺君父者人皆以為無道如桀紂此不勝其惡故若文帝之仁賢不勝其善世俗褒揚言其德比成王治㡬太平也然文帝之節儉約身以率先天下忍容言者含咽臣子之短此亦通人難及似出於孝宣皇}
