  - {type: punctuation, offset: 607, content: 《, id: KR3j0081_CHANT_002-bkkpn181}
  - {type: variant, offset: 607, length: 1, content: 易, SBCK: 春秋左氏傳葉公子髙姓沈名諸梁古者令曰公忠於社稷惠恤萬民方城之外莫不欣戴白公勝作亂子西子期刼惠王以兵葉公自葉而入至于北門或遇之曰君胡不胄國人望君如望慈父母焉盗賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇一人曰何為胄國人望君如望嵗焉日日以㡬若見君面是得艾也人知不死其亦無有奮心猶將旌君以徇扵國而又掩面以絶民望不亦甚乎乃免胄而進之與國人攻白公奔山而逝生烹石乞迎反恵王整肅官司退而老扵葉及其終也葉人追思而立祠功施於民以勞㝎國兼兹二事固祠典之所先也此乃春秋之時何有近孝明乎周書稱靈王太子􅀳㓜有盛德聡眀􅀶達師曠與言弗能}
  - {type: page-break, offset: 607, content: '', id: KR3j0081_SBCK_002-6a}
  - {type: page-break, offset: 607, content: '', id: KR3j0081_SBCK_002-6b}
  - {type: variant, offset: 607, length: 1, content: 易, WYG: 春秋左氏傳葉公子髙姓沈名諸梁古者令曰公忠於社稷惠恤萬民方城之外莫不欣戴白公勝作亂子西子期刼惠王以兵葉公自葉而入至于北門或遇之曰君胡不胄國人望君如望慈父母焉盗賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇一人曰何為胄國人望君如望嵗焉日日以㡬若見君面是得艾也人知不死其亦夫有奮心猶將旌君以狥於國而又掩面以絶民望不亦甚乎乃免胄而進與國人攻之白公奔山而縊生烹石乞迎反惠王整肅官司退而老於葉及其終也葉人追思而立祠功施於民以勞定國兼兹二事固祠典之所先也此乃春秋之時何有近孝明乎周書稱靈王太子晉㓜有盛德聰明博達師曠與言弗能尚也晉年十五顧而問曰吾聞太師能知人年之短長也師曠對曰女色赤白女聲清女色不夀晉曰然吾後三年將上賓於天女慎無言禍將及女其後太子果死孔子聞之曰惜夫殺吾君也後世以其自豫知其死傳稱王子喬仙或人問仙揚雄以為虙羲神農黄帝堯舜殞落文王葬畢孔子葬魯城之北獨不愛其死乎知非人之所能也生乎生乎吾恐名生而實死也國家畏天之威思求譴告故於上西門城上候望近太史寺令丞躬親靈臺位國之陽其屬别在城上懼有得失故參之也何有伺一飛鳬遂建其處乎世之矯誣豈一事㢤燕太子丹天為雨粟烏頭白馬生角厨人生肉足井上株木跳度瀆俗説燕太子丹為質於秦始皇執欲殺之言能致此瑞者可得生活丹有神靈天為感應於是遣使歸國謹按太史記燕太子丹質于秦始皇遇之不善丹恐而亡歸歸求勇士荆軻秦武陽函樊於期之首貢督亢之地圖秦王大悦禮而見之變起兩楹之間事敗而荆軻立死始皇大怒乃益發兵伐燕燕王走保遼東使使斬丹以謝秦燕亦遂滅丹畏死逃歸耳自為其父所戮手足圮絶安在其能使雨粟其餘云云乎原其所以有兹語者丹實好士無所愛恡也故閭閻小論飭成之耳孝文帝孝成皇帝好詩書通覧古今間習朝廷儀體尤善漢家法度故事常見中壘校尉劉向以世俗多傳道孝文皇帝少生於軍及長大有識不知父所在日祭於代東門外髙帝數夢見一兒祭己使使至代求之果得文帝立為代王及後徴到後期不得立日為再中及即位為天子躬自節儉集}
