  - {type: variant, offset: 622, length: 0, content: '', SBCK: 號令何如向未及對上謂向校尉帝師傅耆舊洽聞親事先帝歴見三世得失事無善惡如聞知之其言勿有所隱向曰文帝時政頗遺失皆所謂悔恡小疵耶嘗輦過郎署問中郎馮唐以趙將亷頗馬服唐言今雖有此人不能用也推輦而去還歸禁中召責讓唐頓首陳言聞之於祖父道亷頗李牧爲邊將市租諸入皆輸莫府而趙王不問多少日擊牛灑酒勞賜士大夫賞異有故能立威名今臣竊聞雲中太守魏尚邊之良將也匈奴常犯塞爲冦尚追之吏士争居前樂盡死力斬首上功誤差數級下之吏尚竟抵罪由是言之雖得亷頗李牧不能用也及河東太守季布治郡有聲召欲以爲御史大夫左右或毁言使酒後不用布見辭去自陳曰臣幸得待罪河東無故而見徴召此人必以臣欺國者旣到無用此人亦有以毁傷臣者今以一人言則進之以一人言則退之臣恐天下有以見朝廷短也上有慙色卒遣布之官及太中大夫鄧通以佞幸吮癕􅅑癑汁見愛擬於至親賜以蜀郡銅山令得鑄錢通私家之冨侔於王者封君又爲微行數幸通家文帝代服衣􅄢襲氈㡌騎駿馬從侍中近臣常侍期門武􅀐獵漸臺下馳射狐兎果雉刺彘是時待詔賈山諫以爲不宜數從郡國賢良吏出遊獵重令此人負名不稱其與及太中大夫賈誼亦數陳止遊獵是時誼與鄧通俱侍中同位誼又惡通爲人數廷譏之由是䟽逺遷爲長沙太傅既之官内不自得及渡湘水投吊書曰闒茸尊顯佞諛得意以哀屈原離䜛邪之咎亦因自傷爲鄧通等所愬也成帝曰其治天下孰與孝宣皇帝向曰中宗之世政教明法令行邊境安四夷親單于欵塞天下殷富百姓康樂其治過於太宗之時亦以遭遇匈奴賓服四夷和親也上曰後世皆言文帝治天下㡬至太平其德比周成王此語何從}
