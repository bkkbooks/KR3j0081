  - {type: variant, offset: 642, length: 2, content: 則象, SBCK: 爲如此及至世間言文帝小生於軍中長大祭代東門外使者求得之因立爲代王徴當即位後期日爲之再中集上書囊以爲前殿帷常居光明宮聽政爲薄太后持三年服治天下致升平斷獄三百人粟一升一錢凡此十餘事皆俗人所妄傳言過其實及傅㑹或以爲前皆非是如劉向言東方朔俗言東方朔太白星精黄帝時爲風后堯時爲務成子周時爲老聃在越爲范蠡在齊爲鴟夷子皮言其神聖能興王霸之業變化無常謹按漢書東方朔平原人也孝武皇帝時招延賢良文學之士待以不次之位故四方多上書言得失自衒鬻者於是朔詣闕自陳十二失父長養兄㛐年十三學書十四擊劒十六誦詩十九習孫吳兵法又常服子路}
  - {type: page-break, offset: 642, content: '', id: KR3j0081_SBCK_002-14a}
  - {type: page-break, offset: 642, content: '', id: KR3j0081_SBCK_002-14b}
