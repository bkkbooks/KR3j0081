  - {type: variant, offset: 3500, length: 208, content: 將銳卒因間伺隙略定西河之城南并漢中西定巴蜀東割膏腴之壤收要害之郡諸侯恐懼會盟而謀不愛尊爵重寶以致天下之士當此之時齊有孟嘗趙有平原楚有春申魏有信陵夫四豪者皆明智而忠信寬厚而愛人兼韓魏燕趙宋衛中山之眾其後復有甯越蘇秦杜赫之屬為之謀陳軫召滑樂毅之徒通其意吳起孫臏廉頗之屬制其兵嘗以十倍之地百萬之軍攻秦秦人開關延敵六國之師遁逃而不敢進秦無亡矢遺鏃之費而關東已困矣於是從散約敗爭割地而賂秦秦有餘力而制其弊及至始皇承六世之遺烈抗, SBCK: 虎草木茂}
