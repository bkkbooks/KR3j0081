  - {type: variant, offset: 862, length: 2, content: 革命, SBCK: 皇帝兹益迷謬文成五利處之不疑妻以公主賜以甲第家累萬金身佩四印辭窮情得亦旋梟裂淮南王安鋭精黄白庶㡬輕舉卒離親伏白刃之罪劉向得其遺文竒而獻之成帝令典尚方鑄作事費甚多而方不驗劾向大辟繫湏冬獄兄陽成侯乞入國半故得減死秦漢以天子之貴四海之富淮南竭一國之貢税向假尚方之饒然不能有成者夫物之變化固自有極王陽何人獨能乎㢤語曰金不可作世不可度王陽居官食祿雖爲鮮明車馬衣服亦能㡬所何足恠之乃傳俗説班固之論陋於是矣宋均令虎渡江九江多虎百姓苦之前將募民捕取武吏以除賦課郡境界皆設䧟穽後太守宋均到乃移記屬縣曰夫虎豹在山黿鼉在淵物性之所託故江淮之間有猛獸猶江北之有雞豚今數爲民害者咎在貪殘居職使然而反逐捕非政之本也壊檻穽勿復課録退貪殘進忠良後虎悉東渡江不爲民害謹按}
