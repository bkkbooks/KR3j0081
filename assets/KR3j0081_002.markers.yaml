  - {type: variant, offset: 923, length: 2356, content: 王率殷之叛國以服事殷時尚臣屬何緣便得列三王哉經美文王三分天下有其二王業始兆於此耳俗儒新生不能採綜多共辨論至於訟鬩大王王季皆見追號豈可復謂已王乎禹者輔也輔續舜後庶績洪茂自堯以上王者也子孫據國而起功德浸盛故造美論舜禹本以白衣砥行顯名升為天子雖復更制不知名著故因名焉經曰有鰥在下曰虞舜僉曰伯禹禹平水土是也湯者攘也昌也言其攘除不軌改亳為商成就王道天下熾盛文武皆以其所長夫擅國之謂王能制割之謂王制殺生之威之謂王王者往也為天下所歸往也春秋說齊桓晉文秦繆宋襄楚莊是五伯也謹按春秋左氏傳夏后太康娛於耽樂不脩民事諸侯僣差於是昆吾氏乃為盟主誅不從命以尊王室及殷之衰也大彭氏豕韋氏復續其緒所謂王道廢而霸業興者也齊桓九合一匡率成王室責彊楚之罪復菁茅之貢晉文為踐土之會修朝聘之禮納襄剋帶翼戴天子孔子稱民到于今受其賜又曰齊桓正而不譎晉文譎而不正至於三國既無歎譽一言而繆公受鄭甘言置戍而去違黃髮之計而遇殽之敗殺賢臣百里奚以子車氏為殉詩黃鳥之所為作故謚曰繆襄公不度德量力慕名而不綜實六鶂五石先著其異覆軍殘身終為僇笑莊王僭號自下摩上觀兵京師問鼎輕重恃彊肆忿幾亡宋國易子析骸厥禍亦巨皆無興微繼絕尊事王家之功世之紀事者不詳察其本末至書於竹帛同之伯功或誤後生豈不暗乎伯者長也白也言其咸建五長功實明白也或曰霸者把也駮也言其把持天子政令糾率同盟也桓公問管仲吾何君也對曰狄困於衛復兵不救須滅乃往存之仁不純為霸君也蓋三統者天地人之始道之大綱也五行者品物之宗也道以三興德以五成故三皇五帝三王五伯至道不遠三五復反譬若循連鐶順鼎耳窮則反本終則復始也楚之先出自帝顓頊其裔孫曰陸終娶于鬼方氏是謂女潰蓋孕而三年不育啟其左脅三人出焉啟其右脅三人又出焉其六曰季連是為羋其後有鬻熊子為文王師成王舉文武懃勞而封熊繹於楚食子男之采其十世稱王懷王佞臣上官子蕳斥遠忠臣屈原作離騷之賦自投汨羅王因為張儀所欺客死於秦到王負芻遂為秦所滅百姓哀之為之語曰楚雖三戶亡秦必楚自顓頊至負芻六十四世凡千六百一十六載燕召公奭與周同姓武王滅紂封召公於燕成王時入據三公出為二伯自陝以西召公主之當農桑之時重為所煩勞不舍鄉亭止于棠樹之下聽訟決獄百姓各得其所壽百九十餘乃卒後人思其德美愛其樹而不敢伐詩甘棠之所作也九世稱侯八世稱公十世稱王到王喜為秦所滅燕外迫蠻貊內笮齊晉崎嶇彊國之間最為弱小幾滅者數矣然社稷血食者八九百載於姬姓獨後亡非盛德之遺烈豈其然乎韓之先與周同姓武子事晉獻公封於韓原因以為姓韓厥因卜者之繇陳成季之功紹趙氏之孤建程嬰之義為晉名卿寔天所相其四代始與趙魏俱得列為諸侯矣五世稱王到王安為秦所滅魏之先畢公高之後也畢公與周同姓武王滅紂封高於畢因以為姓其裔孫曰畢萬事晉獻公獻公伐魏滅之以封萬卜偃曰畢萬之後必大萬盈數也魏大名也天子曰兆民諸侯曰萬民今名之大以從盈數以是有眾不亦宜乎其六世稱侯侯之孫稱王到王假為秦所滅趙之先與秦同祖其裔孫曰造父幸於周穆王為御驊騮騄耳之乘西謁西王母東滅徐偃王日馳千里帝念其功賜以趙城因以為姓子叔帶始去周事晉其後簡子地過於諸侯權重於晉君簡子疾五日不知人大夫皆懼呼毉扁鵲視之出董安于問扁鵲扁鵲曰血脈治也勿怪昔秦穆公嘗如此七日而寤寤之日告公孫支與子輿曰我之帝所甚樂吾所以久者適有學也帝告我晉國且大亂五世不安其後將霸未老而死霸者之子且令而國男女無別公孫支書而藏之秦策於是出夫獻公之亂文公之霸而襄公之敗秦師於殽而歸縱淫此子之所聞今主君之病與之同不出三日病必間間必有言也居二日半簡子寤語大夫曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬儛不類三代之樂其聲動心有一熊欲援我帝命我射之中熊熊死有羆來我又射之中羆羆死帝甚嘉之賜我二笥皆有副吾見兒在帝側帝屬我一翟犬曰及汝子之壯也以賜之帝告我晉國且衰七世而亡嬴姓將大敗周人於范魁之西而亦不能有也董安于受言書而藏之以扁鵲之言告簡子簡子賜扁鵲田四萬畝他日簡子出有人當道辟之不去從者將刃當道者曰吾欲有謁於主君從者以聞簡子召之曰嘻吾有所見子晣也當道者曰屏左右願有以謁簡子屏人當道者曰主君之病臣在帝側簡子曰然有之子之見我何為當道者曰帝令主君射熊與羆皆死簡子曰是且何也當道者曰晉國且有大難主君首之帝令主君滅二卿夫熊羆皆其祖也簡子曰帝賜我二笥皆有副何也當道者曰主君之子將剋二國於翟皆子姓也簡子曰吾見兒在帝側帝屬我一翟犬曰及汝子之長以賜之夫兒何說以賜翟犬當道者曰兒主君之子也翟犬代之先也主君之子其必有代及主君之後嗣且有革政而胡服并二國於翟簡子問其姓而延之以官當道者曰臣野人致帝命耳遂不見無幾范中行作亂簡子滅之此熊之效應也簡子卒無䘏立是為襄子智伯攻襄子襄子奔之保晉陽原過從後至於王澤見三人自帶以上可見自帶以下不可見與原過竹二節莫通曰為我以是遺趙無恤原過既至以告襄子襄子齋三日親自剖竹有朱書曰無恤余霍太山山陽侯天使三月丙戌余將使汝反滅智氏汝亦立我百邑余將使賜若林胡之地至于後世且有伉王赤黑龍面鳥噣鬚眉髭髯大膺大匈脩下而馮上左任介乘奄有河宗至于休溷諸狢南伐晉別北滅黑姑襄子再拜受三神之令三國攻晉陽歲餘乃以汾水灌其城城不沒者三板城中懸釜而炊易子而食張孟談乃夜出見韓魏韓魏反與合謀而滅智氏共分其地於是趙北有代南并知山遂祀三神於百邑使原過主霍太山至武靈王竟胡服騎射辟地千里到王遷信秦反間之言殺其良將李牧而任趙括遂為所滅此童謠曰趙為號秦為笑以為不信視地上生毛陳完字敬仲陳厲公之子也初懿氏卜妻之其繇曰是謂鳳凰于飛和鳴鏘鏘有媯之後將育于姜五世其昌並于正卿八世之後莫之與京周史有以周易筮之遇觀之否曰是謂觀國之光利用賓于王此其代陳有國乎不在此其在異國非此其身在其子孫光遠而自他有耀者也厲公為蔡所滅殺國內亂完奔于齊齊侯以為卿辭曰羈旅之臣幸若獲宥及於寬政赦其不閑於教訓而免諸罪戾弛於負擔君之惠也所獲多矣敢辱高位以速官謗詩云翹翹車乘招我以弓豈不欲往畏我友朋使為工正飲桓公酒樂公曰以火繼之辤曰臣卜其晝未卜其夜不敢, SBCK: 炳}
