  - {type: variant, offset: 525, length: 5, content: 日中為市致, krp: 唯泰山乎封者立石髙一丈二赤剋之曰事天以禮立身以義事父以孝成民以仁四守之内莫不爲郡縣四夷八蠻咸來貢職與}
  - {type: variant, offset: 526, length: 0, content: '', WYG: 不能咸至百年詩云三后在天論語曰自古皆有死太史記黄帝葬於橋山騎龍升天豈不恠乎烏號弓者柘桑之林枝條暢茂烏登其上下垂著地烏適飛去後從撥殺取以為弓因名烏號耳葉令祠俗説孝明帝時尚書郎河東王喬遷為葉令喬有神術每月朔望帝詣臺朝帝恠其數而無車騎密令太史候望言其臨至時常有雙鳬從南飛來因伏伺見鳬舉羅但得一雙舄耳使尚方識視則四年}
