  - {type: variant, offset: 646, length: 0, content: '', SBCK: 臣朔年二十三長九尺三寸目若懸珠齒若編貝勇若孟賁捷若慶忌亷如鮑叔信若尾生若此可以爲天子大臣矣朔文辭不遜髙自稱譽由是見偉稍益親幸官至太中大夫倡優畜之不䂊國政劉向少時數問長老賢通於事及朔時人皆云朔口諧倡辯不能持論喜爲凡庸誦説故今後世多傳聞者而揚雄亦以爲朔言不純師行不純德其流風遺書蔑如也然朔所以名過其實以其恢誕多端不名一行應諧似優不窮似智正諫似直穢德似隠非夷齊是栁惠其滑稽之雄乎朔之逢古射覆其事浮淺行於衆僮兒牧竪莫不􅅭耀而後之好事者因取竒言怪語附著之耳安在能神聖歴世爲輔佐哉淮南王安神仙俗説淮南王安招致賔客方術之士數千人作鴻寳苑秘枕中之書鑄成黄白白日升天謹按漢書淮南王安天資辨博善爲文辭孝武以屬諸父甚尊之招募方伎怪迂之人述神仙黄白之事財殫力屈無能成􅀗乃謀叛逆剋皇帝璽丞相將軍大夫已下印漢使符節法冠趙王彭祖列侯讓等議曰安廢法行邪僻詐僞心以亂天下營惑百姓背叛宗廟春秋無將將而必誅安罪重於將反形已定圖書印及他逆無道事驗明白丞相弘廷尉湯以聞上使宗正以符節治王安自殺太子諸所與謀皆収夷國除爲九江郡親伏白刃與衆棄之安在}
