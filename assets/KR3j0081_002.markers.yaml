  - {type: variant, offset: 215, length: 1, content: 含, SBCK: 有金篋玉䇿能知人年夀脩短武帝探䇿得十八因讀曰八十其後果用耆長武帝出璽印石裁有兆朕奉車子侯即沒其印乃止武帝畏惡亦殺去之封禪書説黄帝升封泰山於是有龍垂鬍髯下迎黄帝黄帝上騎群臣後宮從者七十餘人小臣獨不得上乃悉持龍髯㧞墯黄帝之弓小臣百姓仰望黄帝不能復乃抱其弓而號故後世因曰烏號弓孝武}
