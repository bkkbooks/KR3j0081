  - {type: variant, offset: 617, length: 1, content: 為, SBCK: 後元年六月己亥崩未央宫在時平常聽政宣室不居明光宫及皇太薄后以孝景二年四月壬子薨葬南陵文帝先太后崩不爲皇太薄后持三年服文帝遵漢家基業初定重承軍旅之後百姓新免於干戈之難故文帝宜因修秦餘政教輕刑事少與之休息以儉約節欲自持初開籍田躬勸農耕桑務民之本即位十餘年時五穀豊熟百姓足倉廪實蓄積有餘然文帝本修黄老之言不甚好儒術其治尚清浄無爲以故禮樂庠序未修民俗未能大化茍温飽完給所謂治安之國也其後匈奴數犯塞侵擾邊境單于深入冦掠賊害北地都尉殺略吏民係虜老弱驅畜産燒積聚􅀱騎至甘泉烽火通長安京師震動無不憂懣是時大發興材官騎士十餘萬軍長安帝遣丞}
