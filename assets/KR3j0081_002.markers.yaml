  - {type: variant, offset: 227, length: 222, content: 化潛通煌煌盛美不可勝量禮號謚記說伏羲祝融神農含文嘉記虙戲燧人神農伏者別也變也戲者獻也法也伏羲始別八卦以變化天下天下法則咸伏貢獻故曰伏羲也燧人始鑽木取火炮生為熟令人無復腹疾有異於禽獸遂天之意故曰遂人也神農神者信也農者濃也始作耒耜教民耕種美其衣食德濃厚若神故為神農也尚書大傳說遂人為遂皇伏羲為戲皇神農為農皇也遂人以火紀火太陽也陽尊故託遂皇於天伏羲以人事紀故託戲皇於人蓋天非人不因人非天不成也神農以地紀悉地力種㯏䟽故託農皇於地天地人之道備而三五之運興, SBCK: 仙}
