  - {type: variant, offset: 3785, length: 1, content: 壞, WYG: 生備物致用非以傷人也然時為害者乃其政使然也今均思求其政舉清黜濁神明報應宜不為災江渡七里上下隨流近有二十餘里虎山棲穴處毛鬛豈能犯陽侯凌濤瀬而横厲哉俚語狐欲渡河無奈尾何舟人持櫂猶尚畏怖不敢迎犯與之周旋云悉東渡誰指見者堯舜欽明在上稷契允懿於下當此時也寧復有虎耶若均登據三事德被四海虎豈可抱負相隨乃至鬼方絶域之地乎彭城相袁元服俗説元服父字伯楚為光禄卿於服中生此子時年長矣不孝莫大於無後故収舉之君子不隱其過因以服為字謹按元服名賀汝南人也祖父名原為侍中安帝始加元服百官㑹賀臨嚴乗出而孫適生喜其嘉㑹因名曰賀字元服原父安為司徒忠蹇匪躬盡誠事國啓發和帝誅討竇氏中興以來最為名宰原有堂構之稱矜於法度伯楚名彭清擬夷叔政則冉季歴典三郡致位上列賀早失母不復繼室云曽子失妻而不娶曰吾不及尹吉甫子不如伯竒以吉甫之賢伯竒之孝尚有放逐之敗我何人哉及臨病困勑使留葬侍衛先公慎無迎取汝母喪柩如亡者有知徃来不難如其無知祗為煩耳虞舜葬於蒼梧二妃不從經典明文勿違吾志清髙舉動皆此類也何其在服中生子而名之賀者乎雖至愚人猶不云耳予為蕭令周旋謁辭故司空宣伯應賢相把臂言易稱天地大德曰生今俗間多有禁忌生三子者五月生者以為妨害父母服中子犯禮傷孝莫肯収舉袁元服功德爵位子孫巍巍仁君所見越王勾踐民生三子與乳母孟嘗君對其父若不受命於天何不髙户}
