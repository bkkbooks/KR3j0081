  - {type: variant, offset: 621, length: 0, content: '', SBCK: 民重犯法治理不能過中宗之世地節元年天下斷獄四萬七千餘人如􅂢之言復不類前世斷獄皆以萬數不三百人文帝即位二十三年日月薄蝕地數震動毁壊民廬舍關東二十九山同日崩潰水出河決酸棗大風壊都雨雹如桃李深者厚三尺狗馬及人皆生角大雪蝗虫文帝下詔書曰間者隂陽不調日月薄蝕年穀不登大遭旱蝗饑饉之害謫見天地災及萬民丞相御史議可以佐百姓之急推此事類以不及太宗之世不可以爲升平上曰吾於臨朝綂政}
