  - {type: variant, offset: 525, length: 5, content: 日中為市致, SBCK: 唯泰山乎封者立石髙一丈二赤剋之曰事天以禮立身以義事父以孝成民以仁四守之内莫不爲郡縣四夷八蠻咸來貢職與}
  - {type: variant, offset: 525, length: 0, content: '', WYG: 唯泰山乎封者立石髙一丈二尺刻之曰事天以禮立身以義事父以孝成民以仁四海之内莫不為郡縣四夷八蠻咸來貢職與天無極人民蕃息天禄永得祭上𤣥尊而俎生魚壇廣十二丈髙三尺階三等必於其上示増髙也刻石紀號著己績也或曰金泥銀䋲封之印璽下禪梁父禮祠地主去事之殺示増廣也禪謂壇墠當有所與也三皇禪於繹繹明已功成而去有徳者居之繹繹者無所指斥也五帝禪於亭亭德不及於皇亭亭名山其身禪予聖人三王禪於梁父者信父者子言父子相信與也孝武皇帝封廣文二尺髙九尺其下有玊牒書秘書江淮間一茅三脊為神藉五色土益雜封縱逺方竒獸飛禽及白雉加祠兕牛犀象之屬其享曰天増授皇帝泰元神筴周而復始皇帝敬拜泰靈其夜有光如流星書有白雲起封中於是作明堂汶上令諸侯各治邸車駕前後五至祠以元鼎六年告封改為元封武帝己年四十七矣何縁反更得十八也就若所云明神禍福必有徴應權時倒讀焉能延夀命乎奉車子侯驂乗上下臣不預封事何因操印没石乃止暴病而死悼傷無已何云武帝殺之乎又言武帝與犯人對博碁没石中馬蹄迹處于今尚存虚妄若此非一事也予以空偽承乏東嶽忝任六載數往祈祠咨問長老賢通上泰山者云謂璽處刻石文昧難知也殊無有金篋玉牒探籌之事春秋以為傳聞不如親見見之人斯為審矣傳曰五帝聖焉死三王仁焉死五伯智焉死其隕落崩薨之}
