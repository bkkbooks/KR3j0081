  - {type: variant, offset: 2525, length: 237, content: 家益猒苦其後飲醉形壞但得老狗便朴殺之推問里頭沽酒家狗世間多有狗作變怪扑殺之以血塗門戶然眾得咎殃謹按桂陽太守汝南李叔堅少時為從事在家狗人立行家言當殺之叔堅云犬馬諭君子狗見人行效之何傷叔堅見縣令還解冠榻上狗戴持走家大驚時復云此狗誤觸冠纓冠纓挂著之耳狗於竈前蓄火家益怔忪復云兒婢皆在田中狗助蓄火幸可不煩鄰里此有何惡里中相罵不言無狗怪遂不肯殺後數日狗自暴死卒無纖介之異叔堅辟太尉掾固陵長原武令終享大位子條蜀郡都尉威龍司徒掾凡變怪皆婦女下賤何者小人愚而善畏欲信其說類復裨增文人亦不證察, SBCK: 尺深四尺漢書髙祖}
