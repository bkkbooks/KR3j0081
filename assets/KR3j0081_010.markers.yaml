  - {type: variant, offset: 2763, length: 1071, content: 俱悼懾邪氣承虛故速咎證易曰其亡斯自取災若叔堅者心固於金石妖至而不懼自求多福壯矣乎昔晉文公出獵見大虵高如隄其長竟路文公曰天子見妖則修德諸侯修政大夫修官士修身乃即齋館忘食與寢請廟曰孤犧牲瘯蠡幣帛不厚罪一也遊逸無度不䘏國政罪二也賦役重數刑罰懆剋罪三也有三罪矣敢逃死乎其夜守虵吏夢天殺虵曰何故當聖君道為及明視之則已臭爛武帝時迷於鬼神尤信越巫董仲舒數以為言武帝欲驗其道令巫詛仲舒仲舒朝服南面誦詠經論不能傷害而巫者忽死世間多有精物妖怪百端謹按魯相右扶風臧仲英為侍御史家人作食設桉欻有不清塵土投污之炊臨熟不知釜處兵弩自行火從篋簏中起衣物燒盡而簏故完婦女婢使悉亡其鏡數日堂下擲庭中有人聲言汝鏡女孫年三四歲亡之求不能得二三日乃於清中糞下啼若此非一汝南有許季山者素善卜卦言家當有老青狗物內中婉御者益喜與為之誠欲絕殺此狗遣益喜歸鄉里皆如其言因斷無纖介仲英遷太尉長史汝南汝陽西門亭有鬼魅賓客宿止有死亡其厲猒者皆亡髮失精尋問其故云先時頗已有怪物其後郡侍奉掾宜祿鄭奇來去亭六七里有一端正婦人乞得寄載奇初難之然後上車入亭趨至樓下吏卒徼白樓不可上奇云我不惡也時亦昏冥遂上樓與婦人棲宿未明發去亭卒上樓掃除見死婦大驚走白亭長亭長擊鼓會諸廬吏共集診之乃亭西北八里吳氏婦新亡以夜臨殯火滅火至失之家即持去奇發行數里腹痛到南頓利陽亭加劇物故樓遂無敢復上謹按北部督郵西平郅伯夷年三十所大有才決長沙太守郅君章孫也日晡時到亭勑前導人錄事掾白今尚早可至前亭曰欲作文書便留吏卒惶怖言當解去傳云督郵欲於樓上觀望亟掃除須臾便上未冥樓鐙階下復有火勑我思道不可見火滅去吏知必有變當用赴照但藏置壺中耳既冥整服坐誦六甲孝經易本訖臥有頃更轉東首以帤巾結兩足幘冠之密拔劍解帶夜時有正黑者四五尺稍高走至柱屋因覆伯夷伯夷持被掩足跣脫幾失再三徐以劍帶繫魅腳呼下火上照視老狸正赤略無衣毛持下燒殺明旦發樓屋得所髡人結百餘因從此絕伯夷舉孝廉益陽長楚辭云鱉令屍亡泝江而上到崏山下蘇起蜀人神之尊立為王漢淮陽太守尹齊其治嚴酷死未及殮怨家欲燒之屍亦飛去見於書傳樓上新婦豈虛也哉世間多有伐木血出以為怪者謹按桂陽太守江夏張遼叔高去𨻳令家居買田田中有大樹十餘圍扶疏蓋數畝地播不生穀遣客伐之木中血出客驚怖歸具事白叔高叔高大怒曰老樹汁出此何等血因自嚴行復斫之血大流灑叔高使先斫其枝上有一空處白頭公可長四五尺忽出往赴叔高叔高乃逆格之如此凡殺四頭左右皆怖伏地而叔高恬如也徐熟視非人非獸也遂伐其木其年同司空辟侍御史後為兗州刺史以二千石之尊過鄉里薦祝祖考白日繡衣榮羨如此其禍安居春秋國語曰木石之怪夔魍魎物惡能害人乎世間多有虵作怪者謹按車騎將軍巴郡馮緄, SBCK: 項羽要割}
