  - {type: variant, offset: 19, length: 0, content: '', SBCK: 􅀋曰山澤也五嶽東方泰山詩云泰山巖巖魯􅀖所瞻尊曰岱宗岱者長也萬物之始隂陽交代雲觸石而出膚寸而合不崇朝而徧雨天下其惟泰山乎故為五嶽之長王者受命易姓改制應天功成封禪以告天地孔子曰封泰山禪梁父可得而數七十有二岱宗廟在慱縣西北三十里山虞長守之十月日合凍臘月日涸凍正月日解凍皆太守自侍祠若有穢疾代行事法七十萬五千三牲燔柴上福脯三十朐縣次傳送京師四嶽皆王同禮南方衡山一名霍霍者萬物盛長垂枝布葉霍然而大廟在廬江􅏦縣西方崋山崋者華也萬物滋熟變華於西方也廟在弘農崋隂縣北方恒山恒者常也萬物伏藏於北方有常也廟在中山上曲陽縣中央曰嵩髙嵩者髙也詩云嵩髙惟嶽峻極于天廟在頴川陽城縣謹按尚書􅀊二月東廵狩至于岱宗柴岱宗泰山也}
  - {type: page-break, offset: 19, content: '', id: KR3j0081_SBCK_010-1b}
  - {type: page-break, offset: 19, content: '', id: KR3j0081_SBCK_010-2a}
