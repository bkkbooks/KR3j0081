  - {type: variant, offset: 24, length: 0, content: '', SBCK: 嶽同江出蜀郡湔流互徼外崏山入海詩云江漢陶陶禹貢江漢朝宗于海廟在廣陵江都縣淮出南陽平氏桐栢大復山東南入海禹貢海岱及淮淮沂其乂詩云淮水湯湯廟在平氏縣濟出常山房子賛皇山東入沮禹貢浮于汶逹于濟廟在東郡臨邑縣謹按尚書大􅀓禮三正記江河淮濟為四瀆瀆者通也所以通中國垢濁民陵居殖五榖也江者貢也珍物可貢獻也河者播為九流出龍圖也淮者均均其務也濟者齊齊其度量也林謹按詩云殷啇之旅其㑹如林傳曰山林之士徃而不能反禮記將至泰山必先有事於配林林樹木之所聚生也今配林在泰山西南五六里予前臨郡因侍}
