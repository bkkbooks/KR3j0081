  - {type: variant, offset: 40, length: 0, content: '', SBCK: 四方髙中央下像形也詩云至于頓丘宛丘之下論語他人之賢丘陵也爾雅曰天下有名丘五其三在河南二在河北墟謹按尚書舜生姚墟傳曰郭氏之墟墟者虚也郭氏古之諸侯善善不能用惡惡不能去故善人怨焉惡人存焉是以敗為丘墟也今故廬居處髙下者亦名為墟姚墟在濟隂城陽縣帝顓頊之墟閼伯之墟是也阜謹按詩云如山如阜春秋㔫氏傳魯公伯禽宅曲阜之地阜者茂也言平地隆踊不屬於山陵也今曲阜在魯城中委曲長七八里雒北芒坂即爲阜也培謹按春秋左氏傳培塿無松栢言其卑小部者阜之􅀋也今齊魯之間田中少髙卬名之爲部矣藪謹按爾雅藪者澤也藪之爲言厚也草木魚鱉所以厚養人君與百姓也魯有泰野􅀳有泰陸秦有陽紆宋有孟諸楚有雲夢呉有具區齊有海隅燕有昭餘祁鄭有圃田周有焦漢濩今漢有九州之藪揚州曰具區在呉縣之西荆州曰雲夢在華容縣南今有雲夢長掌之豫州曰圃田在中牟縣西青州曰孟諸不知在何處兖州曰大野在鉅鹿縣北雍州曰􅁌蒲在汧縣北蒲谷亭幽州曰奚養在虎縣東冀州曰泰陸在鉅鹿縣西北并州曰昭餘祈在鄢縣北其一藪推求未得其處尚書紂為逋逃淵藪春秋㔫氏傳曰山藪藏疾}
