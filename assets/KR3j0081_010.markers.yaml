  - {type: variant, offset: 497, length: 127, content: 占夢者曰請反具書晏子曰無反書公無所病病者陰也日者陽也一陰不勝二陽公病將已居三日公病大愈且賜占夢者曰此非臣之功也晏子教臣對也公召晏子將賜之晏子曰占夢者以臣之言對故有益也使臣身言之則不信矣此占夢者之力也臣無功焉公召吏而使兩賜之晏子不為奪人之功占夢者不蔽人之能, SBCK: 湖}
