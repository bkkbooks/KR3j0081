  - {type: variant, offset: 1122, length: 222, content: 哉莫之徵耳今條下禁申約吏民為陳利害其有犯者便收朝廷若私遺脫彌彌不絕主者髡截嘆無及已城陽景王縣甚尊之惟王弱冠內侍帷幄呂氏恣睢將危漢室獨見先識權發酒令抑邪扶正忠義洪毅其歆禋祀禮亦宜之於駕乘烹殺倡優男女雜錯是何謂也三邊紛拏師老器弊朝廷旰食百姓囂然禮興在有年飢則損自今聽歲再祀備物而已不得殺牛遠迎他倡賦會宗落造設紛華方廉察之明為身計而復僭失罰與上同明除見處勿後中覺九江逡遒有唐居二山九江逡遒有唐居二山名有神眾巫共為取公嫗歲易男不得復娶女不得復嫁百姓苦之, SBCK: 陂}
