  - {type: variant, offset: 22, length: 1, content: 夫, SBCK: 備嶽者埆功考德黜陟幽明也四瀆河出燉煌塞外崑崙山發源注海易河出圖聖人則之禹貢九河既道詩曰河水洋洋廟在河南滎陽縣河隄謁者掌四瀆禮祠與}
