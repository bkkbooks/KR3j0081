  - {type: variant, offset: 211, length: 193, content: 物惡能傷公公自傷也此所謂澤神委虵者也唯霸主乃得見之於是桓公欣然笑不終日而病愈予之祖父郴為汲令以夏至日詣見主簿杜宣賜酒時北壁上有懸赤弩照於杯中形如虵宣畏惡之然不敢不飲其日便得胸腹痛切妨損飲食大用羸露攻治萬端不為愈後郴因事過至宣家闚視問其變故云畏此蛇虵入腹中郴還聽事思惟良久顧見懸弩必是也則使門下史將鈴下侍徐扶輦載宣於故處設酒盃中故復有虵因謂宣曰此壁上弩影耳非有他怪宣遂解甚夷懌由是瘳平官至, SBCK: 沉沛謹按}
