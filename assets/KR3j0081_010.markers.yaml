  - {type: variant, offset: 626, length: 352, content: 漢書朱虛侯劉章齊悼惠王子高祖孫也宿衛長安年二十有氣力高后攝政諸呂擅恣章私忿之嘗入侍宴飲章為酒吏自請曰臣將種也請得以軍法行酒有詔可酒酣章進歌儛已而復曰請為太后言耕田歌太后笑曰顧汝父知田耳若生而為王者子安知田乎曰臣知之深耕廣種立苗欲䟽非其種者鉏而去之太后默然頃之諸呂有亡酒者章拔劍追斬之而還報曰有亡酒一人臣謹行軍法斬之太后左右大驚業許之矣無以罪也自是諸呂畏憚雖大臣亦皆依之高后崩諸呂作亂欲危社稷章與周勃共誅滅之尊立文帝封城陽王賜黃金千斤立二年薨城陽今莒縣是也自琅琊青州六郡及渤海都邑鄉亭聚落皆為立祠造飾五二千石車商人次第為之立服帶綬備置官屬烹殺謳歌紛籍連日轉相誑曜言有神明其譴問禍福立應歷載彌久莫之匡糾唯樂安太守陳蕃濟南相曹操一切禁絕肅然政清陳曹之後稍復如故安有鬼神能為病者哉予為營陵令以為章本封朱虛并食此縣, SBCK: ''}
