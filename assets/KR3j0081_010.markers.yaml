  - {type: variant, offset: 21, length: 0, content: '', SBCK: 合時月正日同律度量衡修五禮五玉三帛二牲一死䞇五月南廵狩至于南嶽南嶽衡山也八月西廵狩至于西嶽西嶽華山也十二月北廵狩至于北嶽北嶽恒山也皆如岱宗之禮中嵩髙也王者所居故不廵焉廵者循也狩者守也道德太平􅂲逺不同化幽隱有不得所者故自親行之也所以五載一出者蓋五嵗再閏天道}
