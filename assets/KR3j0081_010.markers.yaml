  - {type: variant, offset: 4114, length: 112, content: 次相告因為說鄉人有董彥興者即許季山外孫也其探賾索隱窮神知化雖眭孟京房無以過也然天性褊狹羞於卜術間來候師王叔茂請起往迎須臾便與俱還公祖虛禮盛饌下席行觴彥興自陳下土諸生無他異分幣重言甘誠有踧踖頗能別者願得從事公祖辭讓再三爾乃聽之, WYG: ''}
