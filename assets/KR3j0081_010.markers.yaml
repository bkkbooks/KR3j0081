  - {type: variant, offset: 1823, length: 146, content: 餘漿溉灌後人見桑中反復生李轉相告語有病目痛者息陰下言李君令我自愈謝以一豚目痛小疾亦行自愈眾犬吠聲因盲者得視遠近翕赫其下車騎常數千百酒肉滂沱間一歲餘張助遠出來還見之驚云此有何神乃我所種耳因就斮也謹按汝南汝陽彭氏墓路頭立一石人在石獸後田家老母到市買數片餌暑熱行疲頓息石人下小瞑遺一片餌去忽不自覺行, SBCK: 利漕}
