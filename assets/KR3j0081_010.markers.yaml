  - {type: variant, offset: 1970, length: 299, content: 人有見者時客適會問何因有是餌客聊調之石人能治病愈者來謝之轉以相語頭痛者摩石人頭腹痛者摩其腹亦還自摩他處放此凡人病自愈者因言得其福力號曰賢士輜輦轂擊帷帳絳天絲竹之音聞數十里尉部常往護視數年亦自歇沫復其故矣世間多有亡人魄持其家語聲氣所說良是謹按陳國張漢直到南陽從京兆尹延叔堅讀左氏傳行後數月鬼物持其女弟言我病死喪在陌上常苦飢寒操一量不借挂屋後楮上傅子方送我五百錢在北牖中皆亡取之又買李幼一頭牛本券在書篋中往求索之悉如其言婦尚不知有此女新從壻家來非其所及家人哀傷益以為審父母諸弟衰絰到來迎喪去精舍數里遇漢直與諸生十餘人相隨漢直顧見其家怪其如此家見漢直謂其鬼也惝惘良久漢直乃前為父拜說其本末且悲且喜凡所聞見, SBCK: ''}
