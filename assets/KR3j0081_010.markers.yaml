  - {type: variant, offset: 4131, length: 222, content: 外孫也其探賾索隱窮神知化雖眭孟京房無以過也然天性褊狹羞於卜術間來候師王叔茂請起往迎須臾便與俱還公祖虛禮盛饌下席行觴彥興自陳下土諸生無他異分幣重言甘誠有踧踖頗能別者願得從事公祖辭讓再三爾乃聽之曰府君當有怪白光如門明者然不為害也六月上旬雞鳴時南家哭聲吉也到秋節遷北行郡以金為名位至將軍三公公祖曰怪異如此救族不暇何能致望於所不圖此相饒耳到六月九日未明太尉楊秉暴薨七月二日拜鉅鹿太守鉅邊有金後為度遼將軍歷登三事今妖見此而應在彼猶趙鞅夢童子裸歌而吳入郢也, SBCK: 澤第十}
