  - {type: variant, offset: 2320, length: 138, content: 有知乎曰賜爾死自知之由未晚也董無心云杜伯死親射宣王於鎬京子以為桀紂所殺足以成軍可不須湯武之眾古事既察且復以今驗之人相啖食甚於畜生凡菜肝鱉瘕尚能病人人用物精多有生之最靈者也何不芥蔕於其胸腹而割裂之哉猶死者無知審矣而時有漢直為狗鼠之所為世間亡者多有見神語言飲食其家信以為是益用悲傷, SBCK: 饒焉溝}
