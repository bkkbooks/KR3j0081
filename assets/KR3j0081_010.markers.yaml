  - {type: variant, offset: 1544, length: 189, content: 民間使其無知又何能禍人遂移書屬縣曉諭百姓民不得有出門之祀督課部吏張設罪罰犯尉以下坐祀依託鬼神恐怖愚民皆按論之有屠牛輒行罰民初恐怖頗搖動不安或接祝妄言倫勑之愈急後遂斷無復有禍祟矣謹按汝南鮦陽有於田得麇者其主未往取也商車十餘乘經澤中行望見此麇著繩因持去念其不事持一鮑魚置其處有頃其主往不見所得麇反見鮑君澤中非人道路怪其如是大以為神轉相告語治病求福多有效驗因為起祀舍眾巫數十帷帳鍾鼓方, SBCK: 京師}
