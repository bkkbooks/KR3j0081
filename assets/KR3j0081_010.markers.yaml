  - {type: variant, offset: 34, length: 1, content: 鬼, SBCK: 義取於此陵謹按詩云如山如陵易曰伏戎于莾升其髙陵又天險不可升地險山川丘陵春秋㔫氏傳曰殽有二陵其南陵夏后臯之墓也其北陵文王之所避風雨也殽在􅀪農澠池縣其語曰東殽西殽澠池所髙國語周單子㑹􅀳厲公於加陵爾雅曰陵莫大於加陵言其獨髙厲也陵有天性自然者今王公墳壟各稱陵也丘謹按尚書民乃降丘度土堯遭洪水萬民皆山棲巢居以避其害禹決江䟽河民乃下丘營度爽塏之場}
