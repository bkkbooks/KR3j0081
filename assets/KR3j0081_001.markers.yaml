  - {type: variant, offset: 188, length: 415, content: 言通於流俗之過謬而事該之於義理也風者天氣有寒煖地形有險易水泉有美惡草木有剛柔也俗者含血之類像之而生故言語歌謳異聲鼓舞動作殊形或直或邪或善或淫也聖人作而均齊之咸歸於正聖人廢則還其本俗尚書天子巡守至于岱宗覲諸侯見百年命大師陳詩以觀民風俗孝經曰移風易俗莫善於樂傳曰百里不同風千里不同俗戶異政人殊服由此言之為政之要辯風正俗最其上也周秦常以歲八月遣輶軒之使以歲八月遣輶軒之使求異代方言還奏籍之藏於秘室及嬴氏之亡遺脫漏棄無見之者蜀人嚴君平有千餘言林閭翁孺才有梗概之法楊雄好之天下孝廉衛卒交會周章質問以次注續二十七年爾乃治正凡九千字其所發明猶未若爾雅之閎麗也張竦以為懸諸日月不刊之書予實頑闇無能述演豈敢比隆於斯人哉顧惟述作之功故聊光啟之耳昔客有為齊王畫者王問畫孰最難孰最易曰犬馬最難鬼魅最易犬馬旦暮在人之前不類不可類之故難鬼魅無形無形者不見不見故易今俗語雖云浮淺然賢愚所共咨論有似犬馬其為難矣并綜事宜於今者孔子稱幸苟有過人必知之俾諸明哲幸詳覽焉, SBCK: 皇霸卷第一}
