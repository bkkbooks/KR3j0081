  - {type: variant, offset: 100, length: 0, content: '', krp: 當此之時齊有孟嘗趙有平原楚有春申魏有信陵夫四豪者皆明智而忠信寛厚愛人兼韓魏燕趙宋衛中山之衆其後復有寗越蘇秦杜赫之屬爲之謀陳軫召滑樂毅之徒通其意呉起孫臏亷頗之屬制其兵嘗以十倍之地百萬之軍攻秦秦人開關延敵六國之師遁逃而不敢進秦無一矢遺鏃之費而關東已困於是從散約敗争割地而賂秦秦有餘力而制其弊及至始皇承六世之遺烈抗長䇿而御宇内吞二周而叱諸侯履至尊而制六合兼帝皇而威四海于時議者恨楚之䟽逺屈原魏不用公子無忌故國削以至於亡秦因愚弱之極運震電之蕭條混壹海内爲漢驅除蓋乗天之所壊誰能枝之雖阿衡宰政賁育馭戎何益於事且有彊兵良謀}
