  - {type: variant, offset: 6, length: 0, content: '', SBCK: 秦穆公嘗如此七日而寤寤之日告公孫支與子輿曰我之帝所甚樂吾所以乆者適有學也帝告我􅀳國且大亂五世不安其後將霸未老而死霸者之子且令國男女無別公孫支書而藏之秦策於是出夫獻公之亂文公之霸而襄公之敗秦師於殽而歸縱滛此子所聞今主君之病與之同不出三日病必間有言也居二日半簡子寤語大夫曰我之帝所樂與百神遊於鈞天廣樂于九奏萬儛不類三代之樂其聲動心有一熊欲援我射之中熊死有羆來我又射之中羆死帝甚嘉之賜我二笥皆有副吾見兒在帝側屬我翟犬曰及汝子之壯也以賜之帝告我􅀳國且衰十世而亡嬴姓將大敗周人於范魁之西亦不能有也董安于受言而藏之以扁鵲之言告簡子賜扁鵲田四萬畒他日簡子出有人當道辟之不去從者將刃當道者曰吾有欲謁於主君從者以聞簡子召之曰嘻吾有所見子晣也當道者曰屏左右願有以謁簡子屏人當道者曰主君之病臣在帝側簡子曰然子之見我何爲當道者曰帝令主君射熊羆皆死簡子曰是且何也當道者曰􅀳國且大難主君首之帝令主滅二卿夫熊羆皆其祖也簡子曰帝賜我二笥皆有副何也當道者曰主君之子將剋二國於翟皆子姓也簡子曰吾見兒在帝側屬一翟犬曰及汝子之長以賜之夫兒何説以賜翟犬當道者曰兒主君之子也翟犬代之先也主君之子其必有代及主君之後嗣且有革政而胡服并二國於翟簡子問其姓而延之以官當道者曰臣野人致帝命耳遂不見無㡬范中行作亂簡子滅之此熊之効應也簡子卒無䘏立是爲襄子智伯攻襄子襄子奔之保􅀳陽原過從後至王澤見三人自帶以上不可見與原過竹二節莫通爲我以是遺趙無恤原過既至以告襄子齋三日親自剖竹有朱書曰無恤余霍太山陽侯大吏三月丙戌余將使汝及滅智氏亦立我三百邑余將使賜若林胡之地至于後世且有伉王赤黒龍面鳥屬鬚眉髭髯大膺大匈脩下而馮上左任介乗奄有河宗至于休溷諸狢南伐􅀳别北滅黒姑襄子再拜受三神之令三國攻􅀳陽嵗餘乃以汾水灌其城城不沒者三板城中懸釡而炊易子而食張孟談乃夜出見韓魏韓魏反與合謀而滅智氏共分其地於是趙北有代南并知山遂祀三神於百邑使原過主霍太山至武靈王竟胡服騎射辟地千里到王遷信秦反間之言殺其良將李牧而任趙括遂爲所滅此童謡曰趙爲號秦爲笑以爲不信視地上生毛陳完字敬}
