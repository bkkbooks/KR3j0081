  - {type: variant, offset: 4, length: 1, content: 序, SBCK: 皇霸第一蓋天地剖分萬物萌毓非有典藝之文堅基可據推當今以覽太古自昭昭而本􅄀􅄀乃欲審其事而建其論董其是非而綜其詳矣言也實爲難哉故易紀三皇書叙唐虞惟天爲大唯堯則之巍巍其有成功煥乎其有文章自是以來載籍昭晳然而立談者人異綴文者家舛斯乃楊朱哭於岐路墨翟悲於練素者也是以上述三皇下記六國備其終始曰皇霸三皇春秋運斗樞説伏羲女媧神農是三皇也皇者天天不言四時行焉百物生焉三皇垂拱無爲設言而民不違道德􅀇泊有似皇天故稱曰皇皇者中也光也弘也含弘履中開隂陽布剛上含皇極其施光明指天畫地神化潜通煌煌盛美不可勝量禮號謚記説伏羲祝融神農含文嘉記虙戯燧人神農伏者别也變也戯者獻也法也伏羲始别八卦以變化天下天下法則咸伏貢獻故曰伏羲也燧人始鑚木取火炮生爲熟令人無復腹疾有異於禽獸遂天之意故曰遂人也神農神者信也農者濃也始作耒耜教民耕種美其衣食德濃厚若神故爲神農也尚書大傳説遂人爲遂皇伏羲爲戯皇神農爲農皇也遂人以火紀火太陽也陽尊故託遂皇於天伏羲以人事紀故託戯皇於人蓋天非人不因人非天不成也神農悉地力種㯏䟽故託農皇於地天地人道備而三五之運興矣謹按易稱古者伏羲氏之王天下也仰則觀象於天俯則觀法於地始作八卦以通神明之德以類萬物之情結繩爲網罟以田以漁伏羲氏没神農氏作斵木爲耜揉木爲耒耒耜之利以教天下日中爲市致天下之民通其變使民不倦神而化之使民宜之唯獨叙二皇不及遂人遂人功重於祝融女媧文明文見大傳之義斯近之矣五帝易傳禮記春秋國語太史公記黄帝顓頊帝嚳帝堯帝舜是五帝也謹按易尚書大傳天立五帝以爲相四時施生法度明察春夏慶賞秋冬刑罰帝者任德設刑以則象之言其能行天道舉錯審諦黄帝始制冠冕垂衣裳上棟下宇以避風雨禮文法度興事創業黄者光也厚也中和之色德四季與地同功故先黄以别之也顓者專也頊者信也言其承易文之以質使天下䝉化皆貴貞慤也嚳者考也成也言其考明法度醇美嚳然若酒之芬香也堯者髙也饒也言其隆興焕炳㝡髙明者推行道徳舜者推也循也言其循堯緒也三王禮號謚記説夏禹殷湯周武王是三王也尚書説文王作罰刑兹無赦詩説有命自天命此文王文王受命有此武功儀刑文王萬國作孚春秋􅀃王者孰謂謂文王也謹按易稱湯武革命尚書武王戎車三百兩虎賁八百人擒紂於牧之野惟十有三祀王訪于箕子詩云亮彼武王襲伐大啇勝殷遏劉􅂄定武功由是言之武王審矣論語文王率殷之叛國以服事殷時尚臣屬何縁便得列三王哉經美文王三分天下有其二王業始兆於此耳俗儒新生不能採綜多共辨論至於訟鬩大王王季皆見追號豈可復謂已王乎禹者輔也輔續舜後庶績洪茂自堯以上王者皆子孫據國而起功德浸盛故造美論舜禹本以白衣砥行顯名升爲天子雖復更制不如名著故因名焉經曰有鰥在下曰虞舜僉曰伯禹禹平水土是也湯者攘也昌也言其攘除不􅁤改亳爲啇成就王道天下熾盛文武皆以其所長夫擅國之謂王能制割之謂王制殺生之威之謂王王者徃也爲天下所歸徃也五伯春秋説齊桓􅀳文秦繆宋襄楚莊是五伯也謹按春秋左氏傳夏后太康娱於耽樂不循民事諸侯僣差於是昆吾氏乃爲盟主誅不從命以尊王室及殷之衰也大彭氏豕韋氏復續其緒所謂王道廢而霸業興者也齊桓九合一匡率成王室責彊楚之罪復青茅之貢􅀳文爲踐土之㑹修朝聘之禮納襄尅帶翼戴天子孔子稱民到于今受其賜又曰齊桓正而不譎􅀳文譎而不正至於三國既無歎譽一言而繆公受鄭甘言置戎而去違黄髪之計而遇殽之敗殺賢臣百里奚以子車氏爲殉詩黄鳥之所爲作故謚曰繆襄公不度德量力慕名而不綜實六鶂五石先著其異覆軍殘身終爲僇笑莊王僣號自下摩上觀兵京師問鼎輕重恃彊肆忿㡬亡宋國易子析骸厥禍亦巨皆無興微繼絶尊事王家之功世之紀事者不詳察其本末至書於竹帛同之伯功或誤後生豈不暗乎伯者長也白也言其咸建五長功實明白或曰霸者把也駮也言把持天子政令紏率同盟也桓公問管仲吾何君也對曰狄困於衛復兵不救湏滅乃徃存之仁不純爲霸君也蓋三綂者天地人之始道之大綱也五行者品物之宗也道以三興德以五成故三皇五帝三王五伯至道不逺三五復反譬若循連鐶順鼎耳窮則反本終則復始也六國楚之先出自帝顓頊其裔孫曰陸終娶于􅀑方氏是謂女漬蓋孕而三年不育啓其左脅三人出焉啓其右脅三人又出焉其六曰季連是爲芊其後有鬻熊子爲文王師成王舉文武懃勞而封熊繹於楚食子男之采其十世稱王懐王佞臣上官子簡斥逺忠臣屈原作離騷之賦自投汨羅水因爲張儀所欺客死於秦到王負芻遂爲秦所滅百姓哀之爲之語曰楚雖三戸亡秦必楚自顓頊至負芻六十四世凡千六百一十六載燕召公奭與周同姓武王滅紂封召公於燕成王時入據三公出爲二伯自陜以西召公主之當農桑之時重爲所煩勞不舍鄉亭止于棠樹之下聽訟決獄百姓各得其所夀百九十餘乃卒後人思其德美愛其樹而不敢伐詩甘棠之所作也九世稱侯八世稱公十世稱王到王喜爲秦所滅燕外迫蠻貃内笮齊􅀳﨑嶇彊國之間最爲弱小㡬滅者數矣然社稷血食者八九百載於􅁎姓獨後亡非盛德之遺烈豈其然乎韓之先與周同姓武子事􅀳獻公封於韓原因以爲姓韓厥因卜者之繇陳成季之功紹趙氏之孤建程嬰之義爲􅀳名卿寔天所相其四代始與趙魏俱得列爲諸侯矣五世稱王到王安爲秦所滅魏之先畢公髙之後也畢公與周同姓武王滅紂封髙於畢因以爲姓其裔孫曰畢萬事􅀳獻公獻公伐魏滅之以封萬卜偃曰畢萬之後必大萬盈數魏大名也天子曰兆民諸侯曰萬民今名之大以從盈數以是有衆不亦宜乎其六世稱侯侯之孫稱王到王假爲秦所滅趙之先與秦同祖其裔孫曰造父於周穆王爲御驊騮騄耳之乗西謁西王母東滅徐偃王日馳千里帝念其功賜以趙城因以爲姓子叔帶始去周事􅀳其後簡子地過於諸侯權重於􅀳君簡子疾五日不知人大夫皆懼呼毉扁鵲視之出董安于問扁鵲曰血脉治也勿怪}
