  - {type: variant, offset: 7, length: 2, content: 尼沒, krp: 陳厲公之子也初懿氏卜妻之其繇曰是謂鳯凰于飛和鳴鏘鏘有嬀之後將育于姜五世其昌並于正卿八世之後莫之與京周史有以周易筮之遇觀之否曰是謂觀國之光利用賓于王此其代陳有國乎不在此其在異國非此其身在其子孫光逺}
  - {type: variant, offset: 10, length: 1, content: 微, SBCK: 自他有耀者也厲公爲蔡所滅殺國内亂完奔于齊齊侯以爲卿辭曰覊旅之臣幸若􅀗宥及於寛政赦其不閑教訓而免諸罪戾弛於負檐君之惠也所􅀗多矣敢辱髙位以速官謗詩云翹翹車乗招我以弓豈不欲徃畏我友朋使爲工正飲桓公酒樂曰以火辤曰臣卜其晝未卜其夜不敢君子曰酒以成禮弗繼以滛義也以君成禮弗納於滛仁也桓公嘉之愛敬日新位比髙國始食田采姓田氏焉六世田成殺簡公其三世曰和遷康公於海上食一城以祠太公以下後魏文侯乃使使}
