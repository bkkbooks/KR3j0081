  - {type: variant, offset: 7, length: 2, content: 尼沒, SBCK: 陳厲公之子也初懿氏卜妻之其繇曰是謂鳯凰于飛和鳴鏘鏘有嬀之後將育于姜五世其昌並于正卿八世之後莫之與京周史有以周易筮之遇觀之否曰是謂觀國之光利用賓于王此其代陳有國乎不在此其在異國非此其身在其子孫光逺}
