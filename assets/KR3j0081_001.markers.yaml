  - {type: variant, offset: 47, length: 137, content: 易有數家之傳並以諸子百家之言紛然殽亂莫知所從漢興儒者競復比誼會意為之章句家有五六皆析文便辭彌以馳遠綴文之士雜襲龍鱗訓註說難轉相陵高積如丘山可謂繁富者矣而至於俗間行語眾所共傳積非習貫莫能原察今王室大壞九州幅裂亂靡有定生民無幾私懼後進益以迷昧聊以不才舉爾所知方以類聚凡一十卷謂之, WYG: 庫全書}
