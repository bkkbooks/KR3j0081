  - {type: variant, offset: 588, length: 1, content: 苟, WYG: 若獲宥及於寛政赦其不閑教訓而免諸罪戾弛於負擔君之惠也所獲多矣敢辱髙位以速官謗詩云翹翹車乗招我以弓豈不欲徃畏我友朋使為工正飲桓公酒樂曰以火辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮弗繼以滛義也以君成禮弗納於滛仁也桓公嘉之愛敬日新位比髙國始食田采姓田氏焉六世田成殺簡公其三世曰和遷康公於海上食一城以祠太公以下後魏文侯乃使使言周天子及諸侯列爵於周室其孫曰威王到王建用后勝之計及賓客多受秦金勸王朝秦不修戰備秦兵卒歩入臨淄民無敢格者遷王建於共國人歌之曰松耶柏耶住建共者客耶疾建用客之不詳也謹按戰國䇿太史公記秦孝公據殽函之固擁雍州之地君臣戮力以窺周室}
  - {type: page-break, offset: 588, content: '', id: KR3j0081_WYG_001-11b, image: WYG0862/WYG0862-0357b.png}
  - {type: variant, offset: 590, length: 1, content: 過, WYG: 席巻天下囊括八荒之意當是之時商君佐之内立法度務耕織修守戰之備外猛將鋭卒因間伺隙略定西河之城南并漢中西定巴蜀東割膏腴之壤収要害之郡諸侯恐懼㑹盟而謀不愛尊爵重寳以致天下之士當此之時齊有孟嘗趙有平原楚有春申魏有信陵夫四豪者皆明智而忠信寛厚而愛}
  - {type: page-break, offset: 590, content: '', id: KR3j0081_WYG_001-12a, image: WYG0862/WYG0862-0357c.png}
