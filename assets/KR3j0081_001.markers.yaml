  - {type: variant, offset: 280, length: 0, content: '', WYG: 大傳説遂人為遂皇伏羲為戯皇神農為農皇也遂人以火紀火太陽也陽尊故託遂皇於天伏羲以人事紀故託戯皇於人蓋天非人不因人非天不成也神農悉地力種㯏䟽故託農皇於地天地人道備而三五之運興矣謹按易稱古者伏羲氏之王天下也仰則觀象於天俯則觀法於地始作八卦以通神明之德以類萬物之情結䋲為網罟以田以漁伏羲氏沒神農氏作斵木為耜揉木為耒耒耜之利以教天下日中為市致天下之民通其變使民不倦神而化之使民宜之唯獨叙二皇不及遂人遂人功重於祝融女媧文明象天大傳之義斯近之矣五帝易傳禮記春秋國語太史公記黄帝顓頊帝嚳帝堯帝舜是五帝也謹按易尚書大傳天立五帝以為相四時施生法度明察春夏慶賞秋冬刑罰帝者任德設刑以則象之言其能行天道舉錯審諦黄帝始制冠冕垂衣裳上棟下宇以避風雨禮文法度興事創業黄者光也厚也中和之色德四季與地同功故先黄以别之也顓者專也頊者信也言其承易文之以質使天下䝉化皆貴貞慤也嚳者考也成也言其考明法度醇美嚳然若酒之芬香也堯者髙也饒也言其隆興焕炳㝡髙明也舜者推也循也言其推行道徳循堯緒也三王禮號諡記説夏禹殷湯周武王是三王也尚書説文王作罰刑兹無赦詩説有命自天命此文王文王受命有此武功儀刑文王萬邦作孚春秋説王者孰謂謂文王也謹按易稱湯武革命尚書武王戎車三百兩虎賁八百人擒紂於牧之野惟十有三祀王訪于箕子詩云亮彼武王襲伐大商勝殷遏劉耆定武功由是言之武王審矣論語文王率殷之叛國以服事殷時尚臣屬何縁便得列三王哉經美文王三分天下有其二王業始兆於此耳俗儒新生不能採綜多其辨論至於訟鬩大王王季皆見追號豈可復謂已王乎禹者輔也輔續舜後庶績洪茂自堯以上王者皆子孫據國而起功德浸盛故造美號舜禹本以白衣砥行顯名升為}
