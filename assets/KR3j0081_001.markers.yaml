  - {type: variant, offset: 592, length: 1, content: 必, WYG: 兼韓魏燕趙宋衛中山之衆其後復有寗越蘇秦杜赫之屬為之謀陳軫召滑樂毅之徒通其意呉起孫臏亷頗之屬制其兵嘗以十倍之地百萬之軍攻秦秦人開關延敵六國之師遁逃而不敢進秦無亡矢遺鏃之費而關東已困於是從散約敗争割地而賂秦秦有餘力而制其弊及至始皇承六世之遺烈抗長䇿而御宇内吞二周而叱諸侯履至尊而制六合兼帝皇而威四海于時議者恨楚之䟽逺屈原魏不用公子無忌故國削以至於亡秦因愚弱之極運震電之聲威混壹海内為漢驅除蓋乗天之所壊誰能支之雖阿衡宰政賁育馭戎何益於事且有彊兵良謀雜襲繼踵毎輒挫䘐亦足以袪蔽啓䝉矣始皇自以關中之固金城千里子孫帝王萬世之業也遂恣睢舊習矯任其私}
