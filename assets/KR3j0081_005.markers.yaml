  - {type: variant, offset: 3125, length: 2, content: 攝固, WYG: 備光輝疏附之任而當側身陪乘執䇿握革有死而已無能為役薛丞因前自白今明公乘出未有御者雖云不敏敢充人之周旋進對補察時闕言出成謨大見敬重亦以祖為髙嵗盡俱舉孝亷謹按周禮保氏掌六藝之教}
