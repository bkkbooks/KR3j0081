  - {type: variant, offset: 2313, length: 235, content: 豫其好禮記曰大夫三月葬同位畢至此言謹終悼亡不說子弟當見寵拔也魯有后成叔聘衛右宰穀留而觴之陳樂而不樂酒酣而不飲送以璧其妻孥隔宅而居之分祿而食之其子長而反其璧孔子稱可寄百里之命託六尺之孤臨大節而不可奪相於之義具於此矣語有曰白頭如新交蓋如舊簞食壺漿會於樹陰臨別眷眷念在報效何有同歲相臨而可拱默者哉春秋因其可褒而褒之若乃世公二郡之舉斯為過矣然世人亦多淺薄在者無之亡者無顧覆之施飢寒緩急視之若遺非徒如此而已至有可否之際受刑誅者人各有心兩不得中夫孝廉平除則有社稷民人傷及民人實宜料度, SBCK: ''}
