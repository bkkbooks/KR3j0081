  - {type: variant, offset: 3107, length: 0, content: '', WYG: 夫舉無他也唯善所在親䟽一也祁奚稱其讎不為諂立其子不為比舉其偏不為黨建一官而三物成晉國賴之君子歸焉蓋人君者闢門開窻號咷博求得賢而賞聞善若驚無適也無莫也周不綜臧否而務藴崇之韓演不唯善是務處以一槩夫不擇而彊用之與可用而敗之其罪一也安定太守汝南胡伊伯建平長樊紹孟建俱為司空虞放掾屬放遜位自劾還家郡以伊為主簿迎新太守}
