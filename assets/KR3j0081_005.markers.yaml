  - {type: variant, offset: 91, length: 3, content: 郅惲君, WYG: 范滂孟博天資聦叡辯於持論舉孝亷光禄四行京師歸徳四方影附父字叔矩遭母憂旣𦵏之後饘粥不贍叔矩謂其兄弟禮喪不言事杖而起今俱匍匐號咷上闕奠酹下困餬口非孝道也因將人客於九江田種蓄牧多所收獲以解債負土成冢立祀三年服闋二兄仕進叔矩以自替於䘮紀獨寢墳側服制如初哀猶未歇郡舉至孝拜中司勾}
