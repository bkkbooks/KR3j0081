  - {type: variant, offset: 4, length: 0, content: '', SBCK: 海無所不綂焉孟軻稱不枉尺以直尋况於枉尋以直尺栁下惠不枉道以事人故三黜而不去}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 庫全書風俗通義卷五漢應劭撰十反易記出處黙語書美九徳咸事同歸殊塗一致百慮不期相反各有云尚而已是故伯夷譲國以採薇展禽不去於所生}
  - {type: variant, offset: 4, length: 0, content: '', krp: 海無所不綂焉孟軻稱不枉尺以直尋况於枉尋以直尺栁下惠不枉道以事人故三黜而不去}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 丘周流以應聘長沮隱居而耦耕墨翟摩頂以放踵楊朱一毛而不為干木息偃以藩魏包胥重繭而存郢夷吾朱絃以三歸平仲辭邑而濯纓惠施從車以百乘伯扈徒歩而祼形甯戚商歌以干禄顔闔踰墻而遁榮髙柴趣門以避難季路求入而隕零端木結駟以貨殖顔回屢空而弗營孟獻髙宇以羙室原憲蓬門而株楹傳曰人心不同有如其面古今行事是則然矣比其舛曰十反太尉沛國劉矩叔方父字叔遼屢世卿尹好學敦整士名不休揚又無力援仕進陵遲而叔方雅有髙問逺近偉之州郡辟請未嘗答命徃來京師委質通門太尉徐防太傅桓焉二公嘉其孝敬慰愍契闊為之先後叔遼由此辟公府博士徴議郎叔方爾乃飜然改志以禮進退三登台衮號為名宰陽翟令左馮翊田煇叔都兄字威都俱合純懿不隕洪祚叔都最為知名郡常欲察舉之煇恥越賢兄懼不得免因縁他疾遂託病瘖家人妻}
  - {type: page-break, offset: 5, content: '', id: KR3j0081_WYG_005-1b, image: WYG0862/WYG0862-0378b.png}
  - {type: page-break, offset: 5, content: '', id: KR3j0081_WYG_005-2a, image: WYG0862/WYG0862-0379a.png}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 謂之不恭今紹見編會以禮遊引耳其義不同於此伊心明審自求多福近靈帝之末司徒掾􅀪農董君考上名典君事不得自劾暫以家急假太季崇請乞相見頫領功曹與俱班録訖乃遣時公袁隗意亦非之然彈紏自是之後彌以滋甚郡用從事縣用府吏上下溷淆良可穢也詩云雖無老成人尚有典刑國之大綱也可不申勑小懲而大戒哉宗正南陽劉祖奉為郡屬曹吏左騎校尉薛丞君卓為户曹史太守公孫慶當祠章陵舊俗常以衣冠子孫容止端嚴學問通覽任頋問者以為御史時功曹白用劉祖祖曰旣託帝王肺腑過聞前訓不能備光輝胥附之任而當側身陪乗執䇿握革有死而已無能為役薛丞因前自白今明公垂出未有御者雖云不敏敢充人之周旋進對補察時闕言出成謨大見敬重亦以祖為髙嵗盡俱舉孝廉謹按周禮保氏掌藝之教其一曰御論語曰吾何執執御乎子適衛冉子僕有政事之士列于四友然猶御者不為役也春秋左氏傳晉悼公即位程鄭為乗馬御訓群騶知禮今國家大駕大僕親御他出奉車都尉寜可復言執䇿握革而辭譲之乎凡黔首皆五帝子孫何獨今之肺腑當見優異也宗廟之人或在甽畒人之化也何日之有舊時長吏質樸子皆駕御故曰從兒君臣父子其揆一也臣不肯御乎豈可然公子遂偃蹇不使下陵上替能無亂乎劉祖幸免罪戾而見褒賞公孫於是失政刑矣聘士彭城姜肱伯雅京兆韋著休明靈帝踐祚太后臨朝陳竇以忠見害中常侍曹節秉國之權大作威福兾寵名賢以弭已謗於是起家肱為犍為太守著東海相肱告其人吾以虚獲實藴藉聲價盛明之際尚不委質况今政在家哉遂乗桴浮海莫知其極而著驩以承命駕言宵征民不見徳唯戮是聞論輸左校謹按易}
