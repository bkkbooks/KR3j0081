  - {type: variant, offset: 3167, length: 1, content: 掩, WYG: 使下陵上替能無亂乎劉祖幸免罪戾而見褒賞公孫於是失政刑矣聘士彭城姜肱伯雅京兆韋著休明靈帝踐祚太后臨朝陳竇以忠見害中常侍曹節秉國之權大作威福翼寵名賢以弭已謗於是起姜肱為犍為太守著東海相肱告其人吾以虗獲實藴藉聲價盛明之際尚}
