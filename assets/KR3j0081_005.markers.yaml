  - {type: variant, offset: 3108, length: 2, content: 舊章, WYG: 我是宰士何可委質於二朝乎因出門逺遁劾繫陳國紹曰栁下惠}
  - {type: variant, offset: 3111, length: 7, content: 可無也凡張官置, WYG: 去父母之國君子不辭下位獨行服事後三公黄瓊大以為恨移書汝南論正主者吏絶紹文書而更辟伊謹按春秋尊公曰宰其}
