  - {type: variant, offset: 3162, length: 1, content: 綏, WYG: 䇿握革而辭譲之乎凡黔首皆五帝子孫何獨今之肺腑當見優異也宗廟之人或在甽畒人之化也何日之有舊時長吏質檏子皆駕御故曰從兒君臣父子其揆一也臣}
