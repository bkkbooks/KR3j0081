  - {type: variant, offset: 3099, length: 5, content: 忘率由舊章, WYG: 以從令為孝而乘囂然要勒同儕去喪即寵謂能有功異也明試無效亦旋告退安在其顯君父徳美之有河内太守府廬江周景仲嚮每舉孝亷請之上堂家人宴飲皆令平仰言笑晏晏如是三四臨發贈以衣裝皆出自中子弟中外過歴職署踰於所望曰移臣作子於今何有河内太守司徒潁川韓演伯南舉孝亷唯臨辭一與相見無所寵㧞曰我已舉若豈可令恩偏積於一門乎謹按春秋}
