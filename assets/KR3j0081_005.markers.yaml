  - {type: variant, offset: 1122, length: 1338, content: 殆令先祖不復血食不孝不智而兩有之歸其義勇其義何居汝南陳茂君因為荊州刺史時南陽太守灌恂本名清能茂不入宛城引車到城東為友人衛修母拜到州恂先是茂客仕蒼梧還到修家見修母婦說修坐事繫獄當死因詣府門移辭乞恩隨輩露首入坊中容止嚴恪鬚眉甚偉太守大驚不覺自起立賜巾延請甚嘉敬之即焉出修南陽士大夫謂恂能救解修茂彈繩不撓修竟極罪恂亦以它事去南陽疾惡殺修為之語曰衛修有事陳茂治之衛修無事陳茂殺之謹按春秋王人之微處于諸侯之上坐則專席止則專館朱軒駕駟威烈赫奕就恂素為官速謗當便入傳引見詰問糾其贓狀以時列聞文王日昃不暇食周公坐而俟旦且非為己私皆公也何有忘百姓塗炭之急便迺光昭舊交之問乎鮑宣州牧行部多宿下亭司直舉劾以為輕威損命坐之刑黜今茂泯棄天常進止由己孰使毀之小人譽之自我為之古人病諸以為大譏茂與修善由鴟鴞之愛其子適所以害之者度遼將軍安定皇甫規威明連在大位欲退避弟數上病不見聽會友人上郡太守王旻物故規素縞到下亭迎喪發服送之因令客密告并州刺史胡芳言規擅遠軍營赴私違公當及舉奏荅曰威明欲得避弟故作激發我為朝廷惜其功用何能為此私家計耶規後為中郎將督并涼益三州時有黨事懼見及因先自上言臣前薦故太常張奐才任將帥是附黨也又臣昔論輸左校時太學生張鳳等上書訟臣是為黨人所附也昔有畏舟之危而自投水者蓋憂難於處樂其亟決謹按詩云淑人君子其儀不忒其儀不忒正是四國傳曰一心可以事百君百心不可事一君論語夫子溫良恭儉讓以得之立朝忘家即戎忘身身且忘之況於弟乎方殊俗越溢大為邊害朝廷比辟公旰食規義在出身折衝弭難而誅伐已定當見鎮慰何有挾功苟念去位弟實雋德不患無位而徒闒茸何所堪施彊推轂之亂儀干度孝武皇帝為驃騎將軍霍去病治第舍勑令視之曰匈奴不滅何以家為去病外戚末屬一切武夫尚能抗節洪毅而規世家純儒何獨負哉又以黨事先自勞衒如有白驗其於及己而形兆求不可得唯是從何憚於病曰畏舟之危自投於水憂難於處樂其亟決主幸必不坐太誓有云民之所欲天必從之天作孽猶可違自作孽不可逭人之所忌炎自取之蓋嚴楊惲勳著王室言事過差皆伏大辟以隆主威抑驕侵也規顧弟私也離局姦也誘巧詐也畏舟慢也四罪是矣殺決可也南陽五世公為廣漢太守與司徒長史段遼叔同歲遼叔太子名舊才操鹵鈍小子髡既見齒鄉黨到見股肱曰太守與遼叔同歲恩結締素薄命早亡幸來臨郡今年且以此相饒舉其子如無罪得至後歲貫魚之次敬不有違有主簿柳對曰明府謹終追遠興微繼絕然舊實不如髡宜可授之世公於是厲聲曰丈夫相臨兒女尚欲舉之何謂高下之間耶釋兄用弟此為故殃段氏之家豈稱相遭遇之意乎竟舉舊也世公轉換南陽與東萊太守蔡伯起同歲欲舉其子伯起自乞子瓚尚弱而弟琰幸以成人是歲舉琰明年復舉瓚瓚十四未可見眾常稱病遣詣生交到十八乃始出治劇平春長上書臣甫弱冠未任宰御乞留宿衛尚書劾奏增年受選減年避劇請免瓚官詔書左遷武當左尉會車騎將軍馮緄南征武陵蠻夷緄與伯起同時公府辟瓚為軍曲候瓚歸臥家軍功除新陽長官至下邳相謹按古無孝廉唯有貢士貢士恩義經傳無以也春秋諸侯朝覲會遇大夫亦豫其好禮記曰大夫三月葬同位畢至此言謹終悼亡不說子弟當見寵拔也魯有后成叔聘衛右宰穀留而觴之陳樂而不樂酒酣而不飲送以璧其妻孥隔宅而居之分祿而食之其子長而反其璧孔子稱可寄百里之命託六尺之孤臨大節而不可奪相於之義具於此矣語有曰白頭如新交蓋如舊簞食壺漿會於樹陰臨別眷眷念在報效何有同歲相臨而可拱默者哉春秋, WYG: ''}
