  - {type: variant, offset: 800, length: 894, content: 上欺天子中誣方伯下誑吏民扶輔耄亂政自己出雖幸無闕罪已不容於誅矣為人謀而不忠愛人而以姑息凡人不可況於君子乎上令興負貪昧之罪子被署用之愆章問洶赫父子湮沒執事如此謂禮義何稜宜禁固終身中原非是太原周黨伯況少為鄉佐發黨過於人中辱之黨學春秋長安聞報讎之義輟講下辭歸報讎到與鄉佐相聞期鬭日鄉佐多從兵往使鄉佐先拔刀然後相擊佐欲直令兵擊之黨被創困乏佐服其義勇箯輿養之數日蘇興乃知非其家即徑歸其立勇果乃至於是謹按孝經身體髮膚受之父母不敢毀傷孝之始也樂正子春下堂而傷足三月不出既瘳矣猶有憂色身無擇行口無擇言脩身慎行恐辱先也而伯況被發則得就業鄉佐雖云凶暴何緣侵己今見辱者必有以招之身自取焉何尤於人親不可辱在我何傷凡報讎者謂為父兄耳豈以一朝之忿而肆其狂怒者哉既遠春秋之義殆令先祖不復血食不孝不智而兩有之歸其義勇其義何居汝南陳茂君因為荊州刺史時南陽太守灌恂本名清能茂不入宛城引車到城東為友人衛修母拜到州恂先是茂客仕蒼梧還到修家見修母婦說修坐事繫獄當死因詣府門移辭乞恩隨輩露首入坊中容止嚴恪鬚眉甚偉太守大驚不覺自起立賜巾延請甚嘉敬之即焉出修南陽士大夫謂恂能救解修茂彈繩不撓修竟極罪恂亦以它事去南陽疾惡殺修為之語曰衛修有事陳茂治之衛修無事陳茂殺之謹按春秋王人之微處于諸侯之上坐則專席止則專館朱軒駕駟威烈赫奕就恂素為官速謗當便入傳引見詰問糾其贓狀以時列聞文王日昃不暇食周公坐而俟旦且非為己私皆公也何有忘百姓塗炭之急便迺光昭舊交之問乎鮑宣州牧行部多宿下亭司直舉劾以為輕威損命坐之刑黜今茂泯棄天常進止由己孰使毀之小人譽之自我為之古人病諸以為大譏茂與修善由鴟鴞之愛其子適所以害之者度遼將軍安定皇甫規威明連在大位欲退避弟數上病不見聽會友人上郡太守王旻物故規素縞到下亭迎喪發服送之因令客密告并州刺史胡芳言規擅遠軍營赴私違公當及舉奏荅曰威明欲得避弟故作激發我為朝廷惜其功用何能為此私家計耶規後為中郎將督并涼益三州時有黨事懼見及因先自上言臣前薦故太常張奐才任將帥是附黨也又臣昔論輸左校時太學生張鳳等上書訟臣是為黨人所附也昔有畏舟之危而自投水者蓋憂難於處樂其亟決謹按詩云淑人君子其儀不忒其儀不忒正是四國傳曰一心可以事百君百心不可事一君論語, SBCK: ''}
