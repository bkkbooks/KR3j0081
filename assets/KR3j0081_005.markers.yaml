  - {type: variant, offset: 3215, length: 8, content: 遠薦功曹策名委質, WYG: 倀曰可自力也舉為創草臣聞易曰天垂象見吉㓙觀乎天文以察時變臣竊見九月庚辰今月丙辰辰月遇熒惑於東井旁光輝合并移時乃出經術淺末不曉天官見其非常昭昭再見誠切恠之誠懣憤夫月者太隂熒惑火星不宜相干臣聞盛徳之主不能無異但當變改有以供御孔子曰雖明天子熒惑必謀禍福之徴慎察用之孝宣皇帝地節元年月蝕熒惑明年有霍氏亂孔子曰火上不可握熒惑班變不可息志帝應其修無極此言熒惑火精尤史家所宜察也楚莊曰災異不見寡人其亡今變異屢臻此天以佑助漢室覺悟國家也臣誠懼史官畏忌不敢極言惟陛下深留聖思按圖書之文鑒古今之戒召見方直極言而靡諱親賢納忠推誠應人猶影響也宋景公有善言熒惑徙舍延年益夀况乎至尊感不旋日書曰天畏棐諶言天徳輔誠也周公將没戒成王以左右常伯常任凖人綴衣虎賁言此五官存亡之機不可不謹也臣願陛下思周旦之言詳左右清禁之内謹供養之官嚴宿衛之身申𠡠屢省務知戒慎以退未萌以此無疆謹匍匐自力手書宻上上覽倀表嘉其忠謨倀目數病手能細書詡案大臣茍肆私意詡坐上謝倀䝉慰勞謹按論語能以禮譲為國乎何有夫子温良恭儉譲以得之傳曰心茍不競何憚於病朱倀位極人臣視事數年訖無一言彌縫時闕又倀年且九十足以惛憒義當自引以避賢路}
