  - {type: variant, offset: 582, length: 93, content: 怵忮以采名譽末流論起於愛憎而政在陪隸也司空潁川韓稜少時為郡主簿太守興被風病恍忽誤亂稜陰扶輔其政出入二年署置教令無愆失興子嘗出教欲轉徙吏稜執不聽由是發露被考興免官稜坐禁固章帝即位一切原除也, SBCK: 謝倀􅂪慰勞}
  - {type: variant, offset: 582, length: 536, content: 怵忮以采名譽末流論起於愛憎而政在陪隸也司空潁川韓稜少時為郡主簿太守興被風病恍忽誤亂稜陰扶輔其政出入二年署置教令無愆失興子嘗出教欲轉徙吏稜執不聽由是發露被考興免官稜坐禁固章帝即位一切原除也謹按易稱守位以仁尚書無曠庶官詩云彼君子不素飡兮論語陳力就列不能者止漢典吏病百日應免所以卹民急病懲俗逋慝也今興官尊任重經略千里當聽訟侍祠班詔勸課早朝旰食夕惕若厲不以榮祿為樂而以黔首為憂位過招殃靈督其舋風疾恍忽有加無瘳稜統機括知其虛實當聽上病以禮選引何有上欺天子中誣方伯下誑吏民扶輔耄亂政自己出雖幸無闕罪已不容於誅矣為人謀而不忠愛人而以姑息凡人不可況於君子乎上令興負貪昧之罪子被署用之愆章問洶赫父子湮沒執事如此謂禮義何稜宜禁固終身中原非是太原周黨伯況少為鄉佐發黨過於人中辱之黨學春秋長安聞報讎之義輟講下辭歸報讎到與鄉佐相聞期鬭日鄉佐多從兵往使鄉佐先拔刀然後相擊佐欲直令兵擊之黨被創困乏佐服其義勇箯輿養之數日蘇興乃知非其家即徑歸其立勇果乃至於是謹按孝經身體髮膚受之父母不敢毀傷孝之始也樂正子春下堂而傷足三月不出既瘳矣猶有憂色身無擇行口無擇言脩身慎行恐辱先也而伯況被發則得就業鄉佐雖云凶暴何緣侵己今見辱者必有以招之身自取焉何尤於人親不可辱在我何傷凡報讎者謂為父兄耳豈以一朝之忿而肆其狂怒者哉既遠, WYG: 皇}
  - {type: variant, offset: 582, length: 93, content: 怵忮以采名譽末流論起於愛憎而政在陪隸也司空潁川韓稜少時為郡主簿太守興被風病恍忽誤亂稜陰扶輔其政出入二年署置教令無愆失興子嘗出教欲轉徙吏稜執不聽由是發露被考興免官稜坐禁固章帝即位一切原除也, krp: 謝倀蒙慰勞}
