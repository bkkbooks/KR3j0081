  - {type: variant, offset: 3120, length: 0, content: '', WYG: 士言於四海無所不綂焉孟軻稱不枉尺以直尋况於枉尋以直尺栁下惠不枉道以事人故三黜而不去孔子謂}
  - {type: page-break, offset: 3120, content: '', id: KR3j0081_WYG_005-8b, image: WYG0862/WYG0862-0382b.png}
  - {type: variant, offset: 3121, length: 3, content: 律度故, WYG: 不恭今紹見貶當以禮自引耳其義不同於此伊心明審自求多福近靈帝之末司徒掾𢎞農董君考上名典君事不得自劾暫以家急假太守季崇請乞相見頫領功曹與俱班録訖乃謝遣時三公袁隗意亦非之奮然彈糾自是之後彌以滋甚郡用從事縣用府吏上下溷淆良可穢也詩云雖無老成人尚有典刑國之大綱也可不申勑小懲而大戒哉宗正南陽劉祖為郡屬曹吏左騎校尉薛丞君卓為户曹史太守公孫慶當祠章陵舊俗常以衣冠子孫容止端嚴學問通覽任顧問者以為御吏時功曹白用劉祖祖曰旣託帝王肺腑過聞前訓不}
  - {type: page-break, offset: 3121, content: '', id: KR3j0081_WYG_005-9a, image: WYG0862/WYG0862-0382c.png}
