  - {type: variant, offset: 3041, length: 18, content: 向日解衣裘捕虱已因傾臥厥形悉表露將軍, WYG: 山歠其子羮文侯壮其功而疑其心秦西巴蜀命放獸而孟氏旋進其位麑猶不忍况弟子乎孟軻譏無惻隱之心傳曰於厚者薄則無所不薄矣豫章太守汝南封祈武興泰山太守周乘子居為太守張所舉函封未發張病物故}
