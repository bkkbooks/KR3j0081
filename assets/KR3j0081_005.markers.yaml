  - {type: variant, offset: 3207, length: 0, content: '', WYG: 虐刑以逞}
  - {type: variant, offset: 3208, length: 0, content: '', WYG: 心怨痛徳薄位尊力小任重古人懼旃鮮能不及矣趙相汝南李綂少㓜為兾州刺史况所奏耳目不聰明股肱掾史咸用忿憤欲詣闕自理統聞知之歴收其家遣吏追還曰相乆叅重任負於素餐年漸七十禮在懸車頃被疾病念存首丘比自乞歸}
  - {type: page-break, offset: 3208, content: '', id: KR3j0081_WYG_005-11a, image: WYG0862/WYG0862-0383c.png}
  - {type: variant, offset: 3210, length: 3, content: 德唯詐, WYG: 聽許州家幸能為相得去實至願也居無幾果徴時兾州有疑獄章帝見問統統處當詳平克厭上心曰君大聰明刺史侵君統曰臣受國厚恩官尊禄重不能自竭有以報稱乆抱重疾氣力羸露耳聾目眩常慮隕越自分奄忽填壑猥得承望闕廷親見御座不勝其喜權時有瘳辭出之後必復故也刺史不侵臣也上悅其遜即日免况拜綂侍中司徒九江朱倀以年老為司𨽻虞詡所奏耳目不聰明見掾屬大怒曰顚而不扶焉用彼相君勞臣辱何用為於}
  - {type: page-break, offset: 3210, content: '', id: KR3j0081_WYG_005-11b, image: WYG0862/WYG0862-0383d.png}
