  - {type: variant, offset: 3029, length: 4, content: 梁冀從事, WYG: 掾弟子使客殺人捕得太守盛亮隂為宿留糾亦自劾去詣府亮與相見不乞請又不辭謝亮告賓客周孟玉欲作抗直不恤其親我何能枉憲乎遂斃于獄弟婦不哭死子而哭孟玉世人誤之猶以為髙謹按春秋叔牙為慶父殺般閔公大惡之甚而季子縁獄有所歸不探其情緩追逸賊親親之道州吁旣殺其君而虐用其人石碏惡之而厚與焉大義滅親君子猶曰純臣之道備矣於恩未也君親無將王誅宜耳今二家之子幸非元惡但望誠心内發哀情外露義動君子合禮}
