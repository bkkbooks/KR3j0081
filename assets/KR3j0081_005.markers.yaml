  - {type: variant, offset: 27, length: 146, content: 已至於訐以為直隱以為義枉以為厚偽以為名此眾人之所致譽而明主之所必討蓋觀過知仁謂中心篤誠而無妨於化者故覆其違理曰過譽也長沙太守汝南郅惲君章少時為郡功曹郡俗冬饗百里內縣皆齎牛酒到府宴飲時太守司徒歐陽歙臨饗禮訖教曰西部督郵繇延天資忠貞稟性公方典部折衝摧破姦雄不嚴而治書曰安民則惠黎民懷之蓋舉善以教則, SBCK: ''}
