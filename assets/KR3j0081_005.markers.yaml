  - {type: variant, offset: 1, length: 2, content: 譽第, krp: 歴職署踰於所望曰移臣作子於之何有河内太守司徒頴川韓演伯南舉孝亷唯臨辭一與相見無所寵㧞曰我已舉若豈可令恩偏積於一門乎謹按春秋左氏傳夫舉無他也唯善所在親踈一也祁奚稱其讎不為諂立其子不為比舉其偏不為黨建一官而三物成晉國頼之君子歸焉蓋人君者闢門開窓號咷慱求得賢而賞聞善若驚無適也無莫也周不綜臧否而務藴崇之韓演不唯善是務越以一槩夫不擇而疆用之與可用而敗之其罪一也安定太守汝南胡伊伯建平長樊紹孟建俱爲司空虞放掾屬放遜位自劾還家郡以伊爲主簿迎新太守曰我是宰士何可委質於二朝乎因出門名户占繫陳國紹曰桞下惠不去父母之國君子不辭下位獨行服事後公黄瓊大以爲恨移書汝南論正主者吏絶紹文書而更辟伊謹按春秋尊公曰宰其吏為士言於}
