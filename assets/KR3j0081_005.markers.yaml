markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 風俗通義十反第五易記出處黙語書美九徳咸事同歸殊塗一致百慮不期相反各有云尚而已是故伯夷讓國以採薇展禽不去於所生孔丘周流以應聘長沮隱居而耦耕墨翟摩頂以放踵楊朱一毛而不為干木息偃以藩魏包胥重壐而存郢夷吾朱絃以三歸平仲辭邑而濯纓惠施從車以百乘扈徒歩而祼形甯戚商歌以干禄顔闔踰墻而遁榮髙柴趣門以避難季路求入而隕零端木結駟以貨殖顔回屢空而弗營孟獻髙宇以美室原憲蓬門而株楹傳曰人心同有其面古今行事是則然矣比其舛曰十反沛國劉叔方父字叔遼累祖學敦土名不休揚又無力仕陵叔方雅有髙問逺近偉之州郡辟請未嘗荅命徃來京師委質通門太尉徐防太傅桓焉二公嘉其孝敬慰愍契闊為之先後叔遼由此辟公府博士徴議郎叔方爾乃翻然改志以禮進退三登台衮號為宰陽翟令左馮翊田煇叔都兄威都俱合純懿不隕洪祚叔都最為知名郡常欲爲察授之煇恥越賢兄懼不得免因縁他疾遂託病瘖家人妻子莫知其情人數恐灼持之有度後在田舎天連隂雨友人張子平吉仲考等宻共穿踰奪取衣衾窮夜獨處廹切至矣然無聲響徒喑喑而已子平因前抱持曰我某公也謂汝避兄耳何意眞然耶天䘮斯人吾儕將何效乎相對歔欷哀動左右間積四嵗威都果舉遷安定長史據輜垂緌還歴鄉里薦祀祖考叔都沃醊神坐頫仰因語是月司􅀠太尉大將軍同時並辟為侍御史舉茂才不幸早隕威都官至武都太守太尉掾汝南范滂孟博天資聦叡辯於持論舉孝廉光禄主事京師歸德四方影附父字叔矩遭母憂旣葬之後饘粥不贍叔矩謂其兄弟禮不言事辯杖而起今俱匍匐號咷上闕奠酹下困餬口非孝道也因將人客於九江田種畜牧多所收獲以解債負土成􅃁立祀三年服闋二兄仕進叔矩以自替於䘮紀獨寢墳側服制如初哀猶未歇郡舉至孝拜中司勾章長病去官博士徴兄憂不行司徒梁國盛允字子翩為議郎慕孟慱之德貪樹於有禮謂孟博公區區欲辟大臣宜令邑人廉薦孟博厲聲曰老夫年尊絶意世事又海内清髙當路非一退而告人子翩欲德我我不受也子翩亦以恨遂不得辟孟博病去受事而常幹宰相之職謹按禮父為士子為天子武王建有周之號諡大王王季言王業肇於此矣越裳重九譯獻白雉周公薦陳祖廟曰先人之徳有天下尊歸於父此人道之極前漢詔曰海内大亂兵革並起朕被堅執鋭自率士卒犯危難平暴亂偃兵息民天下大安此皆太公之教訓也今上尊號曰太上皇春秋之義因其可褒而褒之孝經曰敬其父則子恱叔矩則其孝敬則粥身苦思率禮無違矣則其友于則褒兄委榮盡其哀情矣則其學藝則家法洽覽誨人不倦矣則其政事則施於已試靡有闕遺矣君子百行子産有四凡在他姓尚宜褒之况於父乎敬意之至猶用夷恱况於寵族乎抗爽言以拒厚㫖抑所生以為己髙忍能厲然獨享其榮若乃不令之下愚流貨財於權嬖其罪人也田煇託疾上也劉矩屈體次也范滂吾無取焉耳巴郡太守太山但望伯門為司徒掾同産子作客殺繫望自劾去星行電征數日歸趨詣府路首肉袒辭謝太守太尉李固謝與相見頓頭流血自說弟薄命早亡以孤為託無義方之教自陷罪惡自男穿旣與知情幸有微胤乞以代之言甚哀切李公逹於原度即活出之髙唐令樂安周紏孟玉為大將軍掾弟子使客殺人捕得太守盛亮隂為􅀫留紏亦自劾去詣府亮與相見不乞請又不辭謝亮告賓客周孟玉欲作抗直不恤其親我何能枉憲乎遂斃于獄弟婦不哭死子而哭孟玉世人誤之猶以為髙謹按春秋叔牙為慶父殺般閔公大惡之甚而季子縁獄有所歸不探其情緩追逸賊親親之道州吁旣殺其君而虐用其人石碏惡之而厚與焉大義滅親君子猶曰純臣之道備矣於恩未也君親無將王誅宜耳今二家之子幸非元惡但望誠心内發哀情外露義動君子合禮中矣周紏茍執果毅忽如路人昔樂羊為魏伐中山歠其子羮文侯壮其功而疑其心秦西巴蜀命放獸而孟氏旋進其位麑猶不忍况弟子乎孟軻譏無惻隠之心傳曰於厚者薄則無所不薄矣豫章太守汝南封祈武興泰山太守周乗子居為太李張所舉函封未發張病物故夫人於柩側下帷見六孝廉曰李氏􅂪國厚恩據重任咨嘉休懿相授嵗貢上欲報稱聖朝下欲流惠氓􅀠今李氏獲保首領以天年終而諸君各懐進退未肯發引妾幸有三孤足統䘮紀正相追隨蓬斆墳栢何若曜德王室昭顯亡者亡者有靈實寵頼之殁而不朽此其然乎於是周乗頋謂左右諸君欲行周乗當止者莫逮郎君盡其哀惻乗與鄭伯堅即日辭行祈與黄叔度郅伯嚮盛孔叔留隨轜柩乗拜郎遷陵長治無異稱意亦薄之某官與祈相反俱為侍御史公車令享相位焉謹按孝經資於事父以事君君親臨之厚莫重焉春秋國語民生於三事之如一禮斬衰公士大夫衆生為其君乘雖見察授凾封未發未離陪􅀠不與賔于王爵諸臨城社民神之主也義當服懃關其祀紀夫人雖有懇切之教蓋子不以從令為孝而乘囂然要勒同儕去䘮即寵謂能有功異也明試無效亦旋告退安在其顯君父徳美之有河内太守府廬江周景仲嚮每舉孝亷請之上堂家人宴飲皆令平仰言笑宴宴如是三四臨發贈以衣齊皆出自中子弟中外}
