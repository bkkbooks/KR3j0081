  - {type: variant, offset: 2988, length: 270, content: 日無故便去為郡功曹所選頗有不用因稱狂亂首走出府門太守以其宿有重名忍而不罪後為大將軍梁冀從事中郎將冬月坐庭中向日解衣裘捕虱已因傾臥厥形悉表露將軍夫人襄城君云不潔清當亟推問將軍嘆曰是趙從事絕清高士也他事若此非一也謹按詩云不愆不忘率由舊章左氏傳曰舊章不可無也凡張官置吏為之律度故能攝固其位天下無覬覦也今仲讓不先謁府乃徑到縣俱諜吏民爾乃入舍論語升車必正立執綏不內顧不掩不備不見人短見禮記戶有二屨不入將上堂聲必揚家且猶若此況於長吏乎君子之仕行其道也民未見德唯詐是聞遠薦功曹策名委質就有不合當徐告退古既待放須起乃逝何得亂道進退自由傲很天常若無君父洪範陳, SBCK: 反第}
