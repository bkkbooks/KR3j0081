  - {type: page-break, offset: 0, content: '', id: KR3j0081_SBCK_004-1a}
  - {type: variant, offset: 0, length: 2143, content: 愆禮第三夫聖人之制禮也事有其制曲有其防為其可傳為其可繼賢者俯就不肖跂及是故子張過而子夏不及然則無愈子路喪姊朞而不除仲尼以為大譏況於忍能矯情直意而已也哉詩云不愆不忘帥由舊章論語不為禮無以立故注近世苟妄曰愆禮也九江太守武陵陳子威生不識母常自悲感游學京師還於陵谷中見一老母年六十餘因就問母姓為何曰陳家女李氏何故獨行曰我孤獨欲依親家子威再拜長跪自白曰子威少失慈母姓陳舅氏亦李又母與亡親同年會遇於此乃天意也因載歸家供養以為母謹按禮繼母如母慈母如母謂繼父之室慈愛己者皆有母道故事之如母也何有道路之人而定省世間共傳丁蘭剋木而事之今此之事豈不是似如仁人惻隱哀其無歸直可收養無事正母之號耳大將軍掾燉煌宣度為師大常張文明制杖謹按禮記孔子之喪門人疑所服子貢曰昔夫子之喪顏淵若喪子而無服至子路亦然請喪夫子如喪父而無服群居則絰出則否今人乃為制杖同之於父論者既不匡糾而云觀過知仁謂心之哀惻終始一者也凡今杖者皆在權戚之門至有家遭齊衰同生之痛俯伏墳墓而不歸來真不愛其親而愛他人者也無他也庶福報耳凡庸小生夫何譏稱然宣度涼州知名士吾是以云耳山陽太守汝南薛恭祖喪其妻不哭臨殯於棺上大言自同恩好四十餘年服食祿賜男女成人幸不為夭夫復何恨哉今相及也謹按禮為適妻杖重於宗也妻者既齊於己澄漠酒醴以養舅姑契闊中饋經理蠶織垂統傳重其為恩篤勤至矣且鳥獸之微尚有回翔之思啁噍之痛何有死喪之感終始永絕而曾無惻容當內崩傷外自矜飭此為矯情偽之至也俚語婦死腹悲唯身知之又言妻非禮所與此何禮也豈不悖哉大尉山陽王龔與諸子並杖太傅汝南陳蕃袁隗皆制衰絰列在服位躬入隧哀以送之近得禮中王公諸子魏杖亦過矣弘農太守河內吳匡伯康少服職事號為敏達為侍御史與長樂少府黃瓊共佐清河王事文書卬成甚嘉異之後匡去濟南相瓊為司空比比援舉起家拜尚書遷弘農班詔勸耕道於澠池間瓊薨即發喪制服上病載輦車還府謹按春秋大夫出使聞父母之喪徐行而不反君追還之禮也匡雖為瓊所援舉由郡縣功曹州治中兵曹位朝廷尚書也凡所按選豈得復為君臣者耶今匡與瓊其是矣剖符守境勸民耕桑肆省冤疑和解仇怨國之大事所當勤恤而顧私恩傲狠自遂若宮車晏駕何以過茲論者不深察而歸之厚多有是言及其人患失而亦曰其然司空袁周陽舉荀慈明有道太尉鄧伯條舉訾孟直方正二公薨皆制齊衰世非一然荀訾通儒於義足責或舉者名位斥落子孫無繼多不親至何乃衰乎過與不及古人同稱弔服之制斯近之矣河南尹太山羊嗣祖在家平原相封子衡葬母子衡故臨太山數十日時嗣祖去河南矣子衡四從子曼慈復為太山士大夫用此行者數百人皆齊衰絰帶時與太尉府自劾歸家故侍御史胡毋季皮獨過相候求欲作衰謂君不為子衡作吏何制服曰眾人若此不可獨否又謂足下徑行自可今反相歷令子失禮僕豫愆古有弔服可依其制因為裁縞冠幘袍單衣定大為同作所非然潁川有識陳元方韓元長綦毋廣明咸嘉是焉謹按禮為舊君齊衰三月謂策名委質為臣吏者也子衡臨郡日淺無他功惠又非其身嗣祖位則亞卿雅有令稱義當綱紀人倫為之節文而首倡導犯禮違制使東嶽一郡朦朦焉豈不愍哉由郕人失兄子皋為之衰雖失於子衡歸於曼慈者矣太原郝子廉飢不得食寒不得衣一介不取諸人曾過娣飯留十五錢默置席下去每行飲水常投一錢井中謹按易稱天地交萬物生人道交功勳成語願車馬衣輕裘與朋友共弊之而無憾士相見之禮贄用腒雉受而不距而交荅焉唯祭飯然後拜之孔子食於施氏未嘗不飽何有同生之家而顧錢者哉傷恩薄禮弊之至也孟軻譏仲子吐鶂鶂之羹而食井上苦李鮑焦耕田而食穿井而飲非妻所織不衣餓於山中食棗或問之此棗子所種耶遂嘔吐立枯而死世不乏異惟其似旃孔子疾時貪昧退思狂狷狷者有所不為亦其介也南陽張伯大鄧子敬小伯大三年以兄禮事之伯臥床上敬寢下小榻言常恐清旦朝拜俱去鄉里居緱氏城中亦教授坐養聲價伯大為議郎益州太守子敬辟司徒公車徵謹按禮記十年兄事之五年肩隨之詩云如切如磋如琢如磨朋友衎衎誾誾各長其儀也凡兄弟相愛尚同輿而出同床而寢今相校三年耳幸無骨血之屬坐作鬼怪旦朝言恐論語恭而無禮則勞且晏平仲稱善與人交豈徒拜伏而已哉易設四科出處語默傳曰朝廷之人入而不能出山林之民往而不能反二者各有所長而棄聖絕知遯世保真當竄深山樂天知命今居緱氏息偃城郭往來帝都招延賓客無益誨人拱默而已飾虛矜偽誑世耀名辭細即巨終為利動春秋譏宋伯姬女而不婦今二子屑屑遠大失矣公車徵士汝南袁夏甫少舉孝廉為司徒掾人間之事無所闕也其後閉戶塞牖不見賓客清旦東向再拜朝其母念時時往就之子亦不得見復踰拜耳頭不著巾身無單衣足常木蹻食止壃菜云我無益家事莫之能彊及母終亡不列服位謹按孝經生事愛敬死事哀慼一家之中諭若異域下床闇拜遠於愛敬者矣祖載崩隧又不能送遠於哀慼者矣巾所以飾首衣所以蔽形此乃士君子所以自別於夷狄者也唯喪者訟者露首草舍餘曷有哉長沮丈人避世之士由訊子路殺雞黍見其子焉何有藏一室中不出戶庭以此為高斯亦婞婞鯉趨而過庭聞詩聞禮而陳亢喜於得三不當近之何乃若茲者乎公車徵士豫章徐孺子比為太尉黃瓊所辟禮文有加孺子隱者初不荅命瓊薨既葬負算步齎一盤醊哭於墳前孫子琰故五官郎將以長孫制杖聞有哭者不知其誰亦於倚廬哀泣而已孺子無有謁刺事訖便去子琰大怪其故遣瓊門生茅季瑋追請辭謝終不肯還謹按禮凡弔喪者既哭興踊進問其故哀之至也孺子所以經三千里越度山川而親至者非徒徇於己顧義報乎哭醊墳前是也訖當即其帳衾問勞子琰子琰宿有善名在禮無違儻見微闕教誨可乎如何儵忽甚於路人昔黔敖忽於嗟來然君子猶以為其嗟可去, WYG: ''}
