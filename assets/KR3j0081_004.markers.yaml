  - {type: variant, offset: 1592, length: 580, content: 科出處語默傳曰朝廷之人入而不能出山林之民往而不能反二者各有所長而棄聖絕知遯世保真當竄深山樂天知命今居緱氏息偃城郭往來帝都招延賓客無益誨人拱默而已飾虛矜偽誑世耀名辭細即巨終為利動春秋譏宋伯姬女而不婦今二子屑屑遠大失矣公車徵士汝南袁夏甫少舉孝廉為司徒掾人間之事無所闕也其後閉戶塞牖不見賓客清旦東向再拜朝其母念時時往就之子亦不得見復踰拜耳頭不著巾身無單衣足常木蹻食止壃菜云我無益家事莫之能彊及母終亡不列服位謹按孝經生事愛敬死事哀慼一家之中諭若異域下床闇拜遠於愛敬者矣祖載崩隧又不能送遠於哀慼者矣巾所以飾首衣所以蔽形此乃士君子所以自別於夷狄者也唯喪者訟者露首草舍餘曷有哉長沮丈人避世之士由訊子路殺雞黍見其子焉何有藏一室中不出戶庭以此為高斯亦婞婞鯉趨而過庭聞詩聞禮而陳亢喜於得三不當近之何乃若茲者乎公車徵士豫章徐孺子比為太尉黃瓊所辟禮文有加孺子隱者初不荅命瓊薨既葬負算步齎一盤醊哭於墳前孫子琰故五官郎將以長孫制杖聞有哭者不知其誰亦於倚廬哀泣而已孺子無有謁刺事訖便去子琰大怪其故遣瓊門生茅季瑋追請辭謝終不肯還謹按禮凡弔喪者既哭興踊進問其故哀之至也孺子所以經三千里越度山川而親至者非徒徇於己顧義報乎哭醊墳前是也訖當即其帳衾問勞子琰子琰宿有善名在禮無違儻見微闕教誨可乎如何儵忽甚於路人昔黔敖忽於嗟來然君子猶以為其嗟可去謝可食今與黃有恩故矣孝子寢伏苫塊又孺子到便詣墳無介夫何為哉, SBCK: ''}
