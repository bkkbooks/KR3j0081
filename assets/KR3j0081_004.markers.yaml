  body:
  - {type: variant, offset: 3, length: 3, content: 三夫聖, SBCK: 四孔子稱大哉中庸之爲德其至矣乎又曰君子之道忠恕而已至於訐以爲直隱以爲義枉以爲厚僞以爲名此衆}
