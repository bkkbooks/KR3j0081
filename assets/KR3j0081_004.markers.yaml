  - {type: variant, offset: 449, length: 311, content: 以云耳山陽太守汝南薛恭祖喪其妻不哭臨殯於棺上大言自同恩好四十餘年服食祿賜男女成人幸不為夭夫復何恨哉今相及也謹按禮為適妻杖重於宗也妻者既齊於己澄漠酒醴以養舅姑契闊中饋經理蠶織垂統傳重其為恩篤勤至矣且鳥獸之微尚有回翔之思啁噍之痛何有死喪之感終始永絕而曾無惻容當內崩傷外自矜飭此為矯情偽之至也俚語婦死腹悲唯身知之又言妻非禮所與此何禮也豈不悖哉大尉山陽王龔與諸子並杖太傅汝南陳蕃袁隗皆制衰絰列在服位躬入隧哀以送之近得禮中王公諸子魏杖亦過矣弘農太守河內吳匡伯康少服職事號為敏達為侍御史與長樂少府黃瓊共佐清河王事文書卬成甚嘉異之後匡去濟南相瓊為司空比比援舉起家拜尚書遷弘農班詔勸耕道於澠池間瓊薨即發喪制服上病載輦車還府謹按春秋大夫出使, SBCK: ''}
