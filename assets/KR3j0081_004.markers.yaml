  - {type: 'tls:seg', offset: 11, content: '', id: KR3j0081_CHANT_004-1a.3}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 今惲乆見授任職在昭德塞違爲官擇人知延貪邪罔上害民所在荒亂怨慝並作此爲惡積愆非一旦一夕之漸也孔子以匹夫朋徒無幾習射矍相之圃三哲而去者過半汝南中土大郡方城四十養老復敬化之至延姦舋彰著無與比崇臧文仲有言見無禮於君者若鷹鸇之逐鳥雀農夫之務去草也何敢􅀫留不即彈黜姦佞而湏於萬人之中乃暴引之是爲陷君君子不臨深以爲髙不囚少以爲多况創病君父以爲已功者哉而論者茍眩虚聲以爲美談汝南楚之界也其俗急疾有氣決然自君章之後轉相放式好干上怵忮以采名譽末流論起於愛憎而政在陪􅈻也司空頴川韓稜少時爲郡主簿太守興被風病恍忽誤亂稜隂扶輔其政出入二年署置教令無愆失興子嘗出教欲轉徙吏稜執不聽由是發露被考興免官稜坐禁固章帝即位一切原除也謹按易稱守位以仁尚書無曠庶官詩云彼君子不素飡􅀆論語陳力就列不能者止漢典吏病百日應免所以䘏民急病懲俗逋慝也今興官尊任重經略千里當聽訟侍祠班詔勸課早朝旰食夕愓若厲不以榮祿爲樂而以黔首爲憂位過招殃靈督其舋風疾恍忽有加無瘳稜綂機括知其虚實當聽上病以禮選引何有上欺天子中誣方伯下誑吏民扶輔耄亂政自已出雖幸無闕罪已不容於誅矣爲人謀而不忠愛人而以姑息凡人不可况於君子乎上令興負貪昧之罪子被署用之愆章問洶赫父子湮沒執}
