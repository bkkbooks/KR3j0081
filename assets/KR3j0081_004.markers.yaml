  - {type: variant, offset: 13, length: 0, content: '', krp: 憂色身無擇行口無擇言脩身慎行恐辱先也而伯况被發則得就業卿佐雖云凶暴何緣侵已今見辱者必有以招之自取焉何尤於人親不可辱在我何傷讎者謂爲父兄耳豈以一朝之忿而肆}
  - {type: variant, offset: 14, length: 1, content: 制, SBCK: 狂怒者哉既逺春秋之義殆今先祖不復血食不孝不智而兩有之歸其義勇其義何居汝南陳茂君因爲荆州刺史時南陽太守灌恂本名清能茂不入宛城引車到城東爲友人衞修母拜到州恂先是茂客仕蒼梧還到修家見修母婦説修坐事繫獄當死因詣府門移辭乞恩隨輩露首入坊中容止嚴恪􅂡眉甚偉太守大驚不覺自起立賜巾延請甚嘉敬之即焉出修南陽士大夫謂恂能救解修茂彈繩不撓修竟極罪恂亦以它事去南陽疾惡殺修爲之語曰衞修有事陳茂治之衞修無事陳茂殺之謹按春秋王人之微處于諸侯之上坐則專席止則專館朱軒駕駟威烈赫奕就恂素爲官速謗當便入傳引見詰問紏其􅂍狀以時列聞文王日昃不暇食周公坐而俟旦且非爲己私皆公也何有忘百姓塗炭之急便廼光昭舊交之門乎鮑宣州牧行部多􅀫下亭司直舉劾以爲輕威損命坐之刑黜今茂泯弃天常進止由已孰使毁之小人譽之自我爲之古人病諸以爲大譏茂與修善由鴟鴞之愛其子適所以害之者度遼將軍安定皇甫規威明連在大位欲退避弟數上病不見聽㑹友人上郡太守王旻物故䂓素縞到下亭迎喪發服送之因令客密告并州刺史胡芳言䂓擅逺軍營赴私違公當及舉奏荅曰威明欲得避弟故作激發我爲朝廷惜其功用何能爲此私家計耶䂓後爲中郎將督并凉益三州時有黨事懼見及因先自上言臣前薦故太常張煥才任將帥是附黨也又臣論輸左校時太學生張鳳等上書訟臣是爲黨人所附也昔有畏舟之危而自投水者蓋憂難與處樂其亟決謹按詩云淑人君子其儀不忒其儀不忒正是四國傳曰一心可以事百君百心不可事一君論語夫子温良恭儉讓以得之立朝忘家即戎忘身身且忘之况於弟乎方殊俗越溢大爲邊害朝廷比辟公旰食䂓義在出身折衝弭難而誅伐己定當見鎮慰何有挾功茍念去位弟實雋德不患無位而徒闒茸何所堪施彊推轂之亂儀干度孝武皇帝爲驃騎將軍霍去病治弟舎勑令視之曰匈奴不滅何以家爲去病外戚末屬一切武夫尚能抗節洪毅而䂓世家純儒何獨負哉又以黨事先自勞衒如有白驗其於及已而形兆求不可得唯是從何憚於病曰畏舟之危自投於水憂難於處樂其亟决主幸必不坐太誓有云民之所欲天必從之天作孽猶可違自作孽不可逭人之所忌炎自取之蓋嚴楊惲勲著王室言事過差皆伏大辟以隆主威抑驕侵也䂓頋弟私也離局姦也誘巧詐也畏舟慢也四罪是矣殺決可也南陽五世公爲廣漢太守與司徒長史叚遼叔同嵗遼叔太子名舊才操鹵鈍小子髠既見齒郷黨到見股肱曰太守與遼叔同嵗恩結締素薄命早亡幸來臨郡今年且以此相饒舉其子如無罪得至後嵗貫魚之次敬不有違有主簿栁對曰明府謹終追逺興微繼絶然舊實不如髠宜可授之世公於是厲聲曰丈夫相臨兒女尚欲舉之何謂髙下之間耶釋兄用弟此爲故殃叚氏之家豈稱相遭遇之意乎竟舉舊也世公轉換南陽與東萊太守蔡伯起同嵗欲舉其起自乞子瓉尚弱而弟琰幸以成人是嵗舉琰明年復舉瓉瓉十四未可見衆常稱病遣詣生交到十八乃始出治劇平春長上書臣甫弱冠未任宰御乞留􅀫衞尚書劾奏增年受選減年避劇請免瓉官詔書左遷武當左尉㑹車騎將軍馮緄南征武陵蠻夷緄與伯起同時公府辟瓉爲軍}
