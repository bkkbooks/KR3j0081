  - {type: variant, offset: 17, length: 0, content: '', SBCK: 貢士貢士恩義經傳無以也春秋諸侯朝覲㑹遇大夫亦豫}
  - {type: variant, offset: 17, length: 0, content: '', krp: 貢士貢士恩義經傳無以也春秋諸侯朝覲㑹遇大夫亦豫}
  - {type: variant, offset: 18, length: 2, content: 防為, SBCK: 好禮記曰大夫三月葬同位畢至此言謹終悼亡不􅀃子弟當見寵拔也魯有右成叔聘衞右宰榖留而觴之陳樂而不樂酒酣而不飲送以璧其妻孥􆁒宅而居之分禄而食之其子長乃辟孔子稱可􅀉百里之命託六尺之􅀌臨大節而不可奪相於之義具於此矣語有曰白頭如新交蓋如舊簞食壺漿㑹於樹隂臨别眷眷念在報効何有同嵗相臨而可拱黙者哉春秋因}
  - {type: page-break, offset: 18, content: '', id: KR3j0081_SBCK_004-10a}
  - {type: variant, offset: 18, length: 2, content: 防為, krp: 好禮記曰大夫三月葬同位畢至此言謹終悼亡不說子弟當見寵拔也魯有右成叔聘衞右宰榖留而觴之陳樂而不樂酒酣而不飲送以璧其妻孥􆁒宅而居之分禄而食之其子長乃辟孔子稱可寄百里之命託六尺之孤臨大節而不可奪相於之義具於此矣語有曰白頭如新交蓋如舊簞食壺漿㑹於樹隂臨别眷眷念在報効何有同嵗相臨而可拱黙者哉春秋因}
