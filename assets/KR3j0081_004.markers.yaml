  - {type: variant, offset: 1037, length: 554, content: 相候求欲作衰謂君不為子衡作吏何制服曰眾人若此不可獨否又謂足下徑行自可今反相歷令子失禮僕豫愆古有弔服可依其制因為裁縞冠幘袍單衣定大為同作所非然潁川有識陳元方韓元長綦毋廣明咸嘉是焉謹按禮為舊君齊衰三月謂策名委質為臣吏者也子衡臨郡日淺無他功惠又非其身嗣祖位則亞卿雅有令稱義當綱紀人倫為之節文而首倡導犯禮違制使東嶽一郡朦朦焉豈不愍哉由郕人失兄子皋為之衰雖失於子衡歸於曼慈者矣太原郝子廉飢不得食寒不得衣一介不取諸人曾過娣飯留十五錢默置席下去每行飲水常投一錢井中謹按易稱天地交萬物生人道交功勳成語願車馬衣輕裘與朋友共弊之而無憾士相見之禮贄用腒雉受而不距而交荅焉唯祭飯然後拜之孔子食於施氏未嘗不飽何有同生之家而顧錢者哉傷恩薄禮弊之至也孟軻譏仲子吐鶂鶂之羹而食井上苦李鮑焦耕田而食穿井而飲非妻所織不衣餓於山中食棗或問之此棗子所種耶遂嘔吐立枯而死世不乏異惟其似旃孔子疾時貪昧退思狂狷狷者有所不為亦其介也南陽張伯大鄧子敬小伯大三年以兄禮事之伯臥床上敬寢下小榻言常恐清旦朝拜俱去鄉里居緱氏城中亦教授坐養聲價伯大為議郎益州太守子敬辟司徒公車徵謹按禮記十年兄事之五年肩隨之詩云如切如磋如琢如磨朋友衎衎誾誾各長其儀也凡兄弟相愛尚同輿而出同床而寢今相校三年耳幸無骨血之屬坐作鬼怪旦朝言恐論語恭而無禮則勞且晏平仲稱善與人交豈徒拜伏而已哉易設, SBCK: 譽第}
