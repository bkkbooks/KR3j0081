  - {type: variant, offset: 12, length: 0, content: '', SBCK: 如此謂禮義何稜宜禁固終身中原非是太原周黨伯况少爲卿佐發黨過於人中辱之黨學春秋長安聞報讎之義輟講下辭歸報讎到與卿佐相聞期闘日卿佐多從正徃使卿佐先㧞刀然後相擊佐欲直令正擊之黨被創困乏佐服其義勇箯輿養之數日蘇興乃知非其家即徑歸其立勇果乃至於是謹按孝經身體髪膚受之父母不敢毁傷孝之始也樂正子春下堂而傷足三月不出既瘳矣猶}
