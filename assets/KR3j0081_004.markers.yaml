  - {type: variant, offset: 816, length: 187, content: 是矣剖符守境勸民耕桑肆省冤疑和解仇怨國之大事所當勤恤而顧私恩傲狠自遂若宮車晏駕何以過茲論者不深察而歸之厚多有是言及其人患失而亦曰其然司空袁周陽舉荀慈明有道太尉鄧伯條舉訾孟直方正二公薨皆制齊衰世非一然荀訾通儒於義足責或舉者名位斥落子孫無繼多不親至何乃衰乎過與不及古人同稱弔服之制斯近之矣河南尹太山羊嗣祖在家平原相封子衡葬母子衡故臨太山數十日時嗣祖去河南矣子衡四從子曼慈復為太山, SBCK: 俗}
