  - {type: variant, offset: 22, length: 0, content: '', SBCK: 褒而褒之若乃世公二郡之舉斯爲過矣然世人亦多淺薄在者無之亡者無頋覆之施飢寒緩急視之若遺非徒如此而已至有可否之際受刑誅者人各有心兩不得中夫孝廉平除則有社稷民人傷及民人實宜料度以爲後圖汝南戴㓜起三年服竟讓財與兄將妻子出客舎中住官池田以耕種爲上計吏獨車載衣資表汝南太守上計史戴紹車後舉孝亷爲陜令謹按禮有東宮西宮辟子之私不足則資有餘亦歸之於宗也此言兄弟無離異之義也凡讓財者類與弟子弟尚㓜恩情注希有與兄既出之日可居冡下冡無屋宗家猶有羸田廬田可首粥力者耳何必官池客舎既推獨車復表其上爲其飾僞良亦昭晣㓜起同辟有薛孟嘗者與弟子共居弟子常求分力不能止固乃聽之都與奴婢引其老者曰與我共事汝不能使之田屋取其荒壞者曰我少時所作買意所戀也器物取其乆者曰我服食乆身口安之也外有共分之名内實十三耳子弟無幾盡之輙復更分如此者數}
