  - {type: variant, offset: 13, length: 0, content: '', SBCK: 憂色身無擇行口無擇言脩身慎行恐辱先也而伯况被發則得就業卿佐雖云凶暴何緣侵已今見辱者必有以招之自取焉何尤於人親不可辱在我何傷讎者謂爲父兄耳豈以一朝之忿而肆}
