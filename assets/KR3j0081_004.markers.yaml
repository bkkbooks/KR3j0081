  - {type: variant, offset: 8, length: 1, content: 制, SBCK: 所致譽而明主之所必討蓋觀過知仁謂中心篤誠而無妨於化者故覆其違理曰過譽也長沙太守汝南郅惲君章少時爲郡功曹郡俗冬饗百里内縣皆齎牛酒到府宴飲時太守司徒歐陽歙臨饗}
  - {type: variant, offset: 8, length: 1, content: 制, krp: 所致譽而明主之所必討蓋觀過知仁謂中心篤誠而無妨於化者故覆其違理曰過譽也長沙太守汝南郅惲君章少時爲郡功曹郡俗冬饗百里内縣皆齎牛酒到府宴飲時太守司徒歐陽歙臨饗}
  - {type: page-break, offset: 9, content: '', id: KR3j0081_SBCK_004-1b}
  - {type: variant, offset: 10, length: 0, content: '', SBCK: 訖教曰西部督郵繇延天資忠貞禀性公方典部折衝摧破姦雄不嚴而治書曰安民則惠黎民懷之蓋舉善以教則不能者勸今與諸儒共論延功顯之于朝主簿讀教户吏引延受賜惲前跪曰司正舉觥以君之罪告謝于天明府有言而誤不可覆掩按延資性貪邪外方内圓朋黨構姦罔上害民所在荒亂虚而不治怨慝並作百姓苦之而明府以惡爲善股肱莫爭此既無君又復無臣君臣俱喪孰與偏有君雖傾危臣子扶持不至於亡惲敢再拜奉觥歙甚慙謹按禮諫有五風爲上狷爲下故入則造􅂰出則詭辭善則稱君過則稱已暴諫露言罪之大者而歙於饗中用延爲吏以紫亂朱大妨王命造次顛沛不及諷諭雖舉觥彊歙可行}
  - {type: page-break, offset: 10, content: '', id: KR3j0081_SBCK_004-2a}
  - {type: variant, offset: 10, length: 0, content: '', krp: 訖教曰西部督郵繇延天資忠貞禀性公方典部折衝摧破姦雄不嚴而治書曰安民則惠黎民懷之蓋舉善以教則不能者勸今與諸儒共論延功顯之于朝主簿讀教户吏引延受賜惲前跪曰司正舉觥以君之罪告謝于天明府有言而誤不可覆掩按延資性貪邪外方内圓朋黨構姦罔上害民所在荒亂虚而不治怨慝並作百姓苦之而明府以惡爲善股肱莫爭此既無君又復無臣君臣俱喪孰與偏有君雖傾危臣子扶持不至於亡惲敢再拜奉觥歙甚慙謹按禮諫有五風爲上狷爲下故入則造膝出則詭辭善則稱君過則稱已暴諫露言罪之大者而歙於饗中用延爲吏以紫亂朱大妨王命造次顛沛不及諷諭雖舉觥彊歙可行}
