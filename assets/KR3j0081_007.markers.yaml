  - {type: variant, offset: 1943, length: 2, content: 期聽, SBCK: 曰何如人知人固未易也信陵君大慙駕如野迎之魏齊間信陵君之􅀄重見之大怒而自刎趙王聞之卒取其頭與秦秦乃遣平原君虞卿遂留於魏魏趙畏秦莫復用困而不得意乃著書八篇號虞氏春秋焉孟嘗君逐於齊見反譚子迎於澅曰君怨於齊大夫孟嘗君曰有譚子曰如意則殺之乎夫則又争歸之貧賤則人争去之此物之理之固然也願君勿怨請以市論朝而盈焉夕而虛焉非朝愛}
