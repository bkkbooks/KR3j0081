  - {type: variant, offset: 1101, length: 10, content: 音有玄鶴二八從南方來, WYG: 缺而孫修三爲祭酒焉齊人或讒孫卿乃適楚楚相春申君以爲蘭陵令人或謂春申君湯以七十里文王以百里孫卿賢者也今與之百里地楚其危乎春申君謝之孫卿去之游趙應聘于秦是時七國交争尚於權詐而孫卿守禮義貴典籍雖見窮擯而猶不黜其志作書數十篇疾濁世之政國亂君危相屬不遵大道而營乎巫祝信禨祥蘇秦張儀以邪道説諸侯以大貴顯隨而笑之曰夫不以其道}
