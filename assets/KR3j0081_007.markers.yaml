  - {type: variant, offset: 2035, length: 3, content: 越禱祠, SBCK: 應融義髙聞之驚愕即嚴便出徑詣牀蓐手自収摸對之垂涕曰伯休不世英才當爲國家幹輔人何有生相知者黙止客舎不爲人所知邂逅不自貞哉家上有尊老下有弱小願相隨俱入解傳伯休讓融遂不聽歸取衣車厚其薦蓐躬自御手爲丸藥口嘗饘粥身自分􅀬三四日間加甚劣極便制衣棺器送終之具後稍加損又謂伯休吉凶不諱憂怖交心間粗作備具相對悲喜􅀫止傳中數十餘日伯休彊健入舎後室家酣宴乃别伯休到拜侍中尚書豫章}
