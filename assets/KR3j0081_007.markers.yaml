  - {type: variant, offset: 1935, length: 1, content: 伯, SBCK: 一見趙孝成王賜黄金百鎰白璧一􅀟再見拜爲上卿故號爲虞卿其後范雎之仇魏齊亡過平原君於是秦昭王請平原君願爲布衣之交與飲數日請曰周文王得吕尚而以爲太公齊桓得管夷吾而以爲仲父今范君亦寡人之叔父也范君之仇在君之家願使人取其頭不然吾不出君於􅀜平原君曰貴而交者爲賤也富而友者爲貧也夫魏齊者勝之交也在固不出況今又不在臣所乎昭王乃遺趙王書曰范君之仇魏齊在平原君家王使人疾持其頭來不然吾舉兵而伐趙又不出王之弟於關趙孝成王乃卒圍平原君家急魏齊夜亡出見趙相虞虞卿度趙王終不可説乃解其印與魏齊間行念諸侯莫可以赴急者乃復走大梁欲因信陵以至楚而信陵君聞之畏秦猶與未肯見曰虞卿何如人哉時侯嬴在傍曰人固未易知知人亦未易也夫虞卿一見趙王賜白璧一􅀟黄金百斤再見拜爲上卿三見平受相印萬戸侯當是之時天下争知之夫魏齊窮困過虞卿虞卿不敢重爵禄之尊解相印捐萬戸侯而間行以急士窮而歸公}
