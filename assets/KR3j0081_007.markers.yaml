  - {type: variant, offset: 1291, length: 49, content: 雲從西北起再奏之暴風亟至大雨灃沛裂帷幕破俎豆墮廊瓦凡坐者散走平公恐懼伏于室側身遂疾痛晉國大旱赤地三, SBCK: 秀才}
  - {type: variant, offset: 1291, length: 1, content: 雲, WYG: 譚子曰如意則殺之乎夫富貴則人爭歸之貧賤則人争去之此物之必至而理之固然也願君勿怨請以市論朝而盈焉夕而虛焉非朝愛之而夕憎之也求在故往亡故去孟嘗君曰謹受命於是削所怨者名而已韓信常}
