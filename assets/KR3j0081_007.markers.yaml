  - {type: variant, offset: 2441, length: 400, content: 史公記趙惠文王與秦昭王會於澠池秦王飲酒酣曰寡人竊聞趙王好音請奏瑟趙王鼓瑟秦御史前書曰某日秦王與趙王會飲令趙王鼓瑟藺相如前曰竊聞秦王善為秦聲請奏缶以相樂秦王怒不許於是相如進曰五步之內相如請得以頸血濺大王矣左右欲刃相如相如張目叱之皆靡於是秦王不懌為一擊缶相如顧召御史書曰秦王為趙王擊缶也謹按樂記武帝時丘仲之所作也笛者滌也所以蕩滌邪穢納之於雅正也長二尺四寸七孔其後又有羗笛馬融笛賦曰近世雙笛從羗起羗人伐竹未及已龍鳴水中不見己截竹吹之音相似剡其上孔通洞之材以當撾便易持京君明賢識音律故本四孔加以一君明所加孔後出是謂商聲五音畢謹按此近世樂家所作不知誰也以手批把因以為名長三尺五寸法天地人與五行也四絃象四時謹按禮記管三十六簧也長四尺二寸今二十三管謹按世本女媧作簧簧笙中簧也詩云吹笙鼓簧承筐是將謹按周禮籥師氏掌教國子吹籥詩云以籥不僣籥樂之器竹管三孔所以和眾聲也謹按世本蘇成公作篪管樂十孔長尺一寸詩云伯氏吹塤仲氏吹篪, SBCK: 尉}
