  - {type: variant, offset: 1290, length: 0, content: '', SBCK: 時聚天下賢士於稷下尊寵若鄒􅄛田駢淳于髠之屬甚衆號曰列大夫皆世所稱咸作書刺世是時孫卿}
  - {type: page-break, offset: 1290, content: '', id: KR3j0081_SBCK_007-4a}
  - {type: variant, offset: 1290, length: 0, content: '', WYG: 時天下争知之夫魏齊窮困過虞卿不敢重爵禄之尊解相印捐萬戸侯而間行以急士窮而歸公子公子曰何如人知人固未易也信陵君大慙駕如野迎之魏齊聞信陵君之初重見之大怒而自刎趙王聞之卒取其頭與秦秦乃遣平原君虞卿遂畱於魏魏趙畏秦莫復用困而不得意乃著書八篇號虞氏春秋焉孟嘗君逐於齊見反譚子迎於澅曰君怨於齊大夫乎孟嘗君曰}
  - {type: page-break, offset: 1290, content: '', id: KR3j0081_WYG_007-6a, image: WYG0862/WYG0862-0394c.png}
