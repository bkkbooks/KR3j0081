  - {type: variant, offset: 202, length: 564, content: 放遠滔湮心耳乃忘平和亂政傷民致疾損壽重遭暴秦遂以闕忘漢興制氏世掌大樂頗能紀其鏗鏘而不能說其義武帝始定郊祀巡省告封樂官多所增飾然非雅正故繼其條暢曰聲音也昔皇帝使伶倫自大夏之西崑崙之陰取竹於嶰谷生其竅厚均者斷兩節間而吹之以為黃鐘之宮制十二筩以聽鳳之鳴其雄鳴為六雌鳴亦為六天地之風氣正而十二律之五聲於是乎生八音於是乎出聲者宮商角徵羽也音者土曰塤匏曰笙革曰鼓竹曰管絲曰絃石曰磬金曰鐘木曰柷詩曰鶴鳴九皋聲聞于天書八音克諧無相奪倫由是言之聲本音末也謹按劉歆鐘律書商者章也物成熟可章度也五行為金五常為義五事為言凡歸為臣謹按劉歆鐘律書角者觸也物觸地而出戴芒角也五行為木五常為仁五事為貌凡歸為民謹按劉歆鐘律書宮者中也居中央暢四方倡始施生為四聲綱也五行為土五常為信五事為思凡歸為君謹按劉歆鐘律書徵者祉也物盛大而繁祉也五行為火五常為禮五事為視凡歸為事謹按劉歆鐘律書羽者宇也物聚藏宇覆之也五行為水五常為智五事為聽凡歸為物故聞其宮聲使人溫潤而廣大聞其商聲使人方正而好義聞其角聲使人整齊而好禮聞其徵聲使人惻隱而博愛聞其羽聲使人善養而好施宮聲亂者則其君驕商聲錯者則其臣壞角聲繆者則其民怨徵聲洪者則其事難羽聲差者則其物亂春宮秋律百卉必彫秋宮春律萬物必榮夏宮冬律雨雹必降冬宮夏律雷必發聲夫音樂至重所感者大故曰知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明明, SBCK: 承三}
