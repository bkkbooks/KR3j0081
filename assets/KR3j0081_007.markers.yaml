  - {type: variant, offset: 199, length: 2, content: 聲彌, SBCK: 言盈於天下天下之言不歸楊則歸墨楊氏爲我是無君也墨氏兼愛是無父也無父無君是禽獸也楊墨之道不息孔子之道不著是邪􅀃誣民充塞仁義也仁義充塞則率獸食人人將相食也吾爲此懼閑先王之道距楊墨放滛辭正人心熄邪􅀃}
