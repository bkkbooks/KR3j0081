  - {type: 'tls:seg', offset: 1287, content: '', id: KR3j0081_CHANT_007-13a.53}
  - {type: variant, offset: 1287, length: 2, content: 一奏, SBCK: 以爲上卿孫况齊威宣王}
  - {type: variant, offset: 1287, length: 0, content: '', WYG: 叔父也范君之仇在君之家願使人取其頭不然吾不出君於關平原君曰貴而交者爲賤也富而友者爲貧也夫魏齊者勝之交也在固不出況今又不在臣所乎昭王乃遺趙王書曰范君之仇魏齊在平原君家王使人疾持其頭來不然吾舉兵而伐趙又不出王之弟於關趙孝成王乃發卒圍平原君家急魏齊夜亡出見趙相虞卿虞卿度趙王終不可説乃解其印與魏齊間行念諸侯莫可以赴急者乃復走大梁欲因信陵以至楚而信陵君聞之畏秦猶豫未肯見曰虞卿何如人哉時侯嬴在傍曰人固未易知知人亦未易也夫虞卿}
  - {type: page-break, offset: 1287, content: '', id: KR3j0081_WYG_007-5b, image: WYG0862/WYG0862-0394b.png}
  - {type: variant, offset: 1287, length: 2, content: 一奏, krp: 以爲上卿孫况齊威宣王}
  - {type: variant, offset: 1288, length: 1, content: 奏, WYG: 見趙王賜白璧一雙黄金百斤再見拜爲上卿三見卒受相印萬戸侯當是}
  - {type: punctuation, offset: 1290, content: ，, id: KR3j0081_CHANT_007-bkkpn467}
