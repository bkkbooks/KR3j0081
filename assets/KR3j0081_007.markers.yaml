  - {type: variant, offset: 2033, length: 1, content: 賽, SBCK: 乃召廣爲北平太守廣請霸陵尉與俱至軍斬之上書謝罪報曰將軍者國之爪牙也司馬法曰登車式遭喪不服振旅撫師以征不服率三軍心同戰士之力故怒形則千里竦威振則萬物伏是以名聲暴於夷貊威稜憺乎鄰國報忿除害捐殘去殺朕之所圖於將軍也乃免冠徒跣稽顙請罪豈稱朕之指哉太尉沛國劉矩叔方爲尚書失將軍梁兾意遷常山相去官兾妻兄孫禮爲沛相矩不敢還鄉里訪友人彭城環都玉都素敬重矩欲得其意喜於見歸爲除處所意氣周宻人有請玉都者禍至無日何冝爲其主乎玉都因事遠出家人不復占問暑則鬱蒸寒則凛凍且飢且渇如此一年矩素直亮衆談同愁兾亦舉寤轉薄爲厚上補從事中郎復爲尚書令五卿三公國光鎭玉都慙悔自絶司徒中山祝恬字休公車徵道得温病過友人鄴令謝著著拒不通因載病去至汲積六七日止客舎中諸生曰今君所苦沈結困無醫師聞汲令好欲往語之恬曰謝著我舊友也尚不相見視汲令􅀄不相知語之何益死生命也醫藥曷爲諸生事急坐相守吉凶莫見収舉便寺門口白時令汝}
