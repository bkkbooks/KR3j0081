  - {type: variant, offset: 312, length: 318, content: 黃鐘之宮制十二筩以聽鳳之鳴其雄鳴為六雌鳴亦為六天地之風氣正而十二律之五聲於是乎生八音於是乎出聲者宮商角徵羽也音者土曰塤匏曰笙革曰鼓竹曰管絲曰絃石曰磬金曰鐘木曰柷詩曰鶴鳴九皋聲聞于天書八音克諧無相奪倫由是言之聲本音末也謹按劉歆鐘律書商者章也物成熟可章度也五行為金五常為義五事為言凡歸為臣謹按劉歆鐘律書角者觸也物觸地而出戴芒角也五行為木五常為仁五事為貌凡歸為民謹按劉歆鐘律書宮者中也居中央暢四方倡始施生為四聲綱也五行為土五常為信五事為思凡歸為君謹按劉歆鐘律書徵者祉也物盛大而繁祉也五行為火五常為禮五事為視凡歸為事謹按劉歆鐘律書羽者宇也物聚藏宇覆之也五行為水五常為智五事為聽凡歸為物故聞其宮聲使人溫潤而廣大聞其商聲使人方正而好義聞其角聲使人整, WYG: 上卿孫况}
