  - {type: variant, offset: 768, length: 503, content: 述作之謂也謹按世本暴辛公作塤詩云天之誘民如塤如篪塤燒土為之也圍五寸半長三寸半有四孔其二通凡為六孔謹按世本隨作笙長四寸十二簧像鳳之身正月之音也物生故謂之笙詩云我有嘉賓鼓瑟吹笙大笙謂之𥲀小者謂之和謹按易稱鼓之以雷霆聖人則之不知誰所作也鼓者郭也春分之音也萬物郭皮甲而出故謂之鼓周禮六鼓雷鼓八面靈鼓六面路鼓四面鼖鼓睪鼓晉鼓皆二面詩云擊鼓其鏜論語小子鳴鼓而攻之可也謹按詩云嘒嘒管聲簫管備舉禮樂記管漆竹長一尺六孔十二月之音也象物貫地而牙故謂之管尚書大傳舜之時西王母來獻其白玉琯昔章帝時零陵文學奚景於冷道舜祠下得笙白玉管知古以玉為管後乃易之以竹耳夫以玉作音故神人和鳳皇儀也謹按世本宓羲作瑟長八尺一寸四十五絃黃帝書泰帝使素女鼓瑟而悲帝禁不止故破其瑟為二十五絃春秋師曠為晉平公奏清徵之音有玄鶴二八從南方來進於廊門之危再奏之而成列三奏之則延鵛而鳴舒翼而舞音中宮商之聲聲聞于天平公大說坐者皆喜平公提觴而起為師曠壽反坐而問曰音莫悲於清徵乎師曠曰不如清角平公曰清角可得聞乎師曠曰不可昔者黃帝駕象車六交龍畢方並轄蚩尤居前風伯進掃雨師灑道虎狼在前鬼神在後蟲蛇伏地大合鬼神於太山之上作為清角今主君德薄不足以聽之聽之將恐有敗平公曰寡人老矣所, SBCK: 予豈}
