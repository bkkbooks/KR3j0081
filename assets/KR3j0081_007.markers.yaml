  - {type: variant, offset: 631, length: 358, content: 而好禮聞其徵聲使人惻隱而博愛聞其羽聲使人善養而好施宮聲亂者則其君驕商聲錯者則其臣壞角聲繆者則其民怨徵聲洪者則其事難羽聲差者則其物亂春宮秋律百卉必彫秋宮春律萬物必榮夏宮冬律雨雹必降冬宮夏律雷必發聲夫音樂至重所感者大故曰知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明明聖者述作之謂也謹按世本暴辛公作塤詩云天之誘民如塤如篪塤燒土為之也圍五寸半長三寸半有四孔其二通凡為六孔謹按世本隨作笙長四寸十二簧像鳳之身正月之音也物生故謂之笙詩云我有嘉賓鼓瑟吹笙大笙謂之𥲀小者謂之和謹按易稱鼓之以雷霆聖人則之不知誰所作也鼓者郭也春分之音也萬物郭皮甲而出故謂之鼓周禮六鼓雷鼓八面靈鼓六面路鼓四面鼖鼓睪鼓晉鼓皆二面詩云擊鼓其鏜論語小子鳴鼓而攻之可也謹按詩云嘒嘒管聲簫管備舉禮樂記管漆竹長一尺六孔十二月之音也象物貫地而牙故謂之管尚書大傳舜, WYG: 威宣王}
