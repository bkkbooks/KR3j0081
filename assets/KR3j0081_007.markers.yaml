  - {type: variant, offset: 1934, length: 0, content: '', SBCK: 必不以其道士又小五伯以爲仲尼之門羞稱其功後客或謂春申君曰伊尹去夏入殷殷王而夏衰管仲去魯入齊魯弱而齊疆故賢者所在君尊國安今孫况天下賢人所去之國其不安乎春申君使請孫況況遺春申君書刺楚國因爲歌賦以遺春申君因不得已乃行復爲蘭陵令焉虞卿游説之士}
