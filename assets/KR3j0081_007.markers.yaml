  - {type: variant, offset: 1284, length: 0, content: '', WYG: 乃行復爲蘭陵令焉虞卿游説之士也一見趙孝成王賜黄金百鎰白璧一雙再見拜爲上卿故號爲虞卿其後范雎之仇魏齊亡過平原君於是秦昭王請平原君願爲布衣之交與飲數日請曰周文王得吕尚}
