  - {type: variant, offset: 1480, length: 39, content: 是乎出故聖人慎之今王作鐘也聽之弗及比之不度鐘聲不可以知和制度不可以出節無益於樂, krp: 權詐}
  - {type: variant, offset: 1481, length: 548, content: 乎出故聖人慎之今王作鐘也聽之弗及比之不度鐘聲不可以知和制度不可以出節無益於樂而鮮民財將焉用之謹按禮樂記柷漆桶方畫木方三尺五寸高尺五寸中有椎上用柷止音為節書曰合止柷敔笙鏞以間聲所以五者繫五行也音所以八者繫八風也傳曰八音之變不可勝聽也由經五藝六而其枝別葉布繁華無已也謹按世本神農作琴尚書舜彈五絃之琴歌南風之詩而天下治詩云我有嘉賓鼓瑟鼓琴雅琴者樂之統也與八音並行然君子所常御者琴最親密不離於身非必陳設於宗廟鄉黨非若鐘鼓羅列於虡懸也雖在窮閻陋巷深山幽谷猶不失琴以為琴之大小得中而聲音和大聲不喧譁而流漫小聲不湮滅而不聞適足以和人意氣感人善心故琴之為言禁也雅之為言正也言君子守正以自禁也夫以正雅之聲動感正意故善心勝邪惡禁是以古之聖人君子慎所以自感因邪禁之適故近之間居則為從容以致思焉如有所窮困其道閉塞不得施行及有所通達而用事則著之於琴以杼其意以示後人其道行和樂而作者命其曲曰暢暢者言其道之美暢猶不敢自安不驕不溢好禮不以暢其意也其遇閉塞憂愁而作者命其曲曰操操者言遇菑遭害困厄窮迫雖怨恨失意猶守禮義不懼不懾樂道而不失其操者也伯子牙方鼓琴鍾子期聽之而意在高山子期曰善哉乎巍巍若太山頃之間而意在流水鍾子又曰善哉乎湯湯若江河子期死伯牙破琴絕絃終身不復鼓以為世無足為音者也今琴長四尺五寸法四時五行也七絃者法七星也謹按漢書, WYG: ''}
