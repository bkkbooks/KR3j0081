  - {type: variant, offset: 128, length: 0, content: '', SBCK: 昔者桓公得之莒􅀳文公得之曹越得之會稽陳蔡之厄於立其幸乎自衛反魯刪詩書定禮樂制春秋之義著素王之法復相定公會于夾谷昭舊以正其禮抗辭以拒其侮齊人謝過來歸鄆讙􅀛隂之田焉孟軻受業於子思既通游於諸侯所言皆以爲迂遠而闊於事情然終不屈道趣舎枉尺以直尋嘗仕於齊位至卿後不能用孟子去齊尹士曰不識王之不可以爲湯}
