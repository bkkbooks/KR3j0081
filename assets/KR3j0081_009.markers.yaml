  - {type: variant, offset: 148, length: 9, content: 高祖受命郊祀祈望世, SBCK: 是諸吕畏憚雖大臣亦皆依之髙后崩諸吕作亂欲危社稷章與周勃共誅滅之尊立文帝封城陽王賜黄金千斤立二年薨城陽今莒縣是也自琅琊青州六郡及渤海都邑郷亭聚落皆爲立祠造飾五二千石車商人次第爲之立服帶綬備置官屬烹殺謳歌紛藉連日轉相誑曜言}
  - {type: page-break, offset: 148, content: '', id: KR3j0081_SBCK_009-4a}
  - {type: variant, offset: 148, length: 0, content: '', WYG: 是諸呂畏憚雖大臣亦皆依之高后崩諸呂作亂欲危社稷章與周勃共誅滅之尊立文帝封城陽王賜黄金千斤立二年薨城陽今莒縣是也自琅琊青州六郡及渤海都邑鄉亭聚落皆爲立祠造飾五二千石車商人次第爲之立服帶綬備置官屬烹殺謳歌紛藉連日轉相誑曜言有神明其譴問禍福立應厯載彌久莫之匡糾唯樂安太傅陳蕃濟南相曹操一切禁絶肅然政清陳曹之後稍復如故安有鬼神能爲病者哉予爲營陵令以爲章本封朱虚并食此縣春秋國語以勞定國能御大災凡在於他尚列祀典章親}
  - {type: page-break, offset: 148, content: '', id: KR3j0081_WYG_009-4a, image: WYG0862/WYG0862-0403c.png}
  - {type: variant, offset: 148, length: 9, content: 高祖受命郊祀祈望世, krp: 是諸吕畏憚雖大臣亦皆依之髙后崩諸吕作亂欲危社稷章與周勃共誅滅之尊立文帝封城陽王賜黄金千斤立二年薨城陽今莒縣是也自琅琊青州六郡及渤海都邑郷亭聚落皆爲立祠造飾五二千石車商人次第爲之立服帶綬備置官屬烹殺謳歌紛藉連日轉相誑曜言}
  - {type: variant, offset: 150, length: 0, content: '', WYG: 之孫進說耕田軍法行酒時固有大志矣及誅諸呂尊立太宗功冠天下社稷已寧同姓如此功烈如彼餘郡禁之可也朱虚與莒宜常血食於是乃移書曰到聞此俗舊多􅁋祀靡財妨農長亂積惑其侈可忿其愚可愍昔仲尼不許子路之禱晉悼不解桑林之祟死生有命吉㐫由人哀哉黔黎漸染迷謬豈樂也哉莫之徴耳今條下禁申約吏民爲陳利害其有犯者便收朝廷若私遺脫彌彌不絶主者髠截嘆無及已城陽景王縣甚尊之惟王弱冠内侍帷幄吕氏恣雎將危漢室獨見先識權發酒令抑邪扶正忠義洪毅其歆禋祀禮亦冝之於駕乘烹殺倡優男女雜錯是何謂也三邊紛拏師老器弊朝廷旰食百姓囂然禮興在有年飢則損自今聽嵗再祀備物而已不得殺牛逺迎他倡賦㑹宗落造設紛華方亷察之明爲身計而復僭失罰與上同明除見處勿後中覺九江逡遒有唐居山名有神衆巫共爲取公嫗歳易男不得復娶女不得復嫁百姓苦之謹按時太守宋均到官主者白出錢給聘男子女均曰衆巫與神合契知其㫖欲卒取小民不相當於是勅條巫家男女以備公嫗巫叩頭服罪乃殺之是後遂絶會稽俗多滛祀好卜筮民一以牛祭巫祝賦歛}
