  - {type: variant, offset: 254, length: 0, content: '', SBCK: 此女新從􅡾家來非其所受人哀傷益以爲審父母諸弟衰絰到來迎喪去精舎數里遇漢直與諸生十餘人相追漢直頋見其家恠其如此家見漢直謂其􅀑也惝惘良久漢直乃前爲父拜說其本末且悲且喜凡所聞見若此非一夫死者澌也􅀑者歸也精氣消越骨肉歸于土也夏后氏用明器殷人用􅀕器周人兼用之視民疑也子貢問孔子死者其有知乎曰賜爾死自知之由未晚也董無心云杜伯死親射宣王於鎬京子以爲桀紂所殺足以成軍可不湏湯武之衆古事既察且復以今驗之人相啖食甚於畜生凡菜肝鱉瘕尚能病人人用物精多有生之最靈者也何不芥蔕於其胷腹而割裂之哉猶死者無知審者矣而時有漢直爲狗䑕之所爲世間亡者多有見神語言飲食其家信以爲是益用悲傷謹按司空南陽來季德停喪在殯忽然坐􅀕牀上顔色服飾聲氣熟是也孫兒婦女以次教誡事有條貫鞭撻奴婢皆得其過飲食飽滿辭訣而去家人大哀剥斷絶如是三四家益猒苦其後飲醉形壞但得老狗便朴殺之推問里頭沽酒家狗世間多有狗作變怪朴殺之以血塗門戸然衆得咎殃謹按桂陽太守汝南李叔堅少時爲從事在家狗人立行家言當殺之叔堅云犬馬諭君子狗見人行效之何傷叔堅見縣令還解冠榻上狗戴持走家大驚時復云誤觸冠冠纓挂著之耳狗於竈前蓄火家益怔忪復云児婢皆在田中狗助蓄火幸可不煩鄰里此有何惡里中相罵不言無狗怪遂不肯殺後數日狗自􅁀死卒無纖介之異叔堅辟太尉椽固陵長原武令終享大位子條蜀郡都尉威龍司徒􅁺凡變恠皆婦女下賤何者小人愚而善畏欲信其說􅀋復禆増文人亦不證察與俱悼懾邪氣承虚故速咎證易曰其亡斯自取災若叔堅者心固於金石妖至而不懼自求多福壯矣乎昔􅀳文公出獵見大虵髙如隄其長竟路文公曰天子見妖則修德諸侯修政大夫修宫士修身乃即齋館忘食與寢請廟曰孤犠牲瘯蠡幣帛不厚罪一也逰逸無度不䘏國政罪二也賦役重數刑罰懆剋罪三也有三罪矣敢逃死乎其夜守虵吏夢天殺虵曰何故當聖君道爲及明視之則已臭爛武帝時迷於􅀑神尤信越巫董仲舒數以爲言武帝欲驗其道令巫詛仲舒仲舒朝服南靣誦詠經論不能傷害而巫者忽死世間多有精物妖恠百端謹按魯相右扶風臧仲英爲侍御史家人作食設按欻有不清塵土投汚之炊臨熟不知釡處兵弩自行火從篋中起衣物燒盡而簏故完婦女婢使悉亡其鏡數日堂下擲庭中有人聲言汝鏡女孫年三四嵗亡之求不能得二三日乃於清中糞下啼若此非一汝南有許季山者素善}
