  - {type: punctuation, offset: 1833, content: 「, id: KR3j0081_CHANT_009-bkkpn578}
  - {type: variant, offset: 1834, length: 483, content: 門磔禳以畢春氣蓋天子之城十有二門東方三門生氣之門也不欲使死物見於生門故獨於九門殺犬磔禳犬者金畜禳者卻也抑金使不害春之時所生令萬物遂成其性火當受而長之故曰以畢春氣功成而退木行終也太史公記秦德公始殺狗磔邑四門以禦蠱菑今人殺白犬以血題門戶正月白犬血辟除不祥取法於此也謹按韓子書山居谷汲者膢臘而買水楚俗常以十二月祭飲食也又曰嘗新始殺也食新曰膒膢謹按禮傳夏曰嘉平殷曰清祀周曰大蜡漢改為臘臘者獵也言田獵取禽獸以祭祀其先祖也或曰臘者接也新故交接故大祭以報功也漢家火行衰於戌故曰臘也謹按禮傳共工之子曰脩好遠遊舟車所至足跡所達靡不窮覽故祀以為祖神祖者徂也詩云韓侯出祖清酒百壺左氏傳襄公將適楚夢周公祖而遣之是其事也詩云吉日庚午漢家盛於午故以午祖也謹按周禮男巫掌望祀望衍旁招以茅女巫掌歲時以祓除釁浴禊者潔也春者蠢也蠢蠢搖動也尚書以殷仲春厥民析言人解析也療生疾之時故於水上釁潔之也巳者祉也邪疾已去祈介祉也謹按詩云芃芃棫樸薪之槱之周禮以槱燎祀司中司命司命文昌也司中文昌下六星也槱者積薪燔柴也今民間獨祀司命耳刻木長尺二寸為人像行者檐篋中居者別作小屋齊地大尊重之汝南餘郡亦多有皆祠以䐗率以春秋之月, SBCK: ''}
