  - {type: variant, offset: 265, length: 0, content: '', SBCK: 􅁺白今尚早可至前亭曰欲作文書便留吏卒惶怖言當解去傳云督郵欲於樓上觀望亟掃除湏臾便上未􅁳樓鐙階下復有火勑我思道不可見火滅去吏知必有變當用赴照但藏置壷中耳既􅁳整服坐誦六甲孝經易本訖卧有頃更轉東首以挐巾結兩足幘冠之宻拔劒解帶夜時有正黑者四五尺稍髙走至柱屋因覆伯夷持被掩足跣脫幾失再三徐以劒帶擊魅脚呼下火上照視老狸正赤略無衣毛持下燒殺明旦發樓屋得所髠人結百餘因從此絶伯夷舉孝廉益陽長楚辭云鱉今屍亡泝江而上到崏山下蘇起蜀人神之尊立爲王漢淮陽太守尹齊其治嚴酷死未及殮怨家欲燒之屍亦飛去見於書傳樓上新婦豈虚}
