  - {type: variant, offset: 131, length: 5, content: 禴祭蓋重祀, SBCK: 節平荀罃不從桑林之祟而􅀳侯之疾間由是觀之則淫躁而畏者災自取之厥咎嚮應反誠據義内省不疚者物莫能動禍轉爲福矣傳曰神者申也恠者疑也孔子􅁛土之恠爲墳羊論語子不語恠力亂神故采其晃著者曰恠神也世間多有見恠驚怖以自傷者謹按管子書齊公出於澤見衣紫衣大如轂長如轅拱手而立還歸寢疾數月不出有皇士者見公語驚曰物惡能傷公公自傷也此所謂澤神委虵者也唯覇主乃得見之於是桓公欣然􅀏不終日而病愈子之􅃝父郴爲汲令以夏至日詣見主簿杜宣賜酒時北壁上有懸赤弩照於柸形如虵宣畏惡之然不敢不飲其日便得胸腹痛切妨損飲食大用羸露攻治萬端不為愈後郴因事過至宣家闚視問其變故云畏此蛇虵入腹中郴還聽事思惟良乆頋見懸弩必是也則使門下史將鈴下侍徐扶輦載宣於故處設酒盃中故復有虵因謂宣此壁上弩影耳非有他恠宣遂解甚夷懌由是瘳平官至尚書歷四郡有威名焉世間多有惡夢變難必效謹按晏子春秋齊景公病水十日夜夢與二日闘}
