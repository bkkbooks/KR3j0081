  - {type: variant, offset: 262, length: 2, content: 祈農, SBCK: 夜臨殯火滅火至失之家即持去竒發行里腹痛到新頓利陽亭加劇物故樓遂復上謹按北部督郵西平到伯夷年三十所大有才決長沙太守到若章孫也日晡時到亭勑前導人録}
  - {type: variant, offset: 262, length: 2, content: 祈農, WYG: 夜臨殯火滅火至失之家即持去奇發行數里腹痛到新頓利陽亭加劇物故樓遂無敢復上謹按北部督郵西平到伯夷年三十所大有才決長沙太守到若章孫也日晡時到亭勑前𨗳人録}
