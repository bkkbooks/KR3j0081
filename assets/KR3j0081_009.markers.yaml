  - {type: variant, offset: 271, length: 3, content: 郊郊而, SBCK: 叔髙恬如也徐熟視非人非獸也遂伐其木其年同司空辟侍御史兖州刺史以二千石之尊過郷里薦祝祖考白日繡衣榮羡如此其禍安居春秋國語曰木石之恠䕫魍魎物惡能害人乎世間多有虵作恠者謹按車騎將軍巴郡馮緄鴻卿爲議郎發綬笥有二赤虵可長二尺分南北走大用憂怖許季山孫字寧方得其先人秘要緄請使卜云君}
