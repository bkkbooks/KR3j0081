  - {type: variant, offset: 988, length: 845, content: 為風伯故以丙戌日祀於西北火勝金為木相也春秋左氏傳說共工之子為玄冥師鄭大夫子產禳於玄冥雨師也謹按周禮以槱燎祀雨師雨師者畢星也詩云月離于畢俾滂沱矣易師卦師者眾也土中之眾者莫若水雷震百里風亦如之至於太山不崇朝而徧雨天下異於雷風其德散大故雨獨稱師也丑之神為雨師故以己丑日祀雨師於東北土勝水為火相也謹按黃帝書上古之時有神荼與鬱壘昆弟二人性能執鬼度朔山上有桃樹二人於樹下常簡閱百鬼鬼無道理妄為人禍害神荼與鬱壘縛以葦索執以食虎於是縣官常以臘除夕飾桃人垂葦茭畫虎於門皆追效於前事冀以禦凶也桃梗梗者更也歲終更始受介祉也戰國策齊語孟嘗君將西入秦諫者千數而弗聽蘇秦欲止之曰臣之來也過於淄上有土偶人焉與桃梗相與語桃梗謂土偶人曰子西岸之土也埏子以為人至歲八月天霖雨淄水至則子殘矣曰不然吾西岸之土也殘則復西岸耳今子東國桃木也削子以為人隆雨下淄水至泆子而去汎汎將何如矣夫秦四塞之國譬若虎口而入之則不知其可孟嘗君乃止春秋左氏傳曰魯襄公朝楚會楚康王卒楚人使公親襚公患之叔孫穆叔曰祓殯而襚則布帛也乃使巫以桃茢先祓殯楚人弗禁既而悔之古者日在北陸而藏冰深山窮谷其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災也葦茭傳曰萑葦有藂呂氏春秋湯始得伊尹祓之於廟薰以萑葦周禮卿大夫之子名曰門子論語誰能出不由戶故用葦者欲人子孫蕃殖不失其類有如萑葦茭者交易陰陽代興也虎者陽物百獸之長也能執搏挫銳噬食鬼魅今人卒得惡遇悟燒虎皮飲之擊其爪亦能辟惡此其驗也俗說雞鳴將旦為人起居門亦昏閉晨開扞難守固禮貴報功故門戶用雞也青史子書說雞者東方之牲也歲終更始辨秩東作萬物觸戶而出故以雞祀祭也太史丞鄧平說臘者所以迎刑送德也大寒至常恐陰勝故以戌日臘戌者土氣也用其日殺雞以謝刑德雄著門雌著戶以和陰陽調寒暑節風雨也謹按春秋左氏傳周大夫賓孟適郊見雄雞自斷其尾歸以告景王曰憚其為犧也山海經曰祠鬼神皆以雄雞魯郊祀常以丹雞祝曰以斯鶾音赤羽去魯侯之咎今人卒得鬼刺痱悟殺雄雞以傅其心上病賊風者作雞散東門雞頭可以治蠱由此言之雞主以禦死辟惡也俗說狗別賓主善守禦故著四門以辟盜賊也謹按月令, SBCK: 第}
