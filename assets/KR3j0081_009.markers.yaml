  - {type: variant, offset: 408, length: 1, content: 春, SBCK: 太尉梁國橋玄公祖爲司徒長史五月末所於中門外卧夜半後見東壁正白如開門明呼問左右左右莫見因起自徃手収莫之壁自如故還牀復見之心大悸動其旦予適徃侯之語次相告因爲說郷人有董彦興者即許季山外孫也其探頥索隱窮神知化雖眭孟京房無以過也然天性褊狹羞於卜術間來候師王叔茂請起徃迎湏㬰便與俱還公祖虚禮盛饌下席行觴彦興自陳下土諸生無他異分幣重言甘誠有踧踖頗能别者願得從事公祖辭讓再三爾乃聽之曰府君當有恠白光如門明者然不爲害也六月上旬雞鳴時南家哭聲吉也到}
