  - {type: variant, offset: 224, length: 0, content: '', krp: 朱虚與莒宜常血食於是乃移書曰到聞此俗舊多淫祀糜財妨農長亂積惑其侈可忿其愚可愍昔仲尼不許子路之禱晉悼不解桑林之祟死生有命吉凶由人哀哉黔黎漸染迷謬豈樂也哉莫之徴耳今條丸禁申約吏民爲陳利害其有犯者便收朝廷若私遺脫彌彌不絶主者髠截嘆無反已城陽景王縣甚尊之惟王弱冠内侍帷幄吕氏恣雎將危漢室獨見先識權發酒令抑邪扶正忠義洪毅其歆禋祀禮亦宜之於駕乘烹殺倡優男女雜錯是何謂也三邉紛拏師老器弊朝廷旰食百姓囂然禮興在有年飢則損自今聽歲再祀備物而已不得殺牛逺迎他倡賦㑹宗落造設紛華方亷察之明爲身計而復僭失罰與上同明除見處勿後中覺九江逡遒有唐居山名有神衆巫共爲取公嫗歲易男不得復娶女不得復嫁百姓若之}
