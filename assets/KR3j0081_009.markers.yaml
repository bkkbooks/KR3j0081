  - {type: variant, offset: 1586, length: 247, content: 說雞鳴將旦為人起居門亦昏閉晨開扞難守固禮貴報功故門戶用雞也青史子書說雞者東方之牲也歲終更始辨秩東作萬物觸戶而出故以雞祀祭也太史丞鄧平說臘者所以迎刑送德也大寒至常恐陰勝故以戌日臘戌者土氣也用其日殺雞以謝刑德雄著門雌著戶以和陰陽調寒暑節風雨也謹按春秋左氏傳周大夫賓孟適郊見雄雞自斷其尾歸以告景王曰憚其為犧也山海經曰祠鬼神皆以雄雞魯郊祀常以丹雞祝曰以斯鶾音赤羽去魯侯之咎今人卒得鬼刺痱悟殺雄雞以傅其心上病賊風者作雞散東門雞頭可以治蠱由此言之雞主以禦死辟惡也俗說狗別賓主善守禦故著四門以辟盜賊也謹按月令, WYG: 通義卷}
