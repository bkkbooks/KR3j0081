  - {type: variant, offset: 138, length: 4, content: 貴牲敬實, SBCK: 勝晏子朝公曰吾夢與二日闘寡人不勝我其死也晏子對曰請召占夢者立於閨使以車迎召占夢者至曰曷爲見召晏子曰公夢與二日闘不勝恐必死也占夢者曰請反具書晏子曰無反書公無所病病者隂也日者陽也一隂不勝二陽公病將已居三日公病大愈且賜占夢者曰此非臣之功也晏子教臣對也公召晏子將賜之晏子曰占夢者以臣之言對故有益也使臣身言之則不信矣此占夢者之力也臣無功焉公召吏}
