  - {type: variant, offset: 644, length: 299, content: 法主簿仰荅曰唯靈星所以在東南者亦不知也漢書郊祀志高祖五年初置靈星祀后稷也歐爵簸揚田農之事也謹按祀典既以立稷又有先農無為靈星復祀后稷也左中郎將賈逵說以為龍第三有天田星靈者神也故祀以報功辰之神為靈星故以壬辰日祀靈星於東南金勝木為土相禮器記曰臧文仲安知禮燔柴於竈竈者老婦之祭也故盛於盆尊於瓶周禮說顓頊氏有子曰黎為祝融祀以為竈神謹按明堂月令孟冬之月其祀竈也五祀之神王者所祭古之神聖有功德於民非老婦也漢記南陽陰子方積恩好施喜祀竈臘日晨炊而竈神見再拜受神時有黃羊因以祀之其孫識執金吾封原鹿侯興衛尉鮦陽侯家凡二侯牧守數十其後子孫常以臘日祀竈以黃羊楚辭說後飛廉使奔屬飛廉風伯也謹按周禮以燎祀風師風師者箕星也箕主簸揚, SBCK: ''}
