  - {type: variant, offset: 945, length: 0, content: '', SBCK: 望於所不圖此相饒耳到六月九日未明太尉楊秉暴薨七月二日拜鉅鹿太守鉅邊有金後爲度遼將軍歴登三事今妖見此而應在彼猶趙鞅夢童子裸歌而呉入郢也}
