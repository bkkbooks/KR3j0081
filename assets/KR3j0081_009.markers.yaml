  - {type: variant, offset: 144, length: 2, content: 求華, SBCK: 爲奪人之功占夢者不蔽人之能城陽景王祠謹按漢書朱虚侯劉章齊悼惠王子高祖孫也􅀫衞長安年二十有氣力高后攝政諸呂擅恣章私忿之嘗入侍宴飲章爲酒吏自請曰臣將種也請得軍法行酒有詔可酒酣章進歌已而復曰請爲太后耕田歌太后􅀏曰頋汝父知田耳若生而爲王者子安知田乎曰臣知之深耕廣種立苗欲䟽非其種者鉏而去之太后黙然頃之諸呂有亡酒㧞劒追斬之而還報曰有亡酒一人臣謹行軍法斬之太后左右大驚業許之矣無以罪}
