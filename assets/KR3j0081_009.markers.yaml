  - {type: variant, offset: 266, length: 4, content: 是故啟蟄, SBCK: 哉世間多有伐木血出以爲恠者謹按桂陽太守江夏張遼叔髙去􅋣令家居買田田中有大樹十餘圍扶䟽蓋數畒地播不生榖遣客伐之木中血出客驚怖歸具事白叔髙大怒老樹汁出此何等血因自嚴行復斫之血大流灑叔髙使先斫其枝上有一空處白頭公可長四五尺忽出徃赴叔髙髙乃逆格之凡殺四頭左右皆怖伏地}
