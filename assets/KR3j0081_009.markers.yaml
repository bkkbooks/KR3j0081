  - {type: variant, offset: 226, length: 2, content: 春秋, SBCK: 時太守宋均到官主者白出錢給聘男子女均曰衆巫與神合契知其㫖欲卒取小民不相當於是勑條巫家男女以備公嫗巫扣頭服罪乃殺之是後遂絶會稽俗多淫祀好卜筮民一以牛􅀕巫祝賦歛受謝民畏其口懼被祟不敢拒逆是以財盡於􅀑神産匱於􅀕或貧家不能以時祀至竟言不敢食牛害或發病且死先爲牛鳴其畏懼如此謹按時太守司空第五倫到官先禁絶之􅁺吏皆諫倫曰夫建功立事在敢斷爲政當信經義言淫祀無福非其􅀑而􅀕之謟也律不得屠殺少齒令􅀑神有知不妄飲食民間使其無知又何能禍人遂移書屬縣曉諭百姓民不得有出門之祀督課部吏張設罪罰犯尉以下坐祀依託􅀑神恐怖愚民皆按論之有屠生輙行罰民初恐怖頗揺動不安或接祝妄言倫勑之愈急後遂斷無復有禍祟矣鮑君神謹按汝南鮦陽有於田得麏者其主未往取也啇車十餘乘經澤中行望見此麏著繩因持去念其不事持一鮑魚置其處有頃其主徃不見所得麏反見鮑君澤中非人道路恠其如是大以爲神轉相告語治病求福多有效驗因爲起祀舎衆巫數十帷帳鍾皷方數百里皆來禱祀號鮑君神其後數年鮑魚主來歴祠下尋問其故曰此我魚也當有何神上堂取之遂從此壞傳曰物之所聚斯有神言人共奬成之耳李君神謹按汝南南頓張助於田中種禾見李核意欲持去頋見空桑中有土因殖種以餘漿溉灌後人見桑中反復生李轉相告語有病目痛者息隂下言李君令我目愈謝以一豚目痛小疾亦行自愈衆犬吠聲因盲者得視逺近翕赫其下車騎常數千百酒肉滂沲間一嵗餘張助逺出來還見之驚云此有何神乃我所種耳因就斮也石賢士神謹按汝南汝陽彭氏墓路頭立一石人在石獸後田家老母到市買數片餌暑熱行疲頓息石人下小瞑遺一片餌去忽不自覺行道人有見者時客適會問因有是餌客聊調之石人能治病愈者來謝之轉語頭痛者摩石人頭腹痛者摩其腹亦還自摩他處於此凡人病自愈者因言得其福力號曰賢士輜輦轂擊帷帳絳天絲竹之音聞數十里尉部常往護視數年亦自歇沬復其故矣世間多有亡人魄持其家語聲氣所說良是謹按陳國張漢直到南陽從京兆尹延叔堅讀}
