  - {type: variant, offset: 457, length: 186, content: 可徧祭故立稷而祭之謹按春秋左氏傳有烈山氏之子曰柱能殖百穀䟽果故立以為稷正也周棄亦以為稷正也周棄亦以為稷自商以來祀之禮緣生以事死故社稷人祀之也則祭稷穀不得稷米稷反自食也而邾文公用繒子于次睢之社司馬子魚諫曰古者六畜不相為用祭以為人也民神之主也用人其誰享之詩云吉日庚午既伯既禱豈復殺馬以祭馬乎孝經之說於斯悖矣米之神為稷故以癸未日祠稷於西南水勝火為金相也俗說縣令問主簿靈星在城東南, SBCK: 暇}
