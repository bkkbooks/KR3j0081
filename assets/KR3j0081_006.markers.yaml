  - {type: variant, offset: 192, length: 1, content: 然, SBCK: 之不知誰所作也鼓者郭也春分之音也萬物郭皮甲而出故謂之鼓周禮六鼓雷鼓八面路鼔四面睪鼓晉鼔皆二面詩云擊鼓其鏜論語小子鳴鼓而攻之可也管謹按詩云嘒嘒管聲簫管備舉禮樂記管漆竹長一尺六孔十二月之音也物貫地而芽故謂之管尚書大傅舜之時西王母來獻其白玉琯昔章帝時零陵文學奚景於冷道舜祠下得生白玉管知古以玉為管後乃易之以竹耳夫以玉作音故神人和鳯皇儀也瑟謹按世本宓羲作八尺一寸四十五􅃶黄帝書㤗帝使素女鼓瑟而悲帝禁不止故破其瑟為二十五􅃶春秋師曠為晉平公奏清徴之音有􅀇鶴二八從南方來進於廊門之扈再奏之而成列三奏之則延鵛而鳴舒翼而舞音中宫啇聲聞于天平公大􅀃坐者皆喜平公提觴而起爲師曠壽反坐而問曰音莫悲於清徴乎師曠曰不如清角平公曰清角可得聞乎師曠曰不可昔黃帝駕象車交龍畢方並轄􅃖尤居前風伯進掃雨師灑道虎狼在後䖝蛇伏地大合􅀑神於太山之上作爲清角今主君德薄不足以聽之聽之將恐有敗平公曰寡人老}
