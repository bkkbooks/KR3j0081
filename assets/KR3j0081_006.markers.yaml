  - {type: variant, offset: 80, length: 7, content: 息偃以藩魏包胥, SBCK: 曰柷詩曰鶴鳴九臯聲聞于天書八音克諧無相奪倫由是言之聲本音末也啇謹按劉歆鐘律書啇者章也物成熟可章度也五行為金五常為義五事為言凡歸為臣角謹按劉歆鐘律書角者觸也物觸地而出戴芒角也五行為木五常為仁五事為貌凡歸為民宮謹按劉歆鐘律書宮者中也居中央暢四方倡始施生為四聲綱也五行為土五常為信五事為思凡歸為君徴謹按劉歆鐘律書徴者祉也物盛大而繁祉也五行為火五常為禮五事為視凡歸為事羽謹按劉歆鐘律書羽者宇也物聚藏宇覆之也五行為水五常為智五事為德凡歸為物故聞其宮聲使人温潤而廣大聞其啇聲使人方正而好義聞其角聲使人整齊而好禮聞其徴聲使人惻隱而博愛聞其羽聲使人善養而好施宫聲亂者則其君驕啇聲錯者則其臣壊角聲繆者則其民怨徴聲洪者則其事難羽聲差者則其物亂春宫秋律百卉必彫秋宫春律萬物必榮夏宫冬律雨雹必降冬宫夏律雷必發聲夫音樂至}
