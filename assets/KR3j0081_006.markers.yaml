  - {type: variant, offset: 1590, length: 708, content: 周乘顧謂左右諸君欲行周乘當止者莫逮郎君盡其哀惻乘與鄭伯堅即日辭行祈與黃叔度郅伯嚮盛孔叔留隨轜柩乘拜郎遷陵長治無異稱意亦薄之某官與祈相反俱為侍御史公車令享相位焉謹按孝經資於事父以事君君親臨之厚莫重焉春秋國語民生於三事之如一禮斬衰公士大夫眾臣為其君乘雖見察授函封未發未離陪隸不與賓于王爵諸臨城社民神之主也義當服懃關其祀紀夫人雖有懇切之教蓋子不以從令為孝而乘囂然要勒同儕去喪即寵謂能有功異也明試無效亦旋告退安在其顯君父德美之有河內太守府廬江周景仲嚮每舉孝廉請之上堂家人宴飲皆令平仰言笑宴宴如是三四臨發贈以衣齊皆出自中子弟中外過歷職署踰於所望曰移臣作子於之何有河內太守司徒潁川韓演伯南舉孝廉唯臨辭一與相見無所寵拔曰我已舉若豈可令恩偏積於一門乎謹按春秋左氏傳夫舉無他也唯善所在親踈一也祈奚稱其讎不為諂立其子不為比舉其偏不為黨建一官而三物成晉國賴之君子歸焉蓋人君者闢門開窗號咷博求得賢而賞聞善若驚無適也無莫也周不綜臧否而務蘊崇之韓演不唯善是務越此一概夫不擇而彊用之與可用而敗之其罪一也安定太守汝南胡伊伯建平長樊紹孟建俱為司空虞放掾屬放遜位自劾還家郡以伊為主簿迎新太守曰我是宰士何可委質於二朝乎因出門名戶占繫陳國紹曰柳下惠不去父母之國君子不辭下位獨行服事後公黃瓊大以為恨移書汝南論正主者吏絕紹文書而更辟伊謹按春秋尊公曰宰其吏為士言於四海無所不統焉孟軻稱不枉尺以直尋況於枉尋以直尺柳下惠不枉道以事人故三黜而不去孔子謂之不恭今紹見編會以禮遊引耳其義不同於此伊心明審自求多福近靈帝之末司徒掾弘農董君考上名典君事不得自劾暫以家急假太守李崇請乞相見頫領功曹與俱班錄訖乃謝遣時公袁隗意亦非之然彈糾自是之後彌以滋甚郡用從事縣用府吏上下溷淆良可穢, SBCK: ''}
