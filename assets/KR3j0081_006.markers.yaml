  - {type: variant, offset: 2380, length: 0, content: '', SBCK: 上客使擊筑歌無不涕泣而去者宋子客傳之聞於秦始皇始皇召見人有識者乃髙漸離始皇惜其善擊筑重殺之乃矐其目使擊筑未嘗不稱善稍益近之漸離乃以鈆置筑木中後進得近舉筑扑始皇不中於是遂誅缶謹按易稱日呉之離不鼓缶而歌詩云坎其擊缶宛丘之道缶者瓦器所以盛漿秦人鼓之以節歌太史公記趙惠文王與秦昭王㑹於澠池秦王飲酒酣曰寡人􅀼聞趙王好音請奏瑟趙王鼓瑟秦}
