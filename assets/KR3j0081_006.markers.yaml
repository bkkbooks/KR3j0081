  - {type: variant, offset: 2525, length: 269, content: 春秋左氏傳晉悼公即位程鄭為乘馬御訓群騶知禮今國家大駕大僕親御他出奉車都尉御寧可復言執策握革而辭讓之乎凡黔首皆五帝子孫何獨今之肺腑當見優異也宗廟之人或在甽畝人之化也何日之有舊時長吏質樸子皆駕御故曰從兒君臣父子其揆一也臣不肯御子豈可然公孫遂偃蹇不使下陵上替能無亂乎劉祖幸免罪戾而見褒賞公孫於是失政刑矣聘士彭城姜肱伯淮京兆韋著休明靈帝踐祚太后臨朝陳竇以忠見害中常侍曹節秉國之權大作威福冀寵名賢以弭己謗於是起姜肱為犍為太守著東海相肱告其人吾以虛獲實蘊藉聲價盛明之際尚不委質況今政在家哉遂乘桴浮海莫知其極而著驩以承命駕言宵征民不見德唯戮是聞論輸左校, SBCK: 篪同筂}
