  - {type: variant, offset: 1400, length: 189, content: 壯其功而疑其心秦西巴觸命放麑而孟氏旋進其位麑猶不忍況弟子乎孟軻譏無惻隱之心傳曰於厚者薄則無所不薄矣豫章太守汝南封祈武興泰山太守周乘子居為太守李張所舉函封未發張病物故夫人於柩側下帷見六孝廉曰李氏蒙國厚恩據重任咨嘉休懿相授歲貢上欲報稱聖朝下欲流惠氓隸今李氏獲保首領以天年終而諸君各懷進退未肯發引妾幸有三孤足統喪紀正相追隨蓬斅墳柏何若曜德王室昭顯亡者亡者有靈實寵賴之歿而不朽此其然乎於, SBCK: 耶斯論}
