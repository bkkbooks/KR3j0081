  - {type: variant, offset: 3346, length: 263, content: 亂孔子曰火上不可握熒惑班變不可息志帝應其修無極此言熒惑火精尤史家所宜察也楚莊曰災異不見寡人其亡今變異屢臻此天以佑助漢室覺悟國家也臣誠懼史官畏忌不敢極言惟陛下深留聖思按圖書之文鑒古今之戒召見方直極言而靡諱親賢納忠推誠應人猶影響也宋景公有善言熒惑徙舍延年益壽況乎至尊感不旋日書曰天威棐諶言天德輔誠也周公將沒戒成王以左右常伯常任準人綴衣虎賁言此五官存亡之機不可不謹也臣願陛下思周旦之言詳左右清禁之內謹供養之官嚴宿衛之身申勑屢省務知戒慎以退未萌以此無疆謹匍匐自力手書密上上覽倀表嘉其忠謨倀目數病手能細書詡案大臣苟肆私意詡坐上謝倀蒙慰勞, SBCK: 吹篪簫}
