  - {type: variant, offset: 2840, length: 505, content: 夷逸作者七人亦終隱約姜肱高尚其事見得思義豈不綽綽有餘裕哉韋著邁種其德少有云補可也虐刑以逞民心怨痛德薄位尊力小任重古人懼旃鮮能不及矣趙相汝南李統少幼為冀州刺史阮況所奏耳目不聰明股肱掾史咸用忿憤欲詣闕自理統聞知之歷收其家遣吏追還曰相久忝重任負於素餐年漸七十禮在懸車頃被疾病念存首丘比自乞歸未見聽許州家幸能為相得去實上願也居無幾果徵時冀州有疑獄章帝見問統統處當詳平克厭上心曰君大聰明刺史侵君統曰臣受國厚恩官尊祿重不能自竭有以報稱久抱重疾氣力羸露耳聾目眩守虛隕越自分奄忽填壑猥得承望闕廷親見御座不勝其喜權時有瘳辭出之後必復故也刺史不侵臣也上悅其遜即日免況拜統侍中司徒九江朱倀以年老為司隸虞詡所奏耳目不聰明見掾屬大怒曰顛而不扶焉用彼相君勞臣辱何用為於是東閤祭酒周舉曰昔聖帝明王莫不歷象日月星辰以為鏡戒熒惑比有變異豈能手書密以上聞倀曰可自力也舉為創草臣聞易曰天垂象見吉凶觀乎天文以察時變臣竊見九月庚辰今月丙辰過熒惑於東井辟金光輝合并移時乃出臣經術淺末不曉天官見其非常昭昭再見誠切怪之臣誠懣憤夫月者太陰熒惑火星不宜相干臣聞盛德之主不能無異但當變改有以供御孔子曰雖明天子熒惑必謀禍福之徵慎察用之孝宣皇帝地節元年月蝕熒惑明年有霍, SBCK: ''}
