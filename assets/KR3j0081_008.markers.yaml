  - {type: variant, offset: 4, length: 5, content: 易稱懸象著, SBCK: 百所今營泯宰器闕亡蓋物盛則衰自然之道天者欲反本也故記叙神物曰祀典也先農秋左氏傳曰夏四月三卜郊不從乃獻子曰吾乃今而知有卜筮夫郊祈農事也是故啓蟄而郊郊而後耕而卜郊宜其不從也周四月今農之時也孝文帝二年正月詔曰農本其開籍田朕躬帥耕以給宗廟粢民間名曰田官古者使民如借故曰藉社神説社者土地之主土地廣􅀶不可徧敬土以爲社而祀之報功也周禮説二十置一社但爲田祖報求詩云乃立冡土以御田祖以祈甘雨春秋左氏傳曰共工有子曰勾龍佐顓平九土爲后土故封爲上公祀以爲社祗稷神稷者五榖之長五榖衆多不可徧􅀕稷而􅀕之春秋􅀹氏傳有烈山氏之子曰柱能殖䟽果故立以爲稷正也周棄亦以爲稷正也周棄亦以爲稷自啇以來祀之禮縁生以事死故社稷人祀之也則􅀕稷穀不得稷米稷反自食也而邾文公用繒子于次睢之社司馬子魚諌曰古者六畜不相爲用􅀕以爲人也民人神之主也用人其誰享之詩云吉日庚午既伯既禱豈復殺馬以􅀕馬乎孝經之説於斯悖矣米之神爲稷故以癸未日祠稷於西南水勝火爲金相也靈星俗説縣令問主簿靈星在城東南何法主簿仰荅曰唯靈星所以在東南者亦不知也漢書郊祀志髙祖五年􅀄置靈星祀后稷也歐爵􅉫揚田農之事也謹按祀典既以立稷又有先農無爲靈星復祀后稷也左中郎􅀅賈逵説以爲龍第三有天田星靈者神也故祀以報功辰之神爲靈星故以壬辰日祀靈星於東南金勝木爲土相竈神禮噐記曰􅆇文仲安知禮燔柴於竈竈者老婦之􅀕也故盛於盆尊於瓶周禮説顓頊氏有子曰􅀺爲祝融祀以爲竈神謹按}
