  - {type: variant, offset: 59, length: 4, content: 復明江漢, SBCK: 出故以雞祀􅀕也太史丞鄧平説臘者所以迎刑送德也大寒至常恐隂勝故以戍日臘戍者温氣也用其氣日殺雞以謝刑德雄著門雌著戸以和隂陽調寒配水節風雨也謹按春秋左氏傳周大夫賓孟適郊見雄雞自斷其尾歸以告景王曰憚其爲犠也山海經曰祠􅀑神皆以雄雞魯郊祀常以丹雞祀日以其朝聲赤羽去魯侯之咎今人卒得􅀑剌痱悟殺雄雞以傳其心上病賊風者作雞散東門雞頭可以治蠱由此言之雞主以禦死辟惡也殺狗磔邑四門俗􅀃狗别賓主善守禦故著四門以辟盜賊也謹按月令九門磔禳以畢春氣蓋天子之城十有二門東方三門生氣之門也}
  - {type: page-break, offset: 59, content: '', id: KR3j0081_SBCK_008-7b}
