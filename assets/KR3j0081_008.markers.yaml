  - {type: variant, offset: 384, length: 1321, content: 著素王之法復相定公會于夾谷昭舊以正其禮抗辭以拒其侮齊人謝過來歸鄆讙龜陰之田焉孟軻受業於子思既通游於諸侯所言皆以為迂遠而闊於事情然終不屈道趣舍枉尺以直尋嘗仕於齊位至卿後不能用孟子去齊尹士曰不識王之不可以為湯武則是不明也識其不可然且至則是干祿也千里而見王不遇故去三宿而後出晝是何濡滯也軻曰夫尹士烏知予哉千里而見王是予所欲也不遇故去豈予所欲哉予不得已也予三宿而出晝於予心猶以為速王庶幾改諸王如改之則必反予夫出晝而王不予追也予然後浩然有歸志魯平公駕將見孟子嬖人臧倉謂曰何哉君所謂輕身以先於匹夫者以為賢乎樂正子曰克告於君君將為來見也嬖人有臧倉者沮君君是以不果曰行或使之止或尼之行止非人之所能也吾不遇於魯侯天也臧氏之子焉能使予不遇哉又絕糧於鄒薛困殆甚退與萬章之徒序詩書仲尼之意作書中外十一篇以為聖王不作諸侯恣行處士橫議楊朱墨翟之言盈於天下天下之言不歸楊則歸墨楊氏為我是無君也墨氏兼愛是無父也無父無君是禽獸也楊墨之道不息孔子之道不著是邪說誣民充塞仁義也仁義充塞則率獸食人人將相食也吾為此懼閑先王之道距楊墨放淫辭正人心熄邪說以承三聖者予豈好辯哉予不得已也梁惠王復聘請之以為上卿孫況齊威宣王之時聚天下賢士於稷下尊寵之若鄒衍田駢淳于髡之屬甚眾號曰列大夫皆世所稱咸作書刺世是時孫卿有秀才年十五始來遊學諸子之事皆以為非先王之法也孫卿善為詩禮易春秋至襄王時而孫卿最為老師齊尚脩列大夫之缺而孫卿三為祭酒焉齊人或讒孫卿孫卿乃適楚楚相春申君以為蘭陵令人或謂春申君湯以七十里文王以百里孫卿賢者也今與之百里地楚其危乎春申君謝之孫卿去之游趙應聘於秦是時七國交爭尚於權詐而孫卿守禮義貴術籍雖見窮擯而猶不黜其志作書數十篇疾濁世之政國亂君危相屬不遵大道而營乎巫祝信禨祥蘇秦張儀以邪道說諸侯以大貴顯隨而笑之曰夫不以其道進者必不以其道亡又小五伯以為仲尼之門羞稱其功後客或謂春申君曰伊尹去夏入殷殷王而夏衰管仲去魯入齊魯弱而齊彊故賢者所在君尊國安今孫況天下賢人所去之國其不安乎春申君使請孫況況遺春申君書刺楚國因為歌賦以遺春申君春申君恨復固謝孫卿孫卿因不得已乃行復為蘭陵令焉虞卿游說之士也一見趙孝成王賜黃金百鎰白璧一雙再見拜為上卿故號為虞卿其後范雎之仇魏齊亡過平原君於是秦昭王請平原君願為布衣之交與飲數日請曰周文王得呂尚而以為太公齊桓公得管夷吾而以為仲父今范君亦寡人之叔父也范君之仇在君之家願使人取其頭不然吾不出君於關平原君曰貴而交者為賤也富而友者為貧也夫魏齊者勝之交也在固不出也況今又不在臣所乎昭王乃遺趙王書曰王之弟在秦范君之仇魏齊在平原君家王使人疾持其頭來不然吾舉兵而伐趙又不出王之弟於關趙孝成王乃發卒圍平原君家急魏齊夜亡出見趙相虞卿虞卿度趙王終不可說乃解其印與魏齊亡閒行念諸侯莫可以赴急者乃復走大梁欲因信陵君以至楚而信陵君聞之畏秦猶與未肯見曰虞卿何如人哉時侯嬴在傍曰人固未易知知人亦未易也夫虞卿一見趙王賜白璧一雙黃金百斤再見拜為上卿三見卒受相印封萬戶侯當是之時天下爭知之夫魏齊窮困過虞卿虞卿不敢重爵祿之尊解相印捐萬戶侯而閒行以急士窮而歸公子公子曰何如人知人固未易也信陵君大慚駕如野迎之魏齊聞信陵君之初重見之大怒而自刎趙王聞之卒取其頭與秦秦乃遣平原君虞卿遂留於魏魏趙畏秦莫復用困而不得意乃著書, SBCK: 祀典第}
