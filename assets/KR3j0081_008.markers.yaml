  - {type: variant, offset: 3, length: 0, content: '', SBCK: 八子􅀕天地山川􅀊徧春秋國語凡禘郊報此五者國之典禮加之以社稷山川皆有功烈於民者也及前哲令德之人爲質者也及天之三辰所昭仰也地之所生殖也九州名山川澤所出財用也族也不在祀典禮矣論語非其􅀑而􅀕也又曰􅁋祀無福是泰山不享季氏而易羙西鄰之禴􅀕蓋重祀而不貴牲而不求華也自髙祖受命郊祀祈望世增武帝尤敬􅀑神于時盛矣至平帝時宗巳下及諸小神凡千}
  - {type: page-break, offset: 3, content: '', id: KR3j0081_SBCK_008-1b}
  - {type: variant, offset: 3, length: 6, content: 七易稱懸象著, WYG: 三有天田星靈者神也故祀以報功辰之神爲靈星故以壬辰日祀靈星於東南金勝木爲土相也竈神禮器記曰臧文仲安知禮燔柴於竈竈者老婦之祭也故盛於盆尊於瓶周禮説顓頊氏有子曰黎爲祝融祀以爲竈神謹按}
  - {type: page-break, offset: 3, content: '', id: KR3j0081_WYG_008-4a, image: WYG0862/WYG0862-0399a.png}
  - {type: variant, offset: 3, length: 0, content: '', krp: 八子祭天地山川歲徧春秋國語凡禘郊報此五者國之典禮加之以社稷山川皆有功烈於民者也及前哲令德之人爲質者也及天之三辰所昭仰也地之所生殖也九州名山川澤所出財用也族也不在祀典禮矣論語非其鬼而祭也又曰淫祀無福是泰山不享季氏而易羙西鄰之禴祭蓋重祀而不貴牲而不求華也自髙祖受命郊祀祈望世增武帝尤敬鬼神于時盛矣至平帝時宗巳下及諸小神凡千}
