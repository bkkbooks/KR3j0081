  - {type: variant, offset: 1706, length: 1848, content: 篇號虞氏春秋焉孟嘗君逐於齊見反譚子迎於𣻱曰君怨於齊大夫乎孟嘗君曰有譚子曰如意則殺之乎夫富貴則人爭歸之貧賤則人爭去之此物之必至而理之固然也願君勿怨請以市諭朝而盈焉夕而虛焉非朝愛之而夕憎之也求在故往亡故去孟嘗君曰謹受命於是削所怨者名而已韓信常從南昌亭長食數月亭長妻患之乃晨早食食時信往不為具食信亦知意遂絕去釣城下有一漂母見信飢飯之竟漂數十日信曰吾必重報母母怒曰大丈夫不能自食吾哀王孫耳豈望報乎淮陰少年有侮信者曰君雖姣麗好帶長劍怯耳能死刺我不能則出我跨下於是信熟視之俛出跨下匍匐一市人皆笑以為信怯後佐命大漢功冠天下封為楚王賜所食母千金及亭長與百錢公小人也為德不竟召辱己之少年以為中尉告諸將相曰此人壯士也方辱我時豈不能殺之殺之無名故忍而就於此也韓安國為梁中大夫坐法抵罪蒙獄吏田甲辱安國安國曰死灰獨不復燃乎田甲曰燃則溺之居無幾梁內史缺孝景皇帝遣使者即拜安國為內史起徒中為二千石田甲亡安國曰甲不就官我滅乃宗甲肉袒謝安國笑曰公等可與治乎卒善遇之李廣去雲中太守屏居藍田南山中射獵嘗夜從一騎出飲田間還霸陵尉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也宿亭下居無何匈奴入遼西大為邊害於是孝武皇帝乃召廣為北平太守廣請霸陵尉與俱至軍斬之上書謝罪上報曰將軍者國之爪牙也司馬法曰登車不式遭喪不服振旅撫師以征不服率三軍之心同戰士之力故怒形則千里竦威振則萬物伏是以名聲暴於夷貊威稜憺乎鄰國夫報忿除害捐殘去殺朕之所圖於將軍也若乃免冠徒跣稽顙請罪豈稱朕之指哉太尉沛國劉矩叔方為尚書令失將軍梁冀意遷常山相去官冀妻兄孫禮為沛相矩不敢還鄉里訪友人彭城環玉都玉都素敬重矩欲得其意喜於見歸為除處所意氣周密人有請玉都者禍至無日何宜為其主乎玉都因事遠出家人不復占問暑則鬱蒸寒則凜凍且飢且渴如此一年矩素直亮眾談同愁冀亦舉寤轉薄為厚上補從事中郎復為尚書令五卿三公為國光鎮玉都慚悔自絕司徒中山祝恬字伯休公車徵道得溫病過友人鄴令謝著著距不通因載病去至汲積六七日止客舍中諸生曰今君所苦沈結困無醫師聞汲令好事欲往語之恬曰謝著我舊友也尚不相見視汲令初不相知語之何益死生命也醫藥曷為諸生事急坐相守吉凶莫見收舉便至寺門口白時令汝南應融義高聞之驚愕即嚴便出徑詣床蓐手自抆摸對之垂涕曰伯休不世英才當為國家幹輔人何有生相知者默止客舍不為人所知邂逅不自貞哉家上有尊老下有弱小願相隨俱入解傳伯休辭讓融遂不聽歸取衣車厚其薦蓐躬自御之手為丸藥口嘗饘粥身自分熱三四日間加甚劣極便制衣棺器送終之具後稍加損又謂伯休吉凶不諱憂怖交心間粗作備具相對悲喜宿止傳中數十餘日伯休彊健入舍後室家酣宴乃別伯休到拜侍中尚書僕射令豫章太守大將軍從事中郎義高為廬江太守八年遭母喪停柩官舍章百餘上得聽行服未闋而恬拜司隸薦融自代歷典五郡名冠遠近著去鄴淺薄流聞不為公府所取司徒潁川韓演伯南為丹陽太守坐從兄季朝為南陽太守刺探尚書演法車徵以非身中贓舋道路聽其從容至蕭蕭令吳斌演同歲也未至謂其賓從到蕭乃一相勞而斌內之狴犴堅其鐶楗躬將兵馬送之出境從事汝南閻符迎之於杼秋相得令止傳舍解其桎梏入與相見為致餚異曰明府所在流稱今以公徵往便原除不宜深入以介意意氣過於所望到亦遇赦其間無幾演為沛相斌去官乃臨中台首辟符焉太傅汝南陳蕃仲舉去光祿勳還到臨潁巨陵亭從者擊亭卒數下亭長閉門收其諸生人客皆猒毒痛欲復收蕃蕃曰我故大臣有罪州郡尚當先請今約勑兒客無素幸皆坐之何謂乃欲相及相守數時會行亭掾至困乃得免時令范伯弟亦即殺其亭長蕃本召陵父梁父令別仕平輿其祖河東太守冢在召陵歲時往祠以先人所出重難解亭止諸冢舍時令劉子興亦本凡庸不肯出候股肱爭之爾乃會其冢上蕃持板迎之長跪令徐乃下車即坐不命去板辭意又不謙恪蕃深忿之令去顧謂賓客平輿老夫何欲召陵令哉不但為諸家故耶而為小豎子所慢孔子曰假我數年乎其明年桓帝赫然誅五侯鄧氏海內望風草偃子興以臟疾見彈埋於當世矣蕃起於家為尚書僕射太中大夫太尉謹按尚書曰人惟求舊詩云雖有兄弟不如友生論語久要不忘平生之言周禮九兩友以任得民是以隋會圖其身而不遺其友鮑叔度其德而固推管子厥後陵遲彌已凋翫伐木有鳥鳴之刺谷風有棄予之怨陳餘張耳攜手遯秦友猶父子及據國爭權還為豺虎自漢所稱王貢彈冠蕭朱結綬博育復隙其終始以交為難況容悅偶合而能申固其好者哉故長平之吏移於冠軍魏其之客移於武安鄭當汲黯亦旋復然翟公疾之乃書其門一死一生乃知交情一貴一賤交情乃見自古患焉非直今也韓信寵秩出跨下之人斯難能也安國不念舊惡合禮中平李廣因威歸忿非義之理宣尼暨陳皆降而復升兼濟天下唯虞卿逼於彊秦獨善其身纘述篇籍垂訓後昆昔子夏心戰則臞道勝如肥何必高位豐爵以為融懿也, SBCK: ''}
