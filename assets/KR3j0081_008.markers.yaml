  - {type: variant, offset: 33, length: 2, content: 壅滯, SBCK: 荼與鬱壘昆弟二人性能執􅀑度朔山上章桃樹下簡閱百􅀑無道理妄爲人禍害荼與鬱壘縳以葦索執以食虎於是縣官常以臘除夕飾桃人垂葦茭畵虎於門皆追效於前事冀以衛凶也桃梗梗者更也􅀊終更始受介祉也戰國䇿齊語孟甞君將西入秦諌者千數而弗聽蘇秦欲止之曰臣之來過於濇上有土偶人焉與桃梗相與語謂土偶人曰子西岸之土也埏子以爲人至歲八月天霖雨濇水至則子殘矣曰不然吾西之土也殘則復西岸耳今子東國桃木也削子以爲人隆雨下濇水至泆子而汎汎將何如矣夫秦四塞之國譬若虎口而入之則不知其可孟嘗乃止春秋左氏傳曰魯襄公朝楚會楚康王卒楚人使公親禭公患之叔孫穆叔曰祓殯而襚則布帛也乃使巫以桃茢先祓殯楚人弗禁既而悔之古者日在北陸而藏氷深山窮谷其藏之也黒牡秬􅁰以享司寒其出之也桃弧棘矢以除其災也葦茭傳曰􅍉葦有藂吕氏春秋湯始得伊尹祓之於廟薫以􅍉葦周禮卿大夫之子名曰門子}
  - {type: page-break, offset: 33, content: '', id: KR3j0081_SBCK_008-6a}
