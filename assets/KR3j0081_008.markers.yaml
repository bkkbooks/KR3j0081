  - {type: page-break, offset: 1, content: '', id: KR3j0081_SBCK_008-1a}
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 義祀典}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 義巻八漢應劭撰祀典禮天子祭天地山川歲徧春秋國語凡禘郊宗祖報此五者國之典禮加之以社稷山川之神皆有功烈於民者也及前哲令德之人所以爲質者也及天之三辰所昭仰也地之五行所生殖也九州名山川澤所出財用也非是族也不在祀典禮矣論語非其鬼而祭之諂也又曰淫祀無福是以泰山不享季氏之旅而易美西鄰之禴祭蓋重祀而不貴牲敬實而不求華也自高祖受命郊祀祈望世有所增武帝尤敬鬼神于時盛矣至平帝時天地六宗以下及諸小神凡千七百所今營宇夷泯宰器闕亡蓋物盛則衰自然之道天其或者欲反本也故記叙神物曰祀典也先農謹按春秋左氏傳曰夏四月三卜郊不從乃免牲孟獻子曰吾乃今而知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也周四月今二月也先農之時也孝文帝二年正月詔曰農者天下之本其開藉田朕躬帥耕以給宗廟粢盛今民間名曰官田古者使民如借故曰藉田社神孝經説社者土地之主土地廣博不可徧敬故封土以爲社而祀之報功也周禮説二十五家置一社但爲田祖報求詩云乃立冢土又曰以御田祖以祈甘雨謹按春秋左氏傳曰共工有子曰勾龍佐顓頊能平九土爲后土故封爲上公祀以爲社非地祗稷神孝經説稷者五榖之長五榖衆多不可徧祭故立稷而祭之謹按春秋左氏傳有烈山氏之子曰柱能殖百榖蔬果故立以爲稷正也周棄亦以爲稷正也周棄亦以爲稷自商以來祀之禮縁生以事死故社稷人祀之也則祭稷穀不得稷米稷反自食也而邾文公用鄫子于次睢之社司馬子魚諌曰古者六畜不相爲用祭以爲人也民人神之主也用人其誰享之詩云吉日庚午既伯既禱豈復殺馬以祭馬乎孝經之説於斯悖矣米之神爲稷故以癸未日祠稷於西南水勝火爲金相也靈星俗説縣令問主簿靈星在城東南何法主簿仰荅曰唯靈星所以在東南者亦不知也漢書郊祀志高祖五年初置靈星祀后稷也歐爵簸揚田農之事也謹按祀典既以立稷又有先農無爲靈星復祀后稷也左中郎將賈逵説以爲龍}
