  - {type: variant, offset: 18, length: 2, content: 昏晦, SBCK: 黄羊因以祀之其孫識執金吾封原鹿侯興衛尉鮦陽侯家凡二侯牧守數十其後子孫常以臘日祀竈以黄羊風伯楚辭説後飛廉使奔屬飛廉風伯也謹按周禮以燎祀風師風師者箕星也箕主􅉫揚能致風氣易巽爲長女也長者伯故曰風伯鼔之以雷霆潤之以風雨養成萬物有功於人王者祀以報功也戍之神爲風伯故以丙戌日祀於西北火勝金爲木相也雨師春秋左氏傳􅀃共工之子爲玄􅄀師鄭大夫子産禳於玄􅄀雨師也謹按周禮以槱燎祀雨師雨師者畢星也}
