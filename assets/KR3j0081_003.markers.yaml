  - {type: variant, offset: 644, length: 239, content: 玄尊而俎生魚壇廣十二丈高三尺階三等必於其上示增高也剋石紀號著己績也或曰金泥銀繩封之以印璽下禪梁父禮祠地主去事之殺示增廣也禪謂壇墠當有所與也三皇禪於繹繹明己功成而去德者居之繹繹者無所指斥也五帝禪於亭亭德不及於皇亭亭名山其身禪予聖人三王禪於梁父梁者信也信父者子言父子相信與也孝武皇帝封廣丈二尺高九尺其下有玉牒書秘書江淮間一茅三脊為神藉五色土益雜封縱遠方奇獸飛禽及白雉加祠兕牛犀象之屬其贊享曰天增授皇帝泰元神筴周而復始皇帝敬拜泰一其夜有光如流星晝有白雲起封中於是作明堂汶上令諸侯各治邸, SBCK: 病載輦}
