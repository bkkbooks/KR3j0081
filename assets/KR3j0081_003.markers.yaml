  - {type: variant, offset: 5471, length: 1, content: 生, SBCK: 朝廷之人入而不能出山林之民徃而不能反二者各有所長而弃聖絶知遯世保真當竄深山樂天知命}
  - {type: page-break, offset: 5471, content: '', id: KR3j0081_SBCK_003-7a}
  - {type: variant, offset: 5471, length: 0, content: '', WYG: 朝廷之人入而不能出山林之民往而不能反二者各有所長而弃聖絶知遯世保真當竄深山樂天知命今居緱氏息偃城郭往來帝都招延賔客無益誨人拱黙而已飾虛矜偽誑世耀名辭細即巨終為利動春秋譏宋伯姬女而不婦今二子屑屑逺大失矣公車徵士汝南夏甫少舉孝廉為司徒掾人間之事無所闗也其後閉户塞牖不見賔客清旦東向再拜朝其母其母往往就之子亦不得見復敬拜耳頭不著巾身無單衣足常木蹻食止薑菜云我無益家事莫之能彊及母終亡不列服位謹按孝經}
