  - {type: variant, offset: 13, length: 132, content: 眾惡焉必察之孟軻云堯舜不勝其美桀紂不勝其惡傳言失指圖景失形眾口鑠金積毀消骨久矣其患之也是故樂正后夔有一足之論晉師己亥渡河有三豕之文非夫大聖至明孰能原析之乎論語名不正則言不順易稱失之毫釐差以千里故糾其謬曰正失也俗說夔一足而用精專故能調暢於音樂謹按呂氏春秋魯哀公問於孔, SBCK: 喪門人疑所服}
