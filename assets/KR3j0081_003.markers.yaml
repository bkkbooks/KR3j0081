  - {type: variant, offset: 5475, length: 94, content: 多有禁忌生三子者五月生者以為妨害父母服中子犯禮傷孝莫肯收舉袁元服功德爵位子孫巍巍仁君所見越王勾踐民生三子與乳母孟嘗君對其父若不受命於天何不高戶誰能及者夫學問貴能行君體博雅政宜有異乎荅曰齊越, SBCK: ''}
  - {type: variant, offset: 5475, length: 94, content: 多有禁忌生三子者五月生者以為妨害父母服中子犯禮傷孝莫肯收舉袁元服功德爵位子孫巍巍仁君所見越王勾踐民生三子與乳母孟嘗君對其父若不受命於天何不高戶誰能及者夫學問貴能行君體博雅政宜有異乎荅曰齊越, krp: ''}
  - {type: variant, offset: 5477, length: 2, content: 禁忌, WYG: 哉長沮丈人避世之士猶譏子路殺雞黍見其子焉何有藏一室中不出户庭以此為髙斯亦婞婞鯉趨而過庭聞詩聞禮而陳亢喜於得三不當近之何乃若兹者乎公車徵士豫章徐孺子比為太尉黃瓊所辟禮文有加孺子隠者初不荅命瓊薨既葬負擔逺渉齎一盤醊哭於墳前孫子琰故五官郎將以長孫制杖聞有哭者不知其誰亦於倚廬哀泣而已孺子無有謁刺事訖便去子琰大恠其故遣瓊門}
  - {type: page-break, offset: 5477, content: '', id: KR3j0081_WYG_003-7b, image: WYG0862/WYG0862-0371b.png}
  - {type: variant, offset: 5480, length: 0, content: '', WYG: 茅季瑋追請辭謝終不肯還謹按禮凡弔喪者既哭興踊進問其故哀之至也孺子所以經}
  - {type: page-break, offset: 5480, content: '', id: KR3j0081_WYG_003-8a, image: WYG0862/WYG0862-0371c.png}
