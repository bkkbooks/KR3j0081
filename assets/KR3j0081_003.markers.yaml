  - {type: variant, offset: 5469, length: 1, content: 德, SBCK: 鄧子敬小伯大三年以兄禮事之伯卧床上敬寢下小榻言常恐清旦朝拜俱去郷里居緱氏城中亦教授坐養聲價伯大爲議郎益州太守子敬辟司徒公車徵謹按禮記十年兄事之五年肩隨之詩云如切如嗟如琢如磨朋友衎衎誾誾各有其儀也凡兄弟相愛尚同輿而出同床而寢今相校三年耳幸無骨血之屬坐作􅀑怪旦朝言恐論語恭而無禮則勞且晏平仲稱善與人交豈徒拜伏而已哉易設四科出處語黙傳}
