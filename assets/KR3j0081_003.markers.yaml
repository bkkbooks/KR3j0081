  - {type: variant, offset: 1655, length: 1274, content: 言弗能尚也晉年十五顧而問曰吾聞大師能知人年之短長也師曠對曰女色赤白女聲清女色不壽晉曰然吾後三年將上賓於天女慎無言禍將及女其後太子果死孔子聞之曰惜夫殺吾君也後世以其自豫知其死傳稱王子喬仙或人問仙楊雄以為虙羲神農黃帝堯舜殞落文王葬畢孔子葬魯城之北獨不愛其死乎知非人之所能也生乎生乎吾恐名生而實死也國家畏天之威思求譴告故於上西門城上候望近太史寺令丞躬親靈臺位國之陽之安別在宮中懼有得失故參之也何有伺一飛鳧遂建其處乎世之矯誣豈一事哉燕太子丹仰歎天為雨粟烏白頭馬生角廚中木象生𡧢足井上株木跳度瀆俗說燕太子丹為質於秦始皇執欲殺之言能致此瑞者可得生活丹有神靈天為感應於是遣使歸國謹按太史記燕太子丹質秦始皇遇之益不善丹怨而亡歸歸求勇士荊軻秦武陽函樊於期之首貢督亢之地圖秦王大悅禮而見之變起兩楹之間事敗而荊軻立死始皇大怒乃益發兵伐燕燕王走保遼東使使斬丹以謝秦燕亦遂滅丹畏死逃歸耳自為其父所戮手足圮絕安在其能使雨粟其餘云云乎原其所以有茲語者丹實好士無所愛恡也故閭閻小論飭成之耳孝成皇帝好詩書通覽古今間習朝廷儀體尤善漢家法度故事常見中壘校尉劉向以世俗多傳道孝文皇帝小生於軍及長大有識不知父所在日祭於代東門外高帝數夢見一兒祭己使使至代求之果得文帝立為代王及後徵到後期不得立日為再中及即位為天子躬自節儉集上書囊以為前殿帷常居明光宮聽政為皇太薄后持三年服廬居枕塊如禮至以發大病知後子不能行三年之喪更制三十六日服治天下致升平斷獄三百人粟升一錢有此事不向對曰皆不然謹按漢高三年魏王豹叛漢附楚漢使大將韓信擊虜豹姬薄夫人傳詣雒陽織室漢王見薄姬內後宮幸之生文帝二年而為王者子常居宮闕內不棄捐軍中祭代東門高皇后八年後九月己酉夕即位就未央幸前殿下赦令即位時以昏夜日不再中文帝雖節儉未央前殿至奢雕文五采盡華榱壁璫軒檻皆飾以黃金其勢不可以書囊為帷奢儉好醜不相副侔又文帝以後元年六月己亥崩未央宮在時平常聽政宣室不居明光宮及皇太薄后以孝景二年四月壬子薨葬南陵文帝先太后崩不為皇太薄后持三年服文帝遵漢家基業初定重承軍旅之後百姓新免於干戈之難故文帝宜因修秦餘政教輕刑事少與之休息以儉約節欲自持初開籍田躬勸農耕桑務民之本即位十餘年時五穀豐熟百姓足倉廩實蓄積有餘然文帝本修黃老之言不甚好儒術其治尚清淨無為以故禮樂庠序未修民俗未能大化苟溫飽完給所謂治安之國也其後匈奴數犯塞侵擾邊境單于深入寇掠賊害北地都尉殺略吏民係虜老弱驅畜產燒積聚候騎至甘泉烽火通長安京師震動無不憂懣是時大發興材官騎士十餘萬軍長安帝遣丞相灌嬰擊匈奴文帝自勞兵至太原代郡由是北邊置屯待戰設備備胡兵連不解轉輸駱驛費損虛耗因以年歲穀不登百姓饑乏穀糴常至石五百時不升一錢前待詔賈捐之為孝元皇帝言太宗時民賦四十斷獄四百餘案太宗時民重犯法治理不能過中宗之世地節元年天下斷獄四萬七千餘人如捐之言復不類前世斷獄皆以萬數不三百人文帝即位二十三年日月薄蝕地數震動毀壞民廬舍關東二十九山同日崩潰水出河決酸棗大風壞都雨雹如桃李深者厚三尺狗馬及人皆生角大雪蝗蟲文帝下詔書曰間者陰陽不調日月薄蝕年穀不登大遭旱蝗饑饉之害謫見天地災及萬民丞相御史議可以佐百姓之急推此事類以, SBCK: ''}
