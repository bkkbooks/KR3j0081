  - {type: variant, offset: 884, length: 516, content: 駕前後五至祠以元鼎六年告封改為元封武帝已年四十七矣何緣反更得十八也就若所云明神禍福必有徵應權時倒讀焉能誕招期乎奉車子侯驂乘弄臣不預封事何因操印沒石乃正暴病而死悼惕無已又言武帝與仙人對博碁沒石中馬蹄迹處于今尚存虛妄若此非一事也予以空偽承乏東嶽忝素六載數聘祈祠咨問長老賢通上泰山者云謂璽處剋石文昧難知也殊無有金篋玉牒探籌之事春秋以為傳聞不如親見親見之人斯為審矣傳曰五帝聖焉死三王仁焉死五伯智焉死其隕落崩薨之日不能咸至百年詩云三后在天論語自古皆沒太史記黃帝葬於橋山騎龍升天豈不怪乎烏號弓者柘桑之林枝條暢茂烏登其上下垂著地烏適飛去從後撥殺取以為弓因名烏號耳俗說孝明帝時尚書郎河東王喬遷為葉令喬有神術每月朔常詣臺朝帝怪其來數而無車騎密令太史候望之言其臨至時常有雙鳧從東南飛來因伏伺見鳧舉羅但得一雙舄耳使尚方識視四年中所賜尚書官屬履也每當朝時葉門鼓不擊自鳴聞於京師後天下一玉棺於廳事前令臣吏試入終不動搖喬曰天帝獨欲召我沐浴服飾寢其中蓋便立覆宿夜葬於城東土自成墳其夕縣中牛皆流汗吐舌而人無知者百姓為立祠號葉君祠牧守班祿皆先謁拜吏民祈禱無不如意若有違犯立得禍明帝迎取其鼓置都亭下略無音聲但云葉太史候望在上西門上遂以占星辰省察氣祥言此令即僊人王喬者也, SBCK: 還府}
