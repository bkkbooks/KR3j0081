  - {type: variant, offset: 159, length: 1, content: 舜, SBCK: 既不匡紏而云觀過知仁謂心之哀惻終始一者也凡今杖者皆在權戚之門至有家遭齊衰同生之痛俯伏墳墓而不歸來真不愛其親而愛他人者也無他也庶福報耳凡庸小生夫何譏稱然宣度凉州知名士吾是}
  - {type: page-break, offset: 159, content: '', id: KR3j0081_SBCK_003-2b}
  - {type: variant, offset: 159, length: 1, content: 舜, WYG: 既不匡糾而云觀過知仁謂心之哀惻終始如一者也凡今杖者皆在權戚之門至有家遭齊衰同生之痛俯伏墳墓而不歸來真不愛其親而愛他人者也無他也庶福報耳凡庸小生夫何譏稱然宣度凉州知名士吾是}
