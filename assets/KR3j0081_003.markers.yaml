  - {type: punctuation, offset: 3953, content: 《, id: KR3j0081_CHANT_003-bkkpn908}
  - {type: variant, offset: 3953, length: 1511, content: 漢書東方朔平原人也孝武皇帝時招延賢良文學之士待以不次之位故四方士多上書言得失自衒鬻者於是朔詣闕自陳十二失父長養兄嫂年十三學書十四擊劍十六誦詩十九習孫吳兵法又常服子路之言臣朔年二十三長九尺三寸目若懸珠齒若編貝勇若孟賁捷若慶忌廉若鮑叔信若尾生若此可以為天子大臣矣朔文辭不遜高自稱譽由是見偉稍益親幸官至太中大夫倡優畜之不豫國政劉向言少時數問長老賢人通於事及朔時者皆云朔口諧倡辯不能持論喜為凡庸誦說故令後世多傳聞者而楊雄亦以為朔言不純師行不純德其流風遺書蔑如也然朔所以名過其實者以其恢誕多端不名一行應諧似優不窮似智正諫似直穢德似隱非夷齊是柳下惠其滑稽之雄乎朔之逢占射覆其事浮淺行於眾庶僮兒牧豎莫不眩耀而後世之好事者因取奇言怪語附著之耳安在能神聖歷世為輔佐哉俗說淮南王安招致賓客方術之士數千人作鴻寶苑秘枕中之書鑄成黃白白日升天謹按漢書淮南王安天資辨博善為文辭孝武以屬諸父甚尊之招募方伎怪迂之人述神仙黃白之事財殫力屈無能成獲乃謀叛逆剋皇帝璽丞相將軍大夫已下印漢使符節法冠趙王彭祖列侯讓等議曰安廢法行邪僻詐偽心以亂天下營惑百姓背叛宗廟春秋曰臣無將將而必誅安罪重於將反形已定圖書印及他逆無道事驗明白丞相弘廷尉湯以聞上使宗正以符節治王安自殺太子諸所與謀皆收夷國除為九江郡親伏白刃與眾棄之安在其能神仙乎安所養士或頗漏亡恥其如此因飾詐說後人吠聲遂傳行耳漢書曰說王陽雖儒生自寒賤然好車馬衣服極為鮮明而無金銀文繡之物及遷徙去處所載不過囊衣不蓄積餘財去位家居亦布衣䟽食天下服其廉而怪其奢故俗傳王陽能作黃金謹按太史記秦始皇欺於徐市之屬求三山於海中通同道隱形體弦詩想蓬萊而不免沙丘之禍孝武皇帝茲益迷謬文成五利處之不疑妻以公主賜以甲第家累萬金身佩四印辭窮情得亦旋梟裂淮南王安銳精黃白庶幾輕舉卒離親伏白刃之罪劉向得其遺文奇而獻之成帝令典尚方鑄作事費甚多而方不驗劾向大辟繫須冬獄兄陽成侯乞入國半故得減死秦漢以天子之貴四海之富淮南竭一國之貢稅向假尚方之饒然不能有成者夫物之變化固自有極王陽何人獨能乎哉語曰金不可作世不可度王陽居官食祿雖為鮮明車馬衣服亦能幾所何足怪之乃傳俗說班固之論陋於是矣九江多虎百姓苦之前將募民捕取武吏以除賦課郡境界皆設陷穽後太守宋均到乃移記屬縣曰夫虎豹在山黿鼉在淵物性之所託故江淮之間有猛獸猶江北之有雞豚也今數為民害者咎在貪殘居職使然而反逐捕非政之本也壞檻穽勿復課錄退貪殘進忠良後虎悉東渡江不為民害謹按尚書武王戎車三百兩虎賁三千人擒紂於牧野言猛怒如虎之奔赴也詩美南仲闞如哮虎易稱大人虎變其文炳君子豹變其文蔚傳曰山有猛虎草木茂長故天之所生備物致用非以傷人也然時為害者乃其政使然也今均思求其政舉清黜濁神明報應宜不為災江渡七里上下隨流近有二十餘虎山栖穴處毛鬣婆娑豈能犯陽侯凌濤瀨而橫厲哉俚語狐欲渡河無奈尾何舟人楫櫂猶尚畏怖不敢迎上與之周旋云悉東渡誰指見者堯舜欽明在上稷契允懿於下當此時也寧復有虎耶若均登據三事德被四海虎豈可抱負相隨乃至鬼方絕域之地乎俗說元服父字伯楚為光祿卿於服中生此子時年長矣不孝莫大於無後故收舉之君子不隱其過因以服為字謹按元服名賀汝南人也祖父名原為侍中安帝始加元服百官會賀臨嚴垂出而孫適生喜其嘉會因名曰賀字元服原父安為司徒忠蹇匪躬盡誠事國啟發和帝誅討竇氏中興以來最為名宰原有堂構之稱矜於法度伯楚名彭清擬夷叔政則冉季歷典三郡致位上列賀早失母不復繼室云曾子失妻而不娶曰吾不及尹吉甫子不如伯奇以吉甫之賢伯奇之孝尚有放逐之敗我何人哉及臨病困勑使留葬侍衛先公慎無迎取汝母喪柩如亡者有知往來不難如其無知祗為煩耳虞舜葬於蒼梧二妃不從經典明文勿違吾志清高舉動皆此類也何其在服中生子而名之賀者乎雖至愚人猶不云耳予為蕭令周旋謁辭故司空宣伯應賢相把臂言, SBCK: ''}
