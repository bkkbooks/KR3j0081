  - {type: variant, offset: 3214, length: 388, content: 人必有以臣欺國者既到無用此人亦有以毀傷臣者今以一人言則進之以一人言則退之臣恐天下有以見朝廷短也上有慚色卒遣布之官及太中大夫鄧通以佞幸吮癰瘍癑汁見愛擬於至親賜以蜀郡銅山令得鑄錢通私家之富侔於王者封君又為微行數幸通家文帝代服衣罽襲氈帽騎駿馬從侍中近臣常侍期門武騎獵漸臺下馳射狐兔畢雉刺彘是時待詔賈山諫以為不宜數從郡國賢良吏出遊獵重令此人負名不稱其舉及太中大夫賈誼亦數陳止遊獵是時誼與鄧通俱侍中同位誼又惡通為人數廷譏之由是䟽遠遷為長沙太傅既之官內不自得及渡湘水投弔書曰闒茸尊顯佞諛得意以哀屈原離讒邪之咎亦因自傷為鄧通等所愬也成帝曰其治天下孰與孝宣皇帝向曰中宗之世政教明法令行邊境安四夷親單于款塞天下殷富百姓康樂其治過於太宗之時亦以遭遇匈奴賓服四夷和親也上曰後世皆言文帝治天下幾至太平其德比周成王此語何從生向對曰生於言事文帝禮言事者不傷其意群臣無小大至即便從容言上止輦聽之其言可者稱善, SBCK: ''}
