  - {type: variant, offset: 5472, length: 4, content: 今俗間多, WYG: 事愛敬死事哀慼一家之中判若異域下牀闇拜逺於愛敬者矣祖載堋隧又不能送逺於哀慼者矣巾所以飾首衣所以蔽形此乃士君子所以自别於夷狄者矣唯喪者訟者露首草舎餘曷}
  - {type: variant, offset: 5473, length: 1, content: 俗, SBCK: 居緱氏息偃城郭徃來帝都招延賔客無益誨人拱黙而已飾虛矜僞誑世耀名辭細即巨終爲利動春秋譏宋伯􅁎女而不婦今二子屑屑逺大失矣公車徵士汝南夏甫少舉孝廉爲司徒椽人}
