markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 風俗通義愆禮第三夫聖人之制禮也事有其制曲有其防爲其可傳爲其可繼賢者俯就不肖跋及是故子張過而子夏不及然則無愈子路喪姉朞而不除仲尼以爲大譏况於忍能矯情直意而已也哉詩云不愆不忘帥由舊章論語不爲禮無以立故注近世茍妄曰愆禮也九江太守武陵威生不識母常自悲感游學京師還於陵谷中見一老母年六十餘因就問母姓爲何曰陳家女李氏何故獨行曰我孤獨欲依親家子威再拜長跪自白曰子威少失慈母姓陳舅氏亦李又母與亡親同年㑹遇於此乃天意也因載歸家供養以爲母謹按禮繼母如母慈母如母謂繼父之室慈愛已皆有母道故事之如母也何有道路之人而定省世間共傳丁蘭剋木而事之今此之事豈不是似如仁人惻隠哀其無歸直可収養無事}
