  - {type: variant, offset: 5468, length: 0, content: '', SBCK: 交萬物生人道交功勲成語願車馬衣輕裘與朋友共弊之而無憾士相見之禮䞇用腒雉受而不距而交荅焉唯􅀕飯然後拜之孔子食於施氏未當不飽何有同生之家而頋錢者哉傷恩薄禮弊之至也孟軻譏仲子吐鶂鶂之羮而食井上苦李鮑焦耕田而食穿井而飲非妻所織不衣餓於山中食棗或問之此棗子所種耶遂嘔吐立枯而死世不乏異惟其似旃孔子疾時貪昧退思狂狷狷者有所不爲亦其介也南陽張伯}
  - {type: page-break, offset: 5468, content: '', id: KR3j0081_SBCK_003-6a}
  - {type: variant, offset: 5468, length: 0, content: '', WYG: 交萬物生人道交功勲成論語願車馬衣輕裘與朋友共敝之而無憾士相見之禮贄用腒雉受而不拒而交答焉唯祭飯然後拜之孔子食於施氏未嘗不飽何有同生之家而雇錢者哉傷恩薄禮弊之至也孟軻譏仲子吐鶂鶂之􅃵而食井上苦李鮑焦耕田而食穿井而飲非妻所織不衣餓於山中食棗或問之此棗子所種耶遂嘔吐立枯而死世不乏異惟其似旃孔子疾時貪昧退思狂狷狷者有所不為亦其介也南陽張伯}
