body:
  text: 窮通第七易稱懸象著明莫大乎日月然時有昏晦詩美滔滔江漢南北之紀然時有壅滯論語固天縱之莫盛於聖然時有困否日月不失其體故蔽而復明江漢不失其源故窮而復通聖人不失其德故廢而復興非唯聖人俾爾亶厚夫有恆者亦允臻矣是故君子厄窮而不閔勞辱而不苟樂天知命無怨尤焉故録先否後喜曰窮通也孔子困於陳蔡之間七日不嘗粒藜羹不糝而猶絃琴於室顏回釋菜於戶外子路子貢相與言曰夫子逐於魯削迹於衛拔樹於宋今復見厄於此殺夫子者無罪藉夫子者不禁夫子絃歌鼓儛未嘗絶音蓋君子之無恥也若此乎顏淵無以對入以告孔子孔子恬然推琴喟然而嘆曰由與賜小人也召而來吾語之子路與子貢入子路曰如此者可謂窮矣夫子曰由是何言也君子通於道之謂通窮於道之謂窮今丘抱仁義之道以遭亂世之患其何窮之為故內省而不疚於道臨難而不失其德大寒既至霜雪既降吾是以知松柏之茂也昔者桓公得之莒晉文公得之曹越王得之會稽陳蔡之厄於丘其幸乎自衛反魯刪詩書定禮樂制春秋之義著素王之法復相定公會于夾谷昭舊以正其禮抗辭以拒其侮齊人謝過來歸鄆歡龜陰之田焉孟軻受業於子思既通遊於諸侯所言皆以為迂遠而闊於事情然終不屈道趣舍枉尺以直尋嘗仕於齊位至卿後不能用孟子去齊尹士曰不識王之不可以為湯武則是不明也識其不可然且至則是干祿也千里而見王不遇故去三宿而後出晝是何濡滯也軻曰夫尹士烏知豫哉千里而見王是豫所欲也不遇故去豈豫所欲哉豫不得已也豫三宿而出晝於豫心猶以為速王庶幾改諸王如改之則必反豫夫出晝而王不豫追也豫然後浩然有歸志魯平公駕將見孟子嬖人臧倉謂曰何哉君所謂輕身以先於匹夫者以為賢乎樂正子曰克告於君君將為來見也嬖人有臧倉者沮君君是以不果曰行或使之止或尼之行止非人之所能也吾不遇於魯侯天也臧氏之子焉能使豫不遇哉又絶糧於鄒薛困殆甚退與萬章之徒序詩書仲尼之意作書中外十一篇以為聖王不作諸侯恣行處士橫議楊朱墨翟之言盈於天下天下之言不歸楊則歸墨楊氏為我是無君也墨氏兼愛是無父也無父無君是禽獸也楊墨之道不息孔子之道不著是邪説誣民充塞仁義也仁義充塞則率獸食人人將相食也吾為此懼間先王之道距楊墨放淫辭正人心熄邪説以承三聖者豫豈好辨哉豫不得已也梁惠王復聘請之以為上卿孫況齊威宣王之時聚天下賢士於稷下尊寵之若鄒衍田駢淳于髡之屬甚衆號曰列大夫皆世所稱咸作書刺世是時孫卿有秀才年十五始來遊學諸子之事皆以為非先王之法也孫卿善為詩禮易春秋至襄王時而孫卿最為老師齊尚修列大夫之缺而孫卿三為祭酒焉齊人或讒孫卿孫卿乃適楚楚相春申君以為蘭陵令人或謂春申君湯以七十里文王以百里孫卿賢者也今與之百里地楚其危乎春申君謝之孫卿去之遊趙應聘於秦是時七國交爭尚於權詐而孫卿守禮義貴術籍雖見窮擯而猶不黜其志作書數十篇疾濁世之政國亂君危相屬不遵大道而營乎巫祝信禨祥蘇秦張儀以邪道説諸侯以大貴顯隨而笑之曰夫不以其道進者必不以其道亡又小五伯以為仲尼之門羞稱其功後客或謂春申君曰伊尹去夏入殷殷王而夏衰管仲去魯入齊魯弱而齊強故賢者所在君尊國安今孫況天下賢人所去之國其不安乎春申君使請孫況況遺春申君書刺楚國因為歌賦以遺春申君春申君恨復固謝孫卿孫卿因不得已乃行復為蘭陵令焉虞卿遊説之士也一見趙孝成王賜黃金百鎰白璧一雙再見拜為上卿故號為虞卿其後范雎之仇魏齊亡過平原君於是秦昭王請平原君願為布衣之交與飲數日請曰周文王得呂尚而以為太公齊桓公得管夷吾而以為仲父今范君亦寡人之叔父也范君之仇在君之家願使人取其頭不然吾不出君於關平原君曰貴而交者為賤也富而友者為貧也夫魏齊者勝之交也在固不出也況今又不在臣所乎昭王乃遺趙王書曰王之弟在秦范君之仇魏齊在平原君家王使人疾持其頭來不然吾舉兵而伐趙又不出王之弟於關趙孝成王乃發卒圍平原君家急魏齊夜亡出見趙相虞卿虞卿度趙王終不可説乃解其印與魏齊亡間行念諸侯莫可以赴急者乃復走大梁欲因信陵君以至楚而信陵君聞之畏秦猶與未肯見曰虞卿何如人哉時侯嬴在傍曰人固未易知知人亦未易也夫虞卿一見趙王賜白璧一雙黃金百斤再見拜為上卿三見卒受相印封萬戶侯當是之時天下爭知之夫魏齊窮困過虞卿虞卿不敢重爵祿之尊解相印捐萬戶侯而間行以急士窮而歸公子公子曰何如人知人固未易也信陵君大慚駕如野迎之魏齊聞信陵君之初重見之大怒而自刎趙王聞之卒取其頭與秦秦乃遣平原君虞卿遂留於魏魏趙畏秦莫復用困而不得意乃著書八篇號虞氏春秋焉孟嘗君逐於齊見反談子迎於𣻱曰君怨於齊大夫乎孟嘗君曰有談子曰如意則殺之乎夫富貴則人爭歸之貧賤則人爭去之此物之必至而理之固然也願君勿怨請以市諭朝而盈焉夕而虛焉非朝愛之而夕憎之也求在故往亡故去孟嘗君曰謹受命於是削所怨者名而已韓信常從南昌亭長食數月亭長妻患之乃晨早食食時信往不為具食信亦知意遂絶去釣城下有一漂母見信飢飯之竟漂數十日信曰吾必重報母母怒曰大丈夫不能自食吾哀王孫耳豈望報乎淮陰少年有侮信者曰君雖姣麗好帶長劍怯耳能死刺我不能則出我跨下於是信熟視之俯出跨下匍匐一市人皆笑以為信怯後佐命大漢功冠天下封為楚王賜所食母千金及亭長與百錢公小人也為德不竟召辱己之少年以為中尉告諸將相曰此人壯士也方辱我時豈不能殺之殺之無名故忍而就於此也韓安國為梁中大夫坐法抵罪蒙獄吏田甲辱安國安國曰死灰獨不復燃乎田甲曰燃則溺之居無幾梁內史缺孝景皇帝遣使者即拜安國為內史起徒中為二千石田甲亡安國曰甲不就官我滅乃宗甲肉袒謝安國笑曰公等可與治乎卒善遇之李廣去雲中太守屏居藍田南山中射獵嘗夜從一騎出飲田間還霸陵尉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也宿亭下居無何胸奴入遼西大為邊害於是孝武皇帝乃召廣為北平太守廣請霸陵尉與俱至軍斬之上書謝罪上報曰將軍者國之爪牙也司馬法曰登車不式遭喪不服振旅撫師以征不服率三軍之心同戰士之力故怒形則千里竦威振則萬物伏是以名聲暴於夷貊威稜憺乎鄰國夫報忿除害捐殘去殺朕之所圖於將軍也若乃免冠徒跣稽顙請罪豈稱朕之指哉太尉沛國劉矩叔方為尚書令失將軍梁冀意遷常山相去官冀妻兄孫禮為沛相矩不敢還鄉里訪友人彭城環玉都玉都素敬重矩欲得其意喜於見歸為除處所意氣周密人有請玉都者禍至無日何宜為其主乎玉都因事遠出家人不復占問暑則鬱蒸寒則凜凍且飢且渴如此一年矩素直亮衆談同愁冀亦舉寤轉薄為厚上補從事中郎復為尚書令五卿三公為國光鎮玉都慚悔自絶司徒中山祝恬字伯休公車徵道得溫病過友人鄴令謝著著距不通因載病去至汲積六七日止客舍中諸生曰今君所苦沈結困無醫師聞汲令好事欲往語之恬曰謝著我舊友也尚不相見視汲令初不相知語之何益死生命也醫藥曷為諸生事急坐相守吉凶莫見收舉便至寺門口白時令汝南應融義高聞之驚愕即嚴便出徑詣床蓐手自抆摸對之垂涕曰伯休不世英才當為國家幹輔人何有生相知者默止客舍不為人所知邂逅不自貞哉家上有尊老下有弱小願相隨俱入解傳伯休辭讓融遂不聽歸取衣車厚其薦蓐躬自御之手為丸藥口嘗饘粥身自分熱三四日間加甚劣極便制衣棺器送終之具後稍加損又謂伯休吉凶不諱憂怖交心間粗作備具相對悲喜宿止傳中數十餘日伯休強健入舍後室家酣宴乃別伯休到拜侍中尚書僕射令豫章太守大將軍從事中郎義高為廬江太守八年遭母喪停柩官舍章百餘上得聽行服未闋而恬拜司隸薦融自代歷典五郡名冠遠近著去鄴淺薄流聞不為公府所取司徒潁川韓演伯南為丹陽太守坐從兄季朝為南陽太守刺探尚書演法車徵以非身中贓舋道路聽其從容至蕭蕭令吳斌演同歲也未至謂其賓從到蕭乃一相勞而斌內之狴犴堅其鐶楗躬將兵馬送之出境從事汝南閻符迎之於杼秋相得令止傳舍解其桎梏入與相見為致肴異曰明府所在流稱今以公徵往便原除不宜深入以介意意氣過於所望到亦遇赦其間無幾演為沛相斌去官乃臨中台首辟符焉太傅汝南陳蕃仲舉去光祿勳還到臨潁巨陵亭從者擊亭卒數下亭長閉門收其諸生人客皆猒毒痛欲復收蕃蕃曰我故大臣有罪州郡尚當先請今約勑兒客無素幸皆坐之何謂乃欲相及相守數時會行亭掾至困乃得免時令范伯弟亦即殺其亭長蕃本召陵父梁父令別仕平輿其祖河東太守冢在召陵歲時往祠以先人所出重難解亭止諸冢舍時令劉子興亦本凡庸不肯出候股肱爭之爾乃會其冢上蕃持板迎之長跪令徐乃下車即坐不命去板辭意又不謙恪蕃深忿之令去顧謂賓客平輿老夫何欲召陵令哉不但為諸家故耶而為小豎子所慢孔子曰假我數年乎其明年桓帝赫然誅五侯鄧氏海內望風草偃子興以臟疾見彈埋於當世矣蕃起於家為尚書僕射太中大夫太尉謹按尚書曰人惟求舊詩云雖有兄弟不如友生論語久要不忘平生之言周禮九兩友以任得民是以隋會圖其身而不遺其友鮑叔度其德而固推管子厥後陵遲彌已凋玩伐木有鳥鳴之刺谷風有棄豫之怨陳餘張耳攜手遁秦友猶父子及據國爭權還為豺虎自漢所稱王貢彈冠蕭朱結綬博育復隙其終始以交為難況容悅偶合而能申固其好者哉故長平之吏移於冠軍魏其之客移於武安鄭當汲黯亦旋復然翟公疾之乃書其門一死一生乃知交情一貴一賤交情乃見自古患焉非直今也韓信寵秩出跨下之人斯難能也安國不念舊惡合禮中平李廣因威歸忿非義之理宣尼暨陳皆降而復升兼濟天下唯虞卿逼於強秦獨善其身纘述篇籍垂訓後昆昔子夏心戰則臞道勝如肥何必高位豐爵以為融懿也
