front:
  text: 上行下傚謂之風衆心安㝎謂之俗移風易俗在則人亡則書此應劭風俗通􅀁由作也然漢世有其書後人著述多引以為證今罕見全本錫學比刋白虎通矣風俗通一體書也尚缺焉三衢毛希聖挈來横􅀴錫守劉平父一見以此勉之遂繍梓于學客有自錫山來者道廣文此意徴予䟦語余深嘉教之浹風俗通序
  hash: sha256:5ce8aaa4d7cf505e0607334b23b39fafcedcf49553f016945e602f25f5577dd7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0081_SBCK_000-1a}
body:
  text: 城䨇劔張美謂天生寳物終當合古劔古書一也白虎通興風俗通二書並行于二千年前不􅂧見乆关余􅀚風西浙至無錫肖􅂄儒李顕翁晦豪訪云魯齋許文正公公門人劉平父世常豕守吾􅀖嘗刋白􅍑通于學参􅇌恪齋􅃊公題于卷首方慮未渴風俗通以完二書未㡬葉葉子元昭録異泮淂淂扵館以生以歸郡博士遂抄抄將併刻于學頋求着語余曰神物終合合論信然喜而為書火德乙巳陽月中議大夫江南浙西道粛􅇌㢘訪副使謝居仁顕卿題大德新刋校正風俗通義序漢太山太守應劭昔仲尼没而微言闕七十子喪而大義乖重遭戰國約從連横好惡殊心眞僞紛爭故春秋分爲五詩分爲四易有數家之傳並以諸子百家之言紛然殽亂莫知所從漢興儒者競作竟一本復比􅁩㑹意爲之章句家有五六皆析文便辭彌以馳逺綴文之士雜襲龍鱗訓註􅀃難轉相陵髙積如丘山可謂繁冨者矣而至於俗間行語衆所共傳積非習貫莫能原察今王室大壞九州幅裂􅅍靡有定生民無幾私懼後進益以迷昧聊以不才舉爾所知方以􅀋聚凡一十卷謂之風俗通義言通於流俗之過謬而事該之於義理也風者天氣有寒煖地形有險易水泉有美惡草木有剛柔也俗者含血之􅀋像之而生故言語歌謳異聲鼔舞動作殊形或直或邪或善或滛也聖人作而均齊之咸歸於正聖人廢則還其本俗尚書天子廵守至于岱宗覲諸侯見百年命大師陳詩以觀民風俗孝經曰移風易俗莫善於樂傳曰百里不同風千里不同俗户異政人殊服由此言之爲政之要辯風正俗最其上也周秦常以􅀊八月遣輶軒之使求異代方言還奏籍之藏於秘室及嬴氏之亡遺脫漏棄無見之者蜀人嚴君平有千餘言林閭翁孺才有梗槪之法楊雄好之天下孝廉衞卒交㑹周章質問以次注續二十七年爾乃治正凡九千字其所發明猶未􅀂爾雅之閎麗也張竦以爲懸諸日月不刋之書予實頑闇無能述演豈敢比隆於斯人哉頋惟述作之功故聊光啓之耳昔客爲齊王畫者王問畫孰最難孰最易曰犬馬最難􅀑魅最易犬馬旦暮在人之前不􅀋不可􅀋之故難􅀑魅無形無形者不見不見故易今俗語雖云浮淺然賢愚所共咨論有似犬馬其爲難矣并綜事冝於今者孔子稱幸苟有過大德新刋風俗通目録漢太山太守應劭第一卷三皇五帝三王五伯六國第二卷樂正后䕫一足丁氏家穿井得一人葉令祠燕太子丹孝文帝東方朔淮南王安神仙王陽能鑄黄金宋均令虎渡江彭城相􅀽元服第三卷九江太守武陵威大將軍􅁺燉煌宣度山陽太守汝南薛恭祖弘農太守河内呉匡河南尹太山羊翩祖太原郝子廉南陽張伯大公車徴士汝南夏甫公車徴士䂊章徐孺子第四卷長沙太守汝南郅惲司馬頴川韓稜太原周黨汝南陳茂度遼將軍皇甫規南陽五世公汝南戴㓜起江夏太守河内趙仲讓第五卷太尉沛國劉矩叔陽翟令左馮翊田煇汝南范滂孟博東郡太守汝南范茂伯安平相汝南郅朗伯巴郡太守太山但望伯門髙唐令樂安周紏豫章太守汝南封祈河内太守府盧江周景河内太守司徒頴川韓演安定太守汝南胡伊伯宗正南陽劉祖聘士彭城姜肱趙相汝南李綂司徒九江朱倀蜀郡太守頴川劉勝第六卷啇角宫徴羽塤笙皷管瑟磬鐘柷琴空侯筝筑缶笛批把竽簧籥篪簫􅄜箛荻第七卷孔子孟軻虞卿孟甞君韓信韓安國李廣太尉沛國劉矩司徒中山祝恬司徒頴川韓演太傅汝南陳蕃第八卷先農社神稷神靈星竈神風伯雨師桃梗葦茭畫虎雄雞殺狗磔邑四門膢臘祖禊司命第九卷世間多有見怪世間多有惡夢城陽景王祠九江逡遒有唐居山名㑹稽俗多􅁋祀鮑君神世間亡者多有魄持其家李君神石賢士神世間多有亡人見神世間多狗作變怪世間多有精物世間多有伐木血出世間多有蛇作怪世間人家多有見赤白光第十卷五嶽四瀆林麓京陵丘墟阜培藪澤沉沛湖陂渠溝洫大德新刋風俗通目録終余在餘杭借本於㑹稽陳正卿正卿蓋得于中書徐淵子訛舛巳甚殆不可讀愛其近古抄錄藏之携至中都得舘中本及孔復君寺丞本互加參攷始可句讀今刻之夔子好古者或得善本從而增改是所望云嘉定十三年秋七月庚子東徐丁黼書余向知二書有元人大字合刻本闻訪藏書家而鮮有著錄者嗣于道光初元愛日精廬購淂吴门士禮居所藏秪白虎通刻单本以為淂所未見而􅀿氏書惜己佚今夏子雍明經岀示近淂二書元刋本假㱕亟讀一過班書中十萹舊目及書中同异䖏是訂俗本本訛者盧氏校勘己著其善至􅀿氏書自宋以來無完快惟此十􅃃本僅存而明代叢刻訛繆滋甚其元刋本今淂合璧者真純無僅有書中自未脫誤者亦與明刻妄甚六异然如􅃃一建共訛楚共條六國􅃃二收舉訛取舉服條槖伯􅃃三由訙道譁訛猶止條夏甫􅃃五起家訛起姜條姜肱又相訛統州家訛皇家條李統􅃃七岀畫字三見末作畫畫者條明人􅀘刊丣改也孟某條按畫字是其浘􅃃九絳天訛絳繒神條后賢士之􅀋非淂元刊喜由證淩竄易之夫由猶青菁飾飭京原哲誓齊資䓁字古書多通假互用後人不知輙􅊫誤而臆改者皆可据是本正定之益信元刊猶存古書真面弥足寳責㺯道光辛丑八月寒露後三日八十拙叟黄􅇲識又据靈氏羣書拾􅀘云曹見此書元刊本然所錄李果序攵誤作李晦謝居仁序末大徳乙巳陽月中議大夫江南十二字中說空十字乙巳陽月誤作三陽月想其書漫漶不全逺邈此本矣又識
