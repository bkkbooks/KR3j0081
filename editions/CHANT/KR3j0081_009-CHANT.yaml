body:
  text: 祀典第八禮天子祭天地山川歲徧春秋國語凡禘郊宗祖報此五者國之典禮加之以社稷山川之神皆有功烈於民者也及前哲令德之人所以為質者也及天之三辰所昭仰也地之五行所生殖也九州名山川澤所出財用也非是族也不在祀典禮矣論語非其鬼而祭之諂也又曰淫祀無福是以泰山不享季氏之旅而易美西鄰之禴祭蓋重祀而不貴牲敬實而不求華也自高祖受命郊祀祈望世有所增武帝尤敬鬼神于時盛矣至平帝時天地六宗已下及諸小神凡千七百所今營寓夷泯宰器闕亡蓋物盛則衰自然之道天其或者欲反本也故記敘神物曰祀典也謹按春秋左氏傳曰夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啟蟄而郊郊而後耕今既耕而卜郊宜其不從也周四月今二月也先農之時也孝文帝二年正月詔曰農者天下之本其開籍田朕躬帥耕以給宗廟粢盛今民間名曰田官古者使民如借故曰藉田孝經說社者土地之主土地廣博不可徧敬故封土以為社而祀之報功也周禮說二十五家置一社但為田祖報求詩云乃立冢土又曰以御田祖以祈甘雨謹按春秋左氏傳曰共工有子曰勾龍佐顓頊能平九土為后土故封為上公祀以為社非地祇孝經說稷者五穀之長五穀眾多不可徧祭故立稷而祭之謹按春秋左氏傳有烈山氏之子曰柱能殖百穀䟽果故立以為稷正也周棄亦以為稷正也周棄亦以為稷自商以來祀之禮緣生以事死故社稷人祀之也則祭稷穀不得稷米稷反自食也而邾文公用繒子于次睢之社司馬子魚諫曰古者六畜不相為用祭以為人也民神之主也用人其誰享之詩云吉日庚午既伯既禱豈復殺馬以祭馬乎孝經之說於斯悖矣米之神為稷故以癸未日祠稷於西南水勝火為金相也俗說縣令問主簿靈星在城東南何法主簿仰荅曰唯靈星所以在東南者亦不知也漢書郊祀志高祖五年初置靈星祀后稷也歐爵簸揚田農之事也謹按祀典既以立稷又有先農無為靈星復祀后稷也左中郎將賈逵說以為龍第三有天田星靈者神也故祀以報功辰之神為靈星故以壬辰日祀靈星於東南金勝木為土相禮器記曰臧文仲安知禮燔柴於竈竈者老婦之祭也故盛於盆尊於瓶周禮說顓頊氏有子曰黎為祝融祀以為竈神謹按明堂月令孟冬之月其祀竈也五祀之神王者所祭古之神聖有功德於民非老婦也漢記南陽陰子方積恩好施喜祀竈臘日晨炊而竈神見再拜受神時有黃羊因以祀之其孫識執金吾封原鹿侯興衛尉鮦陽侯家凡二侯牧守數十其後子孫常以臘日祀竈以黃羊楚辭說後飛廉使奔屬飛廉風伯也謹按周禮以燎祀風師風師者箕星也箕主簸揚能致風氣易巽為長女也長者伯故曰風伯鼓之以雷霆潤之以風雨養成萬物有功於人王者祀以報功也戌之神為風伯故以丙戌日祀於西北火勝金為木相也春秋左氏傳說共工之子為玄冥師鄭大夫子產禳於玄冥雨師也謹按周禮以槱燎祀雨師雨師者畢星也詩云月離于畢俾滂沱矣易師卦師者眾也土中之眾者莫若水雷震百里風亦如之至於太山不崇朝而徧雨天下異於雷風其德散大故雨獨稱師也丑之神為雨師故以己丑日祀雨師於東北土勝水為火相也謹按黃帝書上古之時有神荼與鬱壘昆弟二人性能執鬼度朔山上有桃樹二人於樹下常簡閱百鬼鬼無道理妄為人禍害神荼與鬱壘縛以葦索執以食虎於是縣官常以臘除夕飾桃人垂葦茭畫虎於門皆追效於前事冀以禦凶也桃梗梗者更也歲終更始受介祉也戰國策齊語孟嘗君將西入秦諫者千數而弗聽蘇秦欲止之曰臣之來也過於淄上有土偶人焉與桃梗相與語桃梗謂土偶人曰子西岸之土也埏子以為人至歲八月天霖雨淄水至則子殘矣曰不然吾西岸之土也殘則復西岸耳今子東國桃木也削子以為人隆雨下淄水至泆子而去汎汎將何如矣夫秦四塞之國譬若虎口而入之則不知其可孟嘗君乃止春秋左氏傳曰魯襄公朝楚會楚康王卒楚人使公親襚公患之叔孫穆叔曰祓殯而襚則布帛也乃使巫以桃茢先祓殯楚人弗禁既而悔之古者日在北陸而藏冰深山窮谷其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災也葦茭傳曰萑葦有藂呂氏春秋湯始得伊尹祓之於廟薰以萑葦周禮卿大夫之子名曰門子論語誰能出不由戶故用葦者欲人子孫蕃殖不失其類有如萑葦茭者交易陰陽代興也虎者陽物百獸之長也能執搏挫銳噬食鬼魅今人卒得惡遇悟燒虎皮飲之擊其爪亦能辟惡此其驗也俗說雞鳴將旦為人起居門亦昏閉晨開扞難守固禮貴報功故門戶用雞也青史子書說雞者東方之牲也歲終更始辨秩東作萬物觸戶而出故以雞祀祭也太史丞鄧平說臘者所以迎刑送德也大寒至常恐陰勝故以戌日臘戌者土氣也用其日殺雞以謝刑德雄著門雌著戶以和陰陽調寒暑節風雨也謹按春秋左氏傳周大夫賓孟適郊見雄雞自斷其尾歸以告景王曰憚其為犧也山海經曰祠鬼神皆以雄雞魯郊祀常以丹雞祝曰以斯鶾音赤羽去魯侯之咎今人卒得鬼刺痱悟殺雄雞以傅其心上病賊風者作雞散東門雞頭可以治蠱由此言之雞主以禦死辟惡也俗說狗別賓主善守禦故著四門以辟盜賊也謹按月令九門磔禳以畢春氣蓋天子之城十有二門東方三門生氣之門也不欲使死物見於生門故獨於九門殺犬磔禳犬者金畜禳者卻也抑金使不害春之時所生令萬物遂成其性火當受而長之故曰以畢春氣功成而退木行終也太史公記秦德公始殺狗磔邑四門以禦蠱菑今人殺白犬以血題門戶正月白犬血辟除不祥取法於此也謹按韓子書山居谷汲者膢臘而買水楚俗常以十二月祭飲食也又曰嘗新始殺也食新曰膒膢謹按禮傳夏曰嘉平殷曰清祀周曰大蜡漢改為臘臘者獵也言田獵取禽獸以祭祀其先祖也或曰臘者接也新故交接故大祭以報功也漢家火行衰於戌故曰臘也謹按禮傳共工之子曰脩好遠遊舟車所至足跡所達靡不窮覽故祀以為祖神祖者徂也詩云韓侯出祖清酒百壺左氏傳襄公將適楚夢周公祖而遣之是其事也詩云吉日庚午漢家盛於午故以午祖也謹按周禮男巫掌望祀望衍旁招以茅女巫掌歲時以祓除釁浴禊者潔也春者蠢也蠢蠢搖動也尚書以殷仲春厥民析言人解析也療生疾之時故於水上釁潔之也巳者祉也邪疾已去祈介祉也謹按詩云芃芃棫樸薪之槱之周禮以槱燎祀司中司命司命文昌也司中文昌下六星也槱者積薪燔柴也今民間獨祀司命耳刻木長尺二寸為人像行者檐篋中居者別作小屋齊地大尊重之汝南餘郡亦多有皆祠以䐗率以春秋之月
