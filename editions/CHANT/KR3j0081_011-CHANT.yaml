body:
  text: 山澤第十孝經曰聖不獨立智不獨治神不過天地同靈造虛由立五嶽設三台傳曰五嶽視三公四瀆視諸侯其餘或伯或子男大小為差尚書咸秩無文王者報功以次秩之無有文也易稱山澤通氣禮名山大澤不以封諸侯故積其類曰山澤也東方泰山詩云泰山巖巖魯邦所瞻尊曰岱宗岱者長也萬物之始陰陽交代雲觸石而出膚寸而合不崇朝而徧雨天下其惟泰山乎故為五嶽之長王者受命易姓改制應天功成封禪以告天地孔子曰封泰山禪梁父可得而數七十有二岱宗廟在博縣西北三十里山虞長守之十月曰合凍臘月曰涸凍正月曰解凍皆太守自侍祠若有穢疾代行事法七十萬五千三牲燔柴上福脯三十朐縣次傳送京師四嶽皆同王禮南方衡山一名霍山霍者萬物盛長垂枝布葉霍然而大廟在廬江灊縣西方崋山崋者華也萬物滋熟變華於西方也廟在弘農崋陰縣北方恆山恆者常也萬物伏藏於北方有常也廟在中山上曲陽縣中央曰嵩高嵩者高也詩云嵩高惟嶽峻極于天廟在潁川陽城縣謹按尚書歲二月東巡狩至于岱宗柴岱宗泰山也望秩于山川遂見東后東后諸侯也合時月正日同律度量衡修五禮五玉三帛二牲一死贄五月南巡狩至于南嶽南嶽衡山也八月西巡狩至于西嶽西嶽華山也十一月北巡狩至于北嶽北嶽恆山也皆如岱宗之禮中嶽嵩高也王者所居故不巡焉巡者循也狩者守也道德太平恐遠近不同化幽隱有不得所者故自親行之也所以五載一出者蓋五歲再閏天道大備嶽者捔功考德黜陟幽明也河出燉煌塞外崑崙山發源注海易河出圖聖人則之禹貢九河既道詩曰河水洋洋廟在河南滎陽縣河隄謁者掌四瀆禮祠與五嶽同江出蜀郡湔氐徼外崏山入海詩云江漢陶陶禹貢江漢朝宗于海廟在廣陵江都縣淮出南陽平氏桐柏大復山東南入海禹貢海岱及淮淮沂其乂詩云淮水湯湯廟在平氏縣濟出常山房子贊皇山東入沮禹貢浮于汶達于濟廟在東郡臨邑縣謹按尚書大傳禮三正記江河淮濟為四瀆瀆者通也所以通中國垢濁民陵居殖五穀也江者貢也珍物可貢獻也河者播也播為九流出龍圖也淮者均均其務也濟者齊齊其度量也謹按詩云殷商之旅其會如林傳曰山林之士往而不能反禮記將至泰山必先有事於配林林樹木之所聚生也今配林在泰山西南五六里予前臨郡因侍祀之行故往觀之樹木蓋不足言猶七八百載間有衰索乎謹按尚書堯禪舜納于大麓麓林屬於山者也春秋沙麓崩傳曰麓者山足也詩云瞻彼旱麓易稱即鹿無虞以從禽也謹按爾雅丘之絕高大者為京謂非人力所能成乃天地性自然也春秋左氏傳莫之與京國語趙文子與叔向游於九京今京兆京師其義取於此謹按詩云如山如陵易曰伏戎于莽升其高陵又天險不可升地險山川丘陵春秋左氏傳曰殽有二陵其南陵夏后皋之墓也其北陵文王之所避風雨也殽在弘農澠池縣其語曰東殽西殽澠池所高國語周單子會晉厲公於加陵爾雅曰陵莫大於加陵言其獨高厲也陵有天性自然者今王公墳壟各稱陵也謹按尚書民乃降丘度土堯遭洪水萬民皆山棲巢居以避其害禹決江䟽河民乃下丘營度爽塏之場而邑落之故丘之字二人立一上一者地也四方高中央下像形也詩云至于頓丘宛丘之下論語他人之賢丘陵也爾雅曰天下有名丘五其三在河南二在河北謹按尚書舜生姚墟傳曰郭氏之墟墟者虛也郭氏古之諸侯善善不能用惡惡不能去故善人怨焉惡人存焉是以敗為丘墟也今故廬居處高下者亦名為墟姚墟在濟陰城陽縣帝顓頊之墟閼伯之墟是也謹按詩云如山如阜春秋左氏傳魯公伯禽宅曲阜之地阜者茂也言平地隆踊不屬於山陵也今曲阜在魯城中委曲長七八里雒北芒坂即為阜也謹按春秋左氏傳培塿無松柏言其卑小培塿者即阜之類也今齊魯之間田中少高卬名之為部矣謹按爾雅藪者澤也藪之為言厚也草木魚鱉所以厚養人君與百姓也魯有泰野晉有泰陸秦有陽紆宋有孟諸楚有雲夢吳有具區齊有海隅燕有昭餘祁鄭有圃田周有焦漢濩今漢有九州之藪楊州曰具區在吳縣之西荊州曰雲夢在華容縣南今有雲夢長掌之豫州曰圃田在中牟縣西青州曰孟諸不知在何處兗州曰大野在鉅野縣北雍州曰弦蒲在汧縣北蒲谷亭幽州曰奚養在虒縣東冀州曰泰陸在鉅鹿縣西北并州曰昭餘祈在鄔縣北其一藪推求未得其處尚書紂為逋逃淵藪春秋左氏傳曰山藪藏疾又曰藪之薪蒸虞候守之是也謹按尚書雷夏既澤詩云彼澤之陂有蒲與荷傳曰水草交厝名之為澤澤者言其潤澤萬物以阜民用也春秋左氏傳曰澤之莞蒲舟鮫守之韓詩內傳舜漁雷澤雷澤在濟陰城陽縣沆謹按傳曰沆者莽也言其平望莽莽無涯際也沆澤之無水斥鹵之類也今俗語亦曰沆澤謹按尚書春秋公羊傳齊桓公循海而東師大陷沛澤之中左氏傳齊景公田于沛招虞人以弓傳曰送逸禽之超大沛沛者草木之蔽茂禽獸之所蔽匿也謹按春秋國語伍子胥諫吳王與我爭五湖之利非越乎及越滅吳范蠡乘扁舟於五湖湖者都也言流瀆四面所猥都也川澤所仰以溉灌也今廬江臨湖丹陽蕪湖縣是也謹按傳曰陂者繁也言因下鍾水以繁利萬物也今陂皆以溉灌今汝南富陂縣是也謹按傳曰渠者水所居也秦時韓人鄭國穿渠孝武帝時趙中大夫白公復穿渠故其語曰田於何所池陽谷口鄭國在前白渠起後舉鍤為雲決渠為雨涇水一石其埿數斗且溉且糞長我稷黍衣食京師數百萬口又鄭當時穿渠以利漕道若此非一官民俱賴其饒焉謹按周禮溝者溝也廣四尺深四尺漢書高祖與項羽要割鴻溝以東為楚是也鴻溝在滎陽縣謹按周禮十里為成成間廣八尺深八尺故謂之洫論語曰禹盡力乎溝洫
