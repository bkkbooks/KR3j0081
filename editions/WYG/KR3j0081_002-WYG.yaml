body:
  text: 風俗通義巻二漢應劭撰正失孔子曰衆善焉必察之衆惡焉必察之孟軻云堯舜不勝其美桀紂不勝其惡傳言失指圖景失形衆口鑠金積毁消骨乆矣其患之也是故樂正后䕫有一足之論晉師己亥渡河有三豕之文非夫大聖至明孰能原析之乎論語名不正則言不順易稱失之毫釐差以千里故紏其謬曰正失也樂正后䕫一足俗說䕫一足而用精專故能調暢於音樂謹按呂氏春秋魯哀公問於孔子樂正䕫一足信乎孔子曰昔者舜以䕫為樂正始治六律和均五聲以通八風而天下服重黎又薦能為音者舜曰夫樂天地之精得失之節故唯聖人為能和樂之本䕫能和之平天下若䕫一足矣故曰䕫一足非一足行丁氏家穿井得一人俗說丁氏家穿井得一人於井中也謹按呂氏春秋宋丁氏無井常一人溉汲於外及自穿井喜而告之吾穿井得一人傳之聞於宋君公問其故對曰得一人之使非得一人於井中也封泰山禪梁父俗説岱宗上有金篋玉䇿能知人年夀修短武帝探䇿得十八因讀曰八十其後果用耆長武帝出璽印石裁有兆朕奉車子侯即沒其印乃止武帝畏惡亦殺去之封禪書説黄帝升封泰山於是有龍垂鬍髯下迎黄帝黄帝上騎羣臣後宮從者七十餘人小臣獨不得上乃悉持龍髯㧞墮黄帝之弓小臣百姓仰望黄帝不能復乃抱其弓而號故後世因曰烏號弓孝武皇帝時齊人公孫卿言漢之聖者在髙祖之孫今厯正値黄帝之日聖主亦當上封則能神仙矣謹按尚書禮天子廵守嵗二月至于岱宗孔子稱封泰山禪梁父可得而數七十有二盖王者受命易姓改制天下太平功成封禪以告平也所以必於岱宗者岱者胎也宗者長也萬物之始隂陽之交觸石而出膚寸而合不崇朝而徧雨天下唯泰山乎封者立石髙一丈二尺刻之曰事天以禮立身以義事父以孝成民以仁四海之内莫不為郡縣四夷八蠻咸來貢職與天無極人民蕃息天禄永得祭上𤣥尊而俎生魚壇廣十二丈髙三尺階三等必於其上示増髙也刻石紀號著己績也或曰金泥銀䋲封之印璽下禪梁父禮祠地主去事之殺示増廣也禪謂壇墠當有所與也三皇禪於繹繹明已功成而去有徳者居之繹繹者無所指斥也五帝禪於亭亭德不及於皇亭亭名山其身禪予聖人三王禪於梁父者信父者子言父子相信與也孝武皇帝封廣文二尺髙九尺其下有玊牒書秘書江淮間一茅三脊為神藉五色土益雜封縱逺方竒獸飛禽及白雉加祠兕牛犀象之屬其享曰天増授皇帝泰元神筴周而復始皇帝敬拜泰靈其夜有光如流星書有白雲起封中於是作明堂汶上令諸侯各治邸車駕前後五至祠以元鼎六年告封改為元封武帝己年四十七矣何縁反更得十八也就若所云明神禍福必有徴應權時倒讀焉能延夀命乎奉車子侯驂乗上下臣不預封事何因操印没石乃止暴病而死悼傷無已何云武帝殺之乎又言武帝與犯人對博碁没石中馬蹄迹處于今尚存虚妄若此非一事也予以空偽承乏東嶽忝任六載數往祈祠咨問長老賢通上泰山者云謂璽處刻石文昧難知也殊無有金篋玉牒探籌之事春秋以為傳聞不如親見見之人斯為審矣傳曰五帝聖焉死三王仁焉死五伯智焉死其隕落崩薨之日不能咸至百年詩云三后在天論語曰自古皆有死太史記黄帝葬於橋山騎龍升天豈不恠乎烏號弓者柘桑之林枝條暢茂烏登其上下垂著地烏適飛去後從撥殺取以為弓因名烏號耳葉令祠俗説孝明帝時尚書郎河東王喬遷為葉令喬有神術每月朔望帝詣臺朝帝恠其數而無車騎密令太史候望言其臨至時常有雙鳬從南飛來因伏伺見鳬舉羅但得一雙舄耳使尚方識視則四年中所賜尚書官屬履也毎當朝時葉門鼔不擊自鳴聞於京師後天下一玊棺於㕔事前令臣吏指排終不動揺喬曰天帝獨欲召我沐浴服飾沐其中蓋便立覆寢夜葬於城東土自成墳縣中牛皆流汗吐舌而人無知者號隔君祠牧守班錄皆先謁拜吏民祈禱無不如意若有違犯立得禍明帝迎取其鼓置都亭下畧無音聲又令太史候望葉君在上西門上遂以占星辰省察氣祥言此令即僊人王喬者也謹按春秋左氏傳葉公子髙姓沈名諸梁古者令曰公忠於社稷惠恤萬民方城之外莫不欣戴白公勝作亂子西子期刼惠王以兵葉公自葉而入至于北門或遇之曰君胡不胄國人望君如望慈父母焉盗賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇一人曰何為胄國人望君如望嵗焉日日以㡬若見君面是得艾也人知不死其亦夫有奮心猶將旌君以狥於國而又掩面以絶民望不亦甚乎乃免胄而進與國人攻之白公奔山而縊生烹石乞迎反惠王整肅官司退而老於葉及其終也葉人追思而立祠功施於民以勞定國兼兹二事固祠典之所先也此乃春秋之時何有近孝明乎周書稱靈王太子晉㓜有盛德聰明博達師曠與言弗能尚也晉年十五顧而問曰吾聞太師能知人年之短長也師曠對曰女色赤白女聲清女色不夀晉曰然吾後三年將上賓於天女慎無言禍將及女其後太子果死孔子聞之曰惜夫殺吾君也後世以其自豫知其死傳稱王子喬仙或人問仙揚雄以為虙羲神農黄帝堯舜殞落文王葬畢孔子葬魯城之北獨不愛其死乎知非人之所能也生乎生乎吾恐名生而實死也國家畏天之威思求譴告故於上西門城上候望近太史寺令丞躬親靈臺位國之陽其屬别在城上懼有得失故參之也何有伺一飛鳬遂建其處乎世之矯誣豈一事㢤燕太子丹天為雨粟烏頭白馬生角厨人生肉足井上株木跳度瀆俗説燕太子丹為質於秦始皇執欲殺之言能致此瑞者可得生活丹有神靈天為感應於是遣使歸國謹按太史記燕太子丹質于秦始皇遇之不善丹恐而亡歸歸求勇士荆軻秦武陽函樊於期之首貢督亢之地圖秦王大悦禮而見之變起兩楹之間事敗而荆軻立死始皇大怒乃益發兵伐燕燕王走保遼東使使斬丹以謝秦燕亦遂滅丹畏死逃歸耳自為其父所戮手足圮絶安在其能使雨粟其餘云云乎原其所以有兹語者丹實好士無所愛恡也故閭閻小論飭成之耳孝文帝孝成皇帝好詩書通覧古今間習朝廷儀體尤善漢家法度故事常見中壘校尉劉向以世俗多傳道孝文皇帝少生於軍及長大有識不知父所在日祭於代東門外髙帝數夢見一兒祭己使使至代求之果得文帝立為代王及後徴到後期不得立日為再中及即位為天子躬自節儉集尚書囊以為前殿帷常居明光宮聼政為皇太后薄氏持三年服廬居枕塊如禮至以發大病知後子不能行三年之喪更至三十六日服治天下致升平㫁獄三百人粟升一錢有此事不向對曰皆不然謹按漢髙三年魏王豹叛漢附楚漢使大將韓信擊虜豹豹姬薄夫人傳詣雒陽織室漢王見薄姬内後宮幸之生文帝二年而為王者子常居宮闕内不棄捐軍中祭代東門髙皇后八年後九月己酉夕即位就未央幸前殿下赦令即位時以昏夜日不再中文帝雖節儉未央前殿至奢雕文五采畵華榱璧璫軒檻皆飾以黄金其勢不可以書囊為帷奢儉好醜不相副侔又文帝以後元年六月己亥崩未央宫在時平常聽政宣室不居明光宫及皇太后薄氏以孝景二年四月壬子薨葬南陵文帝先太后崩不為皇太后薄氏持三年服文帝當漢家基業初定重承軍旅之後百姓新免於干戈之難故文帝宜因修秦餘政教輕刑少事與之休息以儉約節欲自持初開藉田躬勤耕桑務民之本即位十餘年時五穀豊熟百姓足倉廪實蓄積有餘然文帝本修黄老之言不甚好儒術其治尚清浄無為以故禮樂庠序未修民俗未能大化茍温飽完給所謂治安之國也其後匈奴數犯塞侵擾邊境單于深入冦掠賊害北地都尉殺畧吏民係虜老弱驅畜産燒積聚候騎至甘泉烽火通長安京師震動無不憂懣是時大發興材官騎士十餘萬軍長安帝遣丞相灌嬰擊匈奴文帝自勞兵至太原代郡由是北邊置屯待戰設備備胡兵連不解轉輸絡繹費損虚耗因以年嵗比不登百姓饑乏穀糴常至石五百時不升一錢前待詔賈捐之為孝元皇帝言太宗時民賦四十斷獄四百餘案太宗時民重犯法治理不能過中宗之世地節元年天下斷獄四萬七千餘人如捐之言復不類前世斷獄皆以萬數不三百人文帝即位二十三年日月薄蝕地數震動毁壊民廬舍關東二十九山同日崩潰水出河決酸棗大風壊木雨雹如桃李深者厚三尺狗馬及人皆生角大雪蝗虫文帝下詔書曰間者隂陽不調日月薄蝕年穀不登大遭旱蝗饑饉之害謫見天地災及萬民丞相御史議可以佐百姓之急推此事類似不及太宗之世不可以為升平上曰吾於臨朝綂政施號令何如向未及對上謂向校尉帝師傅耆舊洽聞親事先帝歴見三世得失事無善惡如聞知之其言勿有所隱向曰文帝時政頗遺失皆所謂悔恡小疵耶嘗輦過郎署問中郎馮唐以趙將亷頗馬服唐言今雖有此人不能用也推輦而去還歸禁中召責讓唐頓首陳言聞之於祖父道亷頗李牧為邊將市租諸入皆輸幕府而趙王不問多少日擊牛灑酒勞賜士大夫賞異材故能立威名今臣竊聞雲中太守魏尚邊之良將也匈奴常犯塞為冦尚追之吏士争居前樂盡死力斬首上功誤差數級下之吏尚竟抵罪由是言之雖得亷頗李牧不能用也及河東太守季布治郡有聲召欲以為御史大夫左右或毁言使酒後不用布見辭去自陳曰臣幸得待罪河東無故而見徴召此必有人以臣欺國者既到不用此亦有人以毁傷臣者今以一人言則進之以一人言則退之臣恐天下有以見朝廷短也上有慙色卒遣布之官及大中大夫鄧通以佞幸吮癰瘍膿汁見愛擬於至親賜以蜀郡銅山令得鑄錢通私家之富侔於王者封君又為微行數幸通家文帝代服衣􅄢襲氈㡌騎駿馬從侍中近臣常侍期門武騎獵漸臺下馳射狐兎畢雉刺彘是時待詔賈山諫以為不宜數從郡國賢良吏出逰獵重令此人負名不稱其舉及大中大夫賈誼亦數陳止遊獵是時誼與鄧通俱侍中同位誼又惡通為人數廷譏之由是疎逺遷為長沙太傅既之官内不自得及渡湘水投弔書曰闒茸尊顯佞諛得意以哀屈原離䜛邪之咎亦因自傷為鄧通等所愬也成帝曰其治天下孰與孝宣皇帝向曰中宗之世政教明法令行邊境安四夷親單于欵塞天下殷富百姓康樂其治過於太宗之時亦以遭遇匈奴賓服四夷和親也上曰後世皆言文帝治天下㡬至太平其德比周成王此語何從生向對曰生於言事文帝禮言事者不傷其意羣臣無小大至即便從容言上止輦聽之其言可者稱善不可者喜笑而已言事多褒之後人見遺文則以為然世之毁譽莫能得實審形者少隨聲者多或至以無為有故曰堯舜不勝其善桀紂不勝其惡桀紂非殺父與君也而世有殺君父者人皆以為無道如桀紂此不勝其惡故若文帝之仁賢不勝其善世俗褒揚言其德比成王治㡬太平也然文帝之節儉約身以率先天下忍容言者含咽臣子之短此亦通人難及似出於孝宣皇帝者也如其聰明逺識不忘數十年事制持萬㡬天資治理之材恐文帝亦且不及孝宣皇帝向以為如此及至世間言文帝少生於軍中長大祭代東門外使者求得之因立為代王徴當即位後期日為之再中集尚書囊以為前殿帷常居明光宮聽政為薄太后持三年服治天下致升平斷獄三百人粟一升一錢凡此十餘事皆俗人所妄傳言過其實及傅㑹故以為前皆非是如劉向言東方朔俗言東方朔太白星精黄帝時為風后堯時為務成子周時為老􅅨在越為范蠡在齊為鴟夷子皮言其神聖能興王霸之業變化無常謹按漢書東方朔平原人也孝武皇帝時招延賢良文學之士待以不次之位故四方多上書言得失自衒鬻者於是朔詣闕自陳十二失父長飬兄嫂年十三學書十四擊劍十六誦詩十九習孫吳兵法又常服子路之言臣朔年二十三長九尺三寸目若懸珠齒若編貝勇若孟賁㨗若慶忌亷如鮑叔信若尾生若此可以為天子大臣矣朔文辭不遜髙自稱譽由是見偉稍益親幸官至大中大夫倡優畜之不豫國政劉向少時數問長老賢達及朔遺事時人皆云朔口諧倡辯不能持論喜為凡庸誦説故今後世多傳聞者而揚雄亦以為朔言不純師行不純德其流風遺書蔑如也然朔所以名過其實以其恢誕多端不名一行應諧似優不窮似智正諫似直穢德似隠非夷齊是栁惠其滑稽之雄乎朔之道古射覆其事浮淺行於衆僮兒牧豎莫不眩耀而後之好事者因取竒言恠語附著之耳安在能神聖歴世為輔佐㢤淮南王安神仙俗説淮南王安招致賔客方術之士數千人作鴻寳苑秘枕中之書鑄成黄白白日升天謹按漢書淮南王安天資辨博善為文辭孝武以諸父屬甚尊之招募方伎恠迂之人述神仙黄白之事財殫力屈無能成獲乃謀叛逆刻皇帝璽丞相將軍大夫已下印漢使符節法冠趙王彭祖列侯讓等議曰安廢法行邪僻詐偽心以亂天下熒惑百姓背叛宗廟春秋無將將而必誅安罪重於將反形已定圖書印及他逆無道事驗明白丞相𢎞廷尉湯以聞上使宗正以符節治王安自殺太子諸所與謀皆誅夷國除為九江郡親伏白刅與衆棄之安在其能神仙乎安所飬士或頗漏亡恥其如此因飾詐説後人吠聲遂傳形耳王陽能鑄黄金漢書説王陽雖儒生自寒賤然好車馬衣服極為鮮好而無金銀文繡之物及遷徙去處所載不過嚢衣不蓄積餘財去位家居亦布衣䟽食天下服其亷而恠其奢故俗傳王陽能作黄金謹按太史記秦始皇欺於徐市之屬求三山於海中通仙道隠形體自謂想蓬萊而不免沙丘之禍孝武皇帝兹益迷謬文成五利處之不疑妻以公主賜以甲第家累萬金身佩四印辭窮情得亦旋梟裂淮南王安鋭精黄白庶㡬輕舉卒乃親伏白刃之罪劉向得其遺文竒而獻之成帝令典尚方鑄作事費甚多而方不驗劾向大辟繫須冬獄兄陽成侯乞入國半故得减死秦漢以天子之貴四海之富淮南竭一國之貢税向假尚方之饒然不能有成者夫物之變化固自有極王陽何人獨能乎㢤語曰金不可作世不可度王陽居官食祿雖為鮮明車馬衣服亦能㡬所何足恠之乃傳俗説班固之論於是陋矣宋均令虎渡江九江多虎百姓苦之前將募民捕取武吏以除賦課郡境界皆設䧟穽後太守宋均到乃移記屬縣曰夫虎豹在山黿鼉在淵物性之所託故江淮之間有猛獸猶北土之有雞豚今數為民害者咎在貪殘居職使然而反逐捕非政之本也壊檻穽勿復課録退貪殘進忠良後虎悉東渡江不為民害謹按尚書武王戎車三百兩虎賁三千人擒紂於牧野言猛怒如虎之奔赴也詩美南仲闞如哮虎易稱大人虎變其文炳君子豹變其文蔚傳曰山有猛虎草木茂長故天之所生備物致用非以傷人也然時為害者乃其政使然也今均思求其政舉清黜濁神明報應宜不為災江渡七里上下隨流近有二十餘里虎山棲穴處毛鬛豈能犯陽侯凌濤瀬而横厲哉俚語狐欲渡河無奈尾何舟人持櫂猶尚畏怖不敢迎犯與之周旋云悉東渡誰指見者堯舜欽明在上稷契允懿於下當此時也寧復有虎耶若均登據三事德被四海虎豈可抱負相隨乃至鬼方絶域之地乎彭城相袁元服俗説元服父字伯楚為光禄卿於服中生此子時年長矣不孝莫大於無後故収舉之君子不隱其過因以服為字謹按元服名賀汝南人也祖父名原為侍中安帝始加元服百官㑹賀臨嚴乗出而孫適生喜其嘉㑹因名曰賀字元服原父安為司徒忠蹇匪躬盡誠事國啓發和帝誅討竇氏中興以來最為名宰原有堂構之稱矜於法度伯楚名彭清擬夷叔政則冉季歴典三郡致位上列賀早失母不復繼室云曽子失妻而不娶曰吾不及尹吉甫子不如伯竒以吉甫之賢伯竒之孝尚有放逐之敗我何人哉及臨病困勑使留葬侍衛先公慎無迎取汝母喪柩如亡者有知徃来不難如其無知祗為煩耳虞舜葬於蒼梧二妃不從經典明文勿違吾志清髙舉動皆此類也何其在服中生子而名之賀者乎雖至愚人猶不云耳予為蕭令周旋謁辭故司空宣伯應賢相把臂言易稱天地大德曰生今俗間多有禁忌生三子者五月生者以為妨害父母服中子犯禮傷孝莫肯収舉袁元服功德爵位子孫巍巍仁君所見越王勾踐民生三子與乳母孟嘗君對其父若不受命於天何不髙户誰能及者夫學問貴能行君體博雅宜有異乎俗答曰齊楚之事敬聞命矣至於元服其事如此明公既為鄉里宿望超然逺覽何為過聆晉語簡在心事乎於是欣然悦服續以大言茍有過人必知之我能勝仲尼哉元服子夏甫前後徴命終不降志亞作者之遺風矣正甫亦有重名今見沛相載德五世而被斯言之玷恐多有宣伯之論故備記其終始風俗通義卷二
