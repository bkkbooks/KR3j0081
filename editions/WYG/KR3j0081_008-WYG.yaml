body:
  text: 風俗通義巻八漢應劭撰祀典禮天子祭天地山川歲徧春秋國語凡禘郊宗祖報此五者國之典禮加之以社稷山川之神皆有功烈於民者也及前哲令德之人所以爲質者也及天之三辰所昭仰也地之五行所生殖也九州名山川澤所出財用也非是族也不在祀典禮矣論語非其鬼而祭之諂也又曰淫祀無福是以泰山不享季氏之旅而易美西鄰之禴祭蓋重祀而不貴牲敬實而不求華也自高祖受命郊祀祈望世有所增武帝尤敬鬼神于時盛矣至平帝時天地六宗以下及諸小神凡千七百所今營宇夷泯宰器闕亡蓋物盛則衰自然之道天其或者欲反本也故記叙神物曰祀典也先農謹按春秋左氏傳曰夏四月三卜郊不從乃免牲孟獻子曰吾乃今而知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也周四月今二月也先農之時也孝文帝二年正月詔曰農者天下之本其開藉田朕躬帥耕以給宗廟粢盛今民間名曰官田古者使民如借故曰藉田社神孝經説社者土地之主土地廣博不可徧敬故封土以爲社而祀之報功也周禮説二十五家置一社但爲田祖報求詩云乃立冢土又曰以御田祖以祈甘雨謹按春秋左氏傳曰共工有子曰勾龍佐顓頊能平九土爲后土故封爲上公祀以爲社非地祗稷神孝經説稷者五榖之長五榖衆多不可徧祭故立稷而祭之謹按春秋左氏傳有烈山氏之子曰柱能殖百榖蔬果故立以爲稷正也周棄亦以爲稷正也周棄亦以爲稷自商以來祀之禮縁生以事死故社稷人祀之也則祭稷穀不得稷米稷反自食也而邾文公用鄫子于次睢之社司馬子魚諌曰古者六畜不相爲用祭以爲人也民人神之主也用人其誰享之詩云吉日庚午既伯既禱豈復殺馬以祭馬乎孝經之説於斯悖矣米之神爲稷故以癸未日祠稷於西南水勝火爲金相也靈星俗説縣令問主簿靈星在城東南何法主簿仰荅曰唯靈星所以在東南者亦不知也漢書郊祀志高祖五年初置靈星祀后稷也歐爵簸揚田農之事也謹按祀典既以立稷又有先農無爲靈星復祀后稷也左中郎將賈逵説以爲龍第三有天田星靈者神也故祀以報功辰之神爲靈星故以壬辰日祀靈星於東南金勝木爲土相也竈神禮器記曰臧文仲安知禮燔柴於竈竈者老婦之祭也故盛於盆尊於瓶周禮説顓頊氏有子曰黎爲祝融祀以爲竈神謹按明堂月令孟夏之月其祀竈也五祀之神王者所祭古之神聖有功德於民非老婦也漢記南陽隂子方積恩好施喜祀竈臘日晨炊而竈神見再拜受神時有黄羊因以祀之其孫識執金吾封原鹿侯興衛尉鮦陽侯家凡二侯牧守數十其後子孫常以臘日祀竈以黄羊風伯楚辭説後飛亷使奔屬飛亷風伯也謹按周禮以槱燎祀風師風師者箕星也箕主簸揚能致風氣易巽爲長女也長者伯故曰風伯鼔之以雷霆潤之以風雨養成萬物有功於人王者祀以報功也戍之神爲風伯故以丙戌日祀於西北火勝金爲木相也雨師春秋左氏傳説共工之子爲𤣥𡨕師鄭大夫子産禳於𤣥𡨕雨師也謹按周禮以槱燎祀雨師雨師者畢星也詩云月離于畢俾滂沱矣易師封也土中之衆者莫若水衆者師也雷震百里風亦如之至於泰山不崇朝而徧雨天下異於雷風其德散大故雨獨稱師也丑之神爲雨師故以己丑日祀雨師於東北土勝水爲火相也桃梗葦茭畫虎謹按黄帝書上古之時有荼與鬱壘昆弟二人性能執鬼度朔山上章桃樹下簡閱百鬼無道理妄爲人禍害荼與鬱壘縳以葦索執以食虎於是縣官常以臘除夕飾桃人乘葦茭畫虎於門皆追效於前事冀以衛㐫也桃梗梗者更也歲終更始受介祉也戰國䇿齊語孟嘗君將西入秦諌者千數而弗聽蘇代欲止之曰臣之來也過於濇上有土偶人焉與桃梗相與語謂土偶人曰子西岸之土也埏子以爲人至歲八月天霖雨濇水至則子殘矣曰不然吾西岸之土也殘則復西岸耳今子東園桃木也削子以爲人隆雨下濇水至泆子而汎汎將何如矣夫秦四塞之國譬若虎口而入之則不知其可孟嘗乃止春秋左氏傳曰魯襄公朝楚會楚康王卒楚人使公親禭公患之叔孫穆叔曰祓殯而襚則布帛也乃使巫以桃茢先祓殯楚人弗禁既而悔之古者日在北陸而藏冰深山窮谷其藏之也黒牡秬黍以享司寒其出之也桃弧棘矢以除其災也葦茭傳曰萑葦有藂吕氏春秋湯始得伊尹祓之於廟薫以萑葦周禮卿大夫之子名曰門子論語誰能出不由戸故用葦者欲人子孫蕃殖不失其類有如萑葦茭者交易隂陽代興也虎者陽物百獸之長也能執搏挫鋭噬食鬼魅今人卒得惡遇燒煮虎皮飲之擊其爪亦能辟惡此其騐也雄雞俗説雞鳴將旦爲人起居門亦昏閉晨開扞難守固禮貴報功故門戸用雞也青史子書説雞者東方之牲也歲終更始平秩東作萬物觸戸而出故以雞祀祭也太史丞鄧平説臘者所以迎刑送德也大寒至常恐隂勝故以戍日臘戍者溫氣也用其氣日殺雞以謝刑德雄著門雌著戸以和隂陽調寒配水節風雨也謹按春秋左氏傳周大夫賓孟適郊見雄雞自斷其尾歸以告景王曰憚其爲犠也山海經曰祠鬼神皆以雄雞魯郊祀常以丹雞祀日以其朝聲赤羽去魯侯之咎今人卒得鬼刺痱病殺雄雞以傅其心上病賊風者作雞頭可以治蠱由此言之雞主以禦死辟惡也殺狗磔邑四門俗説狗别賓主善守禦故著四門以辟盜賊也謹按月令九門磔禳以畢春氣蓋天子之城十有二門東方三門生氣之門也不欲使死物見於生門故獨於九門殺犬磔禳犬者金畜禳者却也抑金使不害春之時所生令萬物遂成其性火當受而長之故曰以畢春氣功成而退木行終也太史公記秦德公始殺狗磔邑四門以禦蠱菑今人殺白犬以血題門戸正月白犬血辟除不祥取法於此也膢謹按韓子書山居谷汲者膢臘而買水楚俗常以十二月祭飲食也又曰嘗新始殺也食新曰膒膢臘謹按禮傳夏曰嘉平殷曰清祀周曰大蜡漢改爲臘臘者獵也言田獵取獸以祭祀其先祖也或曰臘者接也新故交接故大祭以報功也漢家火行衰於戌故曰臘也祖謹按禮傳共工之子曰脩好遠遊舟車所至足跡所達靡不窮覽故祀以爲祖神祖者徂也詩云韓侯出祖清酒百壺左氏傳襄公將適楚夢周公祖而遣之是其事也詩云吉日庚午漢家盛於午故以午祖也禊謹按周禮男巫掌望祀望衍旁招以茅女巫掌歲時以祓除釁浴禊者潔也春者蠢也蠢蠢搖動也尚書以殷仲春厥民析言人解療生疾之時故於水上釁潔之也已者祉也邪疾已去祈分祉也司命謹按詩云芄芄棫樸薪之槱之周禮槱燎司中司命文昌也司中文昌上六星也槱者積薪燔柴也今民間獨祀司命耳刻木長尺二寸爲人像行者擔篋中居者别作小屋齊天地大尊重之汝南餘郡亦多有皆祠以腊率以春秋之月風俗通義巻八
