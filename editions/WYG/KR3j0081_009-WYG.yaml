body:
  text: 風俗通義卷九漢應劭撰恠神禮天子祭天地五嶽四瀆諸侯不過其望也大夫五祀士門户庶人祖蓋非其鬼而祭之諂也又曰淫祀無福是以隱公將祭鍾巫遇賊蔿氏二世欲解淫神閻樂刼弑仲尼不許子路之禱而消息之節平荀罃不從桑林之祟而晉侯之疾間由是觀之則淫躁而畏者災自取之厥咎響應反誠據義内省不疚者物莫能動禍轉爲福矣傳曰神者申也恠者疑也孔子稱土之恠爲墳羊論語子不語恠力亂神故采其晃著者曰恠神也世間多有見恠驚恠以自傷者謹按管子書齊公出於澤見衣紫衣大如轂長如轅拱手而立還歸寢疾數月不出有皇士者見公語驚曰物惡能傷公公自傷也此所謂澤神委蛇者也唯霸主乃得見之於是桓公欣然笑不終日而病愈予之祖父郴爲汲令以夏至日見主簿杜宣因賜酒時北壁上有懸赤弩照於杯形如蛇宣畏惡之然不敢不飲其日便得胸腹痛切妨損飲食大用羸露攻治萬端不爲愈後郴因事過至宣家闚視問其變故云畏此蛇蛇入腹中郴還廳事思惟良久顧見懸弩曰必是也則使門下史將鈴下侍徐扶輦載宣於故處設酒盃中故復有蛇因謂宣此壁上弩影耳非有他恠宣遂解甚夷懌由是瘳平官至尚書厯四郡有威名焉世間多有惡夢變難必效謹按晏子春秋齊景公病水十日夜夢與二日鬭而不勝晏子朝公曰吾夢與二日鬬寡人不勝我其死也晏子對曰請召占夢者立於閨使以車迎召占夢者至曰曷爲見召晏子曰公夢與二日鬭不勝恐必死也占夢者曰請反具書晏子曰無反書公無所病病者陰也日者陽也一陰不勝二陽公病將已居三日公病大愈且賜占夢者曰此非臣之功也晏子教臣對也公召晏子將賜之晏子曰占夢者以臣之言對故有益也使臣身言之則不信矣此占夢者之力也臣無功焉公召吏而使兩賜之晏子不爲奪人之功占夢者不蔽人之能城陽景王祠謹按漢書朱虗侯劉章齊悼惠王子高祖孫也宿衞長安年二十有氣力高后攝政諸呂擅恣章私忿之嘗入侍宴飲章爲酒吏自請曰臣將種也請得軍法行酒有詔可酒酣章進歌舞已而復曰請爲太后耕田歌太后笑曰顧汝父知田耳若生而爲王者子安知田乎曰臣知之深耕廣種立苗欲疏非其種者鉏而去之太后黙然頃之諸呂有亡酒者章㧞劒追斬之而還報曰有亡酒一人臣謹行軍法斬之太后左右大驚業許之矣無以罪也自是諸呂畏憚雖大臣亦皆依之高后崩諸呂作亂欲危社稷章與周勃共誅滅之尊立文帝封城陽王賜黄金千斤立二年薨城陽今莒縣是也自琅琊青州六郡及渤海都邑鄉亭聚落皆爲立祠造飾五二千石車商人次第爲之立服帶綬備置官屬烹殺謳歌紛藉連日轉相誑曜言有神明其譴問禍福立應厯載彌久莫之匡糾唯樂安太傅陳蕃濟南相曹操一切禁絶肅然政清陳曹之後稍復如故安有鬼神能爲病者哉予爲營陵令以爲章本封朱虚并食此縣春秋國語以勞定國能御大災凡在於他尚列祀典章親高祖之孫進說耕田軍法行酒時固有大志矣及誅諸呂尊立太宗功冠天下社稷已寧同姓如此功烈如彼餘郡禁之可也朱虚與莒宜常血食於是乃移書曰到聞此俗舊多􅁋祀靡財妨農長亂積惑其侈可忿其愚可愍昔仲尼不許子路之禱晉悼不解桑林之祟死生有命吉㐫由人哀哉黔黎漸染迷謬豈樂也哉莫之徴耳今條下禁申約吏民爲陳利害其有犯者便收朝廷若私遺脫彌彌不絶主者髠截嘆無及已城陽景王縣甚尊之惟王弱冠内侍帷幄吕氏恣雎將危漢室獨見先識權發酒令抑邪扶正忠義洪毅其歆禋祀禮亦冝之於駕乘烹殺倡優男女雜錯是何謂也三邊紛拏師老器弊朝廷旰食百姓囂然禮興在有年飢則損自今聽嵗再祀備物而已不得殺牛逺迎他倡賦㑹宗落造設紛華方亷察之明爲身計而復僭失罰與上同明除見處勿後中覺九江逡遒有唐居山名有神衆巫共爲取公嫗歳易男不得復娶女不得復嫁百姓苦之謹按時太守宋均到官主者白出錢給聘男子女均曰衆巫與神合契知其㫖欲卒取小民不相當於是勅條巫家男女以備公嫗巫叩頭服罪乃殺之是後遂絶會稽俗多滛祀好卜筮民一以牛祭巫祝賦歛受謝民畏其口懼被祟不敢拒逆是以財盡於鬼神産匱於祭祀或貧家不能以時祀至禁言不敢食牛害或發病且死先爲牛鳴其畏懼如此謹按時太守司空第五倫到官先禁絶之掾吏皆諫倫曰夫建功立事在敢斷爲政當信經義言滛祀無福非其鬼而祭之諂也律不得屠殺少齒令鬼神有知不妄飲食民間使其無知又何能禍人遂移書屬縣曉諭百姓民不得有出門之祀督課部吏張設罪罸犯尉以下坐祀依託鬼神恐怖愚民皆按論之有屠生輒行罸民初恐怖頗揺動不安或接祝妄言倫勑之愈急後遂斷無復有禍祟矣鮑君神謹按汝南鮦陽有於田得麏者其主未往取也商車十餘乘經澤中行望見此麏著繩因持去念其倖獲持一鮑魚置其處有頃其主往不見所得麏反見鮑魚澤中非人道路恠其如是大以爲神轉相告語治病求福多有效騐因爲起祀舍衆巫數十帷帳鐘鼓方數百里皆來禱祀號鮑君神其後數年鮑魚主來厯祠下尋問其故曰此我魚也當有何神上堂取之遂從此壞傳曰物之所聚斯有神言人共奬成之耳李君神謹按汝南南頓張助於田中種禾見李核意欲持去顧見空桑中有土因殖種以餘漿溉灌後人見桑中反復生李轉相告語有病目痛者息陰下言李君令我目愈謝以一豚目痛止疾亦行自愈衆犬吠聲因盲者得視逺近翕赫其下車騎常數千百酒肉滂沱間一歳餘張助逺出來還見之驚云此有何神乃我所種耳因就斮也石賢士神謹按汝南汝陽彭氏墓路頭立一石人在石獸後田家老母到市買數片餌暑熱行疲頓息石人下小瞑遺一片餌去忽不自覺行道人有見者時客適會門因有是餌客聊調之石人能治病愈者來謝之轉語頭痛者摩石人頭腹痛者摩其腹亦還自摩他處視此凡人病自愈者因言得其福力號曰賢士輜輦轂擊帷帳絳繒絲竹之音聞數十里尉部常往護視數年亦自歇末復其故矣世間多有亡人魄持其家語聲氣所說良是謹按陳國張漢直到南陽從京兆尹延叔堅讀左氏傳行後數月鬼物持其女弟言我病死喪在陌上常苦饑寒有一兩不借挂柴後昔友傅子方送我五百錢在北墉中皆亡取之又李㓜一頭牛文券在書篋中往求索之悉如其言婦尚不知有此女新從聓家來非其所受人哀傷益以爲審父母諸弟衰絰到來迎喪去精舍數里遇漢直與諸生十餘人相追漢直顧見其家恠其如此家見漢直謂其鬼也惝惘良久漢直乃前爲父拜說其本末且悲且喜凡所聞見若此非一夫死者澌也鬼者歸也精氣消越骨肉歸于土也夏后氏用明器殷人用祭器周人兼用之視民疑也子貢問孔子死者其有知乎曰賜爾死自知之猶未晚也董無心云杜伯死親射宣王於鎬京予以爲桀紂所殺足以成軍可不須湯武之衆古事既察且復以今騐之人相啖食甚於畜生凡菜肝鱉瘕尚能病人人用物精多有生之最靈者也何不芥蔕於其胷腹而割裂之哉猶死者無知審者矣而時有漢直爲狗䑕之所爲世間亡者多有見神語言飲食其家信以爲是益用悲傷謹按司空南陽來季德停喪在殯忽然坐祭牀上顔色服飾聲氣盡是也孫兒婦女以次教誠事有條貫鞭撻奴婢皆得其過飲食飽滿辭訣而去家人大哀比絶復起如是三四家益厭苦其後飲醉形壞但得老狗便扑殺之推問里頭沽酒家狗世間多有狗作變恠扑殺之以血塗門戸然衆得咎殃謹按桂陽太守汝南李叔堅少時爲從事在家狗人立行家言當殺之叔堅云犬馬諭君子狗見人行效之何傷叔堅見縣令還解冠榻上狗戴持走家大驚時復云誤觸冠冠纓挂著之耳狗於竈前蓄火家益怔忪復云兒婢皆在田中狗助蓄火幸可不煩鄰里此有何惡里中相罵不言無狗恠遂不肯殺後數日狗自暴死卒無纖介之異叔堅辟太尉椽固陵長原武令終享大位子條蜀郡都尉威龍司徒掾凡變恠皆婦女下賤何者小人愚而善畏欲信其說類復禆増文人亦不證察與俱悼懾邪氣承虗故速咎證易曰其亡斯自取災若叔堅者心固於金石妖至而不懼自求多福壯矣乎昔晉文公出獵見大蛇高如隄其長竟路文公曰天子見妖則修德諸侯修政大夫修宫士修身乃即齋館忘食與寢請廟曰孤犠牲瘯蠡幣帛不厚罪一也遊逸無度不䘏國政罪二也賦役重數刑罰慘尅罪三也有三罪矣敢逃死乎其夜守蛇吏夢天殺蛇曰何故當聖君道爲及明視之則已臭爛武帝時迷於鬼神尤信越巫董仲舒數以爲言武帝欲驗其道令巫詛仲舒仲舒朝服南面誦詠經論不能傷害而巫者忽死世間多有精物妖恠百端謹按魯相右扶風臧仲英爲侍御史家人作食設案欻有不清塵土投汚之炊臨熟不知釡處兵弩自行火從篋簏中起衣物燒盡而簏故完婦女婢使悉亡其鏡數日從堂下擲庭中有人聲言還汝鏡女孫年三四歳亡之求不能得二三日乃於厠中糞下啼若此非一汝南有許季山者素善卜卦言家當有老青狗物内中婉御者益喜與爲之誠欲絶殺此狗遣益喜歸鄉里皆如其言因斷無纖介仲英遷太尉長史汝南汝陽西門亭有鬼魅賓客宿止有死亡其厲厭者皆亡髪失精尋問其故云先時頗已有恠物其後郡侍奉掾宜禄鄭奇來去亭六七里有一端正婦人乞得寄載奇初難之然後上車入亭趨至樓下吏卒檄白樓不可上云我不惡也時亦昏㝠遂上樓與婦人棲宿未明發去亭卒上樓掃除見死婦大驚走白亭長亭長擊鼓㑹諸廬吏共集診之乃亭西北八里呉氏婦新亡以夜臨殯火滅火至失之家即持去奇發行數里腹痛到新頓利陽亭加劇物故樓遂無敢復上謹按北部督郵西平到伯夷年三十所大有才決長沙太守到若章孫也日晡時到亭勑前𨗳人録事掾白今尚早可至前亭曰欲作文書便留吏卒惶怖言當解去傳云督郵欲於樓上觀望亟掃除須㬰便上未㝠樓鐙階下復有火勅我思道不可見火滅去吏知必有變當用赴照但藏置壺中耳既㝠整服坐誦六甲孝經易本訖臥有頃更轉東首以挐巾結兩足幘冠之宻㧞劒解帶夜時有正黑者四五尺稍高走至柱屋因覆伯夷持被掩足跣脫幾失再三徐以劒帶擊魅脚呼下火上照視老狸正赤畧無衣毛持下燒殺明旦發樓屋得所髠人結百餘因從此絶伯夷舉孝廉益陽長楚辭云鱉令屍亡泝江而上到崏山下蘓起蜀人神之尊立爲王漢淮陽太守尹齊其治嚴酷死未及殮怨家欲燒之屍亦飛去見於書傳樓上新婦豈虚也哉世間多有伐木血出以爲恠者謹按桂陽太守江夏張遼叔高去􅋣令家居買田田中有大樹十餘圍扶疏蓋數畝地播不生榖遣客伐之木中血出客驚怖歸具事白叔高大怒老樹汁出此何等血因自嚴行復斫之血大流灑叔高使先斫其枝上有一空處白頭公可長四五尺忽出往赴叔高高乃逆格之凡殺四頭左右皆怖伏地而叔高恬如也徐熟視非人非獸也遂伐其木其年應司空辟侍御史兖州刺史以二千石之尊過鄉里薦祝祖考白日繡衣榮羨如此其禍安居春秋國語曰木石之恠䕫魍魎物惡能害人乎世間多有蛇作恠者謹按車騎將軍巴郡馮緄鴻卿爲議郎發綬笥有二赤蛇可長二尺分南北走大用憂怖許季山孫字寧方得其先人秘要緄請使卜云君後三嵗當爲邊將東北四五里官以東爲名復五年爲大將軍南征此吉祥鴻卿意其妄解實應且惑居無幾拜尚書遼東太守廷尉太常會武陵蠻夷黄高攻燒南郡鴻卿以威名素著選登亞將統六師之任奮虓虎之勢後爲屯騎校尉將作大匠河南尹復再臨理官紀數方面如寧方之言春秋外蛇與内蛇鬭文帝時亦復有此傳志著其云爲而鴻卿獨以終吉豈所謂或得神以昌乎世間人家多有見赤白光爲變恠者謹按太尉梁國橋𤣥公祖爲司徒長史五月末所於中門外臥夜半後見東壁正白如開門明呼問左右左右莫見因起自往手親捫之壁白如故還牀復見之心大悸動其旦予適往侯之語次相告因爲說鄉人有董彦興者即許季山外孫也其探􅄨索隱窮神知化雖睦孟京房無以過也然天性褊狹羞於卜術間來候師王叔茂請起往迎須㬰便與俱還公祖虚禮盛饌下席行觴彦興自陳下土諸生無他異分幣重言甘誠有踧踖頗能别者願得從事公祖辭讓再三爾乃聽之曰府君當有恠白光如門明者然不爲害也六月上旬雞鳴時南家哭聲吉也到秋節遷比行郡以金爲名位至將軍三公公祖曰恠異如此救族不暇何能致望於所不圖此相調耳到六月九日未明太尉楊秉暴薨七月二日拜鉅鹿太守鉅邊有金後爲度遼將軍厯登三事今妖見此而應在彼猶趙鞅夢童子裸歌而呉入郢也風俗通義卷九
