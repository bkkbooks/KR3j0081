  - {type: variant, offset: 1518, length: 220, content: 經岀示近淂二書元刋本假㱕亟讀一過班書中十萹舊目及書中同异䖏是訂俗本本訛者盧氏校勘己著其善至應氏書自宋以來無完快惟此十卷本僅存而明代叢刻訛繆滋甚其元刋本今淂合璧者真純無僅有書中自未脫誤者亦與明刻妄甚六异然如卷一建共訛楚共條六國卷二收舉訛取舉服條槖伯卷三由訙道譁訛猶止條夏甫卷五起家訛起姜條姜肱又相訛統州家訛皇家條李統卷七岀畫字三見末作畫畫者條明人𥙷刊丣改也孟某條按畫字是其浘卷九絳天訛絳繒神條后賢士之類非淂元刊喜由證淩竄易之夫由猶青菁飾飭京原, WYG: ''}
