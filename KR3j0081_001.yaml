front:
  text: 風俗通義序昔仲尼沒而微言闕七十子喪而大義乖重遭戰國約從連橫好惡殊心真偽紛爭故春秋分為五詩分為四易有數家之傳並以諸子百家之言紛然殽亂莫知所從漢興儒者競復比誼會意為之章句家有五六皆析文便辭彌以馳遠綴文之士雜襲龍鱗訓注説難轉相陵高積如丘山可謂繁富者矣而至於俗間行語衆所共傳積非習貫莫能原察今王室大壞九州幅裂亂靡有定生民無幾私懼後進益以迷昧聊以不才舉爾所知方以類聚凡一十卷謂之風俗通義言通於流俗之過謬而事該之於義理也風者天氣有寒暖地形有險易水泉有美惡草木有剛柔也俗者含血之類像之而生故言語歌謳異聲鼓舞動作殊形或直或邪或善或淫也聖人作而均齊之咸歸於正聖人廢則還其本俗尚書天子巡守至于岱宗覲諸侯見百年命大師陳詩以觀民風俗孝經曰移風易俗莫善於樂傳曰百里不同風千里不同俗戶異政人殊服由此言之為政之要辨風正俗最其上也周秦常以歲八月遣輶軒之使以歲八月遣輶軒之使求異代方言還奏籍之藏於祕室及嬴氏之亡遺脫漏棄無見之者蜀人嚴君平有千餘言林閭翁孺才有梗概之法楊雄好之天下孝廉衛卒交會周章質問以次注續二十七年爾乃治正凡九千字其所發明猶未若爾雅之閎麗也張竦以為懸諸日月不刊之書豫實頑暗無能述演豈敢比隆於斯人哉顧惟述作之功故聊光啓之耳昔客有為齊王畫者王問畫孰最難孰最易曰犬馬最難鬼魅最易犬馬旦暮在人之前不類不可類之故難鬼魅無形無形者不見不見故易今俗語雖云浮淺然賢愚所共咨論有似犬馬其為難矣并綜事宜於今者孔子稱幸苟有過人必知之俾諸明哲幸詳覽焉
