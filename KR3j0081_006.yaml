body:
  text: 十反第五易記出處默語書美九德咸事同歸殊塗一致百慮不期相反各有云尚而已是故伯夷讓國以採薇展禽不去於所生孔丘周流以應聘長沮隱居而耦耕墨翟摩頂以放踵楊朱一毛而不為干木息偃以藩魏包胥重繭而存郢夷吾朱紘以三歸平仲辭邑而濯纓惠施從車以百乘桑扈徒步而裸形寧戚商歌以干祿顏闔踰墻而遁榮高柴趣門以避難季路求入而隕零端木結駟以貨殖顏回屢空而弗營孟獻高宇以美室原憲蓬門而株楹傳曰人心不同有如其面古今行事是則然矣比其舛曰十反太尉沛國劉矩叔方父字叔遼纍祖卿尹好學敦整土名不休揚又無力援仕進陵遲而叔方雅有高問遠近偉之州郡辟請未嘗答命往來京師委質通門太尉徐防太傅桓焉二公嘉其孝敬慰愍契闊為之先後叔遼由此辟公府博士徵議郎叔方爾乃翻然改志以禮進退三登台袞號為名宰陽翟令左馮翊田輝叔都兄字威都俱合純懿不隕洪祚叔都最為知名郡常欲為察授之輝恥越賢兄懼不得免因緣他疾遂託病瘖家人妻子莫知其情人數恐灼持之有度後在田舍天連陰雨友人張子平吉仲考等密共穿踰奪取衣衾窮夜獨處迫切至矣然無聲響徒喑喑而已子平因前抱持曰我某公也謂汝避兄耳何意真然耶天喪斯人吾儕將何效乎相對歔欷哀動左右間積四歲威都果舉遷安定長史據輜垂緌還歷鄉里薦祀祖考叔都沃醊神坐俯仰因語是月司隸太尉大將軍同時並辟為侍御史舉茂才不幸早隕威都官至武都太守太尉掾汝南范滂孟博天資聰睿辨於持論舉孝廉光祿主事京師歸德四方影附父字叔矩遭母憂既葬之後饘粥不贍叔矩謂其兄弟禮不言事辨杖而起今俱匍匐號咷上闕奠酹下困糊口非孝道也因將人客於九江田種畜牧多所收獲以解債負土成冢立祀三年服闋二兄仕進叔矩以自替於喪紀獨寢墳側服制如初哀猶未歇郡舉至孝拜中司勾章長病去官博士徵兄憂不行司徒梁國盛允字子嗣為議郎慕孟博之德貪樹於有禮謂孟博家公區區欲辟大臣宜令邑人廉薦之孟博厲聲曰老夫年尊絶意世事又海內清高當路非一退而告人子嗣欲德我我不受也子嗣亦以恨遂不得辟孟博病去受事而常幹宰相之職謹按禮父為士子為天子武王建有周之號諡大王王季言王業肇於此矣越裳重九譯獻白雉周公薦陳祖廟曰先人之德有天下尊歸於父此人道之極前漢詔曰海內大亂兵革並起朕被堅執鋭自率士卒犯危難平暴亂偃兵息民天下大安此皆太公之教訓也今上尊號曰太上皇春秋之義因其可褒而褒之孝經曰敬其父則子悅叔矩則其孝敬則粥身苦思率禮無違矣則其友于則褒兄委榮盡其哀情矣則其學藝則家法洽覽誨人不倦矣則其政事則施於已試靡有闕遺矣君子百行子産有四凡在他姓尚宜褒之況於父乎敬意之至猶用夷悅況於寵族乎抗爽言以拒厚旨抑所生以為己高忍能厲然獨享其榮若乃不令之下愚流貨財於權嬖此罪人也田輝託疾上也劉矩屈體次也范滂吾無取焉耳巴郡太守太山但望字伯闓為司徒掾同産弟子作客殺人繫獄望自劾去星行電征數日歸趨詣府露首肉袒辭謝太守太尉李固謝與相見望頓頭流血自説弟薄命早亡以遺孤為託無義方之教自陷罪惡息男穿既與知情幸有微胤乞以代之言甚哀切李公達於原度即活出之高唐令樂安周㺩高唐令樂安周㺩字孟玉為大將軍掾弟子使客殺人捕得太守盛亮陰為宿留㺩亦自劾去詣府亮與相見不乞請又不辭謝亮告賓客周孟玉欲作抗直不恤其親我何能枉憲乎遂斃于獄弟婦不哭死子而哭孟玉世人誤之猶以為高謹按春秋叔牙為慶父殺般閔公大惡之甚而季子緣獄有所歸不探其情緩追逸賊親親之道州吁既殺其君而虐用其人石碏惡之而厚與焉大義滅親君子猶曰純臣之道備矣於恩未也君親無將王誅宜耳今二家之子幸非元惡但望誠心內發哀情外露義動君子合禮中矣周㺩苟執果毅忽如路人昔樂羊為魏伐中山啜其子羹文侯壯其功而疑其心秦西巴觸命放麑而孟氏旋進其位麑猶不忍況弟子乎孟軻譏無惻隱之心傳曰於厚者薄則無所不薄矣豫章太守汝南封祈武興泰山太守周乘子居為太守李張所舉函封未發張病物故夫人於柩側下帷見六孝廉曰李氏蒙國厚恩據重任咨嘉休懿相授歲貢上欲報稱聖朝下欲流惠氓隸今李氏獲保首領以天年終而諸君各懷進退未肯發引妾幸有三孤足統喪紀正相追隨蓬斆墳柏何若曜德王室昭顯亡者亡者有靈實寵賴之歿而不朽此其然乎於是周乘顧謂左右諸君欲行周乘當止者莫逮郎君盡其哀惻乘與鄭伯堅即日辭行祈與黃叔度郅伯嚮盛孔叔留隨轜柩乘拜郎遷陵長治無異稱意亦薄之某官與祈相反俱為侍御史公車令享相位焉謹按孝經資於事父以事君君親臨之厚莫重焉春秋國語民生於三事之如一禮斬衰公士大夫衆臣為其君乘雖見察授函封未發未離陪隸不與賓于王爵諸臨城社民神之主也義當服勤關其祀紀夫人雖有懇切之教蓋子不以從令為孝而乘囂然要勒同儕去喪即寵謂能有功異也明試無效亦旋告退安在其顯君父德美之有河內太守府廬江周景仲嚮每舉孝廉請之上堂家人宴飲皆令平仰言笑宴宴如是三四臨發贈以衣齊皆出自中子弟中外過歷職署踰於所望曰移臣作子於之何有河內太守司徒潁川韓演伯南舉孝廉唯臨辭一與相見無所寵拔曰我已舉若豈可令恩偏積於一門乎謹按春秋左氏傳夫舉無他也唯善所在親踈一也祈奚稱其讎不為諂立其子不為比舉其偏不為黨建一官而三物成晉國賴之君子歸焉蓋人君者闢門開窗號咷博求得賢而賞聞善若驚無適也無莫也周不綜臧否而務蘊崇之韓演不唯善是務越此一概夫不擇而強用之與可用而敗之其罪一也安定太守汝南胡伊伯建平長樊紹孟建俱為司空虞放掾屬放遜位自劾還家郡以伊為主簿迎新太守曰我是宰士何可委質於二朝乎因出門名戶占繫陳國紹曰柳下惠不去父母之國君子不辭下位獨行服事後公黃瓊大以為恨移書汝南論正主者吏絶紹文書而更辟伊謹按春秋尊公曰宰其吏為士言於四海無所不統焉孟軻稱不枉尺以直尋況於枉尋以直尺柳下惠不枉道以事人故三黜而不去孔子謂之不恭今紹見編會以禮遊引耳其義不同於此伊心明審自求多福近靈帝之末司徒掾弘農董君考上名典君事不得自劾暫以家急假太守李崇請乞相見俯領功曹與俱班録訖乃謝遣時公袁隗意亦非之然彈糾自是之後彌以滋甚郡用從事縣用府吏上下溷淆良可穢也詩云雖無老成人尚有典刑國之大綱也可不申勑小懲而大戒哉宗正南陽劉祖奉為郡屬曹吏左騎校尉薛丞君卓為戶曹史太守公孫慶當祠章陵舊俗常以衣冠子孫容止端嚴學問通覽任顧問者以為御史時功曹白用劉祖祖曰既託帝王肺腑過聞前訓不能備光輝胥附之任而當側身陪乘執策握革有死而已無能為役薛丞因前自白今明公垂出未有御者雖云不敏敢充人乏周旋進退補察時闕言出成謨大見敬重亦以祖為高歲盡俱舉孝廉謹按周禮保氏掌六藝之教其一曰御論語曰吾何執執御乎子適衛冉子僕有政事之士列于四友然猶御者不為役也春秋左氏傳晉悼公即位程鄭為乘馬御訓群騶知禮今國家大駕大僕親御他出奉車都尉御寧可復言執策握革而辭讓之乎凡黔首皆五帝子孫何獨今之肺腑當見優異也宗廟之人或在甽畝人之化也何日之有舊時長吏質朴子皆駕御故曰從兒君臣父子其揆一也臣不肯御子豈可然公孫遂偃蹇不使下陵上替能無亂乎劉祖幸免罪戾而見褒賞公孫於是失政刑矣聘士彭城薑肱伯淮京兆韋著休明靈帝踐祚太后臨朝陳竇以忠見害中常侍曹節秉國之權大作威福冀寵名賢以弭己謗於是起薑肱為犍為太守著東海相肱告其人吾以虛獲實蘊藉聲價盛明之際尚不委質況今政在家哉遂乘桴浮海莫知其極而著歡以承命駕言宵征民不見德唯戮是聞論輸左校謹按易稱君子之道或出或處或默或語傳曰朝廷之人入而不能出山林之士往而不能返言各有長也孔子嘉虞仲夷逸作者七人亦終隱約薑肱高尚其事見得思義豈不綽綽有餘裕哉韋著邁種其德少有云補可也虐刑以逞民心怨痛德薄位尊力小任重古人懼旃鮮能不及矣趙相汝南李統少幼為冀州刺史阮況所奏耳目不聰明股肱掾史咸用忿憤欲詣闕自理統聞知之歷收其家遣吏追還曰相久忝重任負於素餐年漸七十禮在懸車頃被疾病念存首丘比自乞歸未見聽許州家幸能為相得去實上願也居無幾果徵時冀州有疑獄章帝見問統統處當詳平克厭上心曰君大聰明刺史侵君統曰臣受國厚恩官尊祿重不能自竭有以報稱久抱重疾氣力羸露耳聾目眩守虛隕越自分奄忽填壑猥得承望闕廷親見御座不勝其喜權時有瘳辭出之後必復故也刺史不侵臣也上悅其遜即日免況拜統侍中司徒九江朱倀以年老為司隸虞詡所奏耳目不聰明見掾屬大怒曰顛而不扶焉用彼相君勞臣辱何用為於是東閣祭酒周舉曰昔聖帝明王莫不歷象日月星辰以為鏡戒熒惑比有變異豈能手書密以上聞倀曰可自力也舉為創草臣聞易曰天垂象見吉凶觀乎天文以察時變臣竊見九月庚辰今月丙辰過熒惑於東井辟金光輝合并移時乃出臣經術淺末不曉天官見其非常昭昭再見誠切怪之臣誠悶憤夫月者太陰熒惑火星不宜相干臣聞盛德之主不能無異但當變改有以供御孔子曰雖明天子熒惑必謀禍福之徵慎察用之孝宣皇帝地節元年月蝕熒惑明年有霍氏亂孔子曰火上不可握熒惑班變不可息志帝應其修無極此言熒惑火精尤史家所宜察也楚莊曰災異不見寡人其亡今變異屢臻此天以佑助漢室覺悟國家也臣誠懼史官畏忌不敢極言惟陛下深留聖思按圖書之文鑒古今之戒召見方直極言而靡諱親賢納忠推誠應人猶影響也宋景公有善言熒惑徙舍延年益壽況乎至尊感不旋日書曰天威棐諶言天德輔誠也周公將沒戒成王以左右常伯常任準人綴衣虎賁言此五官存亡之機不可不謹也臣願陛下思周旦之言詳左右清禁之內謹供養之官嚴宿衛之身申勑屢省務知戒慎以退未萌以此無疆謹匍匐自力手書密上上覽倀表嘉其忠謨倀目數病手能細書詡案大臣苟肆私意詡坐上謝倀蒙慰勞謹按論語能以禮讓為國乎何有夫子溫良恭儉讓以得之傳曰心苟不競何憚於病朱倀位極人臣視事數年訖無一言彌縫時闕又倀年且九十足以惛憒義當自引以避賢路就使有枉欣以俟命耳何能乃發忿欲自提理周舉為人謀而不忠維訖匡陳起自營衛夫奉義順之謂禮愛人而不以德不可謂仁信不由中文辭何為向遇中宗永平之政救罪不暇何慰勞之有李統內省不疚進對溫雅明主是察終為長者蜀郡太守潁川劉勝季陵去官在家閉門卻掃歲時致敬郡縣答問而已無所褒貶雖自枝葉莫力太僕杜密周甫亦去北海相在家每至郡縣多所陳説箋記括屬太守王昱頗厭苦之語次聞得京師書公卿舉故大臣劉季陵高士也當急見徵密知以見激因曰明府在九重之內臣吏惶畏天威莫敢盡情劉勝位故大夫見禮上賓俯伏甚於鱉蝟冷澀比如寒蜒無能往來此罪人也清雋就義隱居篤學時所不綜而密達之冤疑勳賢成陳之罪所折而密啓之明府賞刑得中令問休揚雖自天然之姿猶有萬分之一詩不云乎雨我公田遂及我私人情所有庶不為闕既不善是多見譏論夫何為哉於是昱甚悅服待之彌厚謹按論語淡臺滅明非公事未嘗至於偃之室也君子思不出其位孟軻亦以為達則兼濟天下窮則獨善其身劉勝在約思純其靜已甚若時意宴及言論折中亦無嫌也杜密婆娑府縣干與王政就若所云猶有公私既見譏切不蹴坐謝負而多伐善以為己力惟顏之厚博而俗矣
