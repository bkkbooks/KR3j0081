body:
  text: 風俗通義佚文聲音相拊也所以輔相於樂奏樂之時先擊相雅形如漆筩有椎禮云訊疾以雅是也擊壤形如履長三四寸下僮以為戲壤木為之前廣後銳長尺四寸闊三寸未戲先側一壤於地遠三四十步以手中壤擊之故曰擊壤古琴歌曲有五如鹿鳴騶虞之類操有十二如將歸拘幽履霜別鶴之類引有九如烈女湘妃霹靂思歸走馬之類又有二十一章如陽春弄連珠弄之類九引烈女楚樊妃伯紀魯伯妃貞女魯次室女思歸衛女霹靂楚商梁走馬樗里牧恭箜篌霍子高即公無渡河琴引秦屠門高楚引楚龍丘子清角黃帝之琴號鐘齊桓公琴繞梁楚莊王琴綠綺司馬相如琴焦尾蔡邕琴鳳凰趙飛燕琴梧桐生於嶧陽山巖石之上采東南孫枝以為琴聲清雅十月謂之應鍾何應者應也鍾者動也言萬物應陽而動不藏也十二月律謂之大呂何大者太也呂拒也言陽氣欲出其陰不許也呂之言拒也旅抑拒難之也祀典太山巖石松樹鬱鬱蒼蒼如雲中謹案自郊貙膢春秋饗射天子射麑掩雉獻諸宗廟扶陽發滯養老致敬化之至也四夷東方曰夷者東方仁好生萬物觝觸地而出夷者觝也其類有九一曰玄菟二曰樂浪三曰高驪四曰滿飾五曰鳧臾六曰索家七曰東屠八曰倭人九曰天鄙南方曰蠻者君臣同川而浴極為簡慢蠻者慢也其類有八一曰天竺二曰垓首三曰僬僥四曰跂踵五曰穿胸六曰儋耳七曰狗軹八曰旁脊西方曰戎者斬伐殺生不得其中戎者兇也其類有六一曰僥夷二曰戎夷三曰老白四曰耆羌五曰鼻息六曰天剛北方曰狄者父子叔嫂同穴無別狄者辟也其行邪辟其類有五一曰月支二曰穢貊三曰匈奴四曰單于五曰白屋王制云東方曰夷夷者柢也言仁而好生萬物柢地而出𦍑乃三苗姜姓之裔𦍑本西戎卑賤者也主牧羊故𦍑字從羊人因以為號無君臣上下健者為豪不能相一種別群分彊者陵弱轉相抄盜男子戰死以為吉病終者謂之凶諸𦍑種落熾盛大為邊害氐言抵冒貪饕至死好利樂在山谿本西南夷之別種號曰白馬孝武皇帝遣中郎將郭昌等引兵征之降服以為武都郡貊者謹案春秋傳大貊小貊貊略也云無禮法不知送往勞來無宗廟粢盛賦斂輕薄也胡者謹案漢書山戎之別種也又胡者互也言其被髮左衽言語贄幣事殊互也殷時曰獯粥改曰匈奴樓煩故樓煩胡地也春秋傳曰狄本山戎之別種也其後分居號曰赤翟白翟昔高辛氏有犬戎之寇帝患其侵暴而征伐不剋乃訪募天下有能得犬戎之將吳將軍頭者購黃金千鎰邑萬家又妻以少女時帝有畜狗其毛五采名曰槃瓠下令之後槃瓠遂銜人頭造闕下群臣怪而診之乃吳將軍首也帝大喜而計槃瓠不可妻之以女又無封爵之道議欲有報而未知所宜女聞之以為帝皇下令不可違信因請行帝不得已乃以女配槃瓠槃瓠得女負而走入南山止石室中所處險絕人跡不至於是女解去衣裳為僕鑒之結著獨力之衣帝悲思之遣使尋求輒遇風雨震晦使者不得進經三年生子一十二人六男六女槃瓠死後因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形其母後歸以狀白帝於是使迎致諸子衣裳斑蘭語言侏離好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷外癡內黠安土重舊以先父有功母帝之女田作賈販無關梁符傳租稅之賦有邑君長皆賜印綬冠用獺皮名渠帥曰精夫相呼為姎徒哀牢夷者其先有婦人名沙壹居于牢山嘗捕魚水中觸沈木若有感因懷妊十月產子男十人後沈木化為龍出水上沙壹忽聞龍語曰若為我生子今悉何在九子見龍驚走獨小子不能去背龍而坐龍因舐之其母鳥語謂背為九謂坐為隆因名子曰九隆及後長大諸兄以九隆能為父所舐而黠遂共推以為王後牢山下有一夫一婦復生十女子九隆兄弟皆娶以為妻後漸相滋長種人皆刻畫其身象龍文衣皆著尾巴有賨人剽勇高帝為漢王時閬中人范目說高祖募取賨人定三秦封目為閬中慈鳧鄉侯並復除目所發賨人盧朴沓鄂度夕襲七姓不供租賦閬中有渝水賨人左右居銳氣喜舞高祖樂其猛銳數觀其舞後令樂府習之槃瓠之後輸布一匹二丈是謂賨布廩君之巴氏出幏布八丈廩君乘土船下至夷城石岸曲水亦曲廩君望之如穴狀曰我既道穴中又入此柰何石岸為崩廣三丈餘陛級之廩君行至上岸上岸有平石廣長五丈休其上投算計算處皆有石因立城其旁秦始皇遣蒙恬築長城徒士犯罪亡依鮮卑山後遂䋣息今皆髡頭衣赭亡徒之明效也古制周禮五黨為州州疇也疇類也州有長使之相周足也字從重川堯遭洪水居水中高土曰州周制天子方千里分為百縣縣有四郡郡者群也故左氏傳曰上大夫受縣下大夫受郡至秦始皇初置三十六郡以監縣縣平也周禮百里曰同所以獎王室協風俗總名為縣縣玄也首也從系倒首與縣易偏矣言當玄靜平徭役也周禮五家為鄰四鄰為里春秋國語五家為軌十軌為里里者止也里有司司五十家共居止春秋通其所也國家制度大率十里一鄉謹案春秋國語畺有寓望謂今之亭也民所安定也亭有樓從高省丁聲也漢家因秦大率十里一亭亭留也今縣有亭長又語有亭待蓋行旅宿食之所館也亭亦平也民有爭訟吏留平處勿失其正也亭吏舊名負弩改為亭長亭長者一亭之長率也陳楚宋魏謂之亭父齊謂之師中人城北四十里有左人亭鮮虞故邑光武中興以來五曹詔書題鄉亭壁歲補正多有闕謬永建中兗州刺史過翔箋撰卷別改著板上一勞而久逸殺青書可繕寫謹案劉向別錄曰殺青者直治青竹作簡書之耳新竹有汗善朽蠹凡作簡者皆於火上炙乾之陳楚之間謂之汗汗者去其汗也吳越曰殺殺亦治也劉向為孝成皇帝典校書籍二十餘年皆先書竹為易刊定可繕寫者以上素也由是言之殺青者竹斯為明矣今東觀書竹素也案劉向別錄義曰周宣王太史作大篆也案劉向別錄讎校一人讀書校其上下得謬誤為校一人持本一人讀書若怨家相對為讎姓氏萬類之中惟人為貴春秋左氏傳官有世功則有官族邑亦如之公羊譏衛滅邢論語貶昭公娶於吳諱同姓也蓋姓有九或氏於號或氏於謚或氏於爵或氏於國或氏於官或氏於字或氏於居或氏於事或氏於職以號唐虞夏殷也以謚戴武宣穆也以爵王公侯伯也以國齊魯宋衛也以官司馬司徒司寇司空司城也以字伯仲叔季也以居城郭園池也以事巫卜陶匠也以職三烏五鹿青牛白馬也齊魯宋衛四族齊為之長張王李趙黃帝賜姓也東方氏伏羲之後帝出於震位主東方子孫因以為氏焉平原厭次漢太中大夫東方朔東郭氏東郭牙齊大夫咸陽其後也東陵氏東陵侯邵平子孫氏焉東關氏晉東關嬖五之後漢有將軍北亭侯東關義僮氏漢有交阯刺史僮尹銅鞮氏晉銅鞮伯華之後銅鞮晉之別邑也中氏漢有少府卿中京中行氏穆子後中壘氏劉向為中壘校尉支孫以官為氏沖氏漢有博士沖和終古氏桀內史終古後氏焉鍾離氏鍾離子國在九江蓋其後徙于此吳滅之嵩氏漢有嵩極玄子弓氏魯大夫叔弓之後漢有光祿勳弓祉熊氏黃帝有熊氏之後也公旗氏公文氏衛有公文要公叔氏衛大夫公叔文子公乘氏魯有公乘子皮見列女傳公賓氏魯大夫公賓庚之後公族氏晉成公立嫡子為公族大夫韓無忌號公族穆子見左氏傳公玉氏齊湣王臣有公玉冉其後也功氏晉大司功景子之後晉有功景蒙氏東蒙主以蒙山為氏秦有將軍蒙驁驁生武武生恬皆仕秦農氏神農之後龍丘氏吳郡漢時博士龍丘長雍氏周文王第十二子也雍伯之後以國為姓今或音雍州之雍鄭大夫有雍糺楚有雍子齊有雍廩宋有雍鉏漢什邡侯雍齒沛人也重氏顓頊重黎之後少昊時重為南正司天之事黎為北正司地之事移氏齊公子雍食采於移其後氏焉漢有弘農太守移良為氏漢有南郡太守為昆隨氏隨侯之後漢有博士隨何又有右扶風隨蕃岐氏岐伯黃帝師羲氏堯卿羲仲之後戲陽氏衛有戲陽速皮氏周卿士樊仲皮之後漢有皮尚又有皮延至孝後漢有諫議大夫皮究離氏離婁孟子門人漢有中庶子離常之訾氏帝嚳妃訾娵氏女漢有樓虛侯訾順卑氏鄭大夫卑諶之後漢有北平太守卑躬議郎卑整裨氏鄭有裨竈明天文差氏人姓池氏漢有中牟令池瑗夷維氏故萊夷維邑也蓋因邑為姓師氏師樂人瞽者之稱晉有師曠魯有師乙鄭有師悝師觸師蠲師成又師服晉大夫也漢有東海師中作雅琴師氏八篇師尹氏師尹三公官也以官為姓鴟夷氏本范蠡也後人以為氏資氏資成陳留人尸氏其先封於尸鄉故為尸氏齊相有尸臣伊氏漢有議郎伊推又伊嘉為雁門都尉石顯黨纍氏纍祖之後晉七輿大夫纍虎里克丕豹之黨邳氏奚仲為夏車正自薛封邳其後以為氏焉後漢二十八將有衛尉信都邳彤司鴻氏古有司鴻苟著書漢中大夫司鴻儀諫議大夫司鴻荀司功氏司馬氏司寇氏蘇忿生為武王司寇後以官為氏禮記司寇惠子魯大夫期氏楚大夫居期思城因以為姓期思氏古有期思國國人以為氏旗氏齊卿公孫竈惠公孫也生欒施字子旗子孫以王父字為氏後漢有旗流甘九江太守旗光旗思氏楚大夫居旗思城因以為氏綦毋氏漢有廷尉綦毋參晉大夫綦毋張戰國策綦毋子與公孫龍爭辯菑丘氏勇士菑丘訢飛廉氏飛廉國秦所滅因氏焉漢書光祿大夫飛廉安國非氏非子伯益之後肥氏漢有肥韶英布將肥銖又仁恕掾肥親賁氏秦非子之後漢有賁赫禮有縣賁父威氏齊威王之後以田氏始王故其後以為氏威王氏漢有中郎威王弼出自楚威王後幾氏宋大夫仲幾之後以王父字為氏魚氏宋桓公子目夷字子魚賢而有謀子孫以王父字為氏漢有長安富人魚翁俶也魚孫氏宋大夫魚石奔楚在國者因氏焉舒氏舒子之後以國為姓渠丘氏莒有渠丘公因氏焉余氏秦由余之後以國為姓代居歙州夫餘氏吳公子夫概奔楚餘子在吳者以夫餘為氏沮氏黃帝時史官沮誦之後樗里氏琴引有樗里牧恭於陵氏陳仲子齊世家也辭爵灌園居于於陵因氏焉漢有議郎於陵欽諸氏漢有雒陽令諸於諸葛氏葛嬰為陳涉將軍有功非罪而誅孝文帝追錄封其孫諸縣侯因并氏焉儲氏齊大夫儲子之後也屠氏漢末有屠景先河東人也屠門氏秦屠門高虞氏凡氏之興九事一氏於號唐虞夏殷是也虞丘氏晉有虞丘書為乘馬御騶氏越王句踐之後毋車氏樂安毋車伯奇為下邳相有主簿步邵南時人稱毋車府君步主簿巫氏凡氏於事巫卜匠陶也殷有巫咸巫賢漢有冀州刺史巫捷又有巫都著養性經也瞿氏漢有南陽太守瞿茂須氏太昊風姓之後有須句國又殷有密須並以國為氏魏有須賈漢有平陸侯須無紹封傳四代須卜氏匈奴貴姓有須卜氏區氏歐冶子之後轉為區氏又音歐吳有區景長沙人官至蒼梧太守蒲氏漢有詹事蒲昌又有蒲遵胡毋氏本陳胡公之後也公子完奔齊齊宣王母弟別封毋鄉遠本胡公近取毋邑故曰胡毋氏也壺氏漢有諫議大夫壺遂徒人氏齊有徒人費屠氏漢末有屠景先屠門氏秦有屠門高塗氏塗山氏之後漢有諫議大夫塗惲治尚書齊氏氏於國黎氏九黎之後尚書西伯戡黎亦見毛詩左傳齊大夫黎彌黎且字亦作犂鞮氏晉銅鞮伯華之後也稽氏稽黃秦賢人也西鄉氏宋大夫西鄉錯之後尸子有隱者西鄉曹洼氏漢有大鴻臚洼丹洼音圭枚氏六國有賢人枚被裴氏伯益之後哀氏魯哀公之後因謚以為姓漢有哀章臺氏金天氏裔孫曰臺駘其後氏焉漢有侍中臺崇來氏楚有來英漢功臣表軑侯來蒼真氏漢有太尉長史真祐新垣氏魏將新垣衍畢公高之後漢書文帝時新垣平善望氣神氏神農之後漢有騎都尉神曜申公氏申公巫臣之後漢太子傅申公申徒氏本申屠氏隨音改為申徒尸子申徒狄夏賢人也湯以天下授之恥以不義聞己自投於河莊子申徒嘉兀者鄭人也漢有西屏將軍申徒建勝屠即申徒也秦氏氏於國頻氏漢有酒泉太守頻暢淳于氏春秋時小國也桓五年不復其國一號州淳于公子孫以國為氏倫氏黃帝樂人伶倫氏之後春氏楚相黃歇號春申君子孫氏焉鈞氏楚大夫元鈞之後漢有御史鈞喜文氏周文王支庶以謚為氏越大夫文種聞人氏少正卯魯之聞人也其後遂以聞人為氏漢有太子舍人聞人通漢沛人治后氏禮芸氏晉大夫芸賢見戰國策云氏祝融之後芬氏晉大夫芬賢殷氏氏於號唐虞夏殷是也勤氏魯有大夫勤成元氏魏武侯公子元食邑於此因而遂氏焉垣氏垣秦邑因以為氏秦始皇有將垣齮漢有西河太守垣恭園氏姓於所居城郭園池是也鄭穆公之子圈其後為姓至秦博士逃難乃改為園軒氏軒轅之後漢有諫議大夫軒和軒轅氏軒轅即黃帝也姓公孫或言姓姬孫陽氏秦穆公時孫陽伯樂善相馬漢有侍御史孫陽敖尊氏太昊諸侯尊盧氏之後尊盧氏太昊之世侯者屯氏漢有常山太守屯莫如盆成氏盆成括仕齊孟軻知其必死其子逃難改氏成焉賁氏魯有賁浦根牟氏根牟子六國時賢者著書七篇恩氏陳大夫成仲不恩之後韓氏韓之先出於唐叔虞曲沃桓叔之子萬食邑於韓原因以為氏邯鄲氏因國為姓漢有衛尉邯鄲義丹氏晉有大夫丹木安氏漢有安成為太守莞蘇楚大夫見呂氏春秋漢有莞路為御史中丞冠氏古賢者鶡冠子之後瞞氏荊蠻之後本姓蠻其枝裔隨音變改為瞞氏關氏關令尹喜之後漢長水校尉關並班氏楚令尹鬭班之後䜌氏漢有南郡太守䜌秘山氏古烈山氏之後晉大夫山祈漢有武都太守山昱千氏漢有蜀郡都尉千獻弦氏弦子後左傳鄭有商人弦高田氏陳敬仲始食采地於田由是改姓田氏淵氏齊大夫淵湫玄氏玄都古諸侯國也子孫以國為氏焉縣氏縣成父孔子門人見史記漢有甘陵相縣芝鮮氏武王封其子於朝鮮其子食采於朝鮮因氏焉錢氏黃帝之後有為文王師者封為錢府官後以為氏旃氏吳人也緜氏孟子有緜駒善歌宣氏宋宣公之後氏於謚漢有宣虎宣義後漢有宣秉司空宣酆虔氏黃帝之後莊子有虔天根騫氏仲尼弟子閔子騫之後以王父字為氏圈氏楚鬻熊之後為圈鄭穆公之子圈其後為姓至秦博士逃難乃改為園蕭氏宋樂叔以討南宮萬立御說之功受封於蕭列附庸之國漢相國蕭何即其後氏也刀氏齊大夫豎刀之後戰國時有刀勃漢有刀閒齊人以富聞子孫居勃海後漢有刀韙聊氏聊蒼為漢侍中著子書廖氏古有廖叔安左傳作飂蓋其後也漢有廖覬為鉅鹿太守超氏漢有太尉超喜鼂氏衛大夫史鼂之後漢有鼂錯焦氏姬姓國也按史記周武王封神農之後於焦後以國為姓左傳曰虞虢焦滑皆姬姓也為晉所滅漢有外黃令焦貢饒氏漢有饒斌為漁陽太守徭氏東越王徭句踐之後其後以徭為姓招氏漢有大鴻臚招猛苗氏楚大夫伯棼之後賁皇奔晉食采於苗因而氏焉漢有長水校尉苗浦王莽時有苗訢蟜氏黃帝孫蟜極之後麃氏秦始皇將軍麃公之後麃秦邑漢有麃宣麃禮高堂氏齊卿高敬仲食采於高堂因氏焉皋氏漢有司徒長史皋誨毛氏毛伯文王子也見左傳漢有毛樗之為壽張令陶氏凡氏於事巫卜陶匠是也敖氏顓頊大敖之後那氏朝那東夷也其後單姓那氏阿氏阿衡伊尹號言倚之如秤其後氏焉過氏過國夏諸侯後因為氏漢有兗州刺史過栩麻氏齊大夫麻嬰之後漢麻光為御史大夫又麻達注論語車氏舜之後也陳敬仲奔齊稱田氏至漢丞相田千秋以年老得乘小車出入省中時號車丞相子孫以為氏蛇丘氏濟北有蛇丘惑為河內太守佘丘氏有佘丘炳家氏漢有家羡為劇令瑕丘氏魯桓公庶子食采於瑕丘子孫氏焉巴氏漢有太常巴茂沙氏晉有沙廣牙氏周穆王大司徒君牙之後以王父字為氏陽成氏陽成胥渠晉隱士也漢有諫議大夫陽成公衡梁氏伯益治水封於梁商丘氏衛大夫食邑於商丘因以為氏漢有御史大夫秺侯商丘成又有商丘子胥高邑人見列仙傳章氏秦有將軍章邯昌氏黃帝子昌意之後疆氏晉有大夫疆劍漢有疆華又漢陽太守疆釋之張氏張王李趙皆黃帝賜姓也又晉國有解張高張侯自此晉國有張氏穰氏田穰苴諸田之族穰所食之邑因以氏焉方氏方雷氏之後襄氏楚大夫襄老之後將匠氏漢官有將匠少府因為氏常丘氏常丘崎嘗氏齊孟嘗君之後匡氏魯邑也句須為之宰其後氏焉漢有匡衡王人氏王人子突之後因氏焉漢有安平太守王人宰公王史氏周先王太史號王史氏芳氏漢有幽州刺史芳乘堂氏堂楚邑大夫五尚為之其後氏焉唐溪氏吳夫概王奔楚封唐谿因以為氏蒼氏八凱蒼舒之後漢有江夏太守蒼英子孫遂為江夏人倉氏黃帝史官倉頡之後春秋時周有倉葛皇氏三皇之後因氏焉左傳鄭大夫皇頡皇辰宋有皇氏世為上卿本皇父充石之後以字為氏漢有琅邪相皇運臧孫氏魯有臧孫辰橫氏韓王子成號橫陽君其後為氏京氏鄭武公子段封於京號京城大叔其後氏焉漢有京房本姓李字君明後推律自定為京氏荊氏漢有九江太守荊修卿氏趙相虞卿之後戰國有卿秦為魏將或云項羽將卿子冠軍宋義之後後漢有卿仲遼甥氏晉大夫呂甥之後行氏漢有行祐為趙相衡氏衡阿衡也伊尹官也見詩傳子孫以衡為氏一云魯公子衡之後以王父字為氏漢有衡咸講學祭酒營氏周成王卿士營伯之後漢有京兆尹營郃嬰氏晉大夫季嬰之後城氏姓於氏者城郭園池是也名氏楚大夫彭名之後也青氏青史善著書青烏氏漢有青烏子善數術青陽氏青陽黃帝子也始得姓焉見國語漢有東海太守青陽愔又東海王國中尉青陽精青牛氏青史氏丁若氏齊丁公子懿伯食采于若因氏焉靈氏齊靈公之後或云宋公子靈圍龜之後晉有餓者靈輒伶氏周有大夫伶州鳩泠氏黃帝時典樂泠倫之後冥氏冥侯國姒姓禹後見史記漢書有冥都為丞相史瓶氏漢有太子少傅瓶守乘氏楚大夫子乘之後以王父字為氏又乘睢古賢人勝屠氏漢有河東太守勝屠公弘氏衛大夫弘演之後漢有宦者弘恭為中書令恆氏楚大夫恆思公之後見世本漢有東安長恆裴子孫因居之猷氏衛有猷康由章氏由余秦相也見史記漢有由章至長沙太傅牛氏漢有牛崇為隴西主簿馬文淵為太守羊喜為功曹涼部云三牲備具犨氏晉大夫郤犨之後周生姓也州氏晉有州綽州賓其先食采于州因以為氏丘氏魯左丘明之後又齊太公封于營丘支孫以地為氏世居扶風漢末丘俊持節江淮屬王莽篡位遂留江左居吳興也謀氏周卿士祭公謀父之後以王父字為氏牟氏牟子國祝融之後後因氏焉漢有太尉牟融侯叟氏飂叔安之後侯史氏董狐為晉侯史官因氏焉漢桑弘羊故吏侯史吳匿弘羊子遷後漢侯史乾為東萊太守因家焉婁氏邾婁之國子孫或以婁為氏或以邾婁為氏左傳齊大夫婁禋疇氏摯疇古之諸侯後有摯疇氏摯氏疇氏或即任姓之摯以國為氏林氏林放之後至林玉為相有九子號十德之門又居九門見戚苑斟灌氏夏諸侯也子孫氏焉箴氏衛大夫箴莊子金氏少昊金天氏之後陰氏陰康氏之後周有陰不佞陰里人也管修自齊適楚為陰大夫其後氏焉後漢光武陰皇后其先則宣帝時祀竈者陰子方之後也弟將軍陰識識弟興岑氏古岑子國之後漢有岑彭南氏楚大夫南遺堪氏八元仲堪之後甘氏甘夏時侯國也以國為氏澹臺氏澹臺滅明字子羽武城人漢有博士澹臺恭三烏氏凡氏於職三烏五鹿有三烏大夫因氏焉漢有三烏郡為上都計三伉氏衛邑也晉公子重耳封舅犯於三伉支孫氏焉漢有少府三伉充宗代郡有陽縣有三伉氏聃氏周文王第十子聃季載之後兼氏衛公子兼之後函氏漢有豫章太守函熙董氏本飂叔安之裔子董父實甚好龍帝舜加焉賜姓曰董被氏漢有牂柯太守被條委氏漢太原太守委進李氏李伯陽之後俊氏有俟子古賢人著書子氏左傳有子鉏商鄭大夫子人九子仲氏魯宣公子仲之後子獻氏齊大夫子獻之後也楚文王之時子獻遼為大夫幾氏宋大夫仲幾之後以王父字為氏舋氏魯大夫舋夏鬼谷氏鬼谷先生六國時縱橫家旅氏周大夫子旅之後漢高功臣昌平侯旅卿傳封六代處氏史記趙有辨士處子故有處姓也漢有北海相處興又有陳留相處就所氏宋大夫華所事之後漢有諫議大夫所忠楚氏羋姓鬻熊封楚以國為姓左傳魯有楚尹楚丘趙襄子家臣楚隆禹氏禹支庶以謚為姓甫氏甫侯之後府氏漢有司徒掾府悝武氏宋武公之後氏於謚秦末武臣自立為趙王項羽之客有武涉魏將武滿漢有武虎武讓武勃武強氏漢武強侯王梁其後因封為氏武成氏趙平原君勝封武城因氏焉輔氏智果以智伯剛愎必亡其別輔氏漢有輔狠為尚書令魯氏凡氏於國齊魯宋衛是也古氏周有古公亶父其後氏焉晉平公時有舟人古乘古成氏即苦成之後隨音改焉漢有廣漢都尉古成雲虎氏漢有合浦太守虎旗其先八元伯虎之後扈氏趙有扈輒苦氏苦成越大夫漢苦均為會稽太守苦音庫五王氏齊自威宣湣襄至建五王因以為氏五鳩氏趙有將軍五鳩盧五鹿氏五鹿衛邑也晉公子重耳封舅犯於五鹿支孫氏焉漢有少府五鹿充宗邸氏漢有上郡太守邸杜采氏漢有度遼將軍采皓尹氏師尹三公官也以官為姓周有尹吉甫尹喜漢尹咸尹賞尹齊後漢尹敏尹公氏衛有尹公佗隱氏漢有隱翁河間太守隱褒蹇氏漢有蹇蘭為交趾刺史圈氏楚鬻熊之後一本云本姓氏鄭穆公之後秦末為博士逃難改為圈氏混沌氏少昊氏之良佐漢有屯莫如為常山太守管氏管夷吾齊桓佐也見論語漢有管虢為西河太守滿氏荊蠻有瞞氏音舛變為滿漢有滿昌銑氏昇平中鉤弋有鮮卑人御史中丞銑管典氏漢有校尉典韋顯氏顯甫為周卿衍氏宋微仲衍之後勉氏漢有上郡太守勉昂矯氏晉大夫矯父之後昊氏昊英氏之後一云少昊之後老氏顓頊子老童之後左傳宋有老佐論語老彭即彭祖也或云老氏老聃老萊子之後我氏我子六國時人著書號我子下門氏晉大夫下門聰社南氏其先齊倡徙居社南因以為氏社北氏凡氏於職社北五鹿有社北大夫因氏焉漢有社北郡為沛郡上計蔣氏周公之裔壤駟氏息公子邊為大夫氏焉漢有光祿大夫宜陵侯壤駟射廣氏廣成子之後丙氏齊有大夫丙歜景氏景鳳隱氏漢有隱翁河間太守隱褒靖氏單靖公之後以謚為氏一云齊田氏之族靖郭君之後有氏有巢氏之後仲尼弟子有若魯人漢有有祿糗氏漢有糗宗為嬴長咎氏湯司空咎單左傳咎犯即舅字也酉氏黃帝之後見國語壽氏吳王壽夢之後吳大夫壽於姚漢末兗州牧壽良郈氏魯大夫郈昭伯食采於郈因氏焉耦氏宋卿華耦之後漢有侍中耦嘉奄氏奄國號也尚書云成王既踐奄左傳秦大夫奄息其後也仲氏湯左相有仲虺孔子弟子仲由漢有廷尉仲定用氏古有用國見毛詩漢有高唐令用虬名士錄有高士用羽之雍氏周文王第十三子雍伯之後以國為姓今或音雍州之雍漢雍齒沛人被氏漢有牂柯太守被條義氏義伯陽卿也漢有南陽太守義縱義渠氏狄國為秦所滅因氏焉漢有光祿大夫義渠安國摯氏摯疇古諸侯也見毛詩周有摯荒摯疇氏古之諸侯後有摯疇氏遂氏虞後商人窴之遂備氏宋封人備之後利氏漢有利乾為中山相肆氏宋大夫肆臣之後漢漁陽太守肆敏子孫因居之懿氏齊懿公之後季連氏晉有棠邑大夫季連齊嗣氏衛嗣君之後食氏食我韓公子也見戰國策漢有食子公為博士食音嗣忌氏周公忌父之後以王父字為氏貴氏陸終之後漢有貴遷為廬江太守既氏吳夫概王之後因避仇改為既氏漢有安南長史既涼御氏漢有司空史御長卿御龍氏陶唐氏之後有劉累學擾龍事夏孔甲賜氏曰御龍氏遇氏漢有遇沖為河內太守鑄氏鑄國也堯後也在濟北虵丘縣左傳臧宣叔娶于鑄後世以國為氏傅氏說築於傅巖因以為姓露氏漢有上黨都尉露平布氏趙有布子善相馬庫氏古守庫大夫之後以官為氏漢文景時有倉氏庫氏後漢竇融傳有輔義侯庫鈞庫成氏本亦苦成也方言音變為庫成步氏漢有步邵為下邳主簿車伯琦為明府時人為之語曰車府君步主簿帝疇氏䠠氏第八氏亦齊諸田之後田廣弟田英為第八門因氏焉王莽時有講學大夫第八矯計氏漢計子勳為司空掾薊氏漢有薊子訓為司空桂氏漢有揚州刺史桂褒昋氏彭城昋景以為計掾厲氏齊厲公之後漢有魏郡太守義陽侯厲溫勵氏後漢魏郡太守義陽侯勵溫見功臣表世氏戰國時有秦大夫世鈞漢有世寵又世碩著子書太史氏漢有尚書郎太史稟太陽氏衛大夫太陽速艾氏龐儉母艾氏大氏大庭氏之後又大填大山稽黃帝師大穎為顓頊師禮記曰大連東夷之子大庭氏會氏陸終之子會乙之後漢有武陽令會相賴氏漢有交阯太守賴先蒯氏晉大夫蒯得之後見左傳禮記漢有蒯徹快氏漢有快欽內史氏周內史叔興之後因官氏焉周又有內史過載氏姬姓之後春秋有載國信氏魏公子信陵君之後信都氏張敖尚漢魯元公主封於信都因氏焉胤氏夏時侯國子孫氏焉遴氏遴到為韓大夫著遴子三十篇慎氏慎到為韓大夫著慎子三十篇晉氏出自姬姓周武王子唐叔虞封為晉侯傳國二十代為韓魏趙所滅子孫以國為姓靳氏楚大夫靳尚漢有信武侯靳歙又汾陽侯靳強建氏楚太子建之後漢有建公見元后傳獻氏晉獻公之後有秦大夫獻則戰國時有獻淵頓氏頓子國今南頓是也後為楚所滅子孫以國為氏漢有頓肅灌氏斟灌之後子孫以國為氏焉漢丞相潁陰侯灌嬰嬰孫賢汝陰侯又太僕灌夫父張孟嘗為嬰舍人易姓灌氏列仙傳有灌光段氏段干木之後姓段名干木諫氏周禮有司諫氏因以為氏漢有持書侍御史諫忠晏氏漢司隸校尉晏稱漢書御史晏忠賤氏漢有北平太守賤瓊變氏遼東人姓也孝氏齊孝公之後豹氏八元叔豹之後到氏漢有東平太守到質暴氏暴辛公周諸侯也秦有將軍暴鳶漢御史大夫暴勝之播氏播鞉武商末賢人謝丘氏周宣王支子食采謝丘因氏焉漢書古今人表魯有謝丘章夜氏𦔯氏新鄭人楊𦔯村在縣西二十五里邢山東暢氏出姜姓匠氏凡氏於事者巫卜陶匠是也古有匠石望氏齊太公望之後伉氏漢有伉喜為中大夫抗氏衛大夫三抗之後漢有抗喜為漢中太守曠氏師曠之後敬氏陳敬仲之後後漢有揚州刺史敬歆慶忌氏令氏楚令尹子文之後救氏漢有諫議大夫救人晝氏齊大夫食邑於晝後因氏焉副氏周公忌父之後以王父字為氏富氏漢有富留人為公田使者廖氏寇氏蘇忿生為武王司寇後以官為氏後漢有寇恂竇氏夏后相遭有窮氏之難其妃方娠逃出自竇而生少康其後氏焉漢有竇嬰竇公氏魏文侯時有樂人竇公氏獻古文樂書一篇監氏衛康叔為連屬之監其後氏焉穀梁氏穀梁名赤子夏門人祿氏殷紂子武庚字祿父其後以王父字為氏鹿氏漢有巴郡太守鹿旗卜氏凡氏於事巫卜陶匠是也春秋魯大夫卜齮魯莊公車右卜國濮陽氏長沙太守濮陽逸沐氏漢有東平太守沐寵宓氏宓康公之後以國為氏史記仲尼弟子宓不齊字子賤魯人鞠氏漢有尚書令鞠譚或為麴氏音訛轉改漢有麴衍祝其氏宋戴公之子公子祝其為大司寇因氏焉見世本漢有清河都尉祝其承先鄐氏漢有東海太守鄐熙宿氏漢有雁門太守宿詳牧氏漢有越嶲太守牧根牧師氏沃氏太甲子沃丁之後督氏宋大夫華父督之後晉有督戎欒盈臣漢有五原太守督瓚僕氏漢有渾梁侯僕多頊氏顓頊之後蓐氏蓐收之後逯秦邑也其大夫氏焉漢有大司空逯竝續氏漢有續相如亍氏河東亍氏楚有大夫亍衡濯氏漢有濯輯郅氏郅商時侯國也見毛詩子孫氏焉漢有濟南太守郅都吉氏周尹吉甫之後漢有漢中太守吉恪室中姓密氏密康公之後以國為氏密須氏姞姓之國乙氏漢有南郡太守乙世屈侯氏魏賢人屈侯鮒漢有郎中令屈侯豫述氏魯大夫仲述之後恤氏魯有恤由闕氏古闕者官為姓承闕黨童子之後縱橫家有闕子著書漢有荊州刺史闕翊謁氏古有謁者官因以為氏漢有汝南太守謁渙又張湯小吏謁居勃氏宋左師勃之後也晉有寺人勃鞮鶡冠氏楚賢人以鶡為冠因氏焉鶡冠子著書葛氏葛天氏之裔子孫氏焉夏時葛伯嬴姓國也亦為葛氏漢有潁川太守葛興滑氏滿有詹事滑典頡氏蒼頡古之賢人頡衛古之賢者列氏古帝王列山氏之後子孫氏焉鄭有隱者列禦寇著書八篇號列子列山氏列僊氏舌氏越有大夫舌庸鄀氏春秋時鄀國以國為氏鐸氏漢有廷尉鐸政幕氏舜祖幕之後支孫以王父字為氏見左傳落氏皋落氏翟國也此赤翟別種以國為姓見左傳漢有落下閎巴郡人撰太初曆落下氏漢有落下閎作氏周公之子胙侯子孫因避地改為作氏漢有涿郡太守作顯薄氏衛賢臣薄疑漢高帝薄夫人生文帝夫人弟昭封軹侯官至車騎將軍子戎奴嗣博氏漢有博子勞善相馬望出淮南廣平郭氏氏於居城郭園池是也白馬氏微子乘白馬朝周因氏焉一云公孫瓚在幽州乘白馬因以為氏白象氏白象先生古隱者白鹿氏白鹿先生古賢人著書帛氏楚有帛州黎伯氏嬴姓伯益之後晉大夫伯宗生州犁仕楚百里氏秦大夫百里奚之後其先虞人家於百里因氏焉柏氏柏皇氏之後又柏亮父為顓頊師柏招帝嚳師柏冏為周太僕柏國在汝南西平縣為楚所滅子孫以國為氏漢有柏始昌柏英為大鴻臚秦大將軍柏直柏成氏伯成子高堯時諸侯也笮氏楚有笮倫赫氏赫胥氏之後赫胥氏獲氏宋大夫猛獲之後以王父字為氏鬲氏偃姓咎繇後昔氏周大夫封昔因氏焉漢有昔登為烏傷令赤氏帝嚳師赤松子之後見神仙傳單姓赤析氏齊大夫析歸父櫟陽氏漢景丹封櫟陽侯丹曾孫分避亂隴西因封為氏焉職氏漢有山陽令職供嗇氏古嗇夫子孫因氏焉即氏漢有單父令即費其先食采即墨因以命氏即墨氏漢有即墨威為咸陽令稷氏后稷之後墨夷氏宋大夫有墨夷須墨夷皋墨胎氏伯夷之國也其君姓墨胎氏北唐氏晉有高人隱於北唐因氏焉漢有北唐子真治京氏易習氏習國名漢有習響為陳相襲氏賨人七姓有襲氏集氏漢有外黃令集一汲氏衛宣公太子伋之後居汲因以為氏沓氏賨人七姓有沓納氏葉氏楚沈尹戌生諸梁字子高食采於葉因氏焉捷氏邾公子捷菑之後漢藝文志有捷子二篇六國時人輒氏衛出公輒之後以王父字為氏漢有輒終古莢氏莢成僖子晉大夫見世本甲氏太甲之後一云鄭大夫石甲之後鄴氏漢有梁令鄴風諱篇汝南主簿應劭議宜為舊君諱論者皆互有異同彭城孝廉張子矯議云若君臣不得相襲作名周穆王諱滿至定王時有王孫滿厲王諱胡莊王之子名胡茂才舊言秀才避光武諱稱茂才釋忌不舉併生三子俗說生子至於三似六畜言其妨父母故不舉之也謹案春秋國語越王句踐令民生二子者與之餼生三子者與之乳母三子不能獨養故與乳母所以人民繁息卒滅強吳雪會稽之恥行霸於中國也古陸終氏娶於鬼方謂之女嬇是生六子皆為諸侯今人多生三子子悉成長父母完安豈有天所孕育而害其父母兄弟者哉不舉寤生子俗說兒墮地便能開目視者謂之寤生舉寤生子妨父母謹案春秋左氏傳鄭武公娶於申曰武姜生莊公及共叔段莊公寤生驚姜氏因名寤生武公老終天年姜氏亦然安有妨其父母乎不舉父同月子俗說妨父也謹案左氏傳桓公之子與父同月生因名子同漢明帝亦與光武同月生俗說五月五日生子男害父女害母故田文生而嬰告其母勿舉且曰長與戶齊將不利其父母不舉生鬢鬚子俗說人十四五乃當生鬢鬚今生而有之妨害父母也謹案周書靈王生而有髭王甚神聖克修其職諸侯服享二世休和安在其有害乎不宜歸生俗云令人衰案婦人好以女易他男故不許歸宅不西益俗說西者為上上益宅者妨家長也原其所以西上者禮記南向北向西方為上爾雅曰西南隅謂之隩尊長之處也不西益者難動搖之耳審西益有害增廣三面豈能獨吉乎祝阿不食生魚俗說祝阿凡有賓婚吉凶大會有異饌飯食自極至蒸魚也俗說臨日月薄蝕而飲令人蝕口謹案日太陽之精君之象也日有蝕之天子不舉樂里語不救蝕者出行遇雨恐有安坐飲食重懼也俗說雷鳴不得作醬雷已發聲作醬令人腹內雷鳴謹案子路感雷精而生尚剛好勇死衛人醢之孔子覆醢每聞雷心惻怛耳堪輿書云上朔會客必鬭爭案劉君陽為南陽牧嘗上朔設盛饌了無鬭者俗云五月到官至免不遷今年有茂才除蕭令五月到官破日入舍視事五月四府所表遷武陵令余為營陵令正觸太歲主余東北上余不從在事五月遷太山守俗說二人共澡手令人鬭爭良無異器當共澡者其祝曰人相愛狗相齧言狗鬭時灑之以水便自解也坐不移樽俗說凡宴飲者移轉樽酒令人鬭爭俗說帷帳不可作衣令人病癘俗說臥枕戶砌者鬼陷其頭令人病顛五月蓋屋令人頭禿謹案易月令五月純陽姤卦用事齊麥始死夫政趣民收獲如寇盜之至與時競也除黍稷三豆當下農功最務間不容息何得晏然除覆蓋室寓乎今天下諸郭皆諱禿豈復家家五月蓋屋邪俗化擾擾動成訛謬尼父猶云從眾難復縷陳之也五月五日不得暴床薦席俗說正月長子解浣衣被令人死亡謹案論語死生有命富貴在天補更小事何乃成災源其所以正月之時天甫淒栗里語大暑在七大寒在一一謂正月也人家不能羸袍異裳脫著身之衣便為風寒所中以生疹疾疹疾不瘳死亡必矣或說正月臣存其君子朝其父九族州閭禮賢當周長子務於告慶故未以解浣也諺曰正月㯹二月初自憘妃女煞丈夫不著潔衣爾後大有俗節戲笑徒不上墓俗說新遭刑罪原解者不可以上墓祠祀令人死亡謹案孝經身體髮膚受之父母曾子病困啟手足以歸全也今遭刑者髡首剔髮身被加笞新出狴犴臭穢不潔凡祭祀者孝子致齋貴馨香如親存也時見子被刑心有惻愴緣生事死恐神明不歆承當不上墓耳汝南陳伯敬行必矩步坐必儼然目有所見不食其肉服妖桓帝元嘉中京師婦人作愁眉啼妝墮馬髻折腰步齲齒笑愁眉者細而曲折啼妝者薄拭目下若啼痕墮馬髻者側在一邊折腰步者足不任體齲齒笑者若齒痛不忻忻始自梁冀家所為京師翕然皆放效之天戒若曰將收捕冀婦女憂愁踧眉將啼也延熹中中常侍單超左悺徐璜具瑗唐衡在帝左右縱其姦慝時人為之語曰左迴天徐轉日具獨坐唐應聲言其信用甚於轉圓也延熹中京師長者皆著木屐婦女始嫁至作漆畫屐五采為系謹案黨事始發傳詣黃門北寺臨時惶恐不能信天任命多有逃亡不就考者九族拘繫及所過歷長幼婦女皆被桎梏應木屐像矣孝靈帝建寧中京師長者皆以葦辟方笥為妝其時有識者竊言葦方笥郡國讞篋也今珍用之天下皆當有罪讞於理官也後黨錮皆讞廷尉人名悉葦方笥中斯為驗矣靈帝好胡服胡帳胡床京師皆競為之後董卓擁胡兵掠宮掖漢靈帝好胡舞靈帝於西園宮中駕四白驢躬自操轡馳驅周旋以為大樂於是公卿貴戚轉相倣至乘軒以為騎從價與馬齊凡人相罵曰死驢醜惡之稱也董卓陵虐王室執政皆如死驢靈帝數以車騎將軍過拜孽臣內孽又贈亡人顯號加於頑凶印綬汙於腐屍昔辛有睹被髮之祥知其為戎今假號雲集不亦宜乎靈帝時京師賓婚嘉會皆作魁𣠠酒酣之後續以挽歌魁𣠠喪家之樂挽歌執紼相偶和之者天戒若曰國家當急殄悴諸貴樂皆死亡也自靈帝崩後京師壞滅戶有兼屍蟲而相食魁𣠠挽歌斯之效乎桓帝世謠曰直如弦死道邊曲如鉤反封侯梁冀欲樹幼主李固欲立清河王梁冀遂奏李固死於獄中暴屍路邊如鉤梁冀如弦李固桓帝之初京師童謠曰車班班入河間言徵靈帝者輪班擁節入河間也桓帝初京師謠曰游平賣印自有評不避豪強及大姓桓帝之末京都童謠曰茅田一頃中有井四方纖纖不可整嚼復嚼今年尚可後年譊于時中常侍管霸蘇康憎疾海內英哲與長樂少府劉囂太常許永尚書柳分尋穆史佟司隸唐珍等代作唇齒史佟左官媮進者也京師謠歌曰烏臘烏臘案逆臣董卓滔天虐民窮凶極惡關東舉兵欲共誅之轉顧望莫肯先進處處停兵數十萬若烏臘蟲相隨橫取之矣中平中京師歌董逃董卓以董逃之歌主為己發大禁絕之死者千數靈帝之末禮樂崩壞賞刑失中毀譽無驗競飾偽服以盪典制遠近翕然咸名後生放聲者為時人有識者竊言舊曰世人次曰俗人今更曰時人此天促其期也其間無幾天下大壞也千里草何青青十日卜不得生此董卓字也青青暴盛之貌靈帝光和七年陳留濟陰諸郡西及成皋陽武城郭路邊草生作人狀操持矛弩牛馬萬狀一一備具後關東義兵先起於宋衛之郊東郡太守橋瑁負眾怙亂陵蔑同盟忿嫉同類以殞厥命陳留濟陰迎助謂為離德棄好即戎吏民殲之草妖之興豈不或信夏禹廟中有梅梁忽一春生枝葉中平中懷陵上有雀萬餘亂鬭殺頭縣著樹也光和中雒陽男子夜龍從兄陽求臘錢龍假取繁數頗厭患之陽與錢千龍意不滿欲破陽家因持弓矢射玄武東闕三發吏士呵縛首服因是遣中常侍尚書御史中丞直事御史謁者衛尉司隸河南尹雒陽令悉會發所劭時為太尉議曹掾白公鄧盛夫禮設闕觀所以飾門章於至尊懸諸象魏示民禮法也故車過者下步過者趨今龍乃敢射闕意慢事醜次於大逆宜遣主者參問變狀公曰府不主盜賊當與諸府相候劭曰丞相邴吉以為道路死傷既往之事京兆長安職所窮逐而住車問牛喘吐舌者豈輕人而貴畜哉顧念陰陽不和必有所害掾史爾乃悅服漢書嘉其達大體今龍所犯然中外奔波邴吉防患大豫況於已形昭晰者哉明公既處宰相大任加掌兵戎之職凡在荒裔謂之大事何有近目下而致逆節之萌者孔子攝魯司寇非常卿也折僭溢之端消纖介之漸從政三月惡人走境邑門不闔外收強齊侵地內虧三桓之威區區小國尚於趣舍大漢之朝焉可無乎明公恬然謂非己詩云儀刑文王萬國作孚當為人制法何必取法於人於是公意大悟遣令史謝申以鈴下規應掾自行之還具條奏時靈帝詔報惡惡止其身龍以重論之陽不坐其後車騎將軍何苗與兄大將軍進部兵還相猜疑對相攻擊戰於闕下苗死兵敗殺數千人雒陽宮室內人燒盡龍者陽類君之象也夜者不明之應也此其象也光和元年司徒長史馮巡馬生胡子問養馬胡蒼頭乃姦此馬以生子熹平二年六月雒陽民譌言虎賁寺東壁中有黃人形容鬚眉良是觀者數萬省內悉出劭時為郎故往視之何在其有人也走漏汙處膩赭流漉壁有他剝數寸曲折耳謹案季夏土黃中行用事又在壁中壁亦土也以見於虎賁寺者虎賁國之祕兵扞難禦侮必示於東東者動也言當出師行將天下搖動也天之以類告人甚於影響也光和四年四月南宮中黃門寺有一男子長九尺服白衣中黃門解步呵問汝何等人白衣妄入宮掖曰我梁伯夏後天使我為天子步欲前收取因忽不見謹案尚書春秋左傳曰伯益佐禹治水封於梁飂叔安有裔子曰董父實甚好龍龍多歸之帝舜嘉之賜姓董氏董氏之祖與梁同焉到光熹元年董卓自外入因閒乘釁廢帝殺后百官總己號令自由殺戮決前威重於王梁本安定而卓隴西人俱涼州也天戒若曰卓不當專制奪矯如白衣無宜蘭入宮也白衣見黃門寺及卓之末中黃門誅滅之際事類如此可謂無乎靈帝光和二年洛陽上西門外女子生兒兩頭異肩四臂共胸俱以為不祥因棄去朝廷瞀亂上下無別二頭之象也喪祭禮臣子無爵謚君父之義也故群臣累其功美葬日遣太尉於南郊告天而謚之天子新崩未有定謚故且稱大行皇帝以別嗣主宮車晏駕謹案史記曰王稽謂范雎曰夫事有不可知者有不可柰何者一旦宮車晏駕是事不可知也君雖恨於臣是無可奈何謂秦昭王以天年終也昔周康王一旦晏起詩人以為深刺天子當夜寢早作身省萬機如今崩殞則為晏駕矣梓宮者禮天子斂以梓器宮者存時所居緣生事亡因以為名凡人呼棺亦為宮也葬之郭北北首求諸幽之道俗說凡祭祀先祖所以求福方者興旭相者所以威厲鬼敺罔像方相欲以驚逐鬼魅俗說亡人魂氣飛揚故作魌頭以存之言頭體魌魌然盛大也或謂魌頭為觸壙殊方語也墓上樹柏路頭石虎周禮方相氏葬日入壙敺魍象魍象好食亡者肝腦人家不能常令方相立于墓側以禁禦之而魍象畏虎與柏故墓前立虎與柏或說秦穆公時陳倉人掘地得物若羊將獻之道逢二童子謂曰此名為蝹常在地中食人腦若殺之以柏東南枝插其首由是墓側皆樹柏謹案禮臣有大喪三年不呼其門葬小兒必於道邊傷其人道未成故置於道側使視成人之道也慎終悼亡宮室論語夫子宮牆數仞禮記季武子入宮不敢哭由是言之宮室一也秦漢已來尊者以宮為常號下乃避之云室耳已前貴賤無別弟子職曰室中握手論語曰譬如宮牆由此言之宮其外室其內也殿堂宮室象東井形刻作荷菱荷菱水物也所以厭火魯昭公設兩觀於門是謂之闕從門欮聲屋止也閈城外郭內里門也閈捍也言為人藩屏以捍難也鑰施懸魚魚翳伏淵源欲令楗閉如此府聚也公卿牧守府道德之所藏府私府賦賄之所聚也廷平也又正也言縣廷郡廷朝廷皆取平均正直也寺司也廷之有法度者也諸官府所止曰寺光武嘗從皇考至南頓故識官府寺舍今尚書侍御史謁者所止皆曰寺故後代道場及祠宇皆取稱焉皇后居椒房以椒塗房取其溫且香也案天子有外屏令臣下屏氣息屏卿大夫以帷士以簾稍有弟以自鄣蔽也示臣臨見自整屏氣處也漢顧成廟設投老鉤欄門戶鋪首謹案百家書云公輸般之水上見蠡謂之曰開汝匣見汝形蠡適出頭般以足畫圖之蠡引閉其戶終不可得開般遂施之門戶欲使閉藏當如此周密也案世本鯀作城郭城盛也從土盛聲郭大也城之為言宬郭之為言廓謂寬廓宬受也郭亦謂之郛郛者亦大也天子治居之城曰都舊都曰邑也漢改郵為置置者度其遠近之閒置之也今吏郵書傳府督郵職掌此傳舍案諸侯及使者有傳信乃得舍於傳耳今刺史行部車號傳車從事督郵南北曰阡東西曰陌河東以東西為阡南北為陌里語云越陌度阡更為客主阡陌田間道路也京師有長壽街萬歲街士馬街若此非一街者攜也離也四出之路攜離而別也菀蘊也言薪蒸所蘊積也囿者畜魚鼈之處也囿猶有也園援也从囗袁聲四皓園公亦本園者秦築長城土皆紫色謂之紫塞南徼土色丹謂之丹徼塞者塞也所以壅塞夷狄也徼繞也池者陂池从水也聲孫子云金城湯池而無粟者太公墨翟不能守之孫子有金城湯池之說後人因此開地為池以養魚鼈海一云朝夕池一云天池亦云大壑巨壑市井井法也節也言法制居人令節其飲食無窮竭也久不渫滌為井泥易云井泥不食不停污曰井渫易云井渫不食滌井曰浚井水清曰洌井易云井洌寒泉甃聚磚修井也易云井甃無咎雍丘縣夏后公祠有神井能致霧市恃也養贍老少恃以不匱也亦謂之市井俗說市井者謂至市鬻賣者當於井上洗濯令其物香潔及自嚴飾乃到市也謹案春秋井田記人年三十受田百畝以食五口五口為一戶父母妻子也公田十畝廬舍五畝成田一頃十五畝八家而九頃二十畝共為一井廬舍在內貴人也公田次之重公也私田在外賤私也井田之義一曰無泄地氣二曰無費一家三曰同風俗四曰合巧拙五曰通財貨因井為市交易而退故稱市井也市者百步為畝秦孝公以百卌步為畝半為廛也數紀十十謂之百十百謂之千十千謂之萬十萬謂之億十億謂之兆十兆謂之經十經謂之垓十垓謂之秭十秭謂之選十選謂之載十載謂之極有物者有事者紀於此矣過此往者則其數可紀其名未之或聞也夫數一為特侯奇隻二為再兩偶雙三為參四為乘千生萬萬生億億生兆兆生京京生秭秭生垓垓生壤壤生溝溝生澗澗生正正生載載地不能載也賈誼書曰數度之遺以六為法數度之始始於微細有形之物莫細於豪是故立一豪以為度十豪為髮十髮為釐十釐為分十分為寸十寸為尺備於六故先王以為天下用也涉始於足足率長十寸十寸則尺一躍三尺法天地人再躍則涉八尺曰尋倍尋曰常秦孝公以二百四十步為畮五十畮為畦踦者奇也履舄之一也銖六則錘錘暉也二錘則錙錙熾也二錙則兩也圭自然之形陰陽之始也四圭曰撮三指撮之也十黍為絫十絫為一銖斛者角也庾三斛四斗秉二十四斛新秦秦昭王聽田貴之議遣李冰為蜀郡太守開成都兩江溉田萬頃無復水旱之災歲大豐熟江水有神歲取童女二人以為婦不然為水災主者白出錢百萬以行聘冰曰不須吾自有女到時裝飾其女當以沈江水徑至神祠上神坐舉酒酹曰今得傅九族江君大神當見尊顏相為進酒冰先投杯但澹澹不耗冰厲聲曰江君相輕當相伐耳拔劍忽然不見良久有兩蒼牛鬭於岸旁有閒冰還流汗謂官屬曰吾鬭大極當相助也若欲知我南向腰中正白者我綬也主簿乃刺殺北面者江神遂死後無復患蜀人慕其氣決凡壯健者因名冰兒秦昭王聽田貴之議以李冰為蜀守開成都兩江造興溉田萬頃以上始皇得其利以併天下立其祠也秦政并吞六國苞宇宙之弘敞秦相趙高指鹿為馬束蒲為脯二世不覺獄法謹案律者法也皋陶謨虞始造律蕭何成以九章此關諸百王不易之道也時主所制曰令漢書著于令甲夫吏者治也當先自正然後正人故文書下如律令言當承憲履繩墨動不失律令也漢令蠻夷戎狄有罪當殊殊者死也易噬嗑為獄獄十月之卦從犬言聲二犬亦所以守也廷者陽也陽尚生長獄者陰也陰主刑殺故獄皆在廷北順其位詩云宜犴宜獄犴司空也周禮凡萬民之有罪過未離於法者桎梏以上坐諸嘉石役諸司空令平易道路也周禮三王始作獄夏曰夏臺言不害人若游觀之臺桀拘湯是也殷曰羑里言不害人若於閭里紂拘文王是也周曰囹圄囹令圄舉也言令人幽閉思愆改惡為善因原之也今縣官錄囚皆言舉也自辛為辠令其辛苦憂之也秦皇謂辠字似皇故改為罪盜逃也言其晝伏夜奔逃避人也囚遒也言辭窮情得以罪誅遒也禮罪人窴諸圜土故囚罪人置諸圓土故囚字為囗中人此其象也械戒也所以警戒使為善也桎實也言其下垂至地然後吐情首實頃者廷尉多牆面而苟充茲位治書侍御史不復平議讞當糾紛豈一事哉里語曰縣官漫漫冤死者半昔在清平之世使明恕君子哀矜折獄尚有怨言況在今時耶折當目錄云泰山太守臣劭再拜上書曰秦皇焚書坑儒六藝缺亡高祖受命四海乂安往往於壁柱石室之中得其遺文竹帛朽裂殘闕不備至國家行事俗間流語莫能原察故三代遣輶軒使者經絕域採方言令人君不出戶牖而知異俗之語耳汝南王叔漢父子方出游二十餘年不還叔漢作尚書郎有人告子方死於汝南即遣兄伯三往迎喪叔漢即發哀詔書賻錢二十萬既而子方從蒼梧還叔漢詣闕乞納賻錢受虛妄罪靈帝詔將相大夫會議之博士任敏議云凡人中壽七十視父同儕亡可製服也子方在遠人指其處不可驗也罪不可加焉詔書還錢復本官濟北李登為從事史病得假歸家復移刺延期後被召登自嫌不甚羸瘦謂雙生弟寧曰我兄弟相似人不能別汝差類病者代我至府寧曰府君大嚴得毋不可登曰我新吏耳無能識者我自行見主必死寧詣府主不辨後為人所言事發覺時相弊久弟大怒曰濟北爾乃欲相為也遂殺登陳國張伯喈弟仲喈婦炊於竈下至井上謂伯喈曰我今日妝寧好不伯喈曰我伯喈也婦大慚愧其夕時伯喈到更衣婦復牽伯喈曰今旦大誤謂伯喈為卿答曰我故伯喈也蓋親密無過夫婦然尚如此況於初未相見而責先識之乎陳留有富室翁年九十無子取田家女為妾一交接即氣絕後生得男其女誣其淫佚有兒曰我父死時年尊何一夕便有子爭財數年不能決丞相邴吉出殿上決獄云吾聞老翁子不耐寒又無影可共試之時八月取同歲小兒俱解衣裸之此兒獨言寒復令並行日中獨無影大小歎息因以財與兒沛郡有富家公資二千餘萬小婦子年裁數歲頃失其母又無親近其大婦女甚不賢公病困思念惡壻爭其財兒判不全因呼族人為遺令云悉以財屬女但遺一劍與兒年十五以還付之其後兒大姊不肯與劍男乃詣郡自言求劍謹案時太守大司空何武也得其辭因錄女及壻省其手書顧謂掾史曰女性強梁壻復貪鄙其父畏賊害其兒又計小兒正得此財不能全護故且俾與女內實寄之耳不當以劍與之乎夫劍者亦所以決斷也限年十五者度其子智力足以自活此女壻必不復還其劍當聞縣官縣官或能證察得以見伸展也凡庸何能思慮強遠如是哉悉奪取財以與子曰弊女惡壻溫飽十五歲亦以幸矣於是論者乃服謂武原情度事得其理南郡讞女子何侍為許遠妻侍父何陽素酗酒從遠假求不悉如意陽數罵詈遠謂侍汝公復罵者吾必揣之侍曰共作夫妻柰何相辱揣我公者搏若母矣其後陽復罵遠遂揣之侍因上堂搏姑耳三下司徒鮑宣決事曰夫婦所以養姑者也今壻自辱其父非姑所使君子之於凡庸尚不遷怒況所尊重乎當減死論陳國有趙祐者酒後自相署或稱亭長督郵祐復於外騎馬將絳幡云我使者也司徒鮑宣決獄云騎馬將幡起於戲耳無它惡意汝南張妙會杜士士家娶婦酒後相戲張妙縛杜士捶二十下又懸足指士遂至死鮑昱決事云酒後相戲原其本心無賊害之意宜減死臨淮有一人持一匹縑到市賣之道遇雨而披戴後人求共庇蔭因與一頭之地雨霽當別因共爭鬭各云我縑詣府自言太守丞相薛宣劾實兩人莫肯首服宣曰縑直數百錢耳何足紛紛自致縣呼騎吏中斷縑各與半使追聽之後人曰受恩前撮之縑主稱冤不已宣曰然固知當爾也因結責之具服俾悉還本主汝南陳公思為五官掾王子祐為兵曹行會食下亭子祐曾以官事考殺公思叔父斌斌無子公思欲為報仇不能得卒見子祐不勝憤怒便格殺之還府歸死時太守太傅胡廣以為招罪人也陳公思追念叔父仁勇憤發手刃仇敵自歸司敗便原遣之潁川有富室兄弟同居兩婦皆懷任數月長婦胎傷因閉匿之產期至同到乳舍弟婦生男夜因盜取之爭訟三年州郡不能決丞相黃霸出坐殿前令卒抱兒去兩婦各十餘步叱婦曰自往取之長婦抱持甚急兒大啼叫弟婦恐傷害之因乃放與而心甚自悽愴長婦甚喜霸曰此弟婦子也責問大婦乃伏平原郡讞胡譚取周碧為妻譚陰陽不屬令碧與李方張少姦通冀得其子巴郡宋遷母名靜往阿奴家飲酒遷母坐上失氣奴謂遷曰汝母在坐上何無儀適遷曰腸痛誤耳人各有氣豈止我母遷罵奴奴乃持木枕擊遷遂死扶風蘇不違父為司隸李暠所逮暠遷司農不違穿府北垣徑上聽事斫暠臥具暠一宿數遷恕度汝南周霸字翁仲為太尉掾婦於乳舍生女自毒無男時屠婦比臥得男因相與私貨易裨錢數萬後翁仲為北海相吏周光能見鬼署為主簿使還致敬於本郡縣因告光曰事訖臘日可與小兒俱上冢去家經十三年不躬烝嘗主簿微察知相先君寧息會同飲食忻娛否往到於冢上郎君沃酹主簿俛伏在後但見屠者弊衣蠡結踞神坐持刀割肉有五時衣帶青墨綬數人彷徨陰堂東西廂不敢來前光怪其故還至引見問之乞屏左右起造於膝前白事狀如此翁仲曰主簿出勿言因持劍上堂問嫗女何以養此子嫗大怒曰君常言兒體質聲氣喜學似我老公欲死為作狂語翁仲具告之曰祀祭如此不具服子母立截嫗辭窮情竭泣涕具陳其故時子年已十八呼與辭決曰凡有子者欲以承先祖先祖不享血食無可奈何自以衣裘僮僕車馬迎取其女女嫁為賣䴵子婦後適安平李文思文思官至南陽太守翁仲便養從弟子熙為高邑令神不歆非類明矣安得養他人子乎趙孝以父田禾將軍任為郎每告歸白衣步擔嘗從長安還欲止郵亭亭長聞孝當過灑掃待之孝既到長不肯內因問曰田禾將軍子何時到孝曰尋到矣顯宗皇帝聞孝名詔拜諫議大夫遷衛尉將作大匠陳國公孫志節有蒼頭地餘年十七情性聰惠儀狀端正工書疏志節為戶曹史令地餘歸取資用因持車馬亡去到丹陽自云姓王名斌字文高遂留為諸曹史志節拜揚州刺史郡選曹史衣冠子弟皆出斌下乃用之斌乞屏左右叩頭涕洟曰斌即明使君地餘也斌後為蒼梧太守楊範字文端齊人齊宋之亂母在賊中採椹藏於地夜取之進母如是非一忽於地中得米十斛上有字云米十斛賜孝子楊範以資給母情遇百里奚為秦相堂上作樂所賃澣婦自言知音呼之搏髀援琴撫絃而歌者三其一曰百里奚五羊皮憶別時烹伏雌炊扊扅今日富貴忘我為其二曰百里奚初娶我時五羊皮臨當別時烹乳雞今適富貴忘我為其三曰百里奚百里奚母已死葬南谿墳以瓦覆以柴舂黃藜搤伏雞西入秦五羖皮今日富貴捐我為問之乃其故妻還為夫婦也司農黃昌為蜀郡太守得所失婦便為正室使後婦下之河南平陰龐儉本魏郡鄴人遭倉卒之世亡失其父時儉三歲弟纔繈抱耳流轉客居廬里中鑿井得錢千餘萬遂溫富儉作府吏躬親家事行求老蒼頭謹信屬任者年六十餘直二萬錢使主牛馬耕種有賓婚大會母在堂上酒酣陳樂歌笑奴在竈下助廚竊言堂上老母我婦也客罷婢語次說老奴無狀為妄語所說不可道也窮詰其由母謂婢試問其形狀奴曰家居鄴時在富樂里宛西婦艾氏女字阿橫大兒字阿癡小兒曰越子時為縣吏為人所略賣阿橫右足下有黑子右腋下赤誌如半櫛母曰是汝公也因下堂相對啼泣兒婦前為汝公拜即洗浴身見衣被遂為夫婦如初儉子歷二千石刺史七八人時人為之語曰廬里諸龐鑿井得銅買奴得公子孫羞之言我先人初居廬里者兄弟二人家買奴得公爾蜀郡任嘉年三四歲時父騰為諸生於漢中就師有盜賊道路斷絕蜀亦覆沒轉客長沙為州郡吏後嘉為長沙太守騰為奏曹掾默知嘉實其子也嘉母語次謂嘉曰奏曹任掾則汝父也但差老耳嘉曰天下豈獨蜀有一任夫人何以老更生邪意母曰咄我守養汝數十年無嫌譏豈以垂沒更失計哉顧實真父不可棄捐後嘉問掾聲音何類太守何州里邪掾曰本犍為武陽人蓬轉流宕到此母察審諦又識左耳前贅因出抱持對之流涕嘉自拔榻歔欷哽咽陳留太守泰山吳文章少孤遭憂衰之世與兄伯武相失別二十年後相會下邳市中爭計共鬭伯武毆文章文章欲報擊之心中悽愴手不能舉大自怪也因投杖於地觀者咸笑之更相借問乃親兄也相持涕泣觀者復曰兄校弟不得報兄向者所笑乃其義也輯事彭祖壽年八百歲猶恨唾遠荊鼈令死尸隨水上荊人求之不得也鼈令至岷山下已復生起見蜀望帝帝使鼈令鑿巫山然後蜀得陸處望帝自以德不如以國禪與鼈令為蜀王號曰開明齊人不食而死也伯魚之生適有饋孔子魚者嘉以為瑞故名鯉字伯魚吳王夫差大敗齊于艾陵還誅子胥取其身流之江抉其目東門曰使汝視越之入吳也吳王夫差羞見子胥以帛幕面而死故後人因之製面衣以為常則也天下之女白不如越谿之女肌皙潁川張欽孟孝吳楚反與亞夫常為前鋒陷陳潰圍傍人觀曰壯哉此君欽聞自矜遂死軍汝南周勃辟太尉清詔使荊州武帝廣開獻書之路立五經博士開弟子員設科射策勸以官祿訖於元始百有餘年書積如丘山傳業浸眾枝葉繁滋經說百萬言蓋利祿之路然也張仲春武帝時人也善雅歌與李延年同時每奏新歌莫不稱善然不知休息終至於敗亡以諭人之進退當有節奏昭帝時大官上食羹中有髮切中有土令丞坐不謹敬皆論昭帝時蒙人焦貢為小黃令路不拾遺詔遷貢百姓揮涕守闕求索還貢天子聽增貢之秩千石貢之風化猶存其民好學多貧此其風也侯霸字君房為淮平大尹政理有能名及王莽敗霸保固自守卒全一郡更始元年遣使徵霸百姓老弱相攜號哭遮使者車或當道而臥皆曰願乞侯復留期年民乃誡乳婦勿復舉子侯君當去必不能全使者慮霸就徵臨淮必亂不敢授璽書而具以狀聞案明帝起居注上東巡泰山到滎陽有烏飛鳴乘輿上虎賁王吉射中之作辭曰烏烏啞啞引弓射洞左腋陛下壽萬歲臣為二千石帝賜錢二百萬令亭壁悉畫為烏也何敞為鬼蘇珠娘按誅亭長龔壽陳龜遷京兆尹民有疾病則給醫藥常使戶曹巡行東海王興宗議曰晏平仲以齊君奢故澣其朝冠振其鹿裘潁川黃子廉者每飲馬投錢於水中南陽酈縣有甘谷谷中水甘美云其山上大有菊華水從山上流下得其滋液谷中三十餘家不復穿井仰飲此水上壽者百二三十中者百餘歲七八十者名之為夭菊華輕身益氣令人堅強故也司空王暢太尉劉寬太傅袁隗為南陽太守聞有此事令酈縣月送水三十斛用之飲食諸公多患風眩皆得瘳袁湯卒時年八十六有子十二人光祿奉肸上戴就為主事謝自然女道士也果州人居金泉山晝夜不寐忽有雲氣散漫彌久仙去陰教女媧禱祠神祈而為女媒因置昏姻行媒始行明矣夫昏以昏時而昏繇此因以因婭而因乎人姻者姻之始媒者姻之聚所謂昏因姻媒如此女媧伏希之妹漢以八月算人后家以金帛賂遺主者以求入也列侯尚公主國人尚翁主以妻制夫陽屈於陰爾六宮采女凡數千人案采者擇也天子以歲八月遣中大夫與掖庭丞相工率於洛陽鄉中閱視童女年十三以上二十以下長壯皎潔有法相者因載入後宮故謂之采女也易稱帝乙歸妹以祉元吉婦人謂嫁娶之禮曰歸歸其妹於諸侯亨終吉也周禮媒氏因三十之男二十之女冰泮鳴雁於是乎合織女七夕當渡河使鵲為橋兩袒俗說齊人有女二人求之東家子醜而富西家子好而貧父母疑不能決問其女定所欲適難指斥言者偏袒令我知之女便兩袒怪問其故云欲東家食西家宿此為兩袒者也辨惑俗有不語謂之東野之言積習而成不敢獨否子不以從令為孝後主固宜是革浸以為俗豈不謬哉傳曰后稷冬墾田流汗而種田不生者人力非不至天時不與俗說天地開闢未有人民女媧摶黃土作人務劇力不暇供乃引絙於泥中舉以為人故富貴者黃土人也貧賤者絙人也上古之時草居露宿冬則山南夏則山北無恙俗說恙病也凡人相見及通書問皆曰無恙謹案易傳上古之世草居露宿多被此毒恙噬人蟲也善入人腹食人心人每患苦之故俗相勞問者云無恙非為病也俗說膊闊大脯也案泰山博縣十月祠泰山膊闊一尺長五分祝阿不食生魚俗說祝阿凡有賓婚吉凶大會有異饌飯食自極至蒸魚也俗說人飲如犢人飲酒無量如犢也菟髕俗說臘正旦食得菟髕者名之曰幸賞以寒酒幸者善祥令人吉利也或說食菟髕者令人面免生髕露見醜惡今覺得之嘉不為己疾也謹案尚書夏禹始作肉刑則天象而慎其過故穿踰盜竊者髕髕者去其髕骨也逮至暴秦亂獄糺紛烹俎車裂抽脅黔首窮愁飲泣永歎凡人食得菟髕以為佳瑞物類相感冀全己之髕也所以有賞耳元日食雞子一枚以鍊形也元日飲桃湯及柏葉酒呼雞曰朱朱俗說雞本朱氏翁化而為之今呼雞皆朱朱也謹案說文解字喌二口為讙州其聲也讀若祝祝者誘致禽畜和順之意喌與朱音相似耳呼虎為李耳俗說虎本南郡中廬李氏公所化為呼李耳因喜呼班便怒肅肅蝦蟆掉尾俗說蝦蟆一跳八尺再跳丈六從春至冬袒裸相逐無他所作掉尾肅肅謹案蝦蟆既處水中其尾又短正使能掉之豈能肅肅乎原其所以當言夏馬夏馬患蠅蚋掉尾振擊常肅肅也蝦蟆夏馬音相似戶律漢中巴蜀廣漢自擇伏日俗說漢中巴蜀廣漢土地溫暑草木早生晚枯氣異中國夷狄畜之故令自擇伏日也謹案漢書高帝分四郡之眾用良平之策還定三秦席卷天下蓋君子所因者本也論功定封加以金帛重復寵異令自擇伏日不同於凡俗也赤春俗說赤春從人假貸皆自乏之時或說當言斥春春舊穀已新穀未登乃指斥此時相從假貸乎斥與赤音相似耳謹案詩曰春日遲遲卉木萋萋春日載陽有鳴倉庚月令衣青衣服蒼玉爾雅云春曰青陽凡三春時不得服赤也今里語曰相斥觸原其所以言不當觸春從人求索也夏至著五綵辟兵題曰游光游光厲鬼也知其名者無溫疾五綵避五兵也案人取新斷織繫戶亦此類也謹案織取新斷二三寸帛綴著衣衿以己織縑告成於諸姑也後世彌文易以五綵又永建中京師大疫云厲鬼字野重游光亦但流言無指見之者其後歲歲有病人情愁怖復增題之冀以脫禍今家人織新縑皆取著後縑二寸許繫戶上此其驗也五月五日賜五色續命絲俗說以益人命五月五日以五綵絲繫臂名長命縷一名續命縷一名辟兵繒一名五色縷一名朱索辟兵及鬼命人不病溫又曰亦因屈原八月一日是六神日以露水調朱砂蘸小指宜點灸去百疾八月秋穰可以殺瓠取其色澤而堅類從以為瓠死燒穰瓜亡煮漆即此是也今俗畜瓠之家不燒穰種瓜之家不焚漆俗說家人燒黍穰則使田中瓠枯死也俗說高祖與項羽戰敗於京索間遁叢薄中羽追求之時鳩正鳴其上追者以為必無人遂得脫及即位異此鳥故作鳩杖以賜老人也謹案少皞氏官五鳩鳩民者聚民也周官羅氏獻鳩養老漢無羅氏故作鳩杖以扶老禹入裸國欣起而解裳俗說禹治洪水乃播入裸國君子入俗不改其恆於是欣然而解裳也原其所以當言皆裳裸國今吳郡是也被髮文身裸以為飾蓋正朔所不及也猥見大聖之君悅禹文德欣然皆著衣裳也眾口鑠金俗說有美金於此眾人咸其詆訾言其不純賣金者欲其必售固取鍛燒以見真此為眾口鑠金眾心成城俗說人同心者可共築起一城同心共飲雒陽酒可盡也錢刀俗說害中有利利旁有刀言人治生卒多得錢財者必有刀劍之禍也案漢書曰王莽造大錢作契刀錯刀五銖錢凡四品並行故稱錢刀也城門失火禍及池中魚俗說司門尉姓池名魚城門火救之燒死故云然耳謹案百家書宋城門失火因汲取池中水以沃灌之池中空竭魚悉露見但就取之喻惡之滋並中傷良謹也俗說殦白日目無見常隱丘藂之間亦深竄牆穴之內因無得見兔鼠之無遺失於人屋下庭中殦貪鼠殘姦邪眾所憎疾有此異者令人死亡也夜糴俗說市買者當清旦而行日中交易所有夕時便罷無人也今乃夜糴穀明其癡騃不足也凡靳不施惠者曰夜糴俗說齊人有空車行魯人有負釜者便持釜置車中行二三百里臨別取釜各不相問為誰後車家繫獄當死釜主徑往募人取之穿壁未達曰極哉車者怒不肯出釜主慚欲與俱死明日主者以事白齊君齊君義而原之俗說有功得賜金者皆黃金也謹案孫子兵書日費千金千金百萬錢也陳平諫楚千金贈二疏五十斤並黃金也或云一金亦是一萬錢也鹹如炭俗說鹹亦與熱正等炭火不可以入口人食得大鹹亦吐之謹案東海朐人曉知鹽法者云攪鹽木多日每燋黑如炭非謂竈中火炭也酢如蓂莢謹案孝經說古太平蓂莢生階其味酸王者取以調味後以醯醢代之俗說𩥄馬啖賓客宴食已闕主意未盡欲復飲酒餘無所施更出脯鮓椒薑鹽豉言其速疾如𩥄馬之傳命案方言豚猪子也今人相罵曰孤豚之子是也凡人相罵曰死驢醜惡之稱也俗說大餓不在車飯謂正得一車飯不復活也或曰輔車上飯小小不足濟也案吳郡名酒杯為𥂸言大餓人得一𥂸飯無所益也寧相六不守熟案蒸飯更泥謂之餾音與六相似也瘦馬不能度繩俗說馬羸不能度繩索言其極也或云不能度菜畦塍也謹案齊有繩水裁廣三四步言馬之疲乃不能度此水耳殺君馬者路旁兒也俗說長吏食厚祿芻稿肥美馬肥希出路旁小兒觀之卻驚致死案長吏馬肥觀者快馬之走驟也乘者喜其言驅馳不已至於瘠死賣牛者勿握角令不售案恐觸人故人不敢取也月與星並無光日照之乃光耳如以鏡照日光則影見壁月初光見西方月望後光見東北一照也吳牛望月則喘使之苦於日見月怖亦喘之矣桑車榆轂聲聞數里俗說凡人揉桑作車又以榆為轂牢彊朗徹聲響乃聞數里俗云亂如蘊者糞除不潔艸芥集眾火就燒之謂之蘊言其烟氣縕縕取其希有淆亂案里語厚哉鮑管探腸案腹不清然尚不盥何共財而生喜怒也今宴飲大會皆先黍臛鈴柄施懸魚魚者欲君臣沈靜如魚之入水不可復得聞見也謹案詩曰手如柔荑荑者茅始熟中穰也既白且滑嘉號四方皆有七宿各成一形東方成龍形西方成虎形南首而北尾南方成鳥形北方成龜形西首而東尾以南方之宿象鳥故謂之朱鳥七宿者也風者天地之號令譴告人君風而靡者也風或清明來久長不搖樹木枝葉離地三二丈者此有龍德在其下風或清明不及地二三尺者此君子之風也狂風曰颲涼風曰瀏微風曰飉小風曰颼小風從孔來曰䫼五月有落梅風江淮以為信風又有霖霪號為梅雨沾衣服皆敗黦積冰曰凌壯冰曰凍冰流曰澌冰解曰泮言人清高如冰之潔夫火者南方陽光輝為明聖人嚮之而治取其象也馬稱匹者俗說相馬比君子與人相匹或曰馬夜行目明照前四丈故曰一匹或說度馬縱橫適得一匹或說馬死賣得一匹帛或云春秋左氏說諸侯相贈乘馬束帛束帛為匹與馬相匹耳車一兩謂兩兩相與為體也原其所以言兩者箱轅及輪兩兩而耦故稱兩耳猶屨有兩隻亦稱為兩詩云葛屨五兩即其類也車有兩輪馬有四匹故車稱兩馬稱匹黃帝戰蚩尤於涿鹿常有五色雲氣金枝玉葉止於帝上因作華蓋武王伐紂大風折蓋遂為曲蓋鹿車窄小裁容一鹿也或云樂車乘牛馬者剉斬飲飼達曙今乘者雖為勞極然入傳舍偃臥無憂故曰樂車無牛馬而能行者獨一人所致耳北俗三牛為一具以備一犁鎌刀自葵積芻蕘之效刻葦傷盜為槍合繩為糺仗者刀戟之總名也匕首其頭類匕故曰匕首短而便用也矛長八尺謂之矟白鷴古弓名柘材為弓彈而放快耳珠曰璫火斗曰尉織毛褥謂之氍毹丸毛謂之踘笈學士所以負書箱如冠籍箱也兩角曰菱四角曰芰總謂之水栗橙皮可為醬虀醬成於鹽而鹹於鹽夫物之變有時而重菖蒲放花人得食之長年徽稱丞者承也相者助也漢武帝諱徹改曰通侯或曰列侯秦時六國未平將帥皆家關中故稱關內侯通侯言其功大通於王室列者言其功德列箸乃饗爵也御史中丞舊持書御史也三公一歲共食萬石案秦昭王太后始臨朝也牧守長不宜數易案尚書有考績孔子曰如有用我者期月而已三年有成子產從政三年民乃歌之賢聖尚須漸進況中才乎數易豈不紛錯道路也巴吾縣者宋雜陳楚地故梁國寧陵種龍鄉也今其都尉印文曰種龍尚書御史臺皆以官倉頭為史主賦舍凡守其門戶有秩則田間大夫言其官裁有秩耳嗇者省也夫賦也言消息百姓均其役賦乘者單夫之高爵大夫衣湊帶不為正衛古制本無奴婢奴婢皆是犯事者或原之奴者劣婢者卑陋臧者被臧罪沒入為官奴婢獲者逃亡獲得為奴婢者也易云利見大人大人與聖人其義一也聖者聲也通也言其聞聲知情通于天地條暢萬物故曰聖也賢者堅也堅中廉外論語曰君子上達臧孫紇曰後有達者將在孔丘乎儒者區也言其區別古今居則翫聖哲之詞動則行典籍之道稽先王之制立當時之事綱紀國體原本要化此通儒也若能納而不能出能言而不能行講誦而已無能往來此俗儒也章帝時以賈逵為通儒時人語曰問事不休賈長頭禮云群居五人長者必異席今呼權貴作長者非也春秋之末鄭有賢人者著書一篇號鄭長者謂年長德艾事長於人以之為長者也管子云先生施教弟子則之非知古之道是師者之稱諸生弟子學者非一故曰諸先生者當如醒學者譬如醉言生俱醉獨有醒者祭酒禮云飲酒必祭尊其先也孫卿在齊最是老師故三稱祭酒士詩云殷士膚敏髦士俊秀雅士博達列士有不易之分處士隱居放言易曰師貞丈人吉非徒尊老亦須德行先人也傳云杖德莫如信言其恩德可信杖也禮云十尺曰丈成人之長也里語八尺男子夫者膚也言其知能膚敏弘毅也故曰丈夫論語曰匹夫匹婦傳曰一晝一夜成一日一男一女成一室案古人男女作衣用二匹今人單衣故言匹夫夫人當龍變雲起不繫鄉里若止繫風俗見善不徙故謂之俗人禮言簡不肖案生子鄙陋不似父母曰不肖方言人不事事而放蕩謂之無賴不可恃賴也猶高祖謂太上皇云大人以臣無賴也其它天地遵化易說天先春而後秋地先生而後凋日月先光而後幽是以王者則之亦先教而後刑三皇結繩五帝畫象三王肉刑五霸黠巧此言步驟稍有優劣也大禹闕百品之羞而菲庖廚殷湯寐寢黃屋駕而乘露輿顏色厚所顧盼若以親密也漢書注沛人語初發聲皆言其其者楚言也高祖始登帝位教令言其後以為常牛乃耕農之本百姓所仰為用最大國家之為強弱也建武之初軍役亟動牛亦損耗農業頗廢米石萬錢天愛斯民扶助聖主事有徵應於是旅穀彌望野繭被山丁壯小犢跳梁弄角飲水數石生芻十束當風路夜至死不曲蓬生麻中不扶自直舟漂汎似散蓮花
