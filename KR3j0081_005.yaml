body:
  text: 過譽第四孔子稱大哉中庸之為德其至矣乎又曰君子之道忠恕而已至於訐以為直隱以為義枉以為厚偽以為名此眾人之所致譽而明主之所必討蓋觀過知仁謂中心篤誠而無妨於化者故覆其違理曰過譽也長沙太守汝南郅惲君章少時為郡功曹郡俗冬饗百里內縣皆齎牛酒到府宴飲時太守司徒歐陽歙臨饗禮訖教曰西部督郵繇延天資忠貞稟性公方典部折衝摧破姦雄不嚴而治書曰安民則惠黎民懷之蓋舉善以教則不能者勸今與諸儒共論延功顯之于朝主簿讀教戶吏引延受賜惲前跪曰司正舉觥以君之罪告謝于天明府有言而誤不可覆掩按延資性貪邪外方內圓朋黨搆姦罔上害民所在荒亂虛而不治怨慝並作百姓苦之而明府以惡為善股肱莫爭此既無君又復無臣君臣俱喪孰與偏有君雖傾危臣子扶持不至於亡惲敢再拜奉觥歙甚慚謹按禮諫有五風為上狷為下故入則造膝出則詭辭善則稱君過則稱己暴諫露言罪之大者而歙於饗中用延為吏以紫亂朱大妨王命造次顛沛不及諷諭雖舉觥彊歙可行也今惲久見授任職在昭德塞違為官擇人知延貪邪罔上害民所在荒亂怨慝並作此為惡積愆非一旦一夕之漸也孔子以匹夫朋徒無幾習射矍相之圃三哲而去者過半汝南中土大郡方城四十養老復敬化之至延姦舋彰著無與比崇臧文仲有言見無禮於君者若鷹鸇之逐鳥雀農夫之務去草也何敢宿留不即彈黜姦佞而須於萬人之中乃暴引之是為陷君君子不臨深以為高不因少以為多況創病君父以為己功者哉而論者苟眩虛聲以為美談汝南楚之界也其俗急疾有氣決然自君章之後轉相放式好干上怵忮以采名譽末流論起於愛憎而政在陪隸也司空潁川韓稜少時為郡主簿太守興被風病恍忽誤亂稜陰扶輔其政出入二年署置教令無愆失興子嘗出教欲轉徙吏稜執不聽由是發露被考興免官稜坐禁固章帝即位一切原除也謹按易稱守位以仁尚書無曠庶官詩云彼君子不素飡兮論語陳力就列不能者止漢典吏病百日應免所以卹民急病懲俗逋慝也今興官尊任重經略千里當聽訟侍祠班詔勸課早朝旰食夕惕若厲不以榮祿為樂而以黔首為憂位過招殃靈督其舋風疾恍忽有加無瘳稜統機括知其虛實當聽上病以禮選引何有上欺天子中誣方伯下誑吏民扶輔耄亂政自己出雖幸無闕罪已不容於誅矣為人謀而不忠愛人而以姑息凡人不可況於君子乎上令興負貪昧之罪子被署用之愆章問洶赫父子湮沒執事如此謂禮義何稜宜禁固終身中原非是太原周黨伯況少為鄉佐發黨過於人中辱之黨學春秋長安聞報讎之義輟講下辭歸報讎到與鄉佐相聞期鬭日鄉佐多從兵往使鄉佐先拔刀然後相擊佐欲直令兵擊之黨被創困乏佐服其義勇箯輿養之數日蘇興乃知非其家即徑歸其立勇果乃至於是謹按孝經身體髮膚受之父母不敢毀傷孝之始也樂正子春下堂而傷足三月不出既瘳矣猶有憂色身無擇行口無擇言脩身慎行恐辱先也而伯況被發則得就業鄉佐雖云凶暴何緣侵己今見辱者必有以招之身自取焉何尤於人親不可辱在我何傷凡報讎者謂為父兄耳豈以一朝之忿而肆其狂怒者哉既遠春秋之義殆令先祖不復血食不孝不智而兩有之歸其義勇其義何居汝南陳茂君因為荊州刺史時南陽太守灌恂本名清能茂不入宛城引車到城東為友人衛修母拜到州恂先是茂客仕蒼梧還到修家見修母婦說修坐事繫獄當死因詣府門移辭乞恩隨輩露首入坊中容止嚴恪鬚眉甚偉太守大驚不覺自起立賜巾延請甚嘉敬之即焉出修南陽士大夫謂恂能救解修茂彈繩不撓修竟極罪恂亦以它事去南陽疾惡殺修為之語曰衛修有事陳茂治之衛修無事陳茂殺之謹按春秋王人之微處于諸侯之上坐則專席止則專館朱軒駕駟威烈赫奕就恂素為官速謗當便入傳引見詰問糾其贓狀以時列聞文王日昃不暇食周公坐而俟旦且非為己私皆公也何有忘百姓塗炭之急便迺光昭舊交之問乎鮑宣州牧行部多宿下亭司直舉劾以為輕威損命坐之刑黜今茂泯棄天常進止由己孰使毀之小人譽之自我為之古人病諸以為大譏茂與修善由鴟鴞之愛其子適所以害之者度遼將軍安定皇甫規威明連在大位欲退避弟數上病不見聽會友人上郡太守王旻物故規素縞到下亭迎喪發服送之因令客密告并州刺史胡芳言規擅遠軍營赴私違公當及舉奏荅曰威明欲得避弟故作激發我為朝廷惜其功用何能為此私家計耶規後為中郎將督并涼益三州時有黨事懼見及因先自上言臣前薦故太常張奐才任將帥是附黨也又臣昔論輸左校時太學生張鳳等上書訟臣是為黨人所附也昔有畏舟之危而自投水者蓋憂難於處樂其亟決謹按詩云淑人君子其儀不忒其儀不忒正是四國傳曰一心可以事百君百心不可事一君論語夫子溫良恭儉讓以得之立朝忘家即戎忘身身且忘之況於弟乎方殊俗越溢大為邊害朝廷比辟公旰食規義在出身折衝弭難而誅伐已定當見鎮慰何有挾功苟念去位弟實雋德不患無位而徒闒茸何所堪施彊推轂之亂儀干度孝武皇帝為驃騎將軍霍去病治第舍勑令視之曰匈奴不滅何以家為去病外戚末屬一切武夫尚能抗節洪毅而規世家純儒何獨負哉又以黨事先自勞衒如有白驗其於及己而形兆求不可得唯是從何憚於病曰畏舟之危自投於水憂難於處樂其亟決主幸必不坐太誓有云民之所欲天必從之天作孽猶可違自作孽不可逭人之所忌炎自取之蓋嚴楊惲勳著王室言事過差皆伏大辟以隆主威抑驕侵也規顧弟私也離局姦也誘巧詐也畏舟慢也四罪是矣殺決可也南陽五世公為廣漢太守與司徒長史段遼叔同歲遼叔太子名舊才操鹵鈍小子髡既見齒鄉黨到見股肱曰太守與遼叔同歲恩結締素薄命早亡幸來臨郡今年且以此相饒舉其子如無罪得至後歲貫魚之次敬不有違有主簿柳對曰明府謹終追遠興微繼絕然舊實不如髡宜可授之世公於是厲聲曰丈夫相臨兒女尚欲舉之何謂高下之間耶釋兄用弟此為故殃段氏之家豈稱相遭遇之意乎竟舉舊也世公轉換南陽與東萊太守蔡伯起同歲欲舉其子伯起自乞子瓚尚弱而弟琰幸以成人是歲舉琰明年復舉瓚瓚十四未可見眾常稱病遣詣生交到十八乃始出治劇平春長上書臣甫弱冠未任宰御乞留宿衛尚書劾奏增年受選減年避劇請免瓚官詔書左遷武當左尉會車騎將軍馮緄南征武陵蠻夷緄與伯起同時公府辟瓚為軍曲候瓚歸臥家軍功除新陽長官至下邳相謹按古無孝廉唯有貢士貢士恩義經傳無以也春秋諸侯朝覲會遇大夫亦豫其好禮記曰大夫三月葬同位畢至此言謹終悼亡不說子弟當見寵拔也魯有后成叔聘衛右宰穀留而觴之陳樂而不樂酒酣而不飲送以璧其妻孥隔宅而居之分祿而食之其子長而反其璧孔子稱可寄百里之命託六尺之孤臨大節而不可奪相於之義具於此矣語有曰白頭如新交蓋如舊簞食壺漿會於樹陰臨別眷眷念在報效何有同歲相臨而可拱默者哉春秋因其可褒而褒之若乃世公二郡之舉斯為過矣然世人亦多淺薄在者無之亡者無顧覆之施飢寒緩急視之若遺非徒如此而已至有可否之際受刑誅者人各有心兩不得中夫孝廉平除則有社稷民人傷及民人實宜料度以為後圖汝南戴幼起三年服竟讓財與兄將妻子出客舍中住官池田以耕種為上計史獨車載衣資表汝南太守上計史戴紹車後舉孝廉為陝令謹按禮有東宮西宮辟子之私不足則資有餘亦歸之於宗也此言兄弟無離異之義也凡讓財者類與弟子弟尚幼恩情注希有與兄既出之日可居冢下冢無屋宗家猶有贏田廬田可首粥力者耳何必官池客舍既推獨車復表其上為其飾偽良亦昭晣幼起同辟有薛孟嘗者與弟子共居弟子常求分力不能止固乃聽之都與奴婢引其老者曰與我共事汝不能使之田屋取其荒壞者曰我少時所作買意所戀也器物取其久者曰我服食久身口安之也外有共分之名內實十三耳子弟無幾盡之輒復更分如此者數傳稱袁盎三兄子分而供其公家之費此則然矣論語泰伯三讓民無得而稱之焉何有讓數十萬畏人而不知欲令皦皦乃如是乎方之袁薛差以千里凡同居上也通有無次也讓其下耳況若幼起仍斯不足貴矣江夏太守河內趙仲讓舉司隸茂材為高唐令密乘轝車徑至高唐變易名姓止都亭中十餘日默入市里觀省風俗已呼亭長問新令為誰從何官來何時到也曰縣已遣吏迎垂有起居曰正我是也亭長怖遽拜謁竟便具吏其日入舍乃謁府數十日無故便去為郡功曹所選頗有不用因稱狂亂首走出府門太守以其宿有重名忍而不罪後為大將軍梁冀從事中郎將冬月坐庭中向日解衣裘捕虱已因傾臥厥形悉表露將軍夫人襄城君云不潔清當亟推問將軍嘆曰是趙從事絕清高士也他事若此非一也謹按詩云不愆不忘率由舊章左氏傳曰舊章不可無也凡張官置吏為之律度故能攝固其位天下無覬覦也今仲讓不先謁府乃徑到縣俱諜吏民爾乃入舍論語升車必正立執綏不內顧不掩不備不見人短見禮記戶有二屨不入將上堂聲必揚家且猶若此況於長吏乎君子之仕行其道也民未見德唯詐是聞遠薦功曹策名委質就有不合當徐告退古既待放須起乃逝何得亂道進退自由傲很天常若無君父洪範陳五事以貌為首孝經列三法以服為先仲讓居有田業加之祿賜勢可免凍餒之厄未必須冬日之煖也利不體皆此也河內殷之舊都國分為三康叔之風既激而紂之化由存其俗士大夫本矜好大言而少實行
