body:
  text: 怪神第九禮天子祭天地五嶽四瀆諸侯不過其望也大夫五祀士門戶庶人祖蓋非其鬼而祭之諂也又曰淫祀無福是以隱公將祭鍾巫遇賊蒍氏二世欲解淫神閻樂劫弒仲尼不許子路之禱而消息之節平荀罃不從桑林之祟而晉侯之疾間由是觀之則淫躁而畏者災自取之厥咎嚮應反誠據義內省不疚者物莫能動禍轉為福矣傳曰神者申也怪者疑也孔子稱土之怪為墳羊論語子不語怪力亂神故采其晃著者曰怪神也謹按管子書齊公出於澤見衣紫衣大如轂長如轅拱手而立還歸寢疾數月不出有皇士者見公語驚曰物惡能傷公公自傷也此所謂澤神委蛇者也唯霸主乃得見之於是桓公欣然笑不終日而病愈豫之祖父郴為汲令以夏至日詣見主簿杜宣賜酒時北壁上有懸赤弩照於杯中形如蛇宣畏惡之然不敢不飲其日便得胸腹痛切妨損飲食大用羸露攻治萬端不為愈後郴因事過至宣家窺視問其變故云畏此蛇蛇入腹中郴還聽事思惟良久顧見懸弩必是也則使門下史將鈴下侍徐扶輦載宣於故處設酒杯中故復有蛇因謂宣曰此壁上弩影耳非有他怪宣遂解甚夷懌由是瘳平官至尚書歷四郡有威名焉謹按晏子春秋齊景公病水十日夜夢與二日鬭而不勝晏子朝公曰吾夢與二日鬭而寡人不勝我其死也晏子對曰請召占夢者立於閨使人以車迎召占夢者至曰曷為見召晏子曰公夢與二日鬭不勝恐必死也占夢者曰請反具書晏子曰無反書公無所病病者陰也日者陽也一陰不勝二陽公病將已居三日公病大愈且賜占夢者曰此非臣之功也晏子教臣對也公召晏子將賜之晏子曰占夢者以臣之言對故有益也使臣身言之則不信矣此占夢者之力也臣無功焉公召吏而使兩賜之晏子不為奪人之功占夢者不蔽人之能謹按漢書朱虛侯劉章齊悼惠王子高祖孫也宿衛長安年二十有氣力高后攝政諸呂擅恣章私忿之嘗入侍宴飲章為酒吏自請曰臣將種也請得以軍法行酒有詔可酒酣章進歌儛已而復曰請為太后言耕田歌太后笑曰顧汝父知田耳若生而為王者子安知田乎曰臣知之深耕廣種立苗欲疏非其種者鉏而去之太后默然頃之諸呂有亡酒者章拔劍追斬之而還報曰有亡酒一人臣謹行軍法斬之太后左右大驚業許之矣無以罪也自是諸呂畏憚雖大臣亦皆依之高后崩諸呂作亂欲危社稷章與周勃共誅滅之尊立文帝封城陽王賜黃金千斤立二年薨城陽今莒縣是也自琅琊青州六郡及渤海都邑鄉亭聚落皆為立祠造飾五二千石車商人次第為之立服帶綬備置官屬烹殺謳歌紛籍連日轉相誑曜言有神明其譴問禍福立應歷載彌久莫之匡糾唯樂安太守陳蕃濟南相曹操一切禁絶肅然政清陳曹之後稍復如故安有鬼神能為病者哉豫為營陵令以為章本封朱虛并食此縣春秋國語以勞定國能御大災凡在於他尚列祀典章親高祖之孫進説耕田軍法行酒時固有大志矣及誅諸呂尊立太宗功冠天下社稷已寧同姓如此功烈如彼餘郡禁之可也朱虛與莒宜常血食於是乃移書曰到聞此俗舊多淫祀糜財妨農長亂積惑其侈可忿其愚可愍昔仲尼不許子路之禱晉悼不解桑林之祟死生有命吉凶由人哀我黔黎漸染迷謬豈樂也哉莫之徵耳今條下禁申約吏民為陳利害其有犯者便收朝廷若私遺脫彌彌不絶主者髡截嘆無及已城陽景王縣甚尊之惟王弱冠內侍帷幄呂氏恣睢將危漢室獨見先識權發酒令抑邪扶正忠義洪毅其歆禋祀禮亦宜之於駕乘烹殺倡優男女雜錯是何謂也三邊紛拏師老器弊朝廷旰食百姓囂然禮興在有年飢則損自今聽歲再祀備物而已不得殺牛遠迎他倡賦會宗落造設紛華方廉察之明為身計而復僭失罰與上同明除見處勿後中覺九江逡遒有唐居二山九江逡遒有唐居二山名有神衆巫共為取公嫗歲易男不得復娶女不得復嫁百姓苦之謹按時太守宋均到官主者白出錢給聘男女均曰衆巫與神合契知其旨欲卒取小民不相當於是勑條巫家男女以備公嫗巫扣頭服罪乃殺之是後遂絶會稽俗多淫祀好卜筮民一以牛祭巫祝賦斂受謝民畏其口懼被祟不敢拒逆是以財盡於鬼神産匱於祭祀或貧家不能以時祀至竟言不敢食牛肉或發病且死先為牛鳴其畏懼如此謹按時太守司空第五倫到官先禁絶之掾吏皆諫倫曰夫建功立事在敢斷為政當信經義經言淫祀無福非其鬼而祭之諂也律不得屠殺少齒令鬼神有知不妄飲食民間使其無知又何能禍人遂移書屬縣曉諭百姓民不得有出門之祀督課部吏張設罪罰犯尉以下坐祀依託鬼神恐怖愚民皆按論之有屠牛輒行罰民初恐怖頗搖動不安或接祝妄言倫勑之愈急後遂斷無復有禍祟矣謹按汝南鮦陽有於田得麇者其主未往取也商車十餘乘經澤中行望見此麇著繩因持去念其不事持一鮑魚置其處有頃其主往不見所得麇反見鮑君澤中非人道路怪其如是大以為神轉相告語治病求福多有效驗因為起祀舍衆巫數十帷帳鍾鼓方數百里皆來禱祀號鮑君神其後數年鮑魚主來歷祠下尋問其故曰此我魚也當有何神上堂取之遂從此壞傳曰物之所聚斯有神言人共獎成之耳謹按汝南南頓張助於田中種禾見李核意欲持去顧見空桑中有土因殖種以餘漿溉灌後人見桑中反復生李轉相告語有病目痛者息陰下言李君令我自愈謝以一豚目痛小疾亦行自愈衆犬吠聲因盲者得視遠近翕赫其下車騎常數千百酒肉滂沱間一歲餘張助遠出來還見之驚云此有何神乃我所種耳因就斫也謹按汝南汝陽彭氏墓路頭立一石人在石獸後田家老母到市買數片餌暑熱行疲頓息石人下小瞑遺一片餌去忽不自覺行道人有見者時客適會問何因有是餌客聊調之石人能治病愈者來謝之轉以相語頭痛者摩石人頭腹痛者摩其腹亦還自摩他處放此凡人病自愈者因言得其福力號曰賢士輜輦轂擊帷帳絳天絲竹之音聞數十里尉部常往護視數年亦自歇沫復其故矣世間多有亡人魄持其家語聲氣所説良是謹按陳國張漢直到南陽從京兆尹延叔堅讀左氏傳行後數月鬼物持其女弟言我病死喪在陌上常苦飢寒操一量不借挂屋後楮上傅子方送我五百錢在北牖中皆亡取之又買李幼一頭牛本券在書篋中往求索之悉如其言婦尚不知有此女新從壻家來非其所及家人哀傷益以為審父母諸弟衰絰到來迎喪去精舍數里遇漢直與諸生十餘人相隨漢直顧見其家怪其如此家見漢直謂其鬼也惝惘良久漢直乃前為父拜説其本末且悲且喜凡所聞見若此非一夫死者澌也鬼者歸也精氣消越骨肉歸于土也夏后氏用明器殷人用祭器周人兼用之視民疑也子貢問孔子死者其有知乎曰賜爾死自知之由未晚也董無心云杜伯死親射宣王於鎬京子以為桀紂所殺足以成軍可不須湯武之衆古事既察且復以今驗之人相啖食甚於畜生凡菜肝鱉瘕尚能病人人用物精多有生之最靈者也何不芥蒂於其胸腹而割裂之哉猶死者無知審矣而時有漢直為狗鼠之所為世間亡者多有見神語言飲食其家信以為是益用悲傷謹按司空南陽來季德停喪在殯忽然坐祭床上顏色服飾聲氣熟是也孫兒婦女以次教誡事有條貫鞭撻奴婢皆得其過飲食飽滿辭訣而去家人大哀剝斷絶如是三四家益猒苦其後飲醉形壞但得老狗便朴殺之推問里頭沽酒家狗世間多有狗作變怪撲殺之以血塗門戶然衆得咎殃謹按桂陽太守汝南李叔堅少時為從事在家狗人立行家言當殺之叔堅云犬馬諭君子狗見人行效之何傷叔堅見縣令還解冠榻上狗戴持走家大驚時復云此狗誤觸冠纓冠纓挂著之耳狗於竈前蓄火家益怔忪復云兒婢皆在田中狗助蓄火幸可不煩鄰里此有何惡里中相罵不言無狗怪遂不肯殺後數日狗自暴死卒無纖介之異叔堅辟太尉掾固陵長原武令終享大位子條蜀郡都尉威龍司徒掾凡變怪皆婦女下賤何者小人愚而善畏欲信其説類復裨增文人亦不證察與俱悼懾邪氣承虛故速咎證易曰其亡斯自取災若叔堅者心固於金石妖至而不懼自求多福壯矣乎昔晉文公出獵見大蛇高如隄其長竟路文公曰天子見妖則修德諸侯修政大夫修官士修身乃即齋館忘食與寢請廟曰孤犧牲瘯蠡幣帛不厚罪一也遊逸無度不恤國政罪二也賦役重數刑罰懆剋罪三也有三罪矣敢逃死乎其夜守蛇吏夢天殺蛇曰何故當聖君道為及明視之則已臭爛武帝時迷於鬼神尤信越巫董仲舒數以為言武帝欲驗其道令巫詛仲舒仲舒朝服南面誦詠經論不能傷害而巫者忽死世間多有精物妖怪百端謹按魯相右扶風臧仲英為侍御史家人作食設桉欻有不清塵土投污之炊臨熟不知釜處兵弩自行火從篋簏中起衣物燒盡而簏故完婦女婢使悉亡其鏡數日堂下擲庭中有人聲言汝鏡女孫年三四歲亡之求不能得二三日乃於清中糞下啼若此非一汝南有許季山者素善卜卦言家當有老青狗物內中婉御者益喜與為之誠欲絶殺此狗遣益喜歸鄉里皆如其言因斷無纖介仲英遷太尉長史汝南汝陽西門亭有鬼魅賓客宿止有死亡其厲猒者皆亡髮失精尋問其故云先時頗已有怪物其後郡侍奉掾宜祿鄭奇來去亭六七里有一端正婦人乞得寄載奇初難之然後上車入亭趨至樓下吏卒徼白樓不可上奇云我不惡也時亦昏冥遂上樓與婦人棲宿未明發去亭卒上樓掃除見死婦大驚走白亭長亭長擊鼓會諸廬吏共集診之乃亭西北八里吳氏婦新亡以夜臨殯火滅火至失之家即持去奇發行數里腹痛到南頓利陽亭加劇物故樓遂無敢復上謹按北部督郵西平郅伯夷年三十所大有才決長沙太守郅君章孫也日晡時到亭勑前導人録事掾白今尚早可至前亭曰欲作文書便留吏卒惶怖言當解去傳云督郵欲於樓上觀望亟掃除須臾便上未冥樓鐙階下復有火勑我思道不可見火滅去吏知必有變當用赴照但藏置壺中耳既冥整服坐誦六甲孝經易本訖臥有頃更轉東首以帤巾結兩足幘冠之密拔劍解帶夜時有正黑者四五尺稍高走至柱屋因覆伯夷伯夷持被掩足跣脫幾失再三徐以劍帶繫魅腳呼下火上照視老狸正赤略無衣毛持下燒殺明旦發樓屋得所髡人結百餘因從此絶伯夷舉孝廉益陽長楚辭云鱉令尸亡泝江而上到崏山下蘇起蜀人神之尊立為王漢淮陽太守尹齊其治嚴酷死未及殮怨家欲燒之尸亦飛去見於書傳樓上新婦豈虛也哉世間多有伐木血出以為怪者謹按桂陽太守江夏張遼叔高去鄢令家居買田田中有大樹十餘圍扶疏蓋數畝地播不生穀遣客伐之木中血出客驚怖歸具事白叔高叔高大怒曰老樹汁出此何等血因自嚴行復斫之血大流灑叔高使先斫其枝上有一空處白頭公可長四五尺忽出往赴叔高叔高乃逆格之如此凡殺四頭左右皆怖伏地而叔高恬如也徐熟視非人非獸也遂伐其木其年同司空辟侍御史後為兗州刺史以二千石之尊過鄉里薦祝祖考白日繡衣榮羡如此其禍安居春秋國語曰木石之怪夔魍魎物惡能害人乎世間多有蛇作怪者謹按車騎將軍巴郡馮緄鴻卿為議郎發綬笥有二赤蛇可長三尺分南北走大用憂怖許季山孫曼字寧方得其先人祕要緄請使卜云君後三歲當為邊將東北四五千里官以東為名復五年為大將軍南征此吉祥也鴻卿意解實應且惑居無幾拜尚書遼東太守廷尉太常會武陵蠻夷黃高攻燒南郡鴻卿以威名素著選登亞將統六師之任奮虓虎之勢後為屯騎校尉將作大匠河南尹復再臨理官紀數方面如寧方之言春秋外蛇與內蛇鬭文帝時亦復有此傳志著其云為而鴻卿獨以終吉豈所謂或得神以昌乎世間人家多有見赤白光為變怪者謹按太尉梁國橋玄公祖為司徒長史五月末所於中門外臥夜半後見東壁正白如開門明呼問左右左右莫見因起自往手抆摸之壁自如故還床復見之心大悸動其旦豫適往候之語次相告因為説鄉人有董彥興者即許季山外孫也其探賾索隱窮神知化雖眭孟京房無以過也然天性褊狹羞於卜術間來候師王叔茂請起往迎須臾便與俱還公祖虛禮盛饌下席行觴彥興自陳下土諸生無他異分幣重言甘誠有踧踖頗能別者願得從事公祖辭讓再三爾乃聽之曰府君當有怪白光如門明者然不為害也六月上旬雞鳴時南家哭聲吉也到秋節遷北行郡以金為名位至將軍三公公祖曰怪異如此救族不暇何能致望於所不圖此相饒耳到六月九日未明太尉楊秉暴薨七月二日拜巨鹿太守巨邊有金後為度遼將軍歷登三事今妖見此而應在彼猶趙鞅夢童子裸歌而吳入郢也
